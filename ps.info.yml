name: PS Theme
type: theme
description: 'BNP Paribas RealEstate front-end Drupal theme (fork of Surface) focused on accessibility and flexibility.'
alt text: 'Screenshot of PS, BNP Paribas RealEstate Drupal front-end theme.'
package: Core
core_version_requirement: ^8.9 || ^9 || ^10
base theme: false

libraries:
  - ps/global

regions:
  header: 'Header (deprecated - use header_top, header_navigation, header_actions)'
  header_top: 'Header - Top (Language selector)'
  header_navigation: 'Header - Navigation (Primary menu)'
  header_actions: 'Header - Actions (User menu, search, etc.)'
  highlighted: Highlighted
  breadcrumb: Breadcrumb
  content_above: Content Above
  content: Content
  content_below: Content Below
  footer: Footer
  theme: Theme

ckeditor5-stylesheets:
  - dist/css/global.css
  - dist/css/button.css

components:
  namespaces:
    ps: templates/custom
    images: dist/images
    base: source/patterns/base
    elements: source/patterns/elements
    layouts: source/patterns/layouts
    components: source/patterns/components
    collections: source/patterns/collections
    theme: source/patterns/theme
