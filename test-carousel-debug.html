    aria-label="Test Carousel"
    data-carousel
  >
    <div class="swiper-wrapper ps-carousel__track">
      <div class="swiper-slide ps-carousel__slide" role="group" aria-roledescription="slide" aria-label="Slide 1 of 3">
        <img
          class="ps-carousel__image"
          src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MDAiIGhlaWdodD0iNjAwIj48cmVjdCBmaWxsPSIjMDA5MTVBIiB3aWR0aD0iODAwIiBoZWlnaHQ9IjYwMCIvPjx0ZXh0IGZpbGw9IiNGRkYiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIzMiIgeD0iNTAlIiB5PSI1MCUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPlNsaWRlIDE8L3RleHQ+PC9zdmc+"
          alt="Slide 1"
        />
      </div>
      <div class="swiper-slide ps-carousel__slide" role="group" aria-roledescription="slide" aria-label="Slide 2 of 3">
        <img
          class="ps-carousel__image"
          src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MDAiIGhlaWdodD0iNjAwIj48cmVjdCBmaWxsPSIjRTAzODhDIiB3aWR0aD0iODAwIiBoZWlnaHQ9IjYwMCIvPjx0ZXh0IGZpbGw9IiNGRkYiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIzMiIgeD0iNTAlIiB5PSI1MCUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPlNsaWRlIDI8L3RleHQ+PC9zdmc+"
          alt="Slide 2"
        />
      </div>
      <div class="swiper-slide ps-carousel__slide" role="group" aria-roledescription="slide" aria-label="Slide 3 of 3">
        <img
          class="ps-carousel__image"
          src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MDAiIGhlaWdodD0iNjAwIj48cmVjdCBmaWxsPSIjMEI1RkZGIiB3aWR0aD0iODAwIiBoZWlnaHQ9IjYwMCIvPjx0ZXh0IGZpbGw9IiNGRkYiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIzMiIgeD0iNTAlIiB5PSI1MCUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPlNsaWRlIDM8L3RleHQ+PC9zdmc+"
          alt="Slide 3"
        />
      </div>
    </div>

    <div class="ps-carousel__controls">
      <button
        class="ps-carousel__button ps-carousel__prev"
        type="button"
        aria-label="Previous slide"
        data-carousel-prev
      >
        <span class="ps-carousel__icon" data-icon="chevron-left" aria-hidden="true"></span>
      </button>
      <button
        class="ps-carousel__button ps-carousel__next"
        type="button"
        aria-label="Next slide"
        data-carousel-next
      >
        <span class="ps-carousel__icon" data-icon="chevron-right" aria-hidden="true"></span>
      </button>
    </div>

    <div class="swiper-pagination ps-carousel__pagination"></div>
  </section>

  <script type="module">
    import { Swiper, Navigation, Pagination, Keyboard, A11y } from './dist/js/vendors/vendors.js';
    
    console.log('Swiper loaded:', Swiper);
    
    // Initialize carousel
    const carouselEl = document.querySelector('[data-carousel]');
    if (carouselEl) {
      const swiper = new Swiper(carouselEl, {
        modules: [Navigation, Pagination, Keyboard, A11y],
        slidesPerView: 1,
        spaceBetween: 0,
        speed: 300,
        navigation: {
          nextEl: carouselEl.querySelector('[data-carousel-next]'),
          prevEl: carouselEl.querySelector('[data-carousel-prev]'),
          disabledClass: 'is-disabled',
        },
        pagination: {
          el: carouselEl.querySelector('.ps-carousel__pagination'),
          clickable: true,
          bulletClass: 'swiper-pagination-bullet',
          bulletActiveClass: 'swiper-pagination-bullet-active',
        },
        keyboard: {
          enabled: true,
          onlyInViewport: true,
        },
        a11y: {
          enabled: true,
        },
      });
      
      console.log('Carousel initialized:', swiper);
    }
  </script>
</body>
</html>
