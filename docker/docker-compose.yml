services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ps_nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - type: bind
        source: ../src
        target: /var/www/html
        consistency: delegated
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    tmpfs:
      - /tmp

  php:
    build:
      context: ./php
    container_name: ps_php
    depends_on:
      - postgres
      - memcache
      - mailpit
    working_dir: /var/www/html
    env_file:
      - ../src/.env
    environment:
      MAILPIT_HOST: mailpit
      MAILPIT_PORT: 1025
    volumes:
      - type: bind
        source: ../src
        target: /var/www/html
        consistency: delegated
    tmpfs:
      - /tmp

  postgres:
    image: postgres:17
    container_name: ps_postgres
    env_file:
      - ../src/.env
    environment:
      POSTGRES_DB: drupal
      POSTGRES_USER: drupal
      POSTGRES_PASSWORD: drupal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multisite.sh:/docker-entrypoint-initdb.d/init-multisite.sh:ro

  memcache:
    image: memcached:1.6-alpine
    container_name: ps_memcache
    ports:
      - "11211:11211"

  solr:
    image: solr:9
    container_name: ps_solr
    environment:
      SOLR_MODULES: analysis-extras
    ports:
      - "8983:8983"
    volumes:
      - solr_data:/var/solr
      - ../conf/solr:/opt/solr/conf-export:ro

  npm:
    image: node:20-alpine
    container_name: ps_npm
    working_dir: /workspace
    volumes:
      - ../src:/workspace
    command: ["sh", "-lc", "tail -f /dev/null"]

  mailpit:
    image: axllent/mailpit:latest
    container_name: ps_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  solr_data: