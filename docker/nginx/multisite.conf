# Property Search local multisite — one HTTP listener per country.
# Ports and server_name values must match web/sites/countries.yml (dev_port)
# and APP_DOMAIN_* / APP_DOMAIN_*_ADMIN in src/.env.

server {
    listen 8080;
    server_name com.localhost admin.com.localhost;
    root /var/www/html/web;
    index index.php index.html;
    client_max_body_size 64M;
    include /etc/nginx/conf.d/snippets/drupal-locations.conf;
}

