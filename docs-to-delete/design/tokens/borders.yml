# Version: 1.0.0

# =============================================================================
# BORDER WIDTH
# =============================================================================

border:
  width:
    none:
      value: "0"
      usage: "Aucune bordure"
      
    thin:
      value: "1px"
      usage: "Bordures fines, séparateurs subtils"
      
    default:
      value: "2px"
      usage: "Bordure par défaut (design PS)"
      
    thick:
      value: "3px"
      usage: "Bordures épaisses, emphasis"
      
    focus:
      value: "2px"
      usage: "Outline de focus"

# =============================================================================
# BORDER RADIUS
# =============================================================================

  radius:
    none:
      value: "0"
      usage: "Design carré (défaut PS)"
      
    small:
      value: "2px"
      usage: "Légère rondeur (si nécessaire)"
      
    default:
      value: "4px"
      usage: "Rondeur standard (badges, tags)"
      
    medium:
      value: "8px"
      usage: "Rondeur moyenne (cards alternatives)"
      
    large:
      value: "12px"
      usage: "Grande rondeur (modales)"
      
    xlarge:
      value: "16px"
      usage: "Très grande rondeur"
      
    full:
      value: "9999px"
      usage: "Arrondi complet (pills, avatars circulaires)"

# =============================================================================
# BORDER STYLE
# =============================================================================

  style:
    solid:
      value: "solid"
      usage: "Bordure pleine (défaut)"
      
    dashed:
      value: "dashed"
      usage: "Bordure pointillée (zones de drop, disabled)"
      
    dotted:
      value: "dotted"
      usage: "Bordure en points (séparateurs légers)"
      
    none:
      value: "none"
      usage: "Aucune bordure"

# =============================================================================
# BORDER COLORS (référence aux tokens colors)
# =============================================================================

  color:
    default:
      value: "#D6DBDE"
      reference: "color.border.default"
      usage: "Bordure par défaut"
      
    light:
      value: "#E8EAED"
      reference: "color.border.light"
      usage: "Bordure légère"
      
    dark:
      value: "#B0B8BD"
      reference: "color.border.dark"
      usage: "Bordure accentuée"
      
    focus:
      value: "#0288D1"
      reference: "color.interactive.focus.outline"
      usage: "Bordure de focus"
      
    error:
      value: "#D32F2F"
      reference: "color.semantic.error"
      usage: "Bordure d'erreur"
      
    success:
      value: "#00915A"
      reference: "color.semantic.success"
      usage: "Bordure de succès"

# =============================================================================
# BORDER PRESETS (Composants)
# =============================================================================

preset:
  # Champs de formulaire
  field:
    default:
      width: "2px"
      style: "solid"
      color: "#D6DBDE"
      radius: "0"
      
    hover:
      width: "2px"
      style: "solid"
      color: "#B0B8BD"
      radius: "0"
      
    focus:
      width: "2px"
      style: "solid"
      color: "#0288D1"
      radius: "0"
      
    error:
      width: "2px"
      style: "solid"
      color: "#D32F2F"
      radius: "0"
      
    disabled:
      width: "2px"
      style: "dashed"
      color: "#E8EAED"
      radius: "0"

  # Boutons
  button:
    primary:
      width: "0"
      radius: "0"
      
    secondary:
      width: "2px"
      style: "solid"
      color: "currentColor"
      radius: "0"

  # Cards
  card:
    default:
      width: "1px"
      style: "solid"
      color: "#E8EAED"
      radius: "0"
      
    hover:
      width: "2px"
      style: "solid"
      color: "#D6DBDE"
      radius: "0"

  # Modales
  modal:
    default:
      width: "0"
      radius: "0"
      shadow: "0 10px 40px rgba(0, 0, 0, 0.2)"

  # Dropdowns
  dropdown:
    default:
      width: "2px"
      style: "solid"
      color: "#D6DBDE"
      radius: "0"
      shadow: "0 4px 12px rgba(0, 0, 0, 0.1)"

  # Dividers (séparateurs)
  divider:
    horizontal:
      width: "1px"
      style: "solid"
      color: "#E8EAED"
      
    vertical:
      width: "1px"
      style: "solid"
      color: "#E8EAED"

# =============================================================================
# FOCUS STYLES
# =============================================================================

focus:
  outline:
    width: "2px"
    style: "solid"
    color: "#0288D1"
    offset: "2px"
    
  ring:
    width: "4px"
    style: "solid"
    color: "rgba(2, 136, 209, 0.3)"
    blur: "0"
    
  visible_always:
    note: "Toujours visible pour accessibilité clavier"

# =============================================================================
# GUIDELINES
# =============================================================================

guidelines:
  default_width: "2px"
  default_radius: "0 (carré)"
  default_style: "solid"
  
  philosophy:
    - "Design PS privilégie les formes carrées (radius: 0)"
    - "Bordures de 2px pour visibilité optimale"
    - "Exception: radius full pour avatars/pills"
    
  accessibility:
    - "Focus outline obligatoire (2px minimum)"
    - "Contraste 3:1 minimum pour les bordures"
    - "Ne pas utiliser uniquement la bordure pour indiquer un état"
    
  responsive:
    - "Bordures identiques sur tous les breakpoints"
    - "Éviter les bordures < 1px sur mobile"

# =============================================================================
# CSS VARIABLES MAPPING
# =============================================================================

css_variables:
  generation:
    prefix: "--ps-border"
    examples:
      - "--ps-border-width-default: 2px"
      - "--ps-border-radius-none: 0"
      - "--ps-border-color-default: #D6DBDE"
      - "--ps-border-style-solid: solid"
      
  utility_classes:
    - ".ps-border { border: var(--ps-border-width-default) solid var(--ps-border-color-default); }"
    - ".ps-border-0 { border: 0; }"
    - ".ps-border-focus { border-color: var(--ps-border-color-focus); }"
    - ".ps-rounded-none { border-radius: var(--ps-border-radius-none); }"
    - ".ps-rounded-full { border-radius: var(--ps-border-radius-full); }"
