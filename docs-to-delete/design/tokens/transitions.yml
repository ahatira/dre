# PS Design System - Transition Tokens
# Version: 1.0.0

# =============================================================================
# DURATIONS (Durées d'animation)
# =============================================================================

transition:
  duration:
    instant:
      value: "0ms"
      usage: "Pas d'animation"
      
    fastest:
      value: "75ms"
      usage: "Micro-interactions (checkbox, toggle)"
      
    fast:
      value: "150ms"
      usage: "Hover states, tooltips"
      
    normal:
      value: "250ms"
      usage: "Transitions standard (défaut)"
      
    slow:
      value: "350ms"
      usage: "Transitions complexes (dropdowns, modales)"
      
    slower:
      value: "500ms"
      usage: "Animations d'entrée/sortie"
      
    slowest:
      value: "700ms"
      usage: "Animations longues (hero, onboarding)"

# =============================================================================
# EASING FUNCTIONS (Courbes d'animation)
# =============================================================================

  easing:
    linear:
      value: "linear"
      cubic_bezier: "cubic-bezier(0, 0, 1, 1)"
      usage: "Animations linéaires (progress bars)"
      
    ease:
      value: "ease"
      cubic_bezier: "cubic-bezier(0.25, 0.1, 0.25, 1)"
      usage: "Défaut navigateur"
      
    ease_in:
      value: "ease-in"
      cubic_bezier: "cubic-bezier(0.42, 0, 1, 1)"
      usage: "Accélération (sortie d'écran)"
      
    ease_out:
      value: "ease-out"
      cubic_bezier: "cubic-bezier(0, 0, 0.58, 1)"
      usage: "Décélération (entrée d'écran) - RECOMMANDÉ"
      
    ease_in_out:
      value: "ease-in-out"
      cubic_bezier: "cubic-bezier(0.42, 0, 0.58, 1)"
      usage: "Accélération puis décélération"
      
    # Easing personnalisés (Material Design inspired)
    standard:
      cubic_bezier: "cubic-bezier(0.4, 0.0, 0.2, 1)"
      usage: "Transitions standard (défaut PS)"
      
    decelerate:
      cubic_bezier: "cubic-bezier(0.0, 0.0, 0.2, 1)"
      usage: "Entrées d'éléments (recommandé)"
      
    accelerate:
      cubic_bezier: "cubic-bezier(0.4, 0.0, 1, 1)"
      usage: "Sorties d'éléments"
      
    sharp:
      cubic_bezier: "cubic-bezier(0.4, 0.0, 0.6, 1)"
      usage: "Transitions rapides et précises"
      
    bounce:
      cubic_bezier: "cubic-bezier(0.68, -0.55, 0.265, 1.55)"
      usage: "Effet rebond (modals, tooltips)"

# =============================================================================
# TRANSITION PROPERTIES
# =============================================================================

  property:
    all:
      value: "all"
      usage: "Toutes les propriétés (à éviter, performance)"
      
    opacity:
      value: "opacity"
      usage: "Fondu (fade in/out)"
      
    transform:
      value: "transform"
      usage: "Transformations (scale, translate, rotate)"
      
    color:
      value: "color"
      usage: "Couleur de texte"
      
    background:
      value: "background-color"
      usage: "Couleur de fond"
      
    border:
      value: "border-color"
      usage: "Couleur de bordure"
      
    box_shadow:
      value: "box-shadow"
      usage: "Ombres"
      
    height:
      value: "height"
      usage: "Hauteur (accordions, collapse)"
      
    width:
      value: "width"
      usage: "Largeur"
      
    max_height:
      value: "max-height"
      usage: "Hauteur maximale (accordions recommandé)"

# =============================================================================
# TRANSITION PRESETS (Composants)
# =============================================================================

preset:
  # Boutons
  button:
    value: "background-color 150ms cubic-bezier(0.4, 0.0, 0.2, 1), color 150ms cubic-bezier(0.4, 0.0, 0.2, 1), border-color 150ms cubic-bezier(0.4, 0.0, 0.2, 1), transform 150ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    duration: "150ms"
    easing: "standard"
    properties: ["background-color", "color", "border-color", "transform"]
    
  # Liens
  link:
    value: "color 150ms cubic-bezier(0.4, 0.0, 0.2, 1), text-decoration-color 150ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    duration: "150ms"
    easing: "standard"
    properties: ["color", "text-decoration-color"]
    
  # Cards
  card:
    value: "box-shadow 250ms cubic-bezier(0.4, 0.0, 0.2, 1), transform 250ms cubic-bezier(0.4, 0.0, 0.2, 1), border-color 250ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    duration: "250ms"
    easing: "standard"
    properties: ["box-shadow", "transform", "border-color"]
    
  # Champs de formulaire
  field:
    value: "border-color 150ms cubic-bezier(0.4, 0.0, 0.2, 1), box-shadow 150ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    duration: "150ms"
    easing: "standard"
    properties: ["border-color", "box-shadow"]
    
  # Modales
  modal:
    enter:
      value: "opacity 250ms cubic-bezier(0.0, 0.0, 0.2, 1), transform 250ms cubic-bezier(0.0, 0.0, 0.2, 1)"
      duration: "250ms"
      easing: "decelerate"
      properties: ["opacity", "transform"]
      
    exit:
      value: "opacity 200ms cubic-bezier(0.4, 0.0, 1, 1), transform 200ms cubic-bezier(0.4, 0.0, 1, 1)"
      duration: "200ms"
      easing: "accelerate"
      properties: ["opacity", "transform"]
      
  # Dropdowns
  dropdown:
    enter:
      value: "opacity 150ms cubic-bezier(0.0, 0.0, 0.2, 1), transform 150ms cubic-bezier(0.0, 0.0, 0.2, 1)"
      duration: "150ms"
      easing: "decelerate"
      
    exit:
      value: "opacity 100ms cubic-bezier(0.4, 0.0, 1, 1)"
      duration: "100ms"
      easing: "accelerate"
      
  # Tooltips
  tooltip:
    enter:
      value: "opacity 100ms cubic-bezier(0.0, 0.0, 0.2, 1)"
      duration: "100ms"
      easing: "decelerate"
      delay: "300ms"
      
    exit:
      value: "opacity 75ms cubic-bezier(0.4, 0.0, 1, 1)"
      duration: "75ms"
      easing: "accelerate"
      
  # Accordions
  accordion:
    value: "max-height 350ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    duration: "350ms"
    easing: "standard"
    properties: ["max-height"]
    
  # Tabs
  tabs:
    indicator:
      value: "transform 250ms cubic-bezier(0.4, 0.0, 0.2, 1), width 250ms cubic-bezier(0.4, 0.0, 0.2, 1)"
      duration: "250ms"
      easing: "standard"
      properties: ["transform", "width"]

# =============================================================================
# ANIMATIONS (Keyframes)
# =============================================================================

animation:
  # Fade
  fade_in:
    duration: "250ms"
    easing: "cubic-bezier(0.0, 0.0, 0.2, 1)"
    keyframes:
      from: "opacity: 0"
      to: "opacity: 1"
      
  fade_out:
    duration: "200ms"
    easing: "cubic-bezier(0.4, 0.0, 1, 1)"
    keyframes:
      from: "opacity: 1"
      to: "opacity: 0"
      
  # Slide
  slide_in_up:
    duration: "250ms"
    easing: "cubic-bezier(0.0, 0.0, 0.2, 1)"
    keyframes:
      from: "transform: translateY(20px); opacity: 0"
      to: "transform: translateY(0); opacity: 1"
      
  slide_out_down:
    duration: "200ms"
    easing: "cubic-bezier(0.4, 0.0, 1, 1)"
    keyframes:
      from: "transform: translateY(0); opacity: 1"
      to: "transform: translateY(20px); opacity: 0"
      
  # Scale
  scale_in:
    duration: "250ms"
    easing: "cubic-bezier(0.0, 0.0, 0.2, 1)"
    keyframes:
      from: "transform: scale(0.95); opacity: 0"
      to: "transform: scale(1); opacity: 1"
      
  scale_out:
    duration: "200ms"
    easing: "cubic-bezier(0.4, 0.0, 1, 1)"
    keyframes:
      from: "transform: scale(1); opacity: 1"
      to: "transform: scale(0.95); opacity: 0"
      
  # Spin (loading)
  spin:
    duration: "1000ms"
    easing: "linear"
    iteration: "infinite"
    keyframes:
      from: "transform: rotate(0deg)"
      to: "transform: rotate(360deg)"
      
  # Pulse
  pulse:
    duration: "2000ms"
    easing: "cubic-bezier(0.4, 0.0, 0.6, 1)"
    iteration: "infinite"
    keyframes:
      "0%, 100%": "opacity: 1"
      "50%": "opacity: 0.5"
      
  # Bounce
  bounce:
    duration: "1000ms"
    easing: "cubic-bezier(0.68, -0.55, 0.265, 1.55)"
    keyframes:
      "0%, 100%": "transform: translateY(0)"
      "50%": "transform: translateY(-10px)"

# =============================================================================
# GUIDELINES
# =============================================================================

guidelines:
  performance:
    - "Privilégier transform et opacity (GPU accelerated)"
    - "Éviter transition: all (performance)"
    - "Spécifier les propriétés exactes"
    
  timing:
    - "150ms: interactions rapides (hover, focus)"
    - "250ms: transitions standard (défaut)"
    - "350ms: animations complexes (accordions, modales)"
    
  easing:
    - "cubic-bezier(0.4, 0.0, 0.2, 1): défaut PS"
    - "ease-out (decelerate): entrées d'éléments"
    - "ease-in (accelerate): sorties d'éléments"
    
  accessibility:
    - "Respecter prefers-reduced-motion"
    - "Désactiver animations si demandé"
    - "Pas d'animations > 5 secondes sans contrôle"
    
  ux:
    - "Animations subtiles (< 500ms généralement)"
    - "Cohérence: mêmes durées pour interactions similaires"
    - "Ne pas bloquer l'interaction pendant l'animation"

# =============================================================================
# MEDIA QUERY (Reduced Motion)
# =============================================================================

reduced_motion:
  preference: "prefers-reduced-motion: reduce"
  behavior:
    - "Désactiver toutes les animations non essentielles"
    - "Réduire les durées à instant (0ms)"
    - "Conserver les transitions d'état critiques"
  example: |
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

# =============================================================================
# CSS VARIABLES MAPPING
# =============================================================================

css_variables:
  generation:
    prefix: "--ps-transition"
    examples:
      - "--ps-transition-duration-fast: 150ms"
      - "--ps-transition-duration-normal: 250ms"
      - "--ps-transition-easing-standard: cubic-bezier(0.4, 0.0, 0.2, 1)"
      - "--ps-transition-button: background-color 150ms cubic-bezier(0.4, 0.0, 0.2, 1)"
      
  utility_classes:
    - ".ps-transition { transition: all var(--ps-transition-duration-normal) var(--ps-transition-easing-standard); }"
    - ".ps-transition-fast { transition-duration: var(--ps-transition-duration-fast); }"
    - ".ps-transition-slow { transition-duration: var(--ps-transition-duration-slow); }"
    - ".ps-transition-none { transition: none; }"
