header:
  title: 'Typography'
  description: 'Complete PS Design System typography scale, including semantic headings, display classes, body text, and font weights.'
  badge: 'Design Tokens'
  meta:
    - label: 'Heading Levels'
      value: '6 (h1–h6)'
    - label: 'Display Sizes'
      value: '6 (.display-1 to .display-6)'
    - label: 'Font Weights'
      value: '3 (300, 400, 700)'
    - label: 'Source'
      value: 'props/fonts.css'

demo:
  headings:
    - level: 'h1'
      token: '--font-size-10'
      description: 'Main page heading (3rem/48px)'
    - level: 'h2'
      token: '--font-size-9'
      description: 'Section title (2.5rem/40px)'
    - level: 'h3'
      token: '--font-size-8'
      description: 'Subsection (2.25rem/36px)'
    - level: 'h4'
      token: '--font-size-7'
      description: 'Tertiary title (2rem/32px)'
    - level: 'h5'
      token: '--font-size-6'
      description: 'Minor heading (1.75rem/28px)'
    - level: 'h6'
      token: '--font-size-5'
      description: 'Small heading (1.5rem/24px)'

  display_classes:
    - class: '.display-1'
      token: '--font-size-14'
      description: 'Hero/showcase text (7.5rem/120px)'
    - class: '.display-2'
      token: '--font-size-13'
      description: 'Large impact (5rem/80px)'
    - class: '.display-3'
      token: '--font-size-12'
      description: 'Campaign headline (4rem/64px)'
    - class: '.display-4'
      token: '--font-size-11'
      description: 'Feature title (3.5rem/56px)'
    - class: '.display-5'
      token: '--font-size-10'
      description: 'Emphasis text (3rem/48px)'
    - class: '.display-6'
      token: '--font-size-9'
      description: 'Alternative heading (2.5rem/40px)'

  body_text:
    - class: '&lt;p&gt; (default)'
      token: '--font-size-1'
      description: 'Body paragraph (1rem/16px), --leading-normal'
    - class: '.lead'
      token: '--font-size-2'
      description: 'Lead text (1.125rem/18px), --leading-relaxed'
    - class: '&lt;small&gt;'
      token: '--font-size-0'
      description: 'Small text (0.875rem/14px)'
    - class: '.micro'
      token: '--font-size--1'
      description: 'Micro text (0.75rem/12px)'

  font_weights:
    - name: 'Light'
      token: '--font-weight-300'
      value: 300
      usage: 'Subtle emphasis (rarely used)'
    - name: 'Regular'
      token: '--font-weight-400'
      value: 400
      usage: 'Body text (default)'
    - name: 'Bold'
      token: '--font-weight-700'
      value: 700
      usage: 'Headings and emphasis'
