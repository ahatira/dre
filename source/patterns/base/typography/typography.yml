---
# PS Theme Typography System - Bootstrap Style
# Complete semantic typography scale with examples and token references

headings:
  - level: 'h1'
    name: 'Heading 1'
    example: 'h1. Bootstrap heading'
    size_value: 'var(--font-size-10)'
    weight: 'var(--font-weight-700)'
    leading: 'var(--leading-tight)'
  - level: 'h2'
    name: 'Heading 2'
    example: 'h2. Bootstrap heading'
    size_value: 'var(--font-size-9)'
    weight: 'var(--font-weight-700)'
    leading: 'var(--leading-tight)'
  - level: 'h3'
    name: 'Heading 3'
    example: 'h3. Bootstrap heading'
    size_value: 'var(--font-size-8)'
    weight: 'var(--font-weight-700)'
    leading: 'var(--leading-tight)'
  - level: 'h4'
    name: 'Heading 4'
    example: 'h4. Bootstrap heading'
    size_value: 'var(--font-size-7)'
    weight: 'var(--font-weight-700)'
    leading: 'var(--leading-snug)'
  - level: 'h5'
    name: 'Heading 5'
    example: 'h5. Bootstrap heading'
    size_value: 'var(--font-size-6)'
    weight: 'var(--font-weight-700)'
    leading: 'var(--leading-snug)'
  - level: 'h6'
    name: 'Heading 6'
    example: 'h6. Bootstrap heading'
    size_value: 'var(--font-size-5)'
    weight: 'var(--font-weight-700)'
    leading: 'var(--leading-normal)'

body:
  - name: 'Body Large'
    example: 'This is a larger body text style, useful for callouts, introductions, and emphasized paragraphs that need more visual prominence.'
    size: 'lead'
    size_value: 'var(--font-size-2)'
    weight: 'var(--font-weight-400)'
    leading: 'var(--leading-7)'
    description: 'Lead body text for emphasis'
  - name: 'Body Regular'
    example: 'This is standard body text used throughout paragraphs and main content areas. It provides the primary reading experience for users navigating your interface.'
    size: 'body'
    size_value: 'var(--font-size-1)'
    weight: 'var(--font-weight-400)'
    leading: 'var(--leading-6)'
    description: 'Default paragraph text'
  - name: 'Body Small'
    example: 'This is smaller body text suitable for secondary information, helper text, and fine print that requires less visual emphasis.'
    size: 'small'
    size_value: 'var(--font-size-0)'
    weight: 'var(--font-weight-400)'
    leading: 'var(--leading-5)'
    description: 'Small secondary text'

utility:
  - name: 'Overline'
    example: 'Small Label'
    size: 'overline'
    size_value: 'var(--font-size--1)'
    weight: 'var(--font-weight-600)'
    tracking: 'var(--tracking-wide)'
    description: 'Uppercase labels and markers'
  - name: 'Caption'
    example: 'Small caption text for descriptions and metadata'
    size: 'caption'
    size_value: 'var(--font-size--1)'
    weight: 'var(--font-weight-400)'
    tracking: null
    description: 'Small secondary captions'
  - name: 'Code'
    example: '&lt;button class="btn btn-primary"&gt;Click me&lt;/button&gt;'
    size: 'code'
    size_value: 'var(--font-size--1)'
    weight: 'var(--font-weight-400)'
    tracking: null
    description: 'Monospace code snippets'

scales:
  - name: 'Font Sizes'
    tokens:
      - 'var(--font-size--2)'
      - 'var(--font-size--1)'
      - 'var(--font-size-0)'
      - 'var(--font-size-1)'
      - 'var(--font-size-2)'
      - 'var(--font-size-3)'
      - 'var(--font-size-4)'
      - 'var(--font-size-5)'
      - 'var(--font-size-6)'
      - 'var(--font-size-7)'
      - 'var(--font-size-8)'
      - 'var(--font-size-9)'
      - 'var(--font-size-10)'
      - 'var(--font-size-11)'
      - 'var(--font-size-12)'
      - 'var(--font-size-13)'
      - 'var(--font-size-14)'
  - name: 'Font Weights'
    tokens:
      - 'var(--font-weight-300)'
      - 'var(--font-weight-400)'
      - 'var(--font-weight-500)'
      - 'var(--font-weight-600)'
      - 'var(--font-weight-700)'
      - 'var(--font-weight-800)'
      - 'var(--font-weight-900)'
  - name: 'Line Heights'
    tokens:
      - 'var(--leading-3)'
      - 'var(--leading-4)'
      - 'var(--leading-5)'
      - 'var(--leading-6)'
      - 'var(--leading-7)'
      - 'var(--leading-8)'
      - 'var(--leading-9)'
      - 'var(--leading-10)'
      - 'var(--leading-none)'
      - 'var(--leading-tight)'
      - 'var(--leading-snug)'
      - 'var(--leading-normal)'
      - 'var(--leading-relaxed)'
      - 'var(--leading-loose)'
  - name: 'Letter Spacing'
    tokens:
      - 'var(--tracking-tighter)'
      - 'var(--tracking-tight)'
      - 'var(--tracking-normal)'
      - 'var(--tracking-wide)'
      - 'var(--tracking-wider)'
      - 'var(--tracking-widest)'
