---
# PS Theme Typography System
# Semantic typography scale with headings, body text, and utility sizes

headings:
  - level: 'h1'
    name: 'Heading 1'
    description: 'Display heading - page titles'
    size: '--font-size-10'
    size_value: '3rem (48px)'
    weight: '700'
    leading: '--leading-8'
    example: 'Design System'
  - level: 'h2'
    name: 'Heading 2'
    description: 'Primary heading - section titles'
    size: '--font-size-8'
    size_value: '2.25rem (36px)'
    weight: '700'
    leading: '--leading-7'
    example: 'Typography'
  - level: 'h3'
    name: 'Heading 3'
    description: 'Secondary heading - subsections'
    size: '--font-size-6'
    size_value: '1.75rem (28px)'
    weight: '700'
    leading: '--leading-6'
    example: 'Semantic Scales'
  - level: 'h4'
    name: 'Heading 4'
    description: 'Tertiary heading'
    size: '--font-size-5'
    size_value: '1.5rem (24px)'
    weight: '700'
    leading: '--leading-6'
    example: 'Component Headings'
  - level: 'h5'
    name: 'Heading 5'
    description: 'Small heading - labels'
    size: '--font-size-3'
    size_value: '1.25rem (20px)'
    weight: '700'
    leading: '--leading-5'
    example: 'Card Titles'
  - level: 'h6'
    name: 'Heading 6'
    description: 'Extra small heading - minor labels'
    size: '--font-size-2'
    size_value: '1.125rem (18px)'
    weight: '600'
    leading: '--leading-5'
    example: 'Section Label'

body:
  - name: 'Body Large'
    description: 'Main content - articles, descriptions'
    size: '--font-size-2'
    size_value: '1.125rem (18px)'
    weight: '400'
    leading: '--leading-7'
    example: 'Lead paragraph with larger font for emphasis'
  - name: 'Body Regular'
    description: 'Default body text'
    size: '--font-size-1'
    size_value: '1rem (16px)'
    weight: '400'
    leading: '--leading-6'
    example: 'Standard paragraph text used throughout the interface and content areas.'
  - name: 'Body Small'
    description: 'Secondary content - captions, metadata'
    size: '--font-size-0'
    size_value: '0.875rem (14px)'
    weight: '400'
    leading: '--leading-5'
    example: 'Small text for supplementary information'

utility:
  - name: 'Overline'
    description: 'Labels and tags'
    size: '--font-size--1'
    size_value: '0.75rem (12px)'
    weight: '600'
    leading: '--leading-4'
    tracking: '--tracking-wide'
    example: 'CATEGORY LABEL'
  - name: 'Caption'
    description: 'Extra small text - timestamps, hints'
    size: '--font-size--1'
    size_value: '0.75rem (12px)'
    weight: '400'
    leading: '--leading-4'
    example: 'Posted 2 hours ago'
  - name: 'Code'
    description: 'Code snippets and technical text'
    size: '--font-size--1'
    size_value: '0.75rem (12px)'
    weight: '400'
    family: '--font-mono'
    example: 'const theme = createTheme()'

scales:
  - name: 'Font Sizes'
    tokens:
      - '--font-size--2: 0.625rem (10px)'
      - '--font-size--1: 0.75rem (12px)'
      - '--font-size-0: 0.875rem (14px)'
      - '--font-size-1: 1rem (16px) - Default'
      - '--font-size-2: 1.125rem (18px)'
      - '--font-size-3: 1.25rem (20px)'
      - '--font-size-4: 1.375rem (22px)'
      - '--font-size-5: 1.5rem (24px)'
      - '--font-size-6: 1.75rem (28px)'
      - '--font-size-7: 2rem (32px)'
      - '--font-size-8: 2.25rem (36px)'
      - '--font-size-9: 2.5rem (40px)'
      - '--font-size-10: 3rem (48px)'
      - '--font-size-11: 3.5rem (56px)'
      - '--font-size-12: 4rem (64px)'
      - '--font-size-13: 5rem (80px)'
      - '--font-size-14: 7.5rem (120px)'

  - name: 'Line Heights'
    tokens:
      - '--leading-3: 0.75rem (12px)'
      - '--leading-4: 1rem (16px)'
      - '--leading-5: 1.25rem (20px)'
      - '--leading-6: 1.5rem (24px)'
      - '--leading-7: 1.75rem (28px)'
      - '--leading-8: 2rem (32px)'
      - '--leading-9: 2.25rem (36px)'
      - '--leading-10: 2.5rem (40px)'
      - '--leading-none: 1'
      - '--leading-tight: 1.25'
      - '--leading-snug: 1.375'
      - '--leading-normal: 1.5 - Default'
      - '--leading-relaxed: 1.625'
      - '--leading-loose: 2'

  - name: 'Font Weights'
    tokens:
      - '--font-weight-300: Light'
      - '--font-weight-400: Regular - Default'
      - '--font-weight-500: Medium'
      - '--font-weight-600: Semibold'
      - '--font-weight-700: Bold'
      - '--font-weight-800: Extra Bold'

  - name: 'Font Families'
    tokens:
      - '--font-sans: BNPP Sans (Primary)'
      - '--font-condensed: BNPP Sans Condensed'
      - '--font-alt: Open Sans (Fallback)'
      - '--font-system: System fonts'
      - '--font-mono: Monospace (Code)'
