---
# Current PS Theme Color System
# Matches source/props/colors.css (neutrals + palettes)
# Semantic colors are in source/props/brand.css

neutrals:
  Gray:
    - name: 'Gray 50'
      var: '--gray-50'
      value: 'hsl(210, 20%, 98%)'
      usage: 'Lightest backgrounds'
    - name: 'Gray 100'
      var: '--gray-100'
      value: 'hsl(220, 14%, 96%)'
      usage: 'Subtle backgrounds'
    - name: 'Gray 200'
      var: '--gray-200'
      value: 'hsl(220, 13%, 91%)'
      usage: 'Borders, dividers'
    - name: 'Gray 300'
      var: '--gray-300'
      value: 'hsl(216, 12%, 84%)'
      usage: 'Disabled backgrounds'
    - name: 'Gray 400'
      var: '--gray-400'
      value: 'hsl(218, 11%, 65%)'
      usage: 'Placeholders'
    - name: 'Gray 500'
      var: '--gray-500'
      value: 'hsl(220, 9%, 46%)'
      usage: 'Secondary text'
    - name: 'Gray 600'
      var: '--gray-600'
      value: 'hsl(215, 14%, 34%)'
      usage: 'Body text'
    - name: 'Gray 700'
      var: '--gray-700'
      value: 'hsl(217, 19%, 27%)'
      usage: 'Headings'
    - name: 'Gray 800'
      var: '--gray-800'
      value: 'hsl(215, 28%, 17%)'
      usage: 'Dark text'
    - name: 'Gray 900'
      var: '--gray-900'
      value: 'hsl(221, 39%, 11%)'
      usage: 'Darkest text'
    - name: 'White'
      var: '--white'
      value: 'hsl(0, 0%, 100%)'
      usage: 'Pure white'

