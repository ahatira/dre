---
# PS Theme Color System
# Matches source/props/colors.css with official BNP Paribas Real Estate palettes
# Semantic colors mapping are in source/props/brand.css

header:
  title: 'Color System'
  description: 'Official BNP Paribas Real Estate color palettes (50–900) plus neutrals. Semantic mapping lives in source/props/brand.css.'
  badge: 'Design Tokens'
  meta:
    - label: 'Sources'
      value: 'source/props/colors.css'
    - label: 'Semantic mapping'
      value: 'source/props/brand.css'

neutrals:
  Gray:
    - name: 'Gray 50'
      var: '--gray-50'
      value: '#f9f9fb'
      usage: 'Lightest backgrounds'
    - name: 'Gray 100'
      var: '--gray-100'
      value: '#ebedef'
      usage: 'Subtle backgrounds'
    - name: 'Gray 200'
      var: '--gray-200'
      value: '#d6dbde'
      usage: 'Borders, dividers'
    - name: 'Gray 300'
      var: '--gray-300'
      value: '#c4c9cf'
      usage: 'Disabled backgrounds'
    - name: 'Gray 400'
      var: '--gray-400'
      value: '#b4babe'
      usage: 'Placeholders'
    - name: 'Gray 500'
      var: '--gray-500'
      value: '#8a9097'
      usage: 'Secondary text'
    - name: 'Gray 600'
      var: '--gray-600'
      value: '#555f66'
      usage: 'Body text'
    - name: 'Gray 700'
      var: '--gray-700'
      value: '#434f57'
      usage: 'Headings, dark text'
    - name: 'Gray 800'
      var: '--gray-800'
      value: '#3a4551'
      usage: 'Darker text'
    - name: 'Gray 900'
      var: '--gray-900'
      value: '#333333'
      usage: 'Darkest text (BNP Official)'
  'White':
    - name: 'White'
      var: '--white'
      value: '#ffffff'
      usage: 'Pure white'
  'Black':
    - name: 'Black'
      var: '--black'
      value: '#000000'
      usage: 'Pure black'

semantic:
  - name: 'Primary'
    token: '--primary'
    usage: 'Brand primary color'
    contrast: 'swatch-light'
  - name: 'Secondary'
    token: '--secondary'
    usage: 'Brand secondary color'
    contrast: 'swatch-light'
  - name: 'Success'
    token: '--success'
    usage: 'Success feedback (distinct from primary)'
    contrast: 'swatch-light'
  - name: 'Danger'
    token: '--danger'
    usage: 'Errors and destructive actions'
    contrast: 'swatch-light'
  - name: 'Warning'
    token: '--warning'
    usage: 'Caution and warning states'
    contrast: 'swatch-dark'
  - name: 'Info'
    token: '--info'
    usage: 'Informational highlights'
    contrast: 'swatch-light'
  - name: 'Gold'
    token: '--gold'
    usage: 'Premium accents'
    contrast: 'swatch-dark'

