# IMPORTANT: Official BNP Color Note
# PRIMARY green (#00915A) and SUCCESS teal (#198754) are DISTINCT colors
# - PRIMARY: Brand identity, primary actions, brand color
# - SUCCESS: System feedback, validation, success messages
# This separation ensures clear semantic meaning and proper UI hierarchy
# See source/props/COLORS_REFERENCE.md for complete documentation
