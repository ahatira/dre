---
# Example Base Story - Complete demonstration of template system

header:
  title: 'Design System Tokens'
  description: 'Comprehensive reference for BNP Paribas Real Estate design tokens. This system ensures consistency across all digital properties through carefully curated color palettes, typography scales, and spacing systems.'
  badge: 'Design System'
  meta:
    - label: 'Total Tokens'
      value: '97+'
    - label: 'Color Palette'
      value: '9 semantic + neutrals'
    - label: 'Last Updated'
      value: 'Dec 7, 2025'

# Color palette data for color-column component
color_palettes:
  primary:
    title: 'Primary Green'
    base_var: '--primary-600'
    base_value: '#00915A'
    shades:
      - { var: '--primary-50', index: 1 }
      - { var: '--primary-100', index: 2 }
      - { var: '--primary-200', index: 3 }
      - { var: '--primary-300', index: 4 }
      - { var: '--primary-400', index: 5 }
      - { var: '--primary-500', index: 6 }
      - { var: '--primary-700', index: 7 }
      - { var: '--primary-800', index: 8 }
      - { var: '--primary-900', index: 9 }
  secondary:
    title: 'Secondary Pink'
    base_var: '--secondary-600'
    base_value: '#E63888'
    shades:
      - { var: '--secondary-50', index: 1 }
      - { var: '--secondary-100', index: 2 }
      - { var: '--secondary-200', index: 3 }
      - { var: '--secondary-300', index: 4 }
      - { var: '--secondary-400', index: 5 }
      - { var: '--secondary-500', index: 6 }
      - { var: '--secondary-700', index: 7 }
      - { var: '--secondary-800', index: 8 }
      - { var: '--secondary-900', index: 9 }
  gold:
    title: 'Premium Gold'
    base_var: '--gold-600'
    base_value: '#D1AE6E'
    shades:
      - { var: '--gold-50', index: 1 }
      - { var: '--gold-100', index: 2 }
      - { var: '--gold-200', index: 3 }
      - { var: '--gold-300', index: 4 }
      - { var: '--gold-400', index: 5 }
      - { var: '--gold-500', index: 6 }
      - { var: '--gold-700', index: 7 }
      - { var: '--gold-800', index: 8 }
      - { var: '--gold-900', index: 9 }

# Semantic colors for color-cards component
semantic_colors:
  - name: 'Primary'
    slug: 'primary'
    var: '--primary'
    description: 'Brand identity & main actions'
  - name: 'Secondary'
    slug: 'secondary'
    var: '--secondary'
    description: 'Accent colors & highlights'
  - name: 'Success'
    slug: 'success'
    var: '--success'
    description: 'Positive feedback & confirmations'
  - name: 'Danger'
    slug: 'danger'
    var: '--danger'
    description: 'Errors & destructive actions'
  - name: 'Warning'
    slug: 'warning'
    var: '--warning'
    description: 'Caution & important alerts'
  - name: 'Info'
    slug: 'info'
    var: '--info'
    description: 'Informational messages'
  - name: 'Gold'
    slug: 'gold'
    var: '--gold'
    description: 'Premium & VIP features'
  - name: 'Light'
    slug: 'light'
    var: '--light'
    description: 'Subtle & muted backgrounds'
  - name: 'Dark'
    slug: 'dark'
    var: '--dark'
    description: 'High contrast & emphasis'

# Token reference data for token-table component
tokens:
  - token: '--primary'
    value: '#00915A'
    usage: 'Primary actions, links, brand identity'
  - token: '--secondary'
    value: '#E63888'
    usage: 'Secondary actions, accents, highlights'
  - token: '--success'
    value: '#00ADB5'
    usage: 'Success states, positive confirmations'
  - token: '--danger'
    value: '#DC3545'
    usage: 'Error states, destructive actions'
  - token: '--warning'
    value: '#FFC107'
    usage: 'Warning alerts, cautions'
  - token: '--info'
    value: '#17A2B8'
    usage: 'Information messages, tooltips'
  - token: '--gold'
    value: '#D1AE6E'
    usage: 'Premium features, VIP content'
  - token: '--light'
    value: '#F8F9FA'
    usage: 'Subtle backgrounds, disabled states'
  - token: '--dark'
    value: '#212529'
    usage: 'High contrast text, emphasis'

# Typography samples for type-sample component
typography:
  - label: 'h1 — Page Title'
    element: 'h1'
    text: 'Welcome to BNP Paribas Real Estate'
    specs: '48px / 60px • Bold 700 • Desktop only'
  - label: 'h2 — Section Heading'
    element: 'h2'
    text: 'Discover Our Premium Properties'
    specs: '44px / 44px • Bold 700 • Responsive'
  - label: 'h3 — Subsection'
    element: 'h3'
    text: 'Featured Listings in Paris'
    specs: '32px / 40px • Bold 700 • Mobile: 28px'
  - label: 'p — Body Text'
    element: 'p'
    text: 'Explore a curated selection of luxury real estate properties across Europe. Our team of experts ensures every property meets the highest standards of quality and location.'
    specs: '16px / 24px • Regular 400 • Optimized for readability'

# Spacing tokens for swatch-grid component
spacing_tokens:
  - name: 'XS'
    var: '--size-1'
    preview: 'text'
    value: '4px'
  - name: 'S'
    var: '--size-2'
    preview: 'text'
    value: '8px'
  - name: 'SM'
    var: '--size-3'
    preview: 'text'
    value: '12px'
  - name: 'MD'
    var: '--size-4'
    preview: 'text'
    value: '16px'
  - name: 'L'
    var: '--size-5'
    preview: 'text'
    value: '20px'
  - name: 'XL'
    var: '--size-6'
    preview: 'text'
    value: '24px'
  - name: '2XL'
    var: '--size-8'
    preview: 'text'
    value: '32px'
  - name: '3XL'
    var: '--size-10'
    preview: 'text'
    value: '40px'
