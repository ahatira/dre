---
# BNP Paribas RealEstate Brand System - Semantic Color Tokens
# Bootstrap-style structure with rowspan grouping
# 3-Layer Architecture:
# 1. source/props/colors.css   → Official BNP palettes (GREEN, PINK, TEAL, RED, YELLOW, BLUE, SKY, GREY)
# 2. source/props/brand.css    → Semantic tokens mapping colors to meanings
# 3. Components               → Reference semantic tokens only

brands:
  'Semantic Colors':
    - name: 'Primary'
      slug: 'primary'
      description: 'Main theme color, used for hyperlinks, focus styles, and component and form active states. Official BNP green #00915A.'
      variants:
        - type: 'base'
          var: '--primary'
          value: '#00915A'
        - type: 'subtle'
          var: '--primary-bg-subtle'
          value: 'rgba(0, 145, 90, 0.1)'
        - type: 'border'
          var: '--primary-border-subtle'
          value: 'rgba(0, 145, 90, 0.3)'
        - type: 'text'
          var: '--primary-text-emphasis'
          value: '#016B44'
    
    - name: 'Secondary'
      slug: 'secondary'
      description: 'Secondary brand color for alternative actions and accents. BNP pink #A12B66.'
      variants:
        - type: 'base'
          var: '--secondary'
          value: '#A12B66'
        - type: 'subtle'
          var: '--secondary-bg-subtle'
          value: 'rgba(161, 43, 102, 0.1)'
        - type: 'border'
          var: '--secondary-border-subtle'
          value: 'rgba(161, 43, 102, 0.3)'
        - type: 'text'
          var: '--secondary-text-emphasis'
          value: '#7A2050'
    
    - name: 'Success'
      slug: 'success'
      description: 'Theme color used for positive or successful actions and information. Distinct from Primary - uses teal #198754.'
      variants:
        - type: 'base'
          var: '--success'
          value: '#198754'
        - type: 'subtle'
          var: '--success-bg-subtle'
          value: 'rgba(25, 135, 84, 0.1)'
        - type: 'border'
          var: '--success-border-subtle'
          value: 'rgba(25, 135, 84, 0.3)'
        - type: 'text'
          var: '--success-text-emphasis'
          value: '#0F5132'
    
    - name: 'Danger'
      slug: 'danger'
      description: 'Theme color used for errors and dangerous actions. Red #EB3636.'
      variants:
        - type: 'base'
          var: '--danger'
          value: '#EB3636'
        - type: 'subtle'
          var: '--danger-bg-subtle'
          value: 'rgba(235, 54, 54, 0.1)'
        - type: 'border'
          var: '--danger-border-subtle'
          value: 'rgba(235, 54, 54, 0.3)'
        - type: 'text'
          var: '--danger-text-emphasis'
          value: '#A02626'
    
    - name: 'Warning'
      slug: 'warning'
      description: 'Theme color used for non-destructive warning messages. Yellow #FFC107.'
      variants:
        - type: 'base'
          var: '--warning'
          value: '#FFC107'
        - type: 'subtle'
          var: '--warning-bg-subtle'
          value: 'rgba(255, 193, 7, 0.1)'
        - type: 'border'
          var: '--warning-border-subtle'
          value: 'rgba(255, 193, 7, 0.3)'
        - type: 'text'
          var: '--warning-text-emphasis'
          value: '#997404'
    
    - name: 'Info'
      slug: 'info'
      description: 'Theme color used for neutral and informative content. Blue #0DCAF0.'
      variants:
        - type: 'base'
          var: '--info'
          value: '#0DCAF0'
        - type: 'subtle'
          var: '--info-bg-subtle'
          value: 'rgba(13, 202, 240, 0.1)'
        - type: 'border'
          var: '--info-border-subtle'
          value: 'rgba(13, 202, 240, 0.3)'
        - type: 'text'
          var: '--info-text-emphasis'
          value: '#087990'
    
    - name: 'Light'
      slug: 'light'
      description: 'Additional theme option for less contrasting colors. Light gray #F8F9FA.'
      variants:
        - type: 'base'
          var: '--light'
          value: '#F8F9FA'
        - type: 'subtle'
          var: '--light-bg-subtle'
          value: 'rgba(248, 249, 250, 0.5)'
        - type: 'border'
          var: '--light-border-subtle'
          value: 'rgba(0, 0, 0, 0.1)'
        - type: 'text'
          var: '--light-text-emphasis'
          value: '#495057'
    
    - name: 'Dark'
      slug: 'dark'
      description: 'Additional theme option for higher contrasting colors. Dark gray #212529.'
      variants:
        - type: 'base'
          var: '--dark'
          value: '#212529'
        - type: 'subtle'
          var: '--dark-bg-subtle'
          value: 'rgba(33, 37, 41, 0.1)'
        - type: 'border'
          var: '--dark-border-subtle'
          value: 'rgba(33, 37, 41, 0.3)'
        - type: 'text'
          var: '--dark-text-emphasis'
          value: '#000000'
    
    - name: 'Gold'
      slug: 'gold'
      description: 'Accent theme option for premium or highlighted content. Gold #D1AE6E.'
      variants:
        - type: 'base'
          var: '--gold'
          value: '#D1AE6E'
        - type: 'subtle'
          var: '--gold-bg-subtle'
          value: '#F6EDDC'
        - type: 'border'
          var: '--gold-border-subtle'
          value: '#E2CFA2'
        - type: 'text'
          var: '--gold-text-emphasis'
          value: '#715E3B'
