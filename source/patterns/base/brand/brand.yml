---
# BNP Paribas RealEstate Brand System
# Official design tokens from maquette (52 tokens total)
# See source/props/brand.css for complete system

brands:
  # SEMANTIC COLORS (Bootstrap Base-Modifier system)
  Primary (Brand Green):
    - name: 'Base'
      var: '--primary'
      value: '#00915A'
      description: 'Official BNP green - Main brand color'
    - name: 'Hover'
      var: '--primary-hover'
      value: '#017F4F'
      description: 'Hover state'
    - name: 'Active'
      var: '--primary-active'
      value: '#047857'
      description: 'Pressed state'
    - name: 'Text'
      var: '--primary-text'
      value: '#FFFFFF'
      description: 'Text on primary backgrounds'
    - name: 'Border'
      var: '--primary-border'
      value: '#00915A'
      description: 'Primary borders'

  Secondary (Brand Magenta):
    - name: 'Base'
      var: '--secondary'
      value: '#A12B66'
      description: 'Official BNP magenta'
    - name: 'Hover'
      var: '--secondary-hover'
      value: '#BA3075'
      description: 'Hover state'
    - name: 'Active'
      var: '--secondary-active'
      value: '#8A2456'
      description: 'Pressed state'
    - name: 'Text'
      var: '--secondary-text'
      value: '#FFFFFF'
      description: 'Text on secondary backgrounds'
    - name: 'Border'
      var: '--secondary-border'
      value: '#A12B66'
      description: 'Secondary borders'

  Success (Positive):
    - name: 'Base'
      var: '--success'
      value: '#047857'
      description: 'Success actions/states'
    - name: 'Hover'
      var: '--success-hover'
      value: '#065F46'
      description: 'Hover state'
    - name: 'Active'
      var: '--success-active'
      value: '#064E3B'
      description: 'Pressed state'
    - name: 'Text'
      var: '--success-text'
      value: '#FFFFFF'
      description: 'Text on success backgrounds'
    - name: 'Border'
      var: '--success-border'
      value: '#047857'
      description: 'Success borders'

  Danger (Status Red):
    - name: 'Base'
      var: '--danger'
      value: '#EB3636'
      description: 'Official status red - Errors/destructive actions'
    - name: 'Hover'
      var: '--danger-hover'
      value: '#DC2626'
      description: 'Hover state'
    - name: 'Active'
      var: '--danger-active'
      value: '#B91C1C'
      description: 'Pressed state'
    - name: 'Text'
      var: '--danger-text'
      value: '#FFFFFF'
      description: 'Text on danger backgrounds'
    - name: 'Border'
      var: '--danger-border'
      value: '#EB3636'
      description: 'Danger borders'

  Warning (Caution):
    - name: 'Base'
      var: '--warning'
      value: '#D97706'
      description: 'Warning states'
    - name: 'Hover'
      var: '--warning-hover'
      value: '#B45309'
      description: 'Hover state'
    - name: 'Active'
      var: '--warning-active'
      value: '#92400E'
      description: 'Pressed state'
    - name: 'Text'
      var: '--warning-text'
      value: '#000000'
      description: 'Text on warning backgrounds'
    - name: 'Border'
      var: '--warning-border'
      value: '#D97706'
      description: 'Warning borders'

  Info (Informational):
    - name: 'Base'
      var: '--info'
      value: '#2563EB'
      description: 'Informational states'
    - name: 'Hover'
      var: '--info-hover'
      value: '#1D4ED8'
      description: 'Hover state'
    - name: 'Active'
      var: '--info-active'
      value: '#1E40AF'
      description: 'Pressed state'
    - name: 'Text'
      var: '--info-text'
      value: '#FFFFFF'
      description: 'Text on info backgrounds'
    - name: 'Border'
      var: '--info-border'
      value: '#2563EB'
      description: 'Info borders'

  # TEXT COLORS
  Text:
    - name: 'Primary'
      var: '--text-primary'
      value: '#434F57'
      description: 'Main text color (WCAG AAA)'
    - name: 'Secondary'
      var: '--text-secondary'
      value: '#777E83'
      description: 'Secondary text (WCAG AA)'
    - name: 'Disabled'
      var: '--text-disabled'
      value: '#B0B8BD'
      description: 'Disabled text'
    - name: 'Inverse'
      var: '--text-inverse'
      value: '#FFFFFF'
      description: 'Text on dark backgrounds'

  # BORDER COLORS
  Borders:
    - name: 'Default'
      var: '--border-default'
      value: '#D6DBDE'
      description: 'Default borders'
    - name: 'Light'
      var: '--border-light'
      value: '#EBEDEF'
      description: 'Light separators'
    - name: 'Focus'
      var: '--border-focus'
      value: '#333333'
      description: 'Focus ring (dark gray from maquette)'
    - name: 'Error'
      var: '--border-error'
      value: '#EB3636'
      description: 'Error state borders'
    - name: 'Success Done'
      var: '--border-success'
      value: '#00915A'
      description: 'Success/done state borders (BNP green)'

  # BACKGROUND COLORS
  Backgrounds:
    - name: 'Page'
      var: '--bg-page'
      value: '#FFFFFF'
      description: 'Main page background'
    - name: 'Section'
      var: '--bg-section'
      value: '#F9F9FB'
      description: 'Section backgrounds'
    - name: 'Disabled'
      var: '--bg-disabled'
      value: '#F4F5F6'
      description: 'Disabled inputs/buttons'
    - name: 'Success Light'
      var: '--bg-success-light'
      value: '#99D3BD'
      description: 'Light success backgrounds (alerts)'
    - name: 'Danger Light'
      var: '--bg-danger-light'
      value: '#FEE2E2'
      description: 'Light error backgrounds'
    - name: 'Warning Light'
      var: '--bg-warning-light'
      value: '#FEF3C7'
      description: 'Light warning backgrounds'
    - name: 'Info Light'
      var: '--bg-info-light'
      value: '#DBEAFE'
      description: 'Light info backgrounds'

  # OVERLAY COLORS
  Overlays:
    - name: 'Dark Heavy'
      var: '--overlay-dark-heavy'
      value: 'rgba(0, 0, 0, 0.6)'
      description: 'Modals, heavy overlays'
    - name: 'Dark Medium'
      var: '--overlay-dark-medium'
      value: 'rgba(0, 0, 0, 0.36)'
      description: 'Medium overlays'
    - name: 'Dark Light'
      var: '--overlay-dark-light'
      value: 'rgba(0, 0, 0, 0.12)'
      description: 'Light overlays'
    - name: 'Brand Base'
      var: '--overlay-brand-base'
      value: '#1C2D37'
      description: 'Brand overlay base color'
    - name: 'Brand Medium'
      var: '--overlay-brand-medium'
      value: 'rgba(28, 45, 55, 0.36)'
      description: 'Medium brand overlay'
    - name: 'Brand Light'
      var: '--overlay-brand-light'
      value: 'rgba(28, 45, 55, 0.12)'
      description: 'Light brand overlay'
