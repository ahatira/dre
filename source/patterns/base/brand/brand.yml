---
# BNP Paribas Real Estate Brand System - Semantic Color Tokens
# 3-Layer Architecture:
# 1. source/props/colors.css  → Official BNP palettes
# 2. source/props/brand.css   → Semantic tokens mapping palettes to meanings
# 3. Components               → Reference semantic tokens only

brands:
  'Semantic Colors':
    - name: 'Primary'
      slug: 'primary'
      description: 'Main theme color for hyperlinks, focus styles, and active states.'
      variants:
        - type: 'base'
          var: '--primary'
          value: '#00915a'
        - type: 'subtle'
          var: '--primary-bg-subtle'
          value: '#ebf7f4'
        - type: 'border'
          var: '--primary-border-subtle'
          value: '#c7e8df'
        - type: 'text'
          var: '--primary-text-emphasis'
          value: '#01563a'

    - name: 'Secondary'
      slug: 'secondary'
      description: 'Secondary brand color for alternative actions and accents.'
      variants:
        - type: 'base'
          var: '--secondary'
          value: '#a12b66'
        - type: 'subtle'
          var: '--secondary-bg-subtle'
          value: '#f9ecf2'
        - type: 'border'
          var: '--secondary-border-subtle'
          value: '#ecc6d8'
        - type: 'text'
          var: '--secondary-text-emphasis'
          value: '#751d4e'

    - name: 'Success'
      slug: 'success'
      description: 'Positive and successful states; distinct from Primary (teal hue).'
      variants:
        - type: 'base'
          var: '--success'
          value: '#198754'
        - type: 'subtle'
          var: '--success-bg-subtle'
          value: '#e7f4f1'
        - type: 'border'
          var: '--success-border-subtle'
          value: '#a3cfbb'
        - type: 'text'
          var: '--success-text-emphasis'
          value: '#124a3b'

    - name: 'Danger'
      slug: 'danger'
      description: 'Errors and destructive actions; semantic red tone.'
      variants:
        - type: 'base'
          var: '--danger'
          value: '#eb3636'
        - type: 'subtle'
          var: '--danger-bg-subtle'
          value: '#fef7f7'
        - type: 'border'
          var: '--danger-border-subtle'
          value: '#f9d1d1'
        - type: 'text'
          var: '--danger-text-emphasis'
          value: '#a62626'

    - name: 'Warning'
      slug: 'warning'
      description: 'Non-destructive warnings; yellow semantic tone.'
      variants:
        - type: 'base'
          var: '--warning'
          value: '#fbbf24'
        - type: 'subtle'
          var: '--warning-bg-subtle'
          value: '#fffdf3'
        - type: 'border'
          var: '--warning-border-subtle'
          value: '#fde68a'
        - type: 'text'
          var: '--warning-text-emphasis'
          value: '#92400e'

    - name: 'Info'
      slug: 'info'
      description: 'Neutral and informative content; blue semantic tone.'
      variants:
        - type: 'base'
          var: '--info'
          value: '#2563eb'
        - type: 'subtle'
          var: '--info-bg-subtle'
          value: '#f7faff'
        - type: 'border'
          var: '--info-border-subtle'
          value: '#bfdbfe'
        - type: 'text'
          var: '--info-text-emphasis'
          value: '#1e3a8a'

    - name: 'Light'
      slug: 'light'
      description: 'Low-contrast option for subtle surfaces and backgrounds.'
      variants:
        - type: 'base'
          var: '--light'
          value: '#ebedef'
        - type: 'subtle'
          var: '--light-bg-subtle'
          value: '#ffffff'
        - type: 'border'
          var: '--light-border-subtle'
          value: '#d6dbde'
        - type: 'text'
          var: '--light-text-emphasis'
          value: '#3a4551'

    - name: 'Dark'
      slug: 'dark'
      description: 'High-contrast option for dark surfaces and text emphasis.'
      variants:
        - type: 'base'
          var: '--dark'
          value: '#434f57'
        - type: 'subtle'
          var: '--dark-bg-subtle'
          value: '#f9f9fb'
        - type: 'border'
          var: '--dark-border-subtle'
          value: '#c4c9cf'
        - type: 'text'
          var: '--dark-text-emphasis'
          value: '#333333'

    - name: 'Gold'
      slug: 'gold'
      description: 'Premium accent color for highlighted or premium content.'
      variants:
        - type: 'base'
          var: '--gold'
          value: '#d1ae6e'
        - type: 'subtle'
          var: '--gold-bg-subtle'
          value: '#f6eddc'
        - type: 'border'
          var: '--gold-border-subtle'
          value: '#e2cfa2'
        - type: 'text'
          var: '--gold-text-emphasis'
          value: '#715e3b'
