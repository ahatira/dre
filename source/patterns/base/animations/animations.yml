# Animation Token Documentation
# Placeholder for future data structure
durations:
  instant: '0.1s'
  fast: '0.15s'
  normal: '0.3s'
  slow: '0.5s'
  slower: '0.75s'
  slowest: '1s'

keyframes:
  - name: 'fade-in'
    description: 'Opacity transition from 0% to 100%'
  - name: 'fade-out'
    description: 'Opacity transition from 100% to 0%'
  - name: 'scale-up'
    description: 'Scale transformation to 125%'
  - name: 'scale-down'
    description: 'Scale transformation to 75%'
  - name: 'slide-out-up'
    description: 'Translate Y to -100%'
  - name: 'slide-out-down'
    description: 'Translate Y to 100%'
  - name: 'slide-out-left'
    description: 'Translate X to -100%'
  - name: 'slide-out-right'
    description: 'Translate X to 100%'
  - name: 'slide-in-up'
    description: 'From Translate Y 100% to 0'
  - name: 'slide-in-down'
    description: 'From Translate Y -100% to 0'
  - name: 'slide-in-left'
    description: 'From Translate X -100% to 0'
  - name: 'slide-in-right'
    description: 'From Translate X 100% to 0'
  - name: 'shake-x'
    description: 'Horizontal shake effect'
  - name: 'shake-y'
    description: 'Vertical shake effect'
  - name: 'spin'
    description: 'Continuous rotation'
  - name: 'ping'
    description: 'Expanding fade effect'
  - name: 'blink'
    description: 'Opacity pulsing at 50%'
  - name: 'float'
    description: 'Vertical floating motion'
  - name: 'bounce'
    description: 'Bouncing motion'
  - name: 'pulse'
    description: 'Scale pulse effect'
