---
# Backgrounds Reference Documentation

header:
  title: 'Background Utilities'
  description: 'Comprehensive background color system for consistent visual hierarchy and semantic meaning. All backgrounds are built from the brand color tokens and include support for subtle, standard, and emphasis levels.'
  badge: 'Utilities'
  meta:
    - label: 'Total Classes'
      value: '27+'
    - label: 'Color Variants'
      value: '9 semantic'
    - label: 'Levels'
      value: 'Subtle, Base, Emphasis'

# Semantic background utilities with color levels
semantic_backgrounds:
  - name: 'Primary'
    slug: 'primary'
    base_token: '--primary'
    variants:
      - class: 'bg-primary-subtle'
        token: '--primary-bg-subtle'
        description: 'Light background for primary sections'
      - class: 'bg-primary'
        token: '--primary'
        description: 'Standard primary background'
      - class: 'bg-primary-emphasis'
        token: '--primary-active'
        description: 'Emphasis/darker primary background'
  - name: 'Secondary'
    slug: 'secondary'
    base_token: '--secondary'
    variants:
      - class: 'bg-secondary-subtle'
        token: '--secondary-bg-subtle'
        description: 'Light background for secondary sections'
      - class: 'bg-secondary'
        token: '--secondary'
        description: 'Standard secondary background'
      - class: 'bg-secondary-emphasis'
        token: '--secondary-active'
        description: 'Emphasis/darker secondary background'
  - name: 'Success'
    slug: 'success'
    base_token: '--success'
    variants:
      - class: 'bg-success-subtle'
        token: '--success-bg-subtle'
        description: 'Light background for success messages'
      - class: 'bg-success'
        token: '--success'
        description: 'Standard success background'
      - class: 'bg-success-emphasis'
        token: '--success-active'
        description: 'Emphasis/darker success background'
  - name: 'Danger'
    slug: 'danger'
    base_token: '--danger'
    variants:
      - class: 'bg-danger-subtle'
        token: '--danger-bg-subtle'
        description: 'Light background for error messages'
      - class: 'bg-danger'
        token: '--danger'
        description: 'Standard danger background'
      - class: 'bg-danger-emphasis'
        token: '--danger-active'
        description: 'Emphasis/darker danger background'
  - name: 'Warning'
    slug: 'warning'
    base_token: '--warning'
    variants:
      - class: 'bg-warning-subtle'
        token: '--warning-bg-subtle'
        description: 'Light background for warning messages'
      - class: 'bg-warning'
        token: '--warning'
        description: 'Standard warning background'
      - class: 'bg-warning-emphasis'
        token: '--warning-active'
        description: 'Emphasis/darker warning background'
  - name: 'Info'
    slug: 'info'
    base_token: '--info'
    variants:
      - class: 'bg-info-subtle'
        token: '--info-bg-subtle'
        description: 'Light background for informational content'
      - class: 'bg-info'
        token: '--info'
        description: 'Standard info background'
      - class: 'bg-info-emphasis'
        token: '--info-active'
        description: 'Emphasis/darker info background'
  - name: 'Gold'
    slug: 'gold'
    base_token: '--gold'
    variants:
      - class: 'bg-gold-subtle'
        token: '--gold-bg-subtle'
        description: 'Light background for premium content'
      - class: 'bg-gold'
        token: '--gold'
        description: 'Standard gold background'
      - class: 'bg-gold-emphasis'
        token: '--gold-active'
        description: 'Emphasis/darker gold background'

# Neutral backgrounds
neutral_backgrounds:
  - name: 'White'
    class: 'bg-white'
    token: '--white'
    usage: 'Primary content background'
  - name: 'Light Gray'
    class: 'bg-light'
    token: '--light'
    usage: 'Subtle section backgrounds'
  - name: 'Dark'
    class: 'bg-dark'
    token: '--dark'
    usage: 'High contrast inverse backgrounds'

# Background utilities reference table
utilities_reference:
  - utility: '.bg-{color}'
    description: 'Apply semantic background color'
    example: '.bg-primary, .bg-success, .bg-danger'
  - utility: '.bg-{color}-subtle'
    description: 'Light/muted background variant'
    example: '.bg-primary-subtle, .bg-success-subtle'
  - utility: '.bg-{color}-emphasis'
    description: 'Dark/saturated background variant'
    example: '.bg-primary-emphasis, .bg-success-emphasis'
  - utility: '.bg-white, .bg-light, .bg-dark'
    description: 'Neutral background colors'
    example: 'Static utilities for neutral backgrounds'
