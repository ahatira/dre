# Menu Secondary Component - Default Configuration
#
# Available Props:
# - items: array (required) - Menu items
#   Each item:
#   - title: string (required) - Menu item text
#   - url: string (optional) - Menu item URL (omit for dropdown buttons)
#   - link_class: array - CSS classes applied to link/button
#     * Example: ['menu-link'] for plain text link
#     * Example: ['ps-button', 'ps-button--primary'] for styled button
#     * Example: ['ps-button', 'ps-button--secondary'] for secondary button
#   - icon: string (optional) - Icon name (chevron-down, user, envelope, etc.)
#   - below: array (optional) - Submenu items (same structure as above)
#
# - modifier: string (optional) - Extra modifier class (e.g., 'compact', 'dark')
#   * null = default (no modifier)
#
# - attributes: Attribute - Additional HTML attributes

# Default: Disconnected state (simple links + login button + contact button)
items:
  - title: 'What are you looking for ?'
    url: '/search'
    link_class: ['ps-button', 'ps-button--primary', 'ps-button--outline']

  - title: 'Find a property'
    url: '/search'
    link_class: ['menu-link']

  - title: 'Log in / Sign up'
    url: '/user/login'
    link_class: ['ps-button', 'ps-button--primary']
    icon: 'account'

  - title: 'Contact us'
    url: '/contact'
    link_class: ['ps-button', 'ps-button--secondary']
    icon: 'email-outline'

modifier: null

