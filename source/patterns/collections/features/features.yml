# Features Organism - Default Configuration
#
# Available Props:
# - title: string (required) - Section title
# - icon: string (required) - Icon name for data-icon attribute
# - items: array (required) - Array of list items (strings or HTML)
# - columns_min_items: number (optional, default: 0) - Minimum items to enable two-column layout
#   Set to 0 to disable, or set threshold (e.g., 5) to enable when items >= threshold
# - attributes: Attribute - Additional HTML attributes

# Default: Equipments section (single column)
html_tag: 'div'
title_level: 'h3'
title: 'Équipements'
icon: 'equipment'
columns_min_items: 0
items:
  - 'Ascenseurs performants'
  - 'Climatisation réversible'
  - 'Câblage réseau : Fibre optique'
  - 'Faux plancher : Hauteur importante'
  - 'Chauffage : Système individuel'
