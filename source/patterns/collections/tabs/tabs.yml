# Tabs Component - Default Configuration
#
# Available Props:
# - label: string (default: 'Tabs navigation') - Accessible label for tablist (aria-label)
# - variant: string (default: 'neutral') - Semantic color variant
#   Options: neutral, primary, success, danger, warning, info, gold, light, dark
# - pill: boolean (default: false) - Enable pill presentation style
# - icon: string (default: null) - Default icon applied to tabs missing specific icon
# - vertical: boolean (default: false) - Vertical orientation (default: horizontal)
# - auto: boolean (default: false) - Auto activation mode (default: manual, requires Enter/Space)
# - tabs: array (required) - Collection of tab objects
#   Each tab:
#   * id: string - Unique identifier (auto-generated as tab-{index} if missing)
#   * label: string (required) - Tab label text
#   * content: string (required) - Tab panel content (HTML permitted)
#   * active: boolean (default: false) - Mark tab as active (first enabled tab auto-active)
#   * disabled: boolean (default: false) - Disable tab selection
#   * icon: string - Icon name displayed before label (overrides global icon)
# - attributes: Attribute - Additional HTML attributes

# Default: Office space property details - tabbed content
label: 'Détails du bien immobilier'
variant: 'primary'
pill: false
icon: null
vertical: false
auto: false
tabs:
  - id: 'tab-description'
    label: 'Description'
    content: |
      <h3>Informations générales</h3>
      <p>Découvrez ce plateau de bureau entièrement rénové situé à proximité de La Défense, offrant 1 250 m² d'espaces modulables avec postes de travail collaboratifs et services premium.</p>
      <ul>
        <li><strong>Surface totale :</strong> 1 250 m²</li>
        <li><strong>Disponibilité :</strong> 2e trimestre 2026</li>
        <li><strong>Loyer :</strong> 540 €/m²/an (HT)</li>
        <li><strong>Étage :</strong> 15e étage</li>
      </ul>
    active: true
    disabled: false
    icon: null
  - id: 'tab-visites'
    label: 'Visite immersive'
    content: |
      <p>Visite 360° des espaces de réception, plateau ouvert, salles de réunion et terrasse panoramique avec vue sur la Capitale.</p>
      <ul>
        <li>Lobby spacieux et modernes</li>
        <li>5 salles de réunion équipées</li>
        <li>Espace lounge déjeuner</li>
        <li>Terrasse 400 m² accessible</li>
      </ul>
    active: false
    disabled: false
    icon: null
  - id: 'tab-performance'
    label: 'Performance énergétique'
    content: |
      <h3>Performances environnementales</h3>
      <p><strong>Classe énergétique :</strong> A</p>
      <p><strong>Consommation :</strong> 62 kWh/m²/an</p>
      <p><strong>Émissions CO₂ :</strong> 12 kg CO₂/m²/an</p>
      <p>Chauffage par pompe à chaleur réversible, climatisation haute efficacité.</p>
    active: false
    disabled: false
    icon: 'info'
  - id: 'tab-certifications'
    label: 'Labels'
    content: |
      <ul>
        <li data-icon="check">HQE Excellent</li>
        <li data-icon="check">BREEAM Outstanding</li>
        <li data-icon="check">WELL Gold Certification</li>
        <li data-icon="check">RT 2020 compliant</li>
