  <p class="ps-text--sm">
    The information collected on this form is recorded in a computerized file by BNP Paribas Real Estate for the management of your request. They are kept for 3 years and are intended for the marketing and communication department. In accordance with the "Informatique et Libertés" law, you can exercise your right of access to data concerning you and have them rectified by contacting: dpo@realestate.bnpparibas by mail or at the following address: BNP Paribas Real Estate - DPO - 167 Quai de la Bataille de Stalingrad - 92130 Issy-les-Moulineaux, attaching a copy of your proof of identity.
