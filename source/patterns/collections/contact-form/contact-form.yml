# Contact Form (Collection/Organism) - Mock Data

title: 'Contact'
section_1_title: 'What are your co-data?'
section_2_title: 'Would you like to know more about your project?'
action: '#contact-form'

fields:
  first_name:
    label: 'First name'
    id: 'contact-first-name'
    name: 'first_name'
    type: 'text'
    value: 'Diego'
    required: true
  
  last_name:
    label: 'Last name'
    id: 'contact-last-name'
    name: 'last_name'
    type: 'text'
    value: 'Plot'
    required: true
  
  email:
    label: 'Professional e-mail'
    id: 'contact-email'
    name: 'email'
    type: 'email'
    value: 'diego.plot@google.com'
    required: true
  
  company:
    label: 'Company'
    id: 'contact-company'
    name: 'company'
    type: 'text'
    placeholder: 'Enter your company'
    required: false
    optional: true
  
  phone:
    label: 'Professional phone'
    id: 'contact-phone'
    name: 'phone'
    type: 'tel'
    placeholder: 'Enter your professional phone'
    required: false
    optional: true

message_field:
  label: 'Message'
  id: 'contact-message'
