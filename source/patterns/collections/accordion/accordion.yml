$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/Component/schema.json
name: 'PS Accordion'
status: stable
group: collections
description: 'Orchestrates multiple Collapse elements with optional single-open coordination.'

props:
  type: object
  properties:
    items:
      type: array
      title: Sections
      items:
        type: object
        properties:
          id:
            type: string
          title:
            type: string
          content:
            type: string
          expanded:
            type: boolean
            default: false
        required: ['title']
    single_open:
      type: boolean
      title: Single open mode
      default: true
    variant:
      type: string
      enum: ['default', 'flush']
      default: 'default'
    attributes:
      type: Drupal\Core\Template\Attribute

args:
  single_open: true
  variant: default
  items:
    - id: property-details-1
      title: Caractéristiques du bien
      content: >-
        <p><strong>Surface utile:</strong> 2 500 m² | <strong>Type:</strong> Bureau | <strong>Étage:</strong> 3-5 | <strong>Parking:</strong> 40 places | <strong>Accès:</strong> Direct métro (ligne 6) | <strong>État:</strong> Récemment rénové avec certification HQE.</p>
      expanded: true
    - id: property-details-2
      title: Modalités de location
      content: >-
        <p><strong>Loyer mensuel:</strong> 15 000 € HT | <strong>Charges:</strong> 250 € HT/m²/an | <strong>Durée:</strong> 3 à 9 ans renouvelable | <strong>Disponibilité:</strong> Janvier 2026 | <strong>Indexation:</strong> IRL annuel.</p>
    - id: property-details-3
      title: Conditions d'accès
      content: >-
        <p><strong>Visite:</strong> Sur rendez-vous uniquement | <strong>Dossier requis:</strong> KBIS + 3 derniers bilans + références bancaires | <strong>Garantie:</strong> 3 mois de loyers | <strong>Délai d'instruction:</strong> 5 jours ouvrables.</p>
    - id: property-details-4
      title: Avantages de localisation
      content: >-
        <p><strong>Zone:</strong> La Défense | <strong>Flux piétons:</strong> 50 000/jour | <strong>Environnement:</strong> Commerces, restaurants, services | <strong>Transport:</strong> SNCF (gare Nanterre) à 800m | <strong>Voirie:</strong> Accès direct avenue Jean-Jaurès.</p>
