# Surface - Collection/Organism
# Property surface table with heading icon and responsive layout
# Real Estate context: Display of property characteristics (lot, floor, type, area, availability)
#
# Available Props:
# - title: string (required) - Table heading text
# - icon: string (required) - Icon name for data-icon attribute
# - html_tag: string (optional, default: 'section') - Root HTML tag
# - title_level: string (optional, default: 'h3') - Heading level (h1-h6)
# - headers: array (required) - Column headers definitions
# - rows: array (required) - Table data rows
# - variant: string (optional, default: 'default') - Color variant
# - striped: boolean (optional, default: false) - Zebra striping
# - hover: boolean (optional, default: true) - Row hover effect
# - bordered: boolean (optional, default: false) - Cell borders

html_tag: 'section'
title_level: 'h3'
title: 'Surface table'
icon: 'area'

# Table configuration
headers:
  - key: lot
    label: Lot
    sortable: false
    numeric: false
    sticky: false
  - key: floor
    label: Étage
    sortable: false
    numeric: false
    sticky: false
  - key: nature
    label: Nature
    sortable: false
    numeric: false
    sticky: false
  - key: surface
    label: Surface
    sortable: false
    numeric: true
    sticky: false
  - key: availability
    label: Disponibilité
    sortable: false
    numeric: false
    sticky: false

# Sample property data - Real Estate context
rows:
  - id: lot_1
    cells:
      - R+5
      - RDC
      - Bureaux
      - 207 m²
      - Nous consulter
  - id: lot_2
    cells:
      - R+5
      - R+5
      - Bureaux
      - 530 m²
      - Nous consulter

# Table display options
variant: default
striped: false
hover: true
bordered: false
compact: false
responsive: true
