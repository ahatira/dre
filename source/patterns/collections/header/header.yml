# Header (Collection/Organism) - 4-Zone Layout
# Default data with logged-in state (user "Enzo" with notification badge)

# Zone Top-Left: Logo configuration
logo_config:
  variant: 'default'     # Logo variant: default (horizontal) | square (icon)
  size: 'medium'         # Logo size: small | medium | large
  href: '/'              # Logo link destination
  alt: 'BNP Paribas Real Estate'

# Zone Top-Left: Tagline text (displayed next to logo)
tagline: 'Real Estate for a Changing World'

# Zone Top-Right: Language Selector configuration
language_config:
  current:
    code: 'GB'
    label: 'En'
    locale: 'en-GB'
  options:
    - code: 'GB'
      label: 'En'
      value: 'en'
      locale: 'en-GB'
      selected: true
    - code: 'FR'
      label: 'Fr'
      value: 'fr'
      locale: 'fr-FR'
      selected: false

# Zone Bottom-Left: Navigation items
nav_items:
  - label: 'Find a property'
    href: '/properties'
    submenu:
      - label: 'Buy'
        href: '/properties/buy'
      - label: 'Rent'
        href: '/properties/rent'
      - label: 'Commercial'
        href: '/properties/commercial'
  - label: 'About us'
    href: '/about'
    submenu:
      - label: 'Our Company'
        href: '/about/company'
      - label: 'Our Team'
        href: '/about/team'
      - label: 'Careers'
        href: '/about/careers'
  - label: 'Solutions'
    href: '/solutions'
  - label: 'Latest News'
    href: '/news'

# Zone Bottom-Right: Navigation actions (Visual variations via classes)
actions:
  - title: 'What are you looking for?'
    url: '#'
    attributes:
      class: ['menu-item--button', 'menu-item--button-primary-outline']
  - title: 'Find a property'
    url: '/properties'
  - title: 'Enzo'
    url: '#'
    below:
      - title: 'Mon compte'
        url: '/account'
      - title: 'Mes favoris'
        url: '/favorites'
      - title: 'Mes alertes'
        url: '/alerts'
      - title: 'Se déconnecter'
        url: '/logout'
  - title: 'Contact us'
    url: '/contact'
    attributes:
      class: ['menu-item--button', 'menu-item--button-secondary']
  - title: 'Favorites'
    url: '/favorites'
    icon: 'heart'
    badge: null
    attributes:
      class: ['menu-item--icon']

# Modifier: Sticky positioning
sticky: false
