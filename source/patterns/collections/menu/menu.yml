# Menu Component - Real Estate Context Data
# Used in Storybook stories with real-estate themed menu items

args:
  menu_name: 'main'

  items:
    - title: 'Recherche de bien'
      url: '/recherche'
      in_active_trail: true
      is_expanded: true
      below:
        - title: 'Achat'
          url: '/recherche/achat'
        - title: 'Location'
          url: '/recherche/location'

    - title: 'Services'
      url: '/services'
      is_expanded: true
      below:
        - title: 'Transaction'
          url: '/services/transaction'
          in_active_trail: false
          is_expanded: true
          below:
            - title: 'Vendre'
              url: '/services/transaction/vendre'
              in_active_trail: true
            - title: 'Acheter'
              url: '/services/transaction/acheter'

    - title: 'Contact'
      url: '/contact'
