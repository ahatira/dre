# Primary Navigation Menu Data
# Structure matching menu.html exactly

menu_name: 'primary'
modifier: null

items:
  # 1. Multilevel mega menu (3 columns with nested flyouts)
  - title: 'Find a property'
    url: '#'
    link_class: ['menu-link', 'menu-bar-link']
    aria_haspopup: true
    submenu_class: ['mega-menu', 'mega-menu--multiLevel']
    below:
      # Column 1: Residential with flyout
      - title: 'Residential'
        url: '#'
        link_class: ['menu-link', 'mega-menu-link']
        aria_haspopup: true
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Apartments'
            url: '/search/residential/apartments'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Houses'
            url: '/search/residential/houses'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Villas'
            url: '/search/residential/villas'
            link_class: ['menu-link', 'menu-list-link']
      
      # Column 2: Commercial with flyout
      - title: 'Commercial'
        url: '#'
        link_class: ['menu-link', 'mega-menu-link']
        aria_haspopup: true
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Office spaces'
            url: '/search/commercial/office'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Retail'
            url: '/search/commercial/retail'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Industrial'
            url: '/search/commercial/industrial'
            link_class: ['menu-link', 'menu-list-link']
      
      # Column 3: Land with flyout
      - title: 'Land & Plots'
        url: '#'
        link_class: ['menu-link', 'mega-menu-link']
        aria_haspopup: true
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Building plots'
            url: '/search/land/building-plots'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Agricultural land'
            url: '/search/land/agricultural'
            link_class: ['menu-link', 'menu-list-link']
      
      # Column 4: Simple link (no flyout)
      - title: 'All properties'
        url: '/search/all'
        link_class: ['menu-link', 'mega-menu-link']

  # 2. Flat mega menu (3 columns with headers)
  - title: 'About us'
    url: '#'
    link_class: ['menu-link', 'menu-bar-link']
    aria_haspopup: true
    submenu_class: ['mega-menu', 'mega-menu--flat']
    below:
      # Column 1
      - title: 'Our company'
        url: '/about/company'
        link_class: ['menu-link', 'mega-menu-link', 'mega-menu-header']
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Who we are'
            url: '/about/company/who-we-are'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Our history'
            url: '/about/company/history'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Leadership team'
            url: '/about/company/leadership'
            link_class: ['menu-link', 'menu-list-link']
      
      # Column 2
      - title: 'Our expertise'
        url: '/about/expertise'
        link_class: ['menu-link', 'mega-menu-link', 'mega-menu-header']
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Property valuation'
            url: '/about/expertise/valuation'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Market analysis'
            url: '/about/expertise/market-analysis'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Investment advisory'
            url: '/about/expertise/advisory'
            link_class: ['menu-link', 'menu-list-link']
      
      # Column 3
      - title: 'Contact us'
        url: '/contact'
        link_class: ['menu-link', 'mega-menu-link', 'mega-menu-header']
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Find an office'
            url: '/contact/offices'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Meet our agents'
            url: '/contact/agents'
            link_class: ['menu-link', 'menu-list-link']

  # 3. Flat mega menu (2 columns - services)
  - title: 'Solutions'
    url: '#'
    link_class: ['menu-link', 'menu-bar-link']
    aria_haspopup: true
    in_active_trail: true
    submenu_class: ['mega-menu', 'mega-menu--flat']
    below:
      # Column 1: Property management
