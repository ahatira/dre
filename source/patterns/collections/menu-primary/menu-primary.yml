            url: '/solutions/consulting/investment'
            link_class: ['menu-link', 'menu-list-link']
            description: 'Strategic planning for real estate investments'
          - title: 'Portfolio optimization'
            url: '/solutions/consulting/portfolio'
            link_class: ['menu-link', 'menu-list-link']
            description: 'Maximize returns on your property portfolio'

