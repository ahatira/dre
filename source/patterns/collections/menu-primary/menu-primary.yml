        url: '/solutions/property-management'
        link_class: ['menu-link', 'mega-menu-link', 'mega-menu-header']
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Residential management'
            url: '/solutions/property-management/residential'
            link_class: ['menu-link', 'menu-list-link']
            description: 'Full-service management for apartments and houses'
          - title: 'Commercial management'
            url: '/solutions/property-management/commercial'
            link_class: ['menu-link', 'menu-list-link']
            description: 'Expert management for office and retail spaces'
          - title: 'HOA management'
            url: '/solutions/property-management/hoa'
            link_class: ['menu-link', 'menu-list-link']
