        url: '/news/market-insights'
        link_class: ['menu-link', 'mega-menu-link', 'mega-menu-header']
        submenu_class: ['menu', 'menu-list']
        below:
          - title: 'Monthly market report'
            url: '/news/market-insights/monthly-report'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Pricing trends'
            url: '/news/market-insights/pricing-trends'
            link_class: ['menu-link', 'menu-list-link']
          - title: 'Investment forecasts'
