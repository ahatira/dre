
$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/Component/schema.json
name: 'PS Label'
status: stable
group: atoms
description: 'Form field label with required indicator and accessibility support.'
props:
  text: 'Property name' # Label text content (real estate context)
  forId: 'field-id' # ID of associated form field
  required: false # Adds asterisk + screen reader text
  disabled: false # Disabled state (70% opacity)
  color: 'default' # Color variant (default|primary|secondary|info|warning|danger|success)
  size: 'md' # Size variant (xs|sm|md|lg|xl)
  attributes: {} # Additional HTML attributes

# Options:
# required: true | false (default)
# disabled: true | false (default)
