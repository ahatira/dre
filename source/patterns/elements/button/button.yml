# Button Component - Default Configuration
#
# Available Props:
# - label: string (required) - Button text
# - variant: primary | secondary | gold | success | info | warning | danger (neutral = omission)
# - outline: boolean (default: false) - Border-only version
# - size: small | medium | large (default: medium = omission)
#   * small: 32px height
#   * medium: 36px height (default - no class output)
#   * large: 40px height
# - url: string - Destination URL (transforms to <a> link)
# - target: _self | _blank (default: _self)
# - icon: string - Icon name (e.g., 'check', 'arrow-right'). Leave empty for no icon.
# - iconPosition: start | end (default: start)
#   * start: Icon displays before text (::before pseudo-element)
#   * end: Icon displays after text (::after pseudo-element)
# - disabled: boolean (default: false)
# - loading: boolean (default: false)
# - fullWidth: boolean (default: false)
# - toggle: boolean (default: false) - Enable toggle state behavior
# - active: boolean (default: false) - Pre-toggled state (requires toggle=true)
# - attributes: Attribute - Additional HTML attributes

# Default: Neutral button (gray) at medium size
label: 'Button'
variant: null  # null = neutral (gray) default state
outline: false
size: null     # null = medium (no class output)
icon: null
iconPosition: 'start'
disabled: false
loading: false
fullWidth: false
toggle: false
active: false

# Available variants: primary, secondary, success, info, warning, danger, gold (omit for neutral/gray)
# Available sizes: small, large (omit for medium/default)
