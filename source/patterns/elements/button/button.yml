# Button Component - Default Configuration
#
# Available Props:
# - label: string (required) - Button text
# - variant: primary | secondary | success | info | warning | danger (default: primary)
# - outline: boolean (default: false) - Border-only version
# - size: small | medium | large (default: medium)
#   * small: 34px height
#   * medium: 36px height
#   * large: 40px height
# - url: string - Destination URL (transforms to <a> link)
# - target: _self | _blank (default: _self)
# - icon: string - Icon name (see @elements/icon)
# - iconPosition: left | right (default: right)
# - disabled: boolean (default: false)
# - loading: boolean (default: false)
# - fullWidth: boolean (default: false)
# - attributes: Attribute - Additional HTML attributes

# Default: Neutral button (gray)
label: 'Button'
variant: 'neutral'
outline: false
size: 'medium'
disabled: false
loading: false
fullWidth: false
