# Progress Bar (Element/Atom) - Defaults
value: 60 # Current progress value (0-100)
min: 0 # Minimum value
max: 100 # Maximum value
variant: 'linear' # Variant: linear | circular
color: 'neutral' # Color: neutral | primary | secondary | gold | info | warning | success | danger | light | dark
size: 'medium' # Size: small (8px/40px), medium (12px/56px), large (16px/72px)
indeterminate: false # true = infinite animation without value
striped: false # true = animated stripes (linear only)
showLabel: true # true = display percentage
label: 'Property upload in progress' # Accessibility label for screen readers
