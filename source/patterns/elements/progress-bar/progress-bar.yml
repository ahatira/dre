# Defaults for Progress Bar preview
value: 60 # Current progress value (0-100)
min: 0 # Minimum value
max: 100 # Maximum value
variant: 'linear' # Options: linear | circular
color: 'default' # Options: default | primary | secondary | info | warning | success | danger | dark | light
size: 'md' # Options: xs | sm | md | lg | xl | xxl
indeterminate: false # true = infinite animation without value
striped: false # true = animated stripes (linear only)
showLabel: true # true = display percentage
label: 'Property upload in progress' # Label for accessibility (screen readers)
