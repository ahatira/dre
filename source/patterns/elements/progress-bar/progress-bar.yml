# Defaults for Progress Bar preview (simple data)
value: 60
min: 0
max: 100
variant: 'linear'  # Options: linear | circular
color: 'default'  # Options: default | primary | secondary | success | warning | danger | info
size: 'md'  # Options: xs | sm | md | lg | xl
indeterminate: false  # true = animation infinie sans valeur
striped: false  # true = rayures animées (linear uniquement)
showLabel: true  # true = affiche le pourcentage
label: 'Upload en cours'  # Label pour accessibilité (lecteurs d'écran)
