# Badge Component - Default Configuration
#
# Available Props:
# - text: string (required) - Text displayed in the badge
# - icon: string (optional) - Icon name (e.g., 'calendar', 'check', 'award')
# - iconPosition: start | end (default: start)
#   * start: Icon displays before text (::before pseudo-element)
#   * end: Icon displays after text (::after pseudo-element)
# - color: neutral | primary | secondary | success | danger | warning | info | light | dark | gold (default: neutral)
#   * neutral: gray (default) - generic label
#   * primary: green (brand primary) - saturated background
#   * secondary: purple (brand secondary) - saturated background
#   * success: teal semantic - saturated background
#   * danger: red semantic - saturated background
#   * warning: yellow semantic - saturated background
#   * info: blue semantic - saturated background
#   * light: light gray - for dark text
#   * dark: dark gray - for light text
#   * gold: gold accent - premium/exclusive
# - pill: boolean (default: false) - Fully rounded pill shape
# - url: string (optional) - Destination URL (transforms into <a> link)
# - attributes: Attribute - Additional HTML attributes

# Default: Neutral badge (scales with parent font)
text: "Badge"
color: neutral
pill: false
icon: ''
iconPosition: 'start'
url: ''
