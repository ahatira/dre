# Badge Component - Default Configuration
#
# Available Props:
# - text: string (required) - Text displayed in the badge
# - icon: string (optional) - Icon name (e.g., 'calendar', 'check', 'medal')
# - color: default | primary | secondary | gold | info | success | warning | danger (default: default)
#   * default: gray background
#   * primary: green (brand primary)
#   * secondary: purple (brand secondary)
#   * gold: gold accent (legacy)
#   * info: blue semantic
#   * success: green semantic
#   * warning: yellow/orange semantic
#   * danger: red semantic
# - size: small | medium | large (default: medium)
#   * small: 11px font, compact padding
#   * medium: 12px font, standard padding
#   * large: 14px font, spacious padding
# - pill: boolean (default: false) - Fully rounded pill shape
# - url: string (optional) - Destination URL (transforms into <a> link)
# - attributes: Attribute - Additional HTML attributes

# Default: Gray badge, medium size
text: "Badge"
color: default
pill: false
size: medium
icon: ''
url: ''
