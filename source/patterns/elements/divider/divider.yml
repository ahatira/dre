# Divider Component - Default Configuration
#
# Available Props:
# - orientation: horizontal | vertical (default: horizontal)
# - style: solid | dashed | dotted (default: solid)
# - thickness: small | medium | large (default: medium)
#   * small: --border-size-1 (1px)
#   * medium: --border-size-2 (2px)
#   * large: --border-size-4 (4px)
# - color: neutral | primary | secondary | success | danger | warning | info | light | dark (default: neutral)
#   * neutral: --border-default (gray)
#   * primary: green (brand primary)
#   * secondary: purple (brand secondary)
#   * success: teal semantic
#   * danger: red semantic
#   * warning: yellow semantic
#   * info: blue semantic
#   * light: light gray
#   * dark: dark gray
# - spacing: small | medium | large (default: medium)
#   * small: --size-2 (8px)
#   * medium: --size-4 (16px)
#   * large: --size-6 (24px)
# - text: Centered text content (optional)
# - icon: Centered icon name (e.g., 'star', 'heart')
# - attributes: Attribute - Additional HTML attributes

orientation: 'horizontal'
style: 'solid'
thickness: 'medium'
color: 'neutral'
spacing: 'medium'
text: ''
icon: ''
