size: 'md'  # Options: xs | sm | md | lg | xl
color: 'default'  # Options: default (gris) | primary (vert BNP) | secondary (rose accent) | success | info | warning | danger | white (sur fond sombre)
text: 'Chargement en cours...'  # Options: any text for screen readers
centered: false  # Options: true | false
