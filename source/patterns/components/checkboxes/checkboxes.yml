# Default props for checkboxes (Real Estate context)
# Default layout: vertical column (best for long lists)

class: "ps-checkboxes"

# Available modifiers (combine with class):
# - form-checkboxes--inline (horizontal row, wraps on small screens)
# - form-checkboxes--compact (reduced spacing for dense forms)
# - form-checkboxes--grid-2 (2 columns, responsive)
# - form-checkboxes--grid-3 (3 columns, responsive)
# - form-checkboxes--grid-4 (4 columns, responsive)
#
# Combined examples:
# - "form-checkboxes--grid-2--compact" (2-column grid with tight spacing)
# - "form-checkboxes--inline--compact" (horizontal with tight spacing)
