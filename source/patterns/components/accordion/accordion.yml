$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/Component/schema.json
name: 'PS Accordion'
status: stable
group: molecules
description: 'Simplified accordion (pixel-perfect): default separators, flush optional, accessible aria-expanded/region.'

props:
  type: object
  properties:
    items:
      type: array
      title: Sections
      items:
        type: object
        properties:
          id:
            type: string
          title:
            type: string
          content:
            type: string
          open:
            type: boolean
            default: false
        required: ['title','content']
    singleOpen:
      type: boolean
      title: Single open mode
      default: true
    flush:
      type: boolean
      title: Remove horizontal padding
      default: false
    headingLevel:
      type: string
      enum: ['h2','h3','h4','h5']
      default: 'h3'
    attributes:
      type: Drupal\Core\Template\Attribute

args:
  singleOpen: true
  flush: false
  headingLevel: h3
  items:
    - id: property-faq-1
      title: How to buy commercial real estate?
      content: >-
        <p>Commercial property acquisition involves several key steps: market research, financial pre-approval, property inspection, due diligence, negotiation, and closing. Our expert team guides you through each phase, ensuring compliance with local regulations and optimal investment decisions.</p>
      open: true
    - id: property-faq-2
      title: What financing options are available?
      content: >-
        <p>Multiple financing solutions exist for real estate investments: traditional bank mortgages, commercial loans, SBA loans, bridge financing, and private equity partnerships. Each option has specific requirements, terms, and benefits tailored to different investor profiles and property types.</p>
    - id: property-faq-3
      title: How long does the acquisition process take?
      content: >-
        <p>Typical commercial real estate transactions range from 60 to 120 days, depending on property complexity, financing type, and due diligence requirements. Residential properties generally close faster (30-60 days), while large commercial portfolios may require extended timelines for comprehensive evaluation.</p>
    - id: property-faq-4
      title: What are the tax implications?
      content: >-
        <p>Real estate investments offer various tax advantages: mortgage interest deductions, depreciation benefits, 1031 exchanges for capital gains deferral, and opportunity zone incentives. Consult with our tax advisors to optimize your investment structure and maximize returns.</p>
