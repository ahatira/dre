$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/Component/schema.json
name: 'PS Accordion'
status: stable
group: molecules
description: 'Simplified accordion (pixel-perfect): default separators, flush optional, accessible aria-expanded/region.'

props:
  type: object
  properties:
    items:
      type: array
      title: Sections
      items:
        type: object
        properties:
          id:
            type: string
          title:
            type: string
          content:
            type: string
          open:
            type: boolean
            default: false
        required: ['title','content']
    singleOpen:
      type: boolean
      title: Single open mode
      default: true
    flush:
      type: boolean
      title: Remove horizontal padding
      default: false
    headingLevel:
      type: string
      enum: ['h2','h3','h4','h5']
      default: 'h3'
    attributes:
      type: Drupal\Core\Template\Attribute

args:
  singleOpen: true
  flush: false
  headingLevel: h3
  items:
