# Default card (product variant, vertical layout)
variant: product
layout: vertical
title: 'Luxury Apartment in Paris 15th'
description: 'Bright 3-room apartment, close to metro, 65m², fully renovated with modern amenities.'
image:
  url: 'https://picsum.photos/800/450?random=1'
  alt: 'Modern apartment interior'
eyebrow: 'Apartment'
meta:
  - icon: 'pin-map'
    text: 'Paris 15th'
  - icon: 'surface'
    text: '65 m²'
  - icon: 'bedroom'
    text: '3 rooms'
cta:
  text: 'View Property'
  url: '#property-123'
  variant: 'primary'

