# Card Component - Default Configuration
#
# Available Props:
# - variant: default | outlined | flat | elevated (default: default)
#   * default: Border 1px
#   * outlined: Border 2px (emphasized)
#   * flat: No border
#   * elevated: Shadow (no border)
# - layout: vertical | horizontal (default: vertical)
#   * vertical: Image top/bottom, content below/above
#   * horizontal: Image left/right (40/60 split, responsive)
# - size: small | medium | large (default: medium)
#   * small: 16px padding
#   * medium: 32px/24px padding (default)
#   * large: 32px padding
# - radius: none | sm | md | lg (default: none)
#   * none: Sharp corners (0px, default)
#   * sm: Small radius (4px)
#   * md: Medium radius (8px)
#   * lg: Large radius (16px)
# - imagePosition: start | end (default: start)
#   * start: Top (vertical) or left (horizontal)
#   * end: Bottom (vertical) or right (horizontal)
# - url: string - Makes entire card clickable (renders as <a>)
# - image: string|object - Image HTML or object {src, alt, ratio}
# - header: string (HTML) - Header section content
# - body: string (HTML) - Main body content
# - content: string (HTML) - Alternative to body
# - footer: string (HTML) - Footer section content
# - bundle: string - Drupal content type (e.g., 'article', 'property')
# - isPromoted: boolean (default: false) - Mark as promoted/featured
# - isSticky: boolean (default: false) - Mark as sticky/pinned
# - isPublished: boolean (default: true) - Publication status
# - view_mode: string - Drupal view mode (e.g., 'teaser', 'full')
# - attributes: Attribute - Additional HTML attributes

# Default: Basic card with default styling
variant: 'default'
layout: 'vertical'
size: 'medium'
radius: 'none'
imagePosition: 'start'
url: null
image: null
header: null
body: null
content: null
footer: null
bundle: null
isPromoted: false
isSticky: false
isPublished: true
view_mode: null

