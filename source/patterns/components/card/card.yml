# Default: Standard card with medium padding and vertical layout
variant: 'default'
layout: 'vertical'
size: 'medium'
radius: 'none'
imagePosition: 'top'

# variant options: default (border), outlined (thick border), flat (no border), elevated (shadow)
# layout options: vertical (image top/bottom), horizontal (image left/right)
# size options: small (16px padding), medium (30px/24px padding), large (32px padding)
# radius options: none (0), sm (4px), md (8px), lg (16px)
# imagePosition options: top, bottom (vertical) | left, right (horizontal)
