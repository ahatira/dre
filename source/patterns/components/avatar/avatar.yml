# Avatar Component - Default Configuration
#
# Available Props:
# - src: string - Avatar image URL (optional)
# - alt: string - Alternative text for image (required when src provided)
# - initials: string - Initials (2 letters max, e.g. "JD") - fallback if no image
# - gender: male | female (default: male) - Icon fallback image variant
# - size: xs | sm | md | lg | xl (default: lg)
#   * xs: 44px
#   * sm: 60px
#   * md: 73px
#   * lg: 88px
#   * xl: 148px
# - shape: circle | square | rounded (default: circle)
# - status: online | offline | busy (optional) - Status badge
# - bordered: boolean (default: false) - White border
# - clickable: boolean (default: false) - Hover/focus effect
# - href: string - URL if clickable (transforms to <a> link)
# - attributes: Attribute - Additional HTML attributes

# Default (real estate context)
src: ''
alt: ''
initials: ''
gender: 'male'
size: 'lg'
shape: 'circle'
status: ''
bordered: false
clickable: false
href: ''
