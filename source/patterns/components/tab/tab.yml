# Tab Component - Default Configuration
#
# Available Props:
# - label: string (required) - Tab label text
# - id: string - Unique tab identifier
# - panel_id: string - Associated panel ID (aria-controls)
# - variant: string (default: 'neutral') - Semantic color variant
#   Options: neutral, primary, secondary, success, danger, warning, info, gold, light, dark
# - pill: boolean (default: false) - Enable pill presentation style
# - active: boolean (default: false) - Mark tab as selected/active
# - disabled: boolean (default: false) - Disable tab interaction
# - icon: string - Icon name displayed before label
# - attributes: Attribute - Additional HTML attributes

# Default: Primary tab (active)
label: 'Description'
id: 'tab-description'
panel_id: 'panel-description'
variant: 'primary'
pill: false
active: true
disabled: false
icon: null
