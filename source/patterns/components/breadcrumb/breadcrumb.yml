# Default: Standard breadcrumb with 4 levels
items:
  - label: 'Home'
    url: '/'
  - label: 'Locations'
    url: '/locations'
  - label: 'Paris 15e'
    url: '/locations/paris-15'
  - label: 'Family Apartment'
compact: false
truncate: false

# Available options:
# compact: boolean (false | true) - Use compact spacing (14px instead of 16px)
# truncate: boolean (false | true) - Enable CSS text truncation
# items[].label: string (required) - Breadcrumb item label
# items[].url: string (optional) - Link URL (omit for last/current item)
# items[].icon: string (optional) - Icon name without "icon-" prefix
# Design: Pixel perfect per Figma - 16px font, 24px line-height, 4px gap, underline on links
