# Default: Images carousel with property photos
slides:
  - id: 'slide1'
    image:
      src: 'data:image/svg+xml;base64,'
      alt: 'Modern office building exterior'
  - id: 'slide2'
    image:
      src: 'data:image/svg+xml;base64,'
      alt: 'Luxury apartment living room'
  - id: 'slide3'
    image:
      src: 'data:image/svg+xml;base64,'
      alt: 'Property kitchen interior'
variant: 'images'
fit: 'cover'
loop: false
autoHeight: false
withPagination: false
toolbar: {}
ariaLabel: 'Property gallery'
attributes: null

# variant options: images, cards
# fit options: cover, contain
# loop: true enables infinite scrolling
# autoHeight: true adjusts height to active slide
# withPagination: true shows bullet navigation
