# Video Component - Default Configuration (Video.js powered)
#
# Available Props:
# - url: string - Video source (YouTube URL, Vimeo URL, or direct MP4/WebM)
# - sources: array - For HTML5: [{src, type}] objects for multiple formats
# - poster: string - Thumbnail image URL
# - aspect_ratio: string (default: '16:9') - Aspect ratio: 16:9|4:3|1:1|21:9
# - title: string (default: 'Video') - Video title (accessibility)
# - controls: boolean (default: true) - Show player controls
# - autoplay: boolean (default: false) - Autoplay video (muted required)
# - loop: boolean (default: false) - Loop video
# - muted: boolean (default: false) - Mute audio
# - preload: string (default: 'metadata') - Preload strategy: none|metadata|auto
# - fluid: boolean (default: true) - Responsive fluid sizing
# - attributes: Attribute - Additional HTML attributes

# Default: YouTube video with Video.js
url: "https://www.youtube.com/watch?v=W5mAwAj6NnM"
poster: "https://img.youtube.com/vi/W5mAwAj6NnM/maxresdefault.jpg"
aspect_ratio: "16:9"
title: "Commercial Real Estate Property Tour"
controls: true
preload: "metadata"
fluid: true
