# Dropdown Component - Default Configuration
#
# Available Props:
# - name: string (required) - Form field name attribute
# - label: string - Visible button label (uses selected option if not provided)
# - placeholder: string (default: 'Select an option') - Placeholder text when no selection
# - size: small | medium | large (default: medium)
#   * small: 180px min-width
#   * medium: 220px min-width
#   * large: 260px min-width
# - shape: none | rounded | pill (default: rounded)
#   * none: no border-radius (sharp corners)
#   * rounded: default rounded corners (4px)
#   * pill: fully rounded ends
# - disabled: boolean (default: false) - Disable dropdown
# - options: array (required) - Array of option objects
#   Each option:
#   * label: string (required) - Display text
#   * value: string (required) - Form value
#   * selected: boolean (default: false)
#   * disabled: boolean (default: false)
# - attributes: Attribute - Additional HTML attributes

# Default: Medium property type dropdown
name: 'property_type'
label: 'Property type'
size: 'md'
shape: 'rounded'
disabled: false
color: 'default'
options:
  - label: 'Apartment'
    value: 'apartment'
    selected: true
    disabled: false
  - label: 'House'
    value: 'house'
    selected: false
    disabled: false
  - label: 'Loft'
    value: 'loft'
    selected: false
    disabled: false
  - label: 'Villa'
    value: 'villa'
    selected: false
    disabled: false
  - label: 'Commercial'
    value: 'commercial'
    selected: false
    disabled: false
