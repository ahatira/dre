# Alert Component - Default Configuration
# Semantic status message with dismissible option
#
# Props:
# - variant: 'info' (default) | 'success' | 'warning' | 'danger' | 'primary' | 'secondary' - Semantic variant
# - title: Optional title text
# - message: Message content (required, supports HTML)
# - icon: true (default) | false - Show icon
# - dismissible: true | false (default) - Show close button
# - compact: true | false (default) - Reduced padding

variant: 'info'
title: 'New Property Listing'
message: 'A new commercial property matching your search criteria has been added in your preferred area. <a href="#">View details</a>'
icon: true
dismissible: false
compact: false
