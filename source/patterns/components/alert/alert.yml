# Alert Component - Default Configuration (Bootstrap 5.3 inspired)
# Flexible alert with free HTML content
#
# Props:
# - variant: 'primary' | 'secondary' | 'success' | 'danger' | 'warning' | 'info' | 'light' | 'dark' - Semantic variant (default: 'primary')
# - content: Free HTML content (headings, paragraphs, links, icons optional) (required)
# - dismissible: true | false (default) - Show close button

variant: 'primary'
content: 'A simple <strong>primary</strong> alert with <a href="#" class="ps-alert-link">an example link</a>. Give it a click if you like.'
dismissible: false
