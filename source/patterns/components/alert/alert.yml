# Alert Component - Default Configuration
# Semantic feedback messages with 10 color variants
#
# Props:
# - variant: 'default' | 'primary' | 'secondary' | 'success' | 'danger' | 'warning' | 'info' | 'gold' | 'light' | 'dark' - Semantic variant (default: 'default')
# - content: Free HTML content (headings, paragraphs, links) (required)
# - icon: Icon name (without icon- prefix) for leading icon (optional)
# - dismissible: true | false (default) - Show close button
# - rounded: true | false (default: false) - Apply border radius

# Default example
variant: 'default'
content: '<strong>Information importante :</strong> Ceci est un message d''alerte générique.'
icon: null
dismissible: false
rounded: false
