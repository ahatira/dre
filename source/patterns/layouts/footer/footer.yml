# Footer Layout - Mock Data (Real Estate Context)
#
# Structure organisée par régions Drupal (comme dans le theme)
# - footer_contact : Contact Us block
# - footer_social : Follow Us block
# - footer_menu : Menu Links sections (collapsible on mobile)
# - footer_legal : Legal Links menu
# - footer_branding : Site logo, branding
# - footer_copyright : Copyright notice
#
# @see footer.twig
# @see footer.stories.jsx

# ========================================================================
# REGION: CONTACT
# ========================================================================
footer_contact:
  label: "Contactez-nous"
  label_level: "h4"
  phones:
    - label: "City 1"
      number: "+32 2 646 49 49"
      href: "tel:+3226464949"
    - label: "City 2"
      number: "+32 2 646 49 49"
      href: "tel:+3226464949"
  email:
    label: "contact.web@realestate.bnpparibas"
    href: "mailto:contact.web@realestate.bnpparibas"

# ========================================================================
# REGION: SOCIAL / FOLLOW US
# ========================================================================
footer_social:
  label: "Suivez-nous"
  label_level: "h4"
  items:
    - label: "Facebook"
      icon: "facebook"
      url: "https://www.facebook.com/BNPParibasRealEstate"
      external: true
    - label: "LinkedIn"
      icon: "linkedin"
      url: "https://www.linkedin.com/company/bnp-paribas-real-estate"
      external: true
    - label: "Twitter"
      icon: "twitter"
      url: "https://twitter.com/BNPPRealEstate"
      external: true
    - label: "YouTube"
      icon: "youtube"
      url: "https://www.youtube.com/channel/UCXXXXXXXXXX"
      external: true

# ========================================================================
# REGION: MENU (Navigation sections)
# ========================================================================
footer_menu:
  - label: "Sites métiers"
    label_level: "h4"
    items:
      - title: "Bureaux à louer"
        url: "/sites/bureaux"
      - title: "Commerces à louer"
        url: "/sites/commerces"
      - title: "Entrepôts & logistique"
        url: "/sites/logistique"
      - title: "Investisseurs institutionnels"
        url: "/sites/investisseurs"
      - title: "Property Management"
        url: "/sites/property-management"

  - label: "À propos de BNP Paribas Real Estate"
    label_level: "h4"
    items:
      - title: "Notre entreprise"
        url: "/a-propos/entreprise"
      - title: "Actualités et études"
        url: "/a-propos/actualites"
      - title: "Carrières"
        url: "/a-propos/carrieres"
      - title: "Engagements RSE"
        url: "/a-propos/rse"
      - title: "Investisseurs"
        url: "/a-propos/investisseurs"

# ========================================================================
# REGION: LEGAL (Bottom legal links)
# ========================================================================
footer_legal:
  label_display: "hidden"
  items:
    - title: "Protection des données"
      url: "/legal/protection-des-donnees"
    - title: "Politique cookies"
      url: "/legal/cookies"
    - title: "Mentions légales"
      url: "/legal/mentions-legales"
    - title: "Fournisseurs : BNP Paribas s'engage auprès de ses partenaires"
      url: "/legal/fournisseurs"
    - title: "Plan du site"
      url: "/plan-du-site"
    - title: "Réclamations Service Client"
      url: "/reclamations"
    - title: "Canal de denuncias éticas"
      url: "/canal-denuncias-eticas"

# ========================================================================
# REGION: BRANDING
# ========================================================================
footer_branding:
  logo:
    site_logo: '/logo/logo.svg'
    site_slogan: null
    url: '/'
    rel: null

# ========================================================================
# REGION: COPYRIGHT
# ========================================================================
footer_copyright: "© BNP Paribas Real Estate"
