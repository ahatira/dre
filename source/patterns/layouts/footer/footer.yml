# Footer Layout - Mock Data (Real Estate Context)
#
# Structure organisée par régions Drupal (comme dans le theme)
# - footer_top_col1 : Contact Us + Follow Us blocks
# - footer_top_col2 : Menu Links section 1 (collapsible on mobile)
# - footer_top_col3 : Menu Links section 2 (collapsible on mobile)
# - footer_legal : Legal Links menu (bottom)
# - footer_branding : Site logo, branding
# - footer_copyright : Copyright notice
#
# @see footer.twig
# @see footer.stories.jsx

# ========================================================================
# REGION: TOP COLUMN 1 (Contact + Social)
# ========================================================================
footer_top_col1:
  contact:
    label: "Contact us"
    label_level: "h4"
    phones:
      - label: "City 1"
        number: "+32 2 646 49 49"
        href: "tel:+3226464949"
      - label: "City 2"
        number: "+32 2 646 49 49"
        href: "tel:+3226464949"
    email:
      label: "contact.web@realestate.bnpparibas"
      href: "mailto:contact.web@realestate.bnpparibas"
  social:
    label: "Suivez-nous"
    label_level: "h4"
    items:
      - label: "Facebook"
        icon: "facebook"
        url: "https://www.facebook.com/BNPParibasRealEstate"
        external: true
      - label: "LinkedIn"
        icon: "linkedin"
        url: "https://www.linkedin.com/company/bnp-paribas-real-estate"
        external: true
      - label: "Twitter"
        icon: "twitter"
        url: "https://twitter.com/BNPPRealEstate"
        external: true
      - label: "YouTube"
        icon: "youtube"
        url: "https://www.youtube.com/channel/UCXXXXXXXXXX"
        external: true

# ========================================================================
# REGION: TOP COLUMN 2 (Business websites)
# ========================================================================
footer_top_col2:
  - label: "Business websites"
    label_level: "h4"
    items:
      - title: "Link"
        url: "/sites/link1"
      - title: "Link"
        url: "/sites/link2"
      - title: "Link"
        url: "/sites/link3"
      - title: "Link"
        url: "/sites/link4"
      - title: "Link"
        url: "/sites/link5"

# ========================================================================
# REGION: TOP COLUMN 3 (About)
# ========================================================================
footer_top_col3:
  - label: "About BNP Paribas Real Estate"
    label_level: "h4"
    items:
      - title: "Link"
        url: "/a-propos/link1"
      - title: "Link"
        url: "/a-propos/link2"
      - title: "Link"
        url: "/a-propos/link3"
      - title: "Link"
        url: "/a-propos/link4"
      - title: "Link"
        url: "/a-propos/link5"

# ========================================================================
# REGION: LEGAL (Bottom legal links)
# ========================================================================
footer_legal:
  label_display: "hidden"
  items:
    - title: "Protection des données"
      url: "/legal/protection-des-donnees"
    - title: "Politique cookies"
      url: "/legal/cookies"
    - title: "Mentions légales"
      url: "/legal/mentions-legales"
    - title: "Fournisseurs : BNP Paribas s'engage auprès de ses partenaires"
      url: "/legal/fournisseurs"
    - title: "Plan du site"
      url: "/plan-du-site"
    - title: "Réclamations Service Client"
      url: "/reclamations"
    - title: "Canal de denuncias éticas"
      url: "/canal-denuncias-eticas"

# ========================================================================
# REGION: BRANDING
# ========================================================================
footer_branding:
  logo:
    site_logo: '/logo/logo.svg'
    site_slogan: null
    url: '/'
    rel: null

# ========================================================================
# REGION: COPYRIGHT
# ========================================================================
footer_copyright: "© BNP Paribas Real Estate"
