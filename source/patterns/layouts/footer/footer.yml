# Footer Layout - Mock Data (Real Estate Context)
#
# Structure organisée par régions Drupal (comme dans le theme)
# - footer_contact : Contact Us block
# - footer_social : Follow Us block
# - footer_menu_col1 : Menu Links section 1 (collapsible on mobile)
# - footer_menu_col2 : Menu Links section 2 (collapsible on mobile)
# - footer_legal : Legal Links menu (bottom)
# - footer_branding : Site logo, branding
# - footer_copyright : Copyright notice
#
# @see footer.twig
# @see footer.stories.jsx

# ========================================================================
# REGION: CONTACT
# ========================================================================
footer_contact:
  label: "Contact us"
  label_level: "h4"
  phones:
    - label: "City 1"
      number: "+32 2 646 49 49"
      href: "tel:+3226464949"
    - label: "City 2"
      number: "+32 2 646 49 49"
      href: "tel:+3226464949"
  email:
    label: "contact.web@realestate.bnpparibas"
    href: "mailto:contact.web@realestate.bnpparibas"

# ========================================================================
# REGION: SOCIAL / FOLLOW US
# ========================================================================
footer_social:
  label: "Suivez-nous"
  label_level: "h4"
  items:
    - label: "Facebook"
      icon: "facebook"
      url: "https://www.facebook.com/BNPParibasRealEstate"
      external: true
    - label: "LinkedIn"
      icon: "linkedin"
      url: "https://www.linkedin.com/company/bnp-paribas-real-estate"
      external: true
    - label: "Twitter"
      icon: "twitter"
      url: "https://twitter.com/BNPPRealEstate"
      external: true
    - label: "YouTube"
      icon: "youtube"
      url: "https://www.youtube.com/channel/UCXXXXXXXXXX"
      external: true

# ========================================================================
# REGION: MENU COLUMN 1 (Business websites / First section)
# ========================================================================
footer_menu_col1:
  - label: "Business websites"
    label_level: "h4"
    items:
      - title: "Link"
        url: "/sites/link1"
      - title: "Link"
        url: "/sites/link2"
      - title: "Link"
        url: "/sites/link3"
      - title: "Link"
        url: "/sites/link4"
      - title: "Link"
        url: "/sites/link5"

# ========================================================================
# REGION: MENU COLUMN 2 (About / Second section)
# ========================================================================
footer_menu_col2:
  - label: "About BNP Paribas Real Estate"
    label_level: "h4"
    items:
      - title: "Link"
        url: "/a-propos/link1"
      - title: "Link"
        url: "/a-propos/link2"
      - title: "Link"
        url: "/a-propos/link3"
      - title: "Link"
        url: "/a-propos/link4"
      - title: "Link"
        url: "/a-propos/link5"

# ========================================================================
# REGION: LEGAL (Bottom legal links)
# ========================================================================
footer_legal:
  label_display: "hidden"
  items:
    - title: "Protection des données"
      url: "/legal/protection-des-donnees"
    - title: "Politique cookies"
      url: "/legal/cookies"
    - title: "Mentions légales"
      url: "/legal/mentions-legales"
    - title: "Fournisseurs : BNP Paribas s'engage auprès de ses partenaires"
      url: "/legal/fournisseurs"
    - title: "Plan du site"
      url: "/plan-du-site"
    - title: "Réclamations Service Client"
      url: "/reclamations"
    - title: "Canal de denuncias éticas"
      url: "/canal-denuncias-eticas"

# ========================================================================
# REGION: BRANDING
# ========================================================================
footer_branding:
  logo:
    site_logo: '/logo/logo.svg'
    site_slogan: null
    url: '/'
    rel: null

# ========================================================================
# REGION: COPYRIGHT
# ========================================================================
footer_copyright: "© BNP Paribas Real Estate"
