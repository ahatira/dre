description:
  title: 'Description'
  content: |
    <p>Idéalement situé au cœur du <strong>quartier de Chamberí à Madrid</strong>, cet espace de bureaux premium offre une opportunité exceptionnelle pour les entreprises recherchant un environnement de travail moderne et flexible.</p>
    
    <p>L'immeuble <strong>Edificio ARA</strong> a été entièrement restructuré avec des espaces communs haut de gamme. Les 611 m² disponibles se composent de 3 plateaux open-space modulables, de bureaux cloisonnés, d'une salle de réunion équipée et d'un espace cafétéria.</p>
    
    <ul>
      <li>Localisation stratégique avec accès direct aux transports en commun (Metro Alonso Martínez à 3 min)</li>
      <li>Prestations techniques de qualité : climatisation réversible, faux plancher technique, câblage fibre optique</li>
      <li>Balcon privatif donnant sur le parc arboré avec vue dégagée</li>
      <li>Accueil avec hôtesses et système de contrôle d'accès sécurisé par interphone</li>
      <li>Certification environnementale LEED Platinum</li>
    </ul>
    
    <p>Le bien bénéficie d'une grande flexibilité d'aménagement avec plusieurs cours intérieures et un rez-de-jardin en parfait état. Disponibilité immédiate. Mandat exclusif.</p>
  maxHeight: 200
  expandLabel: 'Voir plus'
  collapseLabel: 'Voir moins'

