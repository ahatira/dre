# Header Layout - Mock Data (Real Estate Context)
#
# Provides realistic data for all header variants:
# - Default: Simple header (logged out state)
# - WithTagline: Header with company slogan
# - LoggedIn: Header with user menu and notifications
#
# @see header.twig
# @see header.stories.jsx

# =============================================================================
# DEFAULT VARIANT - Logged Out State
# =============================================================================

show_tagline: false
tagline: 'Real Estate for a Changing World'
sticky: true

logo_config:
  variant: 'desktop'
  href: '/'
  alt: 'BNP Paribas Real Estate'

language_selector_config:
  name: 'lang'
  size: 'sm'
  current:
    code: 'GB'
    label: 'En'
    locale: 'en-GB'
  options:
    - code: 'GB'
      label: 'English'
      value: 'en'
      url: '/en'
      locale: 'en-GB'
      selected: true
      disabled: false
    - code: 'FR'
      label: 'Français'
      value: 'fr'
      url: '/fr'
      locale: 'fr-FR'
      selected: false
      disabled: false
    - code: 'ES'
      label: 'Español'
      value: 'es'
      url: '/es'
      locale: 'es-ES'
      selected: false
      disabled: false
    - code: 'DE'
      label: 'Deutsch'
      value: 'de'
      url: '/de'
      locale: 'de-DE'
      selected: false
      disabled: false

primary_menu_items:
  - title: 'Find a property'
    url: '/find-property'
    below:
      - title: 'Buy'
        url: '/find-property/buy'
      - title: 'Rent'
        url: '/find-property/rent'
      - title: 'Invest'
        url: '/find-property/invest'
        below:
          - title: 'Residential'
            url: '/find-property/invest/residential'
          - title: 'Commercial'
            url: '/find-property/invest/commercial'

  - title: 'About us'
    url: '/about-us'
    in_active_trail: true
    below:
      - title: 'Our company'
        url: '/about-us/company'
        in_active_trail: true
      - title: 'Our team'
        url: '/about-us/team'
      - title: 'Careers'
        url: '/about-us/careers'

  - title: 'Solutions'
    url: '/solutions'
    below:
      - title: 'Property Management'
        url: '/solutions/property-management'
      - title: 'Consultancy'
        url: '/solutions/consultancy'
      - title: 'Valuation'
        url: '/solutions/valuation'

  - title: 'Latest News'
    url: '/news'
    below:
      - title: 'Press releases'
        url: '/news/press-releases'
      - title: 'Market insights'
        url: '/news/market-insights'
      - title: 'Events'
        url: '/news/events'

secondary_menu_items:
  - title: 'What are you looking for ?'
    url: '/search'
    link_class: ['ps-button', 'ps-button--primary', 'ps-button--outline']
  
  - title: 'Find a property'
    url: '/search'
    link_class: ['menu-link']
  
  - title: 'Log in / Sign up'
    url: '/user/login'
    link_class: ['ps-button', 'ps-button--primary']
    icon: 'account'
  
  - title: 'Contact us'
    url: '/contact'
    link_class: ['ps-button', 'ps-button--secondary']
    icon: 'email-outline'
