# Header Layout - Mock Data (Real Estate Context)
#
# Structure organisée par régions Drupal (comme dans le theme)
# - header_branding : Site logo, slogan, branding
# - header_top : Utilitaires (language switcher, etc.)
# - header_navigation : Menu primaire
# - header_bottom : Blocs d'action (CTA, compte, favoris, recherche)
#
# @see header.twig
# @see header.stories.jsx

sticky: true

# ========================================================================
# REGION: BRANDING
# ========================================================================
header_branding:
  logo:
    site_logo: '/logo/logo.svg'
    site_slogan: null
    url: '/'
    rel: null

# ========================================================================
# REGION: TOP (Utilities)
# ========================================================================
header_top:
  - language_switcher:
      name: 'lang'
      size: 'sm'
      disabled: false
      current:
        code: 'GB'
        label: 'En'
        locale: 'en-GB'
      options:
        - code: 'GB'
          label: 'En'
          value: 'en'
          url: '/en'
          locale: 'en-GB'
          selected: true
          disabled: false
        - code: 'FR'
          label: 'Fr'
          value: 'fr'
          url: '/fr'
          locale: 'fr-FR'
          selected: false
          disabled: false
        - code: 'ES'
          label: 'Es'
          value: 'es'
          url: '/es'
          locale: 'es-ES'
          selected: false
          disabled: false

# ========================================================================
# REGION: NAVIGATION (Primary Menu)
# ========================================================================
header_navigation:
  menu_name: 'main-menu'
  items:
    - title: 'Find a property'
      url: '/find-property'
      below:
        - title: 'Buy'
          url: '/find-property/buy'
        - title: 'Rent'
          url: '/find-property/rent'
        - title: 'Invest'
          url: '/find-property/invest'
          below:
            - title: 'Residential'
              url: '/find-property/invest/residential'
            - title: 'Commercial'
              url: '/find-property/invest/commercial'
    
    - title: 'About us'
      url: '/about-us'
      in_active_trail: true
      below:
        - title: 'Our company'
          url: '/about-us/company'
          in_active_trail: true
        - title: 'Our team'
          url: '/about-us/team'
        - title: 'Careers'
          url: '/about-us/careers'
    
    - title: 'Solutions'
      url: '/solutions'
      below:
        - title: 'Property Management'
          url: '/solutions/property-management'
        - title: 'Consultancy'
          url: '/solutions/consultancy'
        - title: 'Valuation'
          url: '/solutions/valuation'
    
    - title: 'Latest News'
      url: '/news'
      below:
        - title: 'Press releases'
          url: '/news/press-releases'
        - title: 'Market insights'
          url: '/news/market-insights'
        - title: 'Events'
          url: '/news/events'

# ========================================================================
# REGION: BOTTOM (Action Blocks)
# ========================================================================
header_bottom:
  - block_cta_search:
      button:
        component: 'button'
        label: 'What are you looking for?'
        variant: 'primary'
        outline: true
        fullWidth: true
        url: '/search'
  
  - block_link_find_property:
      button:
        component: 'link'
        fullWidth: true
        label: 'Find a property'
        url: '/find-property'
  
  - block_user_account:
      not_connected:
        logged_in: false
        login_button:
          label: 'Log in / Sign up'
          url: '/user/login'
          variant: 'primary'
          fullWidth: true
          icon: 'account'
      
      connected:
        logged_in: true
        user_name: 'Enzo'
        menu_items:
          - label: 'My account'
            url: '/user/account'
            icon: 'account'
          - label: 'My favorites'
            url: '/user/favorites'
            icon: 'heart'
          - label: 'My alerts'
            url: '/user/alerts'
            icon: 'alert'
          - label: 'Logout'
            url: '/user/logout'
            icon: 'exit'
            type: 'logout'
  
  - block_cta_contact:
      button:
        component: 'button'
        label: 'Contact us'
        variant: 'secondary'
        outline: false
        fullWidth: true
        url: '/contact'
  
  - block_favorites:
      not_connected:
        count: 0
        url: '/favorites'
      
      connected:
        count: 5
        url: '/favorites'
  
  - block_search:
      show_form: false
