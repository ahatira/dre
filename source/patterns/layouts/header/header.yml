# Header Layout - Mock Data (Real Estate Context)
#
# Simule des régions Drupal déjà rendues (HTML) :
# - header_branding : logo
# - header_navigation : menu primaire
# - header_top : sélecteur de langue
# - header_bottom : pile d'actions (CTA, compte, contact, favoris, recherche)
#
# @see header.twig
# @see header.stories.jsx

sticky: true

page:
  header_branding: |
    <div class="ps-logo">
      <img src="/logo/logo.svg" alt="BNP Paribas Real Estate" />
    </div>

  header_navigation: |
    <ul class="menu-primary" role="menubar">
      <li class="menu-primary__item menu-primary__item--has-children">
        <a href="/find-property" class="menu-primary__link">Find a property</a>
        <ul class="menu-primary__submenu menu-primary__submenu--level-1">
          <li class="menu-primary__item"><a href="/find-property/buy" class="menu-primary__link">Buy</a></li>
          <li class="menu-primary__item"><a href="/find-property/rent" class="menu-primary__link">Rent</a></li>
          <li class="menu-primary__item menu-primary__item--has-children">
            <a href="/find-property/invest" class="menu-primary__link">Invest</a>
            <ul class="menu-primary__submenu menu-primary__submenu--level-2">
              <li class="menu-primary__item"><a href="/find-property/invest/residential" class="menu-primary__link">Residential</a></li>
              <li class="menu-primary__item"><a href="/find-property/invest/commercial" class="menu-primary__link">Commercial</a></li>
            </ul>
          </li>
        </ul>
      </li>
      <li class="menu-primary__item menu-primary__item--active menu-primary__item--has-children">
        <a href="/about-us" class="menu-primary__link">About us</a>
        <ul class="menu-primary__submenu menu-primary__submenu--level-1">
          <li class="menu-primary__item menu-primary__item--active"><a href="/about-us/company" class="menu-primary__link">Our company</a></li>
          <li class="menu-primary__item"><a href="/about-us/team" class="menu-primary__link">Our team</a></li>
          <li class="menu-primary__item"><a href="/about-us/careers" class="menu-primary__link">Careers</a></li>
        </ul>
      </li>
      <li class="menu-primary__item menu-primary__item--has-children">
        <a href="/solutions" class="menu-primary__link">Solutions</a>
        <ul class="menu-primary__submenu menu-primary__submenu--level-1">
          <li class="menu-primary__item"><a href="/solutions/property-management" class="menu-primary__link">Property Management</a></li>
          <li class="menu-primary__item"><a href="/solutions/consultancy" class="menu-primary__link">Consultancy</a></li>
          <li class="menu-primary__item"><a href="/solutions/valuation" class="menu-primary__link">Valuation</a></li>
        </ul>
      </li>
      <li class="menu-primary__item menu-primary__item--has-children">
        <a href="/news" class="menu-primary__link">Latest News</a>
        <ul class="menu-primary__submenu menu-primary__submenu--level-1">
          <li class="menu-primary__item"><a href="/news/press-releases" class="menu-primary__link">Press releases</a></li>
          <li class="menu-primary__item"><a href="/news/market-insights" class="menu-primary__link">Market insights</a></li>
          <li class="menu-primary__item"><a href="/news/events" class="menu-primary__link">Events</a></li>
        </ul>
      </li>
    </ul>

  header_top: |
    <nav class="ps-language-selector" aria-label="Sélecteur de langue">
      <div class="ps-language-selector__control">
        <button class="ps-language-selector__button" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="ps-language-selector__current">
            <span class="ps-language-selector__label">En</span>
          </span>
          <span class="ps-language-selector__icon" data-icon="chevron-down" aria-hidden="true"></span>
        </button>
      </div>
    </nav>

  header_bottom: |
    <div class="ps-header-bottom">
      <div class="ps-header-bottom__block ps-header-bottom__block--search-input">
        <input type="search" class="ps-header-bottom__search-input" placeholder="What are you looking for ?" aria-label="Search" />
      </div>
      <div class="ps-header-bottom__block ps-header-bottom__block--find-property">
        <!-- Find Property CTA Block component -->
      </div>
      <div class="ps-header-bottom__block ps-header-bottom__block--user-account">
        <!-- User Account Block component -->
      </div>
      <div class="ps-header-bottom__block ps-header-bottom__block--contact">
        <!-- Contact CTA Block component -->
      </div>
      <div class="ps-header-bottom__block ps-header-bottom__block--search-trigger">
        <!-- Search Block component -->
      </div>
    </div>
