# PS Design System - Spacing Tokens
# Version: 1.0.0
# Base: 4px (0.25rem)

# =============================================================================
# SPACING SCALE
# =============================================================================

spacing:
  # Système basé sur 4px
  0:
    value: "0"
    rem: "0"
    usage: "Aucun espacement"
    
  1:
    value: "4px"
    rem: "0.25rem"
    usage: "Espacement minimal, ajustements fins"
    
  2:
    value: "8px"
    rem: "0.5rem"
    usage: "Petit espacement, padding inline"
    
  3:
    value: "12px"
    rem: "0.75rem"
    usage: "Espacement entre éléments proches"
    
  4:
    value: "16px"
    rem: "1rem"
    usage: "Espacement de base (défaut)"
    
  5:
    value: "20px"
    rem: "1.25rem"
    usage: "Espacement entre éléments liés"
    
  6:
    value: "24px"
    rem: "1.5rem"
    usage: "Espacement moyen, sections de cards"
    
  7:
    value: "28px"
    rem: "1.75rem"
    usage: "Gap de grille"
    
  8:
    value: "32px"
    rem: "2rem"
    usage: "Espacement large, entre groupes"
    
  10:
    value: "40px"
    rem: "2.5rem"
    usage: "Grands espacements"
    
  12:
    value: "48px"
    rem: "3rem"
    usage: "Espacement très large"
    
  15:
    value: "60px"
    rem: "3.75rem"
    usage: "Padding de sections"
    
  16:
    value: "64px"
    rem: "4rem"
    usage: "Grandes sections"
    
  20:
    value: "80px"
    rem: "5rem"
    usage: "Espacement entre sections majeures"
    
  26:
    value: "104px"
    rem: "6.5rem"
    usage: "Espacement XXL, hero sections"

# =============================================================================
# SPACING SÉMANTIQUE
# =============================================================================

semantic:
  # Padding de composants
  component:
    button:
      horizontal: "16px"  # spacing-4
      vertical: "8px"     # spacing-2
      
    field:
      horizontal: "16px"  # spacing-4
      vertical: "8px"     # spacing-2
      
    card:
      all: "24px"         # spacing-6
      compact: "16px"     # spacing-4
      
    modal:
      all: "32px"         # spacing-8
      
  # Margin entre éléments
  element:
    inline:
      tight: "4px"        # spacing-1
      normal: "8px"       # spacing-2
      relaxed: "12px"     # spacing-3
      
    block:
      tight: "16px"       # spacing-4
      normal: "24px"      # spacing-6
      relaxed: "32px"     # spacing-8
      
  # Sections
  section:
    padding_vertical:
      small: "40px"       # spacing-10
      medium: "60px"      # spacing-15
      large: "80px"       # spacing-20
      xlarge: "104px"     # spacing-26
      
    padding_horizontal:
      mobile: "16px"      # spacing-4
      tablet: "32px"      # spacing-8
      desktop: "122px"    # Custom (conteneur 1196px)
      
    margin_bottom:
      small: "40px"       # spacing-10
      medium: "60px"      # spacing-15
      large: "80px"       # spacing-20

  # Grilles
  grid:
    gap:
      small: "16px"       # spacing-4
      default: "28px"     # spacing-7
      large: "32px"       # spacing-8
      
    column_gap:
      default: "28px"     # spacing-7
      
    row_gap:
      default: "28px"     # spacing-7

# =============================================================================
# CONTAINER SPACING
# =============================================================================

container:
  padding:
    mobile:
      horizontal: "16px"
      vertical: "24px"
    tablet:
      horizontal: "32px"
      vertical: "40px"
    desktop:
      horizontal: "122px"  # Pour conteneur 1196px dans viewport 1440px
      vertical: "60px"

# =============================================================================
# RESPONSIVE SPACING
# =============================================================================

responsive:
  section_vertical:
    mobile: "40px"        # spacing-10
    tablet: "60px"        # spacing-15
    desktop: "80px"       # spacing-20
    
  section_horizontal:
    mobile: "16px"        # spacing-4
    tablet: "32px"        # spacing-8
    desktop: "122px"      # Custom
    
  grid_gap:
    mobile: "16px"        # spacing-4
    tablet: "24px"        # spacing-6
    desktop: "28px"       # spacing-7

# =============================================================================
# LAYOUT SPACING
# =============================================================================

layout:
  header:
    height: "64px"        # Mobile
    height_desktop: "88px"
    padding_horizontal: "16px"
    
  footer:
    padding_vertical: "60px"
    padding_horizontal: "16px"
    
  sidebar:
    width: "280px"
    gap: "32px"
    
  content:
    max_width: "1196px"
    padding: "32px"

# =============================================================================
# STACK SPACING (Vertical rhythm)
# =============================================================================

stack:
  # Espacement vertical entre éléments consécutifs
  heading_to_paragraph: "16px"      # spacing-4
  paragraph_to_paragraph: "24px"    # spacing-6
  heading_to_heading: "32px"        # spacing-8
  section_to_section: "80px"        # spacing-20
  
  # Dans les formulaires
  form_field_to_field: "24px"       # spacing-6
  label_to_input: "8px"             # spacing-2
  input_to_helper: "4px"            # spacing-1
  
  # Dans les listes
  list_item_to_item: "12px"         # spacing-3
  list_to_list: "24px"              # spacing-6

# =============================================================================
# INLINE SPACING (Horizontal rhythm)
# =============================================================================

inline:
  # Espacement horizontal entre éléments consécutifs
  icon_to_text: "8px"               # spacing-2
  button_to_button: "16px"          # spacing-4
  menu_item_to_item: "24px"         # spacing-6
  
  # Dans les champs
  input_icon_spacing: "12px"        # spacing-3
  
  # Dans les badges/tags
  tag_to_tag: "8px"                 # spacing-2

# =============================================================================
# TOUCH TARGET SPACING
# =============================================================================

touch_target:
  minimum_size: "44px"              # WCAG 2.2 (44x44px)
  comfortable_size: "48px"
  spacing_between: "8px"            # Minimum entre targets

# =============================================================================
# GUIDELINES
# =============================================================================

guidelines:
  base_unit: "4px"
  philosophy: "Tous les espacements doivent être des multiples de 4px"
  exceptions: "Container padding horizontal (122px) pour layout spécifique"
  
  consistency:
    - "Utiliser spacing-4 (16px) comme défaut"
    - "Spacing-6 (24px) pour sections de composants"
    - "Spacing-8 (32px) pour séparer des groupes"
    - "Spacing-20 (80px) entre sections majeures"
    
  responsive:
    - "Réduire les espacements de 25-50% sur mobile"
    - "Utiliser clamp() pour transitions fluides"
    
  accessibility:
    - "Respecter 44x44px minimum pour touch targets"
    - "Espacer suffisamment les éléments interactifs"

# =============================================================================
# CSS VARIABLES MAPPING
# =============================================================================

css_variables:
  generation:
    prefix: "--ps-spacing"
    examples:
      - "--ps-spacing-0: 0"
      - "--ps-spacing-1: 0.25rem"
      - "--ps-spacing-4: 1rem"
      - "--ps-spacing-20: 5rem"
      
  utility_classes:
    margin:
      - ".ps-m-0 { margin: var(--ps-spacing-0); }"
      - ".ps-m-4 { margin: var(--ps-spacing-4); }"
      - ".ps-mt-4 { margin-top: var(--ps-spacing-4); }"
      - ".ps-mb-6 { margin-bottom: var(--ps-spacing-6); }"
      
    padding:
      - ".ps-p-0 { padding: var(--ps-spacing-0); }"
      - ".ps-p-4 { padding: var(--ps-spacing-4); }"
      - ".ps-pt-6 { padding-top: var(--ps-spacing-6); }"
      - ".ps-px-8 { padding-inline: var(--ps-spacing-8); }"
      
    gap:
      - ".ps-gap-4 { gap: var(--ps-spacing-4); }"
      - ".ps-gap-7 { gap: var(--ps-spacing-7); }"
