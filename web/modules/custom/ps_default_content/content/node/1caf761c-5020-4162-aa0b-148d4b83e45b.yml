  body:
    -
      value: |
        <p>Profitez d'une opportunite rare de bureaux dans le 19e arrondissement, au sein d'un environnement dynamique et parfaitement desservi.</p>

        <p>Decouvrez le Parc du Pont de Flandre, campus d'entreprises developpe sur 5 hectares : un concept compose d'immeubles en pierre meuliere et de pierre de taille, repartis autour d'espaces verts et de bassins.</p>

        <p>Restauration variee, fitness, creche sur site.</p>

        <p>Le parc est idealement situe a proximite du RER E (RosaParks), du Metro (Corentin Cariou Ligne 7), du Tramway (T3B-Porte de la Villette) et de la Porte de la Villette.</p>

        <p><strong>Dessertes :</strong></p>
        <ul>
          <li>Metro "Corentin Cariou" (ligne 7)</li>
          <li>RER "Rosaparks" (ligne E)</li>
          <li>Tramway "Porte de la Villette" (ligne T3b)</li>
          <li>Peripherique "Porte de la Villette" / A1/A3/N2</li>
        </ul>

        <p><strong>Prestations :</strong></p>
        <ul>
          <li>Climatisation</li>
          <li>Faux plancher technique</li>
          <li>PC securite</li>
          <li>Parkings</li>
          <li>Restaurant inter-entreprises</li>
          <li>Fitness</li>
          <li>Creche</li>
        </ul>
      format: basic_html
      summary: ''
