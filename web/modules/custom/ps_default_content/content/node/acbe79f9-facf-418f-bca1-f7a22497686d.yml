  body:
    -
      value: |
        <p>A proximite des stations de metro "Pte de Pantin" (L5) et "Danube" (L7b), BNP Paribas Real Estate vous propose une surface de bureaux a louer au 1er etage d'un immeuble recent. Les bureaux seront livres renoves en open space. ERP5 possible.</p>

        <p><strong>Prestations :</strong></p>
        <ul>
          <li>climatisation double flux</li>
          <li>gestion technique centralisee</li>
          <li>acces securise</li>
          <li>bureaux en open-space</li>
          <li>faux plancher / faux plafond</li>
          <li>4 ascenseurs</li>
          <li>monte charge</li>
          <li>luminaires encastres</li>
          <li>sol en moquette</li>
          <li>sanitaires privatifs</li>
          <li>hall d'accueil</li>
        </ul>

        <p><strong>Services :</strong></p>
        <ul>
          <li>parkings interieurs en sous-sol</li>
          <li>RIE / cafeteria</li>
          <li>acces PMR</li>
        </ul>

        <p><strong>Desserte :</strong></p>
        <ul>
          <li>metro ligne 5 station "Porte de Pantin"</li>
          <li>bus</li>
          <li>tramway T3</li>
          <li>acces direct boulevard peripherique "Porte de Pantin"</li>
        </ul>
      format: basic_html
      summary: ''
