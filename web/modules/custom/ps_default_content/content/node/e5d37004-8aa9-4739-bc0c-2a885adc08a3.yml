  body:
    -
      value: |
        <p>Location bureau Paris 19 - Immeuble independant - Terrasse rooftop privatif - Climatisation reversible - Parkings velos.</p>

        <p>BNP Paribas Real Estate propose en exclusivite a la location un immeuble independant de 902 m2 a deux pas du Canal Saint-Martin et du metro Laumiere (L5).</p>

        <p>Immeuble construit en 2019, developpe du RDC au R+3, avec plusieurs terrasses et rooftops.</p>

        <p><strong>Conditions commerciales :</strong></p>
        <ul>
          <li>Bail commercial 3/6/9</li>
          <li>Depot de garantie: 3 mois de loyer HT</li>
          <li>Honoraires de commercialisation: a la charge du preneur</li>
        </ul>

        <p><strong>Technique :</strong></p>
        <ul>
          <li>Chauffage/climatisation: pompe a chaleur reversible</li>
          <li>Renouvellement d'air: CTA</li>
          <li>Consommation d'eau: compteur divisionnaire en sous-sol</li>
          <li>Arrosage espaces verts: recuperation eaux de pluie (cuve de retention en sous-sol)</li>
          <li>Electricite: compteur au sous-sol</li>
          <li>Acces: controle d'acces par badge</li>
        </ul>
      format: basic_html
      summary: ''
