ps_agent.settings:
  type: config_object
  label: "Agent Settings"
  mapping:
    bo_protected_fields:
      type: sequence
      label: "BO-Protected Fields"
      sequence:
        type: string
    crm_import_enabled:
      type: boolean
      label: "Enable CRM Import"
    crm_update_on_external_id:
      type: boolean
      label: "Update agents by external ID"

ps_agent.agent_type.*:
  type: config_entity
  label: "Agent Type"
  mapping:
    id:
      type: string
      label: "ID"
    uuid:
      type: string
      label: "UUID"
    langcode:
      type: string
      label: "Language code"
    status:
      type: boolean
      label: "Status"
    label:
      type: string
      label: "Label"
    description:
      type: string
      label: "Description"
