id: ps_contact_offer
title: 'Offer Contact'
description: 'Offer contact form displayed in a modal dialog.'
categories:
  - Contact
elements: |
  contact_identity_title:
    '#type': webform_markup
    '#markup': '<h2 class="ps-contact-webform__section-title">What are your co-data?</h2>'
  contact_identity_row:
    '#type': webform_flexbox
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#required': true
      '#placeholder': 'Diego'
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
      '#placeholder': 'Plot'
  professional_email:
    '#type': email
    '#title': 'Professional e-mail'
    '#required': true
    '#placeholder': 'diego.plot@google.com'
  contact_company_row:
    '#type': webform_flexbox
    company:
      '#type': textfield
      '#title': Company
      '#placeholder': 'Enter your company'
    professional_phone:
      '#type': tel
      '#title': 'Professional phone'
      '#placeholder': 'Enter your professional phone'
  project_title:
    '#type': webform_markup
    '#markup': '<h2 class="ps-contact-webform__section-title">Would you like to know more about your project?</h2>'
  message:
    '#type': textarea
    '#title': Message
    '#required': true
    '#rows': 5
    '#default_value': "Hello,\r\nI would like more information about the offer with reference \"[webform_submission:source-entity:field_reference]\".\r\nThank you"
  consent_processing:
    '#type': checkbox
    '#title': 'I accept that BNP Paribas Real Estate processes my request in order to answer this contact demand.'
    '#required': true
    '#required_error': 'This field is required.'
  consent_marketing:
    '#type': checkbox
    '#title': 'I agree to receive additional information related to similar real estate opportunities.'
  consent_phone:
    '#type': checkbox
    '#title': 'I agree to be contacted by phone regarding this request.'
  consent_updates:
    '#type': checkbox
    '#title': 'I agree to receive follow-up updates related to this offer.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p class="ps-contact-webform__legal">BNP Paribas Real Estate Transaction France, as Data Controller, processes the information submitted through this form in order to answer your request and, where applicable, for commercial prospecting where consent has been provided.</p><p class="ps-contact-webform__legal">For more information on how your personal data is processed and on your rights, please consult our Data Protection Notice.</p>'
  lead_number:
    '#type': hidden
    '#default_value': '[date:custom:YmdHis]'
  submission_date:
    '#type': hidden
    '#default_value': '[date:custom:m/d/Y H:i:s]'
  page_url:
    '#type': hidden
    '#default_value': '[current-page:url:absolute]'
  offer_nid:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:id]'
  offer_uuid:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:uuid]'
  offer_title:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:title]'
  offer_reference:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_reference]'
  offer_external_id:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:external_id]'
  offer_property_type_code:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_property_type]'
  offer_transaction_type_code:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_transaction_types]'
  offer_address_line1:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_address:address_line1]'
  offer_postal_code:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_address:postal_code]'
  offer_city:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_address:locality]'
  offer_country_code:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_address:country_code]'
  agent_name:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_agents:entity:label]'
  agent_email:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_agents:entity:email]'
  agent_notification_email:
    '#type': hidden
    '#default_value': '[webform_submission:source-entity:field_agents:entity:email]'
  actions:
    '#type': webform_actions
    '#submit__label': Send
