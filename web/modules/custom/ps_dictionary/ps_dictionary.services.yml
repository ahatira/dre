services:
  ps_dictionary.manager:
    class: Drupal\ps_dictionary\Service\DictionaryManager
    arguments:
      - "@entity_type.manager"
      - "@cache.default"
      - "@logger.factory"

  # Alias for interface-based injection
  Drupal\ps_dictionary\Service\DictionaryManagerInterface: "@ps_dictionary.manager"

  ps_dictionary.commands:
    class: Drupal\ps_dictionary\Command\DictionaryCommand
    arguments:
      - "@ps_dictionary.manager"
      - "@entity_type.manager"
    tags:
      - { name: drush.command }
