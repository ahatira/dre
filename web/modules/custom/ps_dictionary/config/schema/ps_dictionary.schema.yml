ps_dictionary.type.*:
  type: config_entity
  label: "Dictionary Type"
  mapping:
    id:
      type: string
      label: "ID"
    label:
      type: label
      label: "Label"
    description:
      type: text
      label: "Description"
    locked:
      type: boolean
      label: "Locked"
    metadata_schema:
      type: ignore

ps_dictionary.entry.*:
  type: config_entity
  label: "Dictionary Entry"
  mapping:
    id:
      type: string
      label: "ID"
    dictionary_type:
      type: string
      label: "Dictionary Type"
    code:
      type: string
      label: "Code"
    label:
      type: label
      label: "Label"
    description:
      type: text
      label: "Description"
    weight:
      type: integer
      label: "Weight"
    status:
      type: boolean
      label: "Status"
    deprecated:
      type: boolean
      label: "Deprecated"
    metadata:
      type: ignore

ps_dictionary.settings:
  type: config_object
  label: "Dictionary Settings"
  mapping:
    uuid:
      type: string
    allow_unknown_codes:
      type: boolean
      label: "Allow unknown codes"
    auto_create_on_unknown:
      type: boolean
      label: "Auto-create on unknown"
    default_status_new_items:
      type: string
      label: "Default status for new items"
    deprecated_policy:
      type: string
      label: "Deprecated policy"

field.storage_settings.ps_dictionary:
  type: mapping
  label: "Dictionary field storage settings"
  mapping:
    dictionary_type:
      type: string
      label: "Dictionary type"
    allowed_values_function:
      type: string
      label: "Allowed values function"
    allowed_values:
      type: sequence
      label: "Allowed values"
      sequence:
        type: mapping
        label: "Allowed value"
        mapping:
          value:
            type: string
          label:
            type: label

field.field_settings.ps_dictionary:
  type: mapping
  label: "Dictionary field settings"
  mapping: {}
# Field storage schema is auto-generated by Drupal core when fields are created.
# Module does not define specific node field storages; those are created on-demand.
