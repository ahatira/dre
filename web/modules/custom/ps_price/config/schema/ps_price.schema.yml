ps_price.settings:
  type: config_object
  label: "PS Price settings"
  mapping:
    default_currency:
      type: string
      label: "Default currency code"
    normalize_on_zero_surface:
      type: string
      label: "Behavior when surface is zero"
    reference_period:
      type: string
      label: "Reference period for normalization"
    display_codes_as_labels:
      type: boolean
      label: "Display codes as labels"
    price_flag_ht_label:
      type: string
      label: "Label for VAT excluded flag"
    price_flag_hc_label:
      type: string
      label: "Label for charges excluded flag"
    price_tooltip_ht_text:
      type: string
      label: "Tooltip line for VAT excluded flag"
    price_tooltip_hc_text:
      type: string
      label: "Tooltip line for charges excluded flag"
    price_tooltip_extra_text:
      type: text
      label: "Additional tooltip lines"

# Field storage settings (none currently).
field.storage_settings.ps_price:
  type: field.storage_settings.base
  label: "PS Price storage settings"

# Field instance settings (default values).
field.field_settings.ps_price:
  type: mapping
  label: "PS Price field settings"
  mapping:
    default_currency:
      type: string
      label: "Default currency code"
    default_period:
      type: string
      label: "Default period code"

# Field widget settings schema.
field.widget.settings.ps_price_default:
  type: mapping
  label: "PS Price widget settings"
  mapping:
    show_unit:
      type: boolean
      label: "Show unit field"
    show_period:
      type: boolean
      label: "Show period field"
    show_value_type:
      type: boolean
      label: "Show value type field"
    show_flags:
      type: boolean
      label: "Show business flags"

# Field formatter settings schema.
field.formatter.settings.ps_price_full:
  type: mapping
  label: "PS Price full formatter settings"
  mapping:
    show_currency:
      type: boolean
      label: "Display currency symbol"
    show_unit:
      type: boolean
      label: "Display unit label"
    show_period:
      type: boolean
      label: "Display period label"

field.formatter.settings.ps_price_short:
  type: mapping
  label: "PS Price short formatter settings"
  mapping:
    show_currency:
      type: boolean
      label: "Display currency symbol"

field.formatter.settings.ps_price_offer:
  type: mapping
  label: "PS Price offer formatter settings"
  mapping:
    show_tooltip:
      type: boolean
      label: "Show info tooltip"

# Field value schema for ps_price.
field.value.ps_price:
  type: mapping
  label: "Price value"
  mapping:
    amount:
      type: float
      label: "Amount"
    currency_code:
      type: string
      label: "Currency code"
    value_type_code:
      type: string
      label: "Value type code"
    unit_code:
      type: string
      label: "Unit code"
    period_code:
      type: string
      label: "Period code"
    is_on_request:
      type: boolean
      label: "On request flag"
    is_from:
      type: boolean
      label: "From flag"
    is_vat_excluded:
      type: boolean
      label: "VAT excluded flag"
    is_charges_included:
      type: boolean
      label: "Charges included flag"
