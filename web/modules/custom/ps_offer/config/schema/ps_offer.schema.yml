ps_offer.settings:
  type: config_object
  label: "Offer settings"
  mapping:
    langcode:
      type: string
    status:
      type: boolean
    dependencies:
      type: ignore
    id:
      type: string
    label:
      type: label
    third_party_settings:
      type: ignore
    divisible_default:
      type: boolean
      label: "Offers are divisible by default"
    auto_publish:
      type: boolean
      label: "Auto-publish offers on import"
    results_per_page:
      type: integer
      label: "Default results per page"

