services:
  ps_offer.reference_builder:
    class: Drupal\ps_offer\Service\OfferReferenceBuilder
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@lock'
      - '@logger.factory'

  Drupal\ps_offer\Service\OfferReferenceBuilder:
    alias: ps_offer.reference_builder

  ps_offer.manager:
    class: 'Drupal\ps_offer\Service\OfferManager'
    arguments:
      - "@entity_type.manager"
      - "@logger.factory"
    public: true

  ps_offer.price_search_value_resolver:
    class: Drupal\ps_offer\Service\OfferPriceSearchValueResolver
    arguments:
      - "@ps_price.formatter"
      - "@ps_price.normalizer"

  ps_offer.surface_division_search_value_resolver:
    class: Drupal\ps_offer\Service\OfferSurfaceDivisionSearchValueResolver

  ps_offer.event_subscriber:
    class: Drupal\ps_offer\EventSubscriber\OfferEventSubscriber
    arguments:
      - "@logger.factory"
    tags:
      - { name: "event_subscriber" }

  ps_offer.commands:
    class: Drupal\ps_offer\Commands\OfferCommands
    arguments:
      - "@entity_type.manager"
      - "@logger.factory"
      - "@date.formatter"
    tags:
      - { name: "drush.command_handler" }
