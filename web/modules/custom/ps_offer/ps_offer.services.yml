services:
  ps_offer.hooks:
    class: Drupal\ps_offer\Hook\OfferHooks
    arguments:
      - '@logger.factory'
      - '@ps_offer.reference_builder'
      - '@messenger'
      - '@current_user'
      - '@entity_type.manager'
      - '@module_handler'
      - '@ps_diagnostic.class_calculator'
      - '@file_url_generator'
      - '@ps_features.manager'
      - '@ps_dictionary.manager'

  Drupal\ps_offer\Hook\OfferHooks:
    alias: ps_offer.hooks

  ps_offer.admin_hooks:
    class: Drupal\ps_offer\Hook\OfferAdminHooks
    arguments:
      - '@entity_type.manager'
      - '@ps_offer.reference_builder'

  Drupal\ps_offer\Hook\OfferAdminHooks:
    alias: ps_offer.admin_hooks

  ps_offer.reference_builder:
    class: Drupal\ps_offer\Service\OfferReferenceBuilder
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@lock'
      - '@logger.factory'

  Drupal\ps_offer\Service\OfferReferenceBuilder:
    alias: ps_offer.reference_builder

  ps_offer.manager:
    class: 'Drupal\ps_offer\Service\OfferManager'
    arguments:
      - "@entity_type.manager"
      - "@logger.factory"
    public: true

  ps_offer.price_search_value_resolver:
    class: Drupal\ps_offer\Service\OfferPriceSearchValueResolver
    arguments:
      - "@ps_price.formatter"
      - "@ps_price.normalizer"

  ps_offer.surface_division_search_value_resolver:
    class: Drupal\ps_offer\Service\OfferSurfaceDivisionSearchValueResolver

  ps_offer.extra_filters_search_value_resolver:
    class: Drupal\ps_offer\Service\OfferExtraFiltersSearchValueResolver
    arguments:
      - '@ps_features.manager'

  ps_offer.event_subscriber:
    class: Drupal\ps_offer\EventSubscriber\OfferEventSubscriber
    arguments:
      - "@logger.factory"
    tags:
      - { name: "event_subscriber" }

  ps_offer.commands:
    class: Drupal\ps_offer\Commands\OfferCommands
    arguments:
      - "@entity_type.manager"
      - "@logger.factory"
      - "@date.formatter"
    tags:
      - { name: "drush.command_handler" }
