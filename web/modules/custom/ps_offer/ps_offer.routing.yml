# Offer module routing

# Admin routes
ps_offer.admin_offers:
  path: "/admin/content/offers"
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    _title: "Offers"
  requirements:
    _permission: "administer offer content"

ps_offer.settings:
  path: "/admin/ps/config/offers"
  defaults:
    _title: "Offer Settings"
    _form: 'Drupal\ps_offer\Form\OfferSettingsForm'
  requirements:
    _permission: "administer offer content"

ps_offer.reference_preview:
  path: "/admin/ps/config/offers/reference/preview"
  defaults:
    _controller: '\Drupal\ps_offer\Controller\OfferReferencePreviewController::preview'
  requirements:
    _permission: "edit any offer content"
  methods: [POST]
