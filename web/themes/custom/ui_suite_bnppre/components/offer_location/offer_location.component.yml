name: 'Offer Location'
description: 'Offer location section with address and optional transport details.'
group: 'PS Theme'
props:
  type: object
  properties:
    attributes:
      title: Attributes
      $ref: 'ui-patterns://attributes'
    title:
      title: Title
      type: string
      default: 'Location'
    title_level:
      title: Heading level
      type: integer
      default: 2
      enum:
        - 2
        - 3
        - 4
        - 5
        - 6
    icon:
      title: Icon
      type: string
      default: 'marker'
    address_lines:
      title: Address lines
      type: array
      items:
        type: string
    transport_title:
      title: Transport title
      type: string
    transport_items:
      title: Transport items
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          value:
            type: string
          icon:
            type: string
libraryOverrides:
  css:
    component:
      styles/offer_location.css: {}
