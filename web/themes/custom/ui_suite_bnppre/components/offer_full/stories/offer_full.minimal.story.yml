name: 'Minimal — hero, meta, sidebar'
description: 'Minimal variant with only hero, meta and sidebar. Useful for previewing the two-column structure without secondary content.'
slots:
  hero: |
    <div style="background:#e9ecef;aspect-ratio:3/2;display:flex;align-items:center;justify-content:center;">
      <span style="color:#6c757d;">[ Hero ]</span>
    </div>
  meta: |
    <div style="padding:1rem 0;">
      <h1 style="font-size:1.5rem;margin:0 0 .5rem;">Location Bureaux PARIS 8ème</h1>
      <p style="margin:0;font-size:.875rem;color:#6c757d;">350 m² · 45 000 €/an HT/HC</p>
    </div>
  sidebar: |
    <div style="background:#f8f9fa;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;">
      <p style="margin:0;font-weight:600;">Jean-Pierre Martin</p>
      <button style="background:#009900;color:#fff;border:none;padding:.625rem 1rem;width:100%;cursor:pointer;">Contacter l'agent</button>
    </div>
