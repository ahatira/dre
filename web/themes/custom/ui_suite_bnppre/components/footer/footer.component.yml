name: 'Footer'
description: 'BNP Paribas Real Estate footer with dynamic top columns and a consolidated bottom strip.'
group: 'PS Theme'
slots:
  top:
    title: Top
    description: 'Fallback top content for stories/preview. In real pages, columns are built from footer_top blocks grouped by weight bucket (0-99, 100-199, ...).'
  bottom:
    title: Bottom
    description: 'Footer bottom area. Intended for logo + legal/navigation blocks.'
props:
  type: object
  properties:
    container_class:
      title: Container class
      description: 'Footer container wrapper class.'
      type: string
      enum:
        - container
        - container-fluid
        - container-xxl
      "meta:enum":
        container: Container
        container-fluid: Container fluid
        container-xxl: Container XXL
