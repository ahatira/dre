name: "Brand: image and text"
slots:
  brand:
    - type: html_tag
      tag: a
      attributes:
        href: "#"
      0:
        theme: image
        uri: "data:image/png;base64,"
        attributes:
          width: 30px
          height: 24px
      1:
        markup: "BNP Paribas"
props:
  attributes:
    class:
      - bg-body-tertiary
  variant: default
  toggler_position: none
