name: 'Header'
description: 'Simple Bootstrap-based site header component.'
group: 'PS Theme'
slots:
  brand:
    title: Brand
    description: 'System branding block output (logo / site name).'
  switcher:
    title: Switcher
    description: 'Language switcher block output.'
  navigation:
    title: Navigation
    description: 'Primary menu or mega-menu block output.'
  actions:
    title: Actions
    description: 'Utility area: search, CTA buttons, account, custom links, icons, flags.'
  content:
    title: Content
    description: 'Optional additional renderable content rendered in the mobile panel.'
props:
  type: object
  properties:
    attributes:
      title: Attributes
      description: 'Additional attributes for the header element.'
      $ref: 'ui-patterns://attributes'
    container_class:
      title: Container class
      description: 'Header container wrapper class.'
      type: string
      enum:
        - container
        - container-fluid
        - container-xxl
      "meta:enum":
        container: Container
        container-fluid: Container fluid
        container-xxl: Container XXL
