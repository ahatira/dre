    .demo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2rem;
      padding: 0 .75rem;
      border: 1px solid #d6dbde;
      background: #ffffff;
      color: #333333;
      font-size: .75rem;
      font-weight: 600;
      white-space: nowrap;
      line-height: 1;
    }
    .demo-box--brand {
      min-width: 7rem;
      color: #0b7451;
      border-color: #cfe4db;
    }
    .storybook-header-demo {
      min-height: 2000px;
      padding: 1rem;
      background: #f3e5ab;
    }
  </style>
  <div class="storybook-header-demo">{{ _story }}</div>
