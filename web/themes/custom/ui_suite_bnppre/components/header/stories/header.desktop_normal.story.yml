name: "Desktop normal"
description: "Desktop maquette state with 2x2 visual zones."
slots:
  brand:
    - type: html_tag
      tag: a
      attributes:
        href: "#"
        class:
          - navbar-brand
      value: "BNP PARIBAS REAL ESTATE"
  switcher:
    - type: html_tag
      tag: a
      attributes:
        href: "#"
        class:
          - ps-header-utility-link
      value: "language_switcher"
  navigation:
    - type: component
      component: "ui_suite_bnppre:navbar_nav"
      props:
        variant: default
        items:
          - title: "Find a property"
            url: "#"
          - title: "About us"
            url: "#"
          - title: "Solutions"
            url: "#"
          - title: "Latest News"
            url: "#"
  actions:
    - type: html_tag
      tag: a
      attributes:
        href: "#"
        class:
          - ps-header-utility-link
      value: "search_block"
    - type: html_tag
      tag: a
      attributes:
        href: "#"
        class:
          - ps-header-utility-link
      value: "secondary_menu"
    - type: component
      component: "ui_suite_bnppre:button"
      slots:
        label: "account_block"
      props:
        variant: success
        url: "#"
    - type: component
      component: "ui_suite_bnppre:button"
      slots:
        label: "contact_cta"
      props:
        variant: secondary
        url: "#"
    - type: html_tag
      tag: a
      attributes:
        href: "#"
        class:
          - ps-header__icon-link
          - ps-header__icon-link--favorites
      value: " "
    - type: html_tag
      tag: a
      attributes:
        href: "#"
        class:
          - ps-header__icon-link
          - ps-header__icon-link--search
      value: " "
props:
  container_class: container-xxl
  preview_mode: desktop
  preview_open: false
