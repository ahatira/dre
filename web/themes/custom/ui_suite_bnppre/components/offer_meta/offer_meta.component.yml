name: 'Offer Meta'
description: 'Structured hero metadata for an offer detail page with reference, title, price, location, availability, and CTA actions.'
group: 'PS Theme'
props:
  type: object
  properties:
    attributes:
      title: Attributes
      description: 'Additional attributes for the root wrapper.'
      $ref: 'ui-patterns://attributes'
slots:
  top:
    title: Top
    description: 'Top row content, typically the formatted reference field.'
  header_left:
    title: Header left
    description: 'Left column of the header row (commercial title, node title, primary info).'
  header_right:
    title: Header right
    description: 'Right column of the header row, typically formatted price output.'
  content:
    title: Content
    description: 'Secondary metadata content, typically availability and mandate fields.'
  footer:
    title: Footer
    description: 'Bottom row content, typically call-to-actions and optional complementary renderables.'
libraryOverrides:
  css:
    component:
      styles/offer_meta.css: {}
