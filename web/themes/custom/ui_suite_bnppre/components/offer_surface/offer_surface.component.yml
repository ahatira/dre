name: 'Offer Surface'
description: 'Offer surface section with heading and structured table content.'
group: 'PS Theme'
props:
  type: object
  properties:
    attributes:
      title: Attributes
      $ref: 'ui-patterns://attributes'
    title:
      title: Title
      type: string
      default: 'Surface table'
    title_level:
      title: Heading level
      type: integer
      default: 3
      enum:
        - 2
        - 3
        - 4
        - 5
        - 6
    icon:
      title: Icon
      type: string
      default: 'surface'
slots:
  table:
    title: Table
    description: 'Renderable table component for surface data.'
libraryOverrides:
  css:
    component:
      styles/offer_surface.css: {}
