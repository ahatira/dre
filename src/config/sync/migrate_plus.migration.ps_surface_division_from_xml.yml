uuid: 8a4b5c6d-7e8f-9012-3456-789abcdef004
langcode: en
status: true
dependencies:
  enforced:
    module:
      - ps_migrate
_core:
  default_config_hash: cGr76UlYndoBAsehEtAD7TP_ObZl6cP2tJBfzRREvkw
id: ps_surface_division_from_xml
class: Drupal\migrate\Plugin\Migration
idMap: {  }
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - ps_project
  - xml
  - divisions
migration_group: null
label: 'Surface divisions from CRM XML'
source:
  plugin: url
  data_fetcher_plugin: file
  data_parser_plugin: simple_xml
  urls:
    - 'public://crm/offers.xml'
  item_selector: "/OFFERS_LIST/OFFER/DIVISIONS_LIST/DIVISION[normalize-space(LOT) != '' and not(LOT = preceding::DIVISION/LOT)]"
  fields:
    -
      name: lot
      label: 'LOT identifier'
      selector: LOT
    -
      name: floor
      label: Floor
      selector: FLOOR
    -
      name: building_name
      label: 'Building name'
      selector: BUILDING_NAME
    -
      name: nature_label
      label: 'Nature label'
      selector: NATURE_LABEL
    -
      name: surface_value
      label: 'Surface value'
      selector: SURFACES_LIST/SURFACE/VALUE
    -
      name: surface_qualification
      label: 'Surface qualification code'
      selector: SURFACES_LIST/SURFACE/QUALIFICATION_CODE
    -
      name: availability_fr
      label: 'Availability (FR)'
      selector: 'ML_AVAILABILITY/AVAILABILITY[@LANGUAGE="FR"]'
  constants:
    division_status_default: UNKNOWN
    availability_empty: ''
    default_surface_zero: 0
    default_qualification: DISPO
  ids:
    lot:
      type: string
process:
  division_reference: lot
  division_label:
    -
      plugin: concat
      source:
        - floor
        - building_name
      delimiter: ' - '
    -
      plugin: callback
      callable: trim
  floor_label:
    -
      plugin: callback
      callable: trim
      source: floor
  nature_label/value:
    -
      plugin: callback
      callable: trim
      source: nature_label
  division_status:
    plugin: default_value
    default_value: UNKNOWN
  availability_text/value:
    plugin: null_coalesce
    source:
      - availability_fr
      - constants/availability_empty
  pseudo_surfaces_data:
    plugin: transpose
    source:
      - surface_qualification
      - surface_value
  surfaces:
    plugin: sub_process
    source: '@pseudo_surfaces_data'
    process:
      qualification:
        plugin: get
        source: '0'
      value:
        plugin: callback
        callable: floatval
        source: '1'
      unit_code:
        plugin: default_value
        default_value: M2
destination:
  plugin: 'entity:ps_surface_division'
  default_bundle: ps_surface_division
migration_dependencies:
  required: {  }
  optional: {  }
include: null
