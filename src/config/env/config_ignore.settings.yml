langcode: en
mode: intermediate
# Connector Solr (host, port, core) is env-specific:
# - dev/local: $config override in sites/default/settings.local.php
# - prod: $config override in settings.bootstrap.php (APP_ENV != dev)
# backend_config is ignored on import/export so CIM deploy does not overwrite prod.
# Other search_api.server.ps_solr keys remain editable in BO and exportable via CMI.
ignored_config_entities:
  import:
    - config_split.config_split.*
    - system.site
    - user.role.administrator
    - user.role.site_admin
    - user.role.content_admin
    - user.role.content_editor
    - user.role.seo_admin
    - user.role.translate_admin
    - user.role.translate_editor
    - devel.settings
    - devel.toolbar.settings
    - stage_file_proxy.settings
    - 'search_api.server.ps_solr:backend_config'
    - 'locale.settings:translation.path'
    - mailer_transport.settings
    - mailer_transport.mailer_transport.sendmail
  export:
    - config_split.config_split.*
    - system.site
    - user.role.administrator
    - user.role.site_admin
    - user.role.content_admin
    - user.role.content_editor
    - user.role.seo_admin
    - user.role.translate_admin
    - user.role.translate_editor
    - devel.settings
    - devel.toolbar.settings
    - stage_file_proxy.settings
    - 'search_api.server.ps_solr:backend_config'
    - 'locale.settings:translation.path'
    - mailer_transport.settings
    - mailer_transport.mailer_transport.sendmail
