name: Media credit
description: 'Image with optional copyright toggle — icon overlay and sliding credit panel (bnppre.fr pattern).'
group: Media
status: stable
props:
  type: object
  properties:
    image_url:
      type: string
      title: Image URL
    image_alt:
      type: string
      title: Image alt text
    credit:
      type: string
      title: Copyright / credit text
    image_class:
      type: string
      title: Additional image CSS classes
    wrapper_class:
      type: string
      title: Additional wrapper CSS classes
    width:
      type: integer
      title: Image width attribute
    height:
      type: integer
      title: Image height attribute
libraryOverrides:
  css:
    component:
      css/media-credit.css: {}
  js:
    js/media-credit.js: {}
  dependencies:
    - core/drupal
    - core/once
