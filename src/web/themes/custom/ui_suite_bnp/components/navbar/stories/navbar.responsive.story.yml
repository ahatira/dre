name: "Responsive behaviors"
slots:
  brand:
    - theme: image
      uri: "data:image/svg+xml;base64,"
      attributes:
        width: 40px
        height: 32px
    - type: html_tag
      tag: a
      attributes:
        href: "#"
      value: Brand
  navigation:
    type: html_tag
    tag: span
    attributes:
      class:
        - navbar-text
    value: Text
  navigation_collapsible:
    type: component
    component: "ui_suite_bnp:navbar_nav"
    props:
      variant: default
      attributes:
        class:
          - me-auto
      items:
        - title: Home
          url: "#"
          link_attributes:
            class:
              - active
        - title: Link
          url: "#"
        - title: Dropdown
          url: "#"
          below:
            - title: "Action"
              url: "#"
            - title: "Another action"
              url: "#"
            - {}
            - title: "Something else here"
              url: "#"
        - title: Disabled
          url: "#"
          link_attributes:
            class:
              - disabled
props:
  attributes:
    class:
      - bg-body-tertiary
  toggler_position: end
