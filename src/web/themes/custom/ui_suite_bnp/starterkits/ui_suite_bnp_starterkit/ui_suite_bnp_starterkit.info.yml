name: 'UI Suite BNP Starterkit'
type: theme
description: 'Example theme with Bootstrap SASS compilation in one file.'
core_version_requirement: ^11.3
base theme: ui_suite_bnp
hidden: true

regions:
  navigation: 'Navigation'
  navigation_collapsible: 'Navigation (Collapsible)'
  header: 'Top Bar'
  highlighted: 'Highlighted'
  help: 'Help'
  content: 'Content'
  sidebar_first: 'Primary'
  sidebar_second: 'Secondary'
  footer: 'Footer'
  page_top: 'Page top'
  page_bottom: 'Page bottom'

ckeditor5-stylesheets:
  - assets/css/ckeditor5.css

libraries-extend:
  ui_suite_bnp/form:
    - ui_suite_bnp_starterkit/form
