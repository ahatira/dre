name: CTA card
description: 'Simple card with title and action button.'
group: Property Search
status: stable
props:
  type: object
  properties:
    title:
      type: string
      title: Title
    button_label:
      type: string
      title: Button label
    button_url:
      type: string
      title: Button URL or modal anchor
    button_style:
      type: string
      title: Button style
      enum:
        - primary
        - outline
      default: outline
    button_width:
      type: string
      title: Button width
      enum:
        - full
        - auto
      default: full
    icon:
      type: string
      title: Icon name
    link_type:
      type: string
      title: Link opening mode
    modal_id:
      type: string
      title: Bootstrap modal ID
    background:
      type: string
      title: Background
      enum:
        - default
        - white
        - muted
        - dark
        - primary
      default: default
    text_align:
      type: string
      title: Text alignment
      enum:
        - left
        - center
      default: left
    elevation:
      type: string
      title: Shadow / elevation
      enum:
        - none
        - sm
        - md
      default: none
    attributes:
      type: Drupal\Core\Template\Attribute
      title: Wrapper attributes
libraryOverrides:
  css:
    component:
      styles/cta-card.css: {}
