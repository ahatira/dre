name: Search push card
description: 'Interstitial promotional card inserted between search result offer cards.'
group: Property Search
status: stable
props:
  type: object
  required:
    - title
    - cta_label
    - cta_url
  properties:
    title:
      type: string
      title: Title
    body:
      type: string
      title: Body text
    cta_label:
      type: string
      title: Button label
    cta_url:
      type: string
      title: Button URL
    cta_button_style:
      type: string
      title: Button style
      enum:
        - primary
        - outline
      default: outline
    background:
      type: string
      title: Background
      enum:
        - default
        - white
        - muted
        - dark
        - primary
      default: default
    text_align:
      type: string
      title: Text alignment
      enum:
        - left
        - center
      default: left
    cta_width:
      type: string
      title: Button width
      enum:
        - auto
        - full
      default: auto
    border:
      type: string
      title: Border
      enum:
        - default
        - none
        - accent
      default: default
    elevation:
      type: string
      title: Shadow / elevation
      enum:
        - none
        - sm
        - md
      default: none
    attributes:
      type: Drupal\Core\Template\Attribute
      title: Wrapper attributes
libraryOverrides:
  css:
    component:
      styles/search-push-card.css: {}
