name: Media gallery hero
description: 'Hero gallery for offer detail pages with overlays and lightbox trigger.'
group: Property Search
status: stable
props:
  type: object
  properties:
    images:
      type: array
      title: Images
      items:
        type: object
        properties:
          url:
            type: string
          alt:
            type: string
          media_id:
            type: string
    photo_count:
      type: integer
      title: Photo count
      default: 0
    video_count:
      type: integer
      title: Video count
      default: 0
    has_visit_3d:
      type: boolean
      title: Has 3D visit
      default: false
    has_plan:
      type: boolean
      title: Has plan
      default: false
    slides:
      type: array
      title: Lightbox slides
    entry_indexes:
      type: object
      title: Lightbox entry indexes by badge
    offer_id:
      type: integer
      title: Offer entity ID
      default: 0
    offer_type:
      type: string
      title: Offer entity type
      default: node
    badge_icons:
      type: object
      title: Gallery badge icons
      properties:
        photos:
          type: object
          properties:
            pack:
              type: string
            id:
              type: string
        videos:
          type: object
          properties:
            pack:
              type: string
            id:
              type: string
        visit_3d:
          type: object
          properties:
            pack:
              type: string
            id:
              type: string
        plan:
          type: object
          properties:
            pack:
              type: string
            id:
              type: string
slots:
  favorite:
    title: Favorite action
    description: Optional favorite button slot.
