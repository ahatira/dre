services:
  ps_form.webform_provisioner:
    class: Drupal\ps_form\Service\PsFormWebformProvisioner
    arguments:
      - '@module_handler'
      - '@extension.list.module'
      - '@entity_type.manager'

  ps_form.spam_configurator:
    class: Drupal\ps_form\Service\PsFormSpamConfigurator
    arguments:
      - '@config.factory'
      - '@extension.list.module'

  ps_form.contact_need_router:
    class: Drupal\ps_form\Service\ContactNeedRouter
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@router.route_provider'
      - '@extension.list.module'

  ps_form.contact_display_mode:
    class: Drupal\ps_form\Service\ContactDisplayModeManager
    arguments:
      - '@config.factory'
      - '@ps_form.contact_need_router'

  ps_form.contact_webform_shell_builder:
    class: Drupal\ps_form\Service\ContactWebformShellBuilder
    arguments:
      - '@entity_type.manager'
      - '@ps_form.contact_need_router'
      - '@ps_form.contact_display_mode'

  ps_form.contact_project_field_presenter:
    class: Drupal\ps_form\Service\ContactProjectFieldPresenter
    arguments:
      - '@ps_dictionary.resolver'
      - '@ps_dictionary.entry_icon_resolver'

  ps_form.contact_wizard_presentation:
    class: Drupal\ps_form\Service\ContactWizardPresentationService
    arguments:
      - '@ps_form.contact_form_field_label'

  ps_form.contact_form_field_label:
    class: Drupal\ps_form\Service\ContactFormFieldLabelService

  Drupal\ps_form\Hook\ContactWebformHooks:
    autowire: false
    arguments:
      - '@ps_form.contact_need_router'
      - '@ps_form.contact_project_field_presenter'
      - '@ps_form.contact_wizard_presentation'
      - '@request_stack'
      - '@config.factory'
      - '@language_manager'

  Drupal\ps_form\Hook\ContactFormPageHooks:
    arguments:
      - '@ps_form.contact_need_router'
      - '@ps_form.contact_display_mode'
      - '@router.admin_context'

  Drupal\ps_form\Hook\ContactMenuHooks:
    arguments:
      - '@ps_form.contact_display_mode'

  ps_form.form_urgency_contact:
    class: Drupal\ps_form\Service\FormUrgencyContactBuilder
    arguments:
      - '@config.factory'

  Drupal\ps_form\Hook\WebformStickyFooterHooks:
    arguments:
      - '@ps_form.form_urgency_contact'

  ps_form.contact_email_settings:
    class: Drupal\ps_form\Service\ContactEmailSettings
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@entity_type.manager'

  ps_form.contact_email_recap_formatter:
    class: Drupal\ps_form\Service\ContactEmailSubmissionRecapFormatter
    arguments:
      - '@plugin.manager.webform.element'
      - '@renderer'

  ps_form.contact_email_footer_builder:
    class: Drupal\ps_form\Service\ContactEmailFooterBuilder
    arguments:
      - '@ps_form.contact_email_settings'
      - '@config.factory'
      - '@entity_type.manager'

  ps_form.contact_email_confirmation_builder:
    class: Drupal\ps_form\Service\ContactEmailConfirmationBuilder
    arguments:
      - '@ps_form.contact_email_settings'
      - '@ps_form.contact_email_recap_formatter'
      - '@ps_form.contact_email_hero_image_resolver'
      - '@renderer'

  ps_form.contact_email_hero_image_resolver:
    class: Drupal\ps_form\Service\ContactEmailHeroImageResolver
    arguments:
      - '@file_url_generator'
      - '@file_system'
      - '@config.factory'
      - '@focal_point.manager'
      - '@image.factory'
      - '@ps_form.contact_email_settings'

  ps_form.contact_email_preview_builder:
    class: Drupal\ps_form\Service\ContactEmailPreviewBuilder
    arguments:
      - '@entity_type.manager'
      - '@ps_form.contact_email_settings'
      - '@ps_form.contact_email_confirmation_builder'
      - '@renderer'
      - '@config.factory'
      - '@date.formatter'
      - '@datetime.time'
      - '@theme.manager'
      - '@theme.initialization'

  Drupal\ps_form\Hook\ContactEmailHooks:
    arguments:
      - '@ps_form.contact_email_settings'
      - '@ps_form.contact_email_confirmation_builder'
      - '@ps_form.contact_email_footer_builder'

  Drupal\ps_form\Hook\PsFormAdminHooks: {}
