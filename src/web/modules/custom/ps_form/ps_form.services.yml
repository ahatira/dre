services:
  ps_form.webform_provisioner:
    class: Drupal\ps_form\Service\PsFormWebformProvisioner
    arguments:
      - '@module_handler'
      - '@extension.list.module'
      - '@entity_type.manager'

  ps_form.spam_configurator:
    class: Drupal\ps_form\Service\PsFormSpamConfigurator
    arguments:
      - '@config.factory'
      - '@extension.list.module'

  Drupal\ps_form\Hook\OfferContactWebformHooks:
    class: Drupal\ps_form\Hook\OfferContactWebformHooks

  Drupal\ps_form\Hook\WebformUrgencyContactHooks:
    class: Drupal\ps_form\Hook\WebformUrgencyContactHooks
    arguments:
      - '@ps_core.site_urgency_contact'
