ps_form.settings:
  type: config_object
  label: 'PS Form settings'
  mapping:
    provision_webforms_on_install:
      type: boolean
      label: 'Provision webforms on module install'
    apply_spam_baseline_on_install:
      type: boolean
      label: 'Apply spam baseline on module install'
    contact_display_mode:
      type: string
      label: 'Contact display mode'
    contact_modal_dialog_options:
      type: text
      label: 'Contact modal dialog options (JSON)'
    contact_hub_enabled_webforms:
      type: sequence
      label: 'Hub contact enabled webforms'
      sequence:
        type: string
        label: 'Webform id'
    urgency_help_enabled:
      type: boolean
      label: 'Enable site-wide urgency help block'
    urgency_help_lead:
      type: label
      label: 'Urgency help lead text'
      translatable: true
    urgency_help_phone:
      type: string
      label: 'Urgency help phone (display)'
    urgency_help_phone_link:
      type: string
      label: 'Urgency help phone link (tel: URI, optional)'
    urgency_help_hours:
      type: label
      label: 'Urgency help opening hours'
      translatable: true

webform.webform.third_party.ps_form:
  type: mapping
  label: 'PS Form webform third-party settings'
  mapping:
    email_hero_fid:
      type: integer
      label: 'Confirmation email hero file id'
    email_hero_image_style:
      type: string
      label: 'Confirmation email hero image style'
