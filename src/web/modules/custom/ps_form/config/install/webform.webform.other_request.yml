langcode: en
status: open
dependencies:
  module:
    - altcha
    - antibot
    - captcha
    - honeypot
id: other_request
title: 'Other request'
description: 'Direct access — non-standard contact request.'
category: 'Property Search'
elements: |
  step_project:
    '#type': webform_wizard_page
    '#title': Project
    other_need:
      '#type': checkboxes
      '#title': 'What is your request about?'
      '#required': true
      '#options':
        services: 'Propose services'
        application: 'Submit an application'
        press: 'Contact the press office'
        complaint: 'File a complaint'
        account: 'Other (account, login...)'
  step_contact:
    '#type': webform_wizard_page
    '#title': Details
    firstname:
      '#type': textfield
      '#title': 'First name'
      '#required': true
    lastname:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
    company_name:
      '#type': textfield
      '#title': Company
      '#required': true
    prof_phone:
      '#type': tel
      '#title': 'Professional phone'
      '#required': true
    prof_email_address:
      '#type': email
      '#title': 'Professional e-mail'
      '#required': true
    optout_intro:
      '#type': webform_markup
      '#markup': '<p>I object to receiving commercial communications from BNP Paribas Real Estate Advisory France:</p>'
    optout_email_transaction:
      '#type': checkbox
      '#title': E-mail
    optout_sms_transaction:
      '#type': checkbox
      '#title': SMS
    optout_tel_transaction:
      '#type': checkbox
      '#title': Telephone
    captcha:
      '#type': captcha
      '#captcha_type': altcha/ALTCHA
    legal_notice:
      '#type': webform_markup
      '#markup': '<p class="ps-form-legal-notice__title"><strong>Personal data protection information</strong></p><p class="ps-form-legal-notice">You may object to receiving commercial prospecting by telephone by registering free of charge on the telemarketing opposition list at <a href="https://www.bloctel.gouv.fr">www.bloctel.gouv.fr</a> or by post to Société Opposetel, Service Bloctel, 6 rue Nicolas Siret, 10000 Troyes, France. This registration prohibits a professional from contacting you by telephone, except where the call relates to an ongoing contract. BNP Paribas Real Estate Advisory France, a simplified joint stock company located at 50, cours de l&rsquo;Ile Seguin, 92100 Boulogne-Billancourt, France, as data controller, processes information about you to respond to your request submitted via this form and, where applicable, for commercial prospecting purposes (if you have given your consent or applicable law allows us to do so).</p><p class="ps-form-legal-notice">For more information on how BNP Paribas Real Estate Advisory France processes your personal data in this context and on your rights (including access, rectification, objection to processing for prospecting purposes, and the right to give instructions regarding your personal data after your death, as well as, in certain circumstances, erasure, restriction of processing, data portability and objection to other forms of processing) and BNP Paribas Real Estate Advisory France''s obligations in this regard, please see our <a href="https://data-privacy.realestate.bnpparibas/">Data Protection Notice</a>.</p>'
      '#wrapper_attributes':
        class:
          - ps-contact-form__legal
  step_message:
    '#type': webform_wizard_page
    '#title': Message
    qualification_comment:
      '#type': textarea
      '#title': Message
      '#placeholder': 'Describe your request'
      '#maxlength': 2000
css: ''
javascript: ''
settings:
  ajax: true
  ajax_scroll_top: form
  page: false
  form_submit_label: 'Send message'
  wizard_progress_bar: true
  wizard_progress_pages: true
  wizard_progress_link: false
  wizard_progress_states: false
  wizard_confirmation: false
  wizard_auto_forward: false
  wizard_page_type: container
  wizard_prev_button_label: Back
  wizard_next_button_label: Continue
  confirmation_type: inline
  confirmation_message: '<p>Thank you. Your message has been sent.</p>'
  third_party_settings:
    antibot:
      antibot: true
    honeypot:
      honeypot: true
access:
  create:
    roles:
      - anonymous
      - authenticated
    users: {  }
    permissions: {  }
handlers:
  email_notification:
    id: email
    label: 'Site notification'
    handler_id: email_notification
    status: true
    conditions: {  }
    weight: 0
    settings:
      states:
        - completed
      to_mail: _default
      from_mail: '[webform_submission:values:prof_email_address:raw]'
      from_name: '[webform_submission:values:firstname:raw] [webform_submission:values:lastname:raw]'
      subject: 'Other contact request'
      body: _default
      reply_to: '[webform_submission:values:prof_email_address:raw]'
      html: true
  email_confirmation:
    id: email
    label: 'Visitor confirmation'
    handler_id: email_confirmation
    status: true
    conditions: {  }
    weight: 1
    settings:
      states:
        - completed
      to_mail: '[webform_submission:values:prof_email_address:raw]'
      from_mail: _default
      from_name: _default
      subject: 'Thank you for contacting us'
      body: '<p>Thank you for your message.</p><p>We have received your request and will get back to you shortly.</p>'
      html: true
