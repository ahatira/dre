id: offer_contact
title: 'Contact the consultancy'
description: 'Offer detail contact form.'
category: 'Property Search'
elements: |-
  contact:
    '#type': fieldset
    '#title': 'What are your contact details?'
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'Professional e-mail'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Company
      '#placeholder': 'Enter your company'
    phone:
      '#type': tel
      '#title': 'Professional phone'
      '#placeholder': 'Enter your professional phone'
  project:
    '#type': fieldset
    '#title': 'Would you like to know more about your project?'
    message:
      '#type': textarea
      '#title': Message
      '#required': true
      '#default_value': "Hello, I would like more information about the offer with reference '[webform_submission:source-entity:field_reference]'. Thank you"
  legal:
    '#type': checkbox
    '#title': 'I have read and accept the terms of the Personal Data Protection Policy.'
    '#required': true
  marketing:
    '#type': checkbox
    '#title': 'I agree to receive marketing communications from BNP Paribas Real Estate.'
  newsletter:
    '#type': checkbox
    '#title': 'I agree to receive the newsletter.'
  similar_offers:
    '#type': checkbox
    '#title': 'I agree to be contacted about similar properties.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France, a limited company located at 50, cours de l&rsquo;Ile Seguin, 92100 Boulogne-Billancourt, as the Data Controller, processes information about you for the purposes of audience measurement, to carry out the requests you submit to us via the website and, in certain cases, for commercial prospecting purposes (if you have given your consent or if the applicable legislation authorizes us to do so). For more information on how BNP Paribas Real Estate Transaction France processes your personal data in this context and on your rights (in particular your rights of access, rectification, opposition to processing for canvassing purposes and your right to give instructions regarding the use of your personal data after your death as well as, in certain circumstances, a right to erasure, restriction of processing, data portability and a right to object to other forms of processing) and the obligations of BNP Paribas Real Estate Transaction France in this regard, we invite you to consult our <a href="/data-protection">Data Protection Notice</a>.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
