langcode: en
status: open
dependencies: {  }
open: null
close: null
uid: null
template: false
archive: false
id: schedule_visit
title: 'Schedule a visit'
description: 'Offer visit scheduling form.'
category: 'Property Search'
elements: |-
  visitor:
    '#type': fieldset
    '#title': 'Your details'
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
    email:
      '#type': email
      '#title': Email
      '#required': true
    phone:
      '#type': tel
      '#title': Phone
  visit:
    '#type': fieldset
    '#title': 'Visit request'
    preferred_date:
      '#type': date
      '#title': 'Preferred date'
    message:
      '#type': textarea
      '#title': Message
      '#default_value': 'I would like to schedule a visit for this offer.'
  legal:
    '#type': checkbox
    '#title': 'I agree to the privacy policy.'
    '#required': true
css: ''
javascript: ''
settings:
  ajax: false
  page: true
  form_prepopulate_source_entity: true
  form_prepopulate_source_entity_type: node
  confirmation_type: message
  confirmation_message: 'Thank you. Your visit request has been sent.'
access:
  create:
    roles:
      - anonymous
      - authenticated
    users: {  }
    permissions: {  }
handlers:
  email_agent:
    id: email
    label: 'Agent notification'
    notes: 'Notifies the offer primary agent when a visitor requests a visit.'
    handler_id: email_agent
    status: true
    conditions: {  }
    weight: 0
    settings:
      states:
        - completed
      to_mail: '[webform_submission:source-entity:ps-offer-contact-email]'
      to_options: {  }
      cc_mail: ''
      cc_options: {  }
      bcc_mail: _default
      bcc_options: {  }
      from_mail: '[webform_submission:values:email:raw]'
      from_options: {  }
      from_name: '[webform_submission:values:first_name:raw] [webform_submission:values:last_name:raw]'
      subject: 'Visit request — Offer [webform_submission:source-entity:field_reference]'
      body: _default
      excluded_elements: {  }
      ignore_access: false
      exclude_empty: true
      exclude_empty_checkbox: true
      exclude_attachments: false
      html: true
      attachments: false
      twig: false
      theme_name: ''
      parameters: {  }
      debug: false
      reply_to: '[webform_submission:values:email:raw]'
      return_path: ''
      sender_mail: ''
      sender_name: ''
  email_confirmation:
    id: email
    label: 'Visitor confirmation'
    handler_id: email_confirmation
    status: true
    conditions: {  }
    weight: 1
    settings:
      states:
        - completed
      to_mail: '[webform_submission:values:email:raw]'
      to_options: {  }
      cc_mail: ''
      cc_options: {  }
      bcc_mail: ''
      bcc_options: {  }
      from_mail: _default
      from_options: {  }
      from_name: _default
      subject: 'Your visit request — [webform_submission:source-entity:field_reference]'
      body: '<p>Thank you for your visit request regarding offer <strong>[webform_submission:source-entity:field_reference]</strong>.</p><p>Our consultant will contact you shortly to arrange a visit.</p>'
      excluded_elements: {  }
      ignore_access: false
      exclude_empty: true
      exclude_empty_checkbox: true
      exclude_attachments: false
      html: true
      attachments: false
      twig: false
      theme_name: ''
      parameters: {  }
      debug: false
