langcode: en
status: open
dependencies:
  module:
    - altcha
    - antibot
    - captcha
    - datetime_flatpickr_webform
    - honeypot
id: schedule_visit
title: 'Schedule a visit'
description: 'Offer visit scheduling form.'
category: 'Property Search'
elements: |
  step_availability:
    '#type': webform_wizard_page
    '#title': Availability
    availability_intro:
      '#type': webform_markup
      '#markup': '<p><strong>What are your availabilities?</strong></p><p>Select up to 5 dates within the next 15 days (from tomorrow).</p>'
    availabilities:
      '#type': flatpickr_date
      '#title': Availabilities
      '#title_display': none
      '#required': true
      '#wrapper_attributes':
        class:
          - ps-schedule-visit-availabilities
      '#mode': multiple
      '#inline': true
      '#minDate': '1'
      '#maxDate': '15'
      '#dateFormat': 'Y-m-d'
  step_contact:
    '#type': webform_wizard_page
    '#title': Details
    firstname:
      '#type': textfield
      '#title': 'First name'
      '#required': true
    lastname:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
    company_name:
      '#type': textfield
      '#title': Company
      '#required': true
    prof_phone:
      '#type': tel
      '#title': 'Professional phone'
      '#required': true
    prof_email_address:
      '#type': email
      '#title': 'Professional e-mail'
      '#required': true
    optout_intro:
      '#type': webform_markup
      '#markup': '<p>I object to receiving commercial communications from BNP Paribas Real Estate Advisory France:</p>'
    optout_email_transaction:
      '#type': checkbox
      '#title': E-mail
    optout_sms_transaction:
      '#type': checkbox
      '#title': SMS
    optout_tel_transaction:
      '#type': checkbox
      '#title': Telephone
    captcha:
      '#type': captcha
      '#captcha_type': altcha/ALTCHA
    legal_notice:
      '#type': webform_markup
      '#markup': '<p class="ps-form-legal-notice__title"><strong>Personal data protection information</strong></p><p class="ps-form-legal-notice">You may object to receiving commercial prospecting by telephone by registering free of charge on the telemarketing opposition list at <a href="https://www.bloctel.gouv.fr">www.bloctel.gouv.fr</a> or by post to Société Opposetel, Service Bloctel, 6 rue Nicolas Siret, 10000 Troyes, France. This registration prohibits a professional from contacting you by telephone, except where the call relates to an ongoing contract. BNP Paribas Real Estate Transaction France, a public limited company located at 50, cours de l&rsquo;Ile Seguin, 92100 Boulogne-Billancourt, France, as data controller, processes information about you to respond to your request submitted via this form and, where applicable, for commercial prospecting purposes (if you have given your consent or applicable law allows us to do so).</p><p class="ps-form-legal-notice">For more information on how BNP Paribas Real Estate Transaction France processes your personal data in this context and on your rights (including access, rectification, objection to processing for prospecting purposes, and the right to give instructions regarding your personal data after your death, as well as, in certain circumstances, erasure, restriction of processing, data portability and objection to other forms of processing) and BNP Paribas Real Estate Transaction France''s obligations in this regard, please see our <a href="https://data-privacy.realestate.bnpparibas/">Data Protection Notice</a>.</p>'
      '#wrapper_attributes':
        class:
          - ps-contact-form__legal
  step_message:
    '#type': webform_wizard_page
    '#title': Message
    qualification_comment:
      '#type': textarea
      '#title': Message
      '#placeholder': 'Would you like to add any details about your visit request?'
      '#maxlength': 2000
  offer_reference:
    '#type': hidden
    '#title': 'Offer reference'
  offer_business_id:
    '#type': hidden
    '#title': 'Offer business ID'
  offer_operation_code:
    '#type': hidden
    '#title': 'Offer operation code'
  offer_asset_code:
    '#type': hidden
    '#title': 'Offer asset code'
  offer_captured_at:
    '#type': hidden
    '#title': 'Offer captured at'
  offer_title:
    '#type': hidden
    '#title': 'Offer title'
  offer_operation_label:
    '#type': hidden
    '#title': 'Offer operation label'
  offer_asset_label:
    '#type': hidden
    '#title': 'Offer asset label'
  offer_surface_primary:
    '#type': hidden
    '#title': 'Offer surface primary'
  offer_surface_suffix:
    '#type': hidden
    '#title': 'Offer surface suffix'
  offer_location:
    '#type': hidden
    '#title': 'Offer location'
  offer_price_display:
    '#type': hidden
    '#title': 'Offer price display'
  offer_price_qualifiers:
    '#type': hidden
    '#title': 'Offer price qualifiers'
  offer_exclusive:
    '#type': hidden
    '#title': 'Offer exclusive'
  offer_url:
    '#type': hidden
    '#title': 'Offer URL'
  offer_image_uri:
    '#type': hidden
    '#title': 'Offer image URI'
  offer_image_alt:
    '#type': hidden
    '#title': 'Offer image alt'
  offer_langcode:
    '#type': hidden
    '#title': 'Offer language'
  offer_agent_email:
    '#type': hidden
    '#title': 'Offer agent email'
  offer_agent_id:
    '#type': hidden
    '#title': 'Offer agent ID'
css: ''
javascript: ''
settings:
  ajax: true
  ajax_scroll_top: form
  page: false
  form_submit_label: 'Send message'
  form_prepopulate_source_entity: true
  form_prepopulate_source_entity_type: node
  wizard_progress_bar: true
  wizard_progress_pages: true
  wizard_progress_link: false
  wizard_progress_states: false
  wizard_confirmation: false
  wizard_auto_forward: false
  wizard_page_type: container
  wizard_prev_button_label: Back
  wizard_next_button_label: Continue
  confirmation_type: inline
  confirmation_message: '<p>Thank you. Your visit request has been sent.</p>'
  third_party_settings:
    antibot:
      antibot: true
    honeypot:
      honeypot: true
access:
  create:
    roles:
      - anonymous
      - authenticated
    users: {  }
    permissions: {  }
handlers:
  email_agent:
    id: email
    label: 'Agent notification'
    notes: 'Notifies the offer primary agent when a visitor requests a visit.'
    handler_id: email_agent
    status: true
    conditions: {  }
    weight: 0
    settings:
      states:
        - completed
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      to_options: {  }
      cc_mail: ''
      cc_options: {  }
      bcc_mail: _default
      bcc_options: {  }
      from_mail: '[webform_submission:values:prof_email_address:raw]'
      from_options: {  }
      from_name: '[webform_submission:values:firstname:raw] [webform_submission:values:lastname:raw]'
      subject: 'Visit request — Offer [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">You have received a new contact request. The offer snapshot and visitor details are below.</p>
        [webform_submission:ps-schedule-visit-availabilities]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Thank you for your visit request regarding offer <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">The property details below were recorded at the time of the request:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Our consultant will contact you shortly to arrange a visit.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">For reference, your request is as follows:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Thank you for your interest in BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Best regards,<br>Your Customer Service team, BNP Paribas Real Estate.</p>
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
      ignore_access: false
      exclude_empty: true
      exclude_empty_checkbox: true
      exclude_attachments: false
      html: true
      attachments: false
      twig: false
      theme_name: ''
      parameters: {  }
      debug: false
      reply_to: '[webform_submission:values:prof_email_address:raw]'
      return_path: ''
      sender_mail: ''
      sender_name: ''
  email_confirmation:
    id: email
    label: 'Visitor confirmation'
    handler_id: email_confirmation
    status: true
    conditions: {  }
    weight: 1
    settings:
      states:
        - completed
      to_mail: '[webform_submission:values:prof_email_address:raw]'
      to_options: {  }
      cc_mail: ''
      cc_options: {  }
      bcc_mail: ''
      bcc_options: {  }
      from_mail: _default
      from_options: {  }
      from_name: _default
      subject: 'Your visit request — [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Hello [webform_submission:values:firstname:raw],</p>
        [webform_submission:ps-schedule-visit-availabilities]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Thank you for your visit request regarding offer <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">The property details below were recorded at the time of the request:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Our consultant will contact you shortly to arrange a visit.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">For reference, your request is as follows:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Thank you for your interest in BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Best regards,<br>Your Customer Service team, BNP Paribas Real Estate.</p>
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
      ignore_access: false
      exclude_empty: true
      exclude_empty_checkbox: true
      exclude_attachments: false
      html: true
      attachments: false
      twig: false
      theme_name: ''
      parameters: {  }
      debug: false
      reply_to: ''
      return_path: ''
      sender_mail: ''
      sender_name: ''
