langcode: en
status: open
dependencies:
  module:
    - altcha
    - antibot
    - captcha
    - honeypot
id: find_property
title: 'Find a property for sale or rent'
description: 'Direct access — search for a property to buy or rent.'
category: 'Property Search'
elements: |
  step_project:
    '#type': webform_wizard_page
    '#title': Project
    project:
      '#type': fieldset
      '#title': 'Property type and requirements'
      transaction_type:
        '#type': radios
        '#title': 'What type of transaction?'
        '#required': true
        '#options':
          LOC: Rent
          VEN: Buy
          EITHER: 'No preference'
        '#default_value': LOC
      search_type:
        '#type': radios
        '#title': 'What type of property are you looking for?'
        '#required': true
        '#options':
          BUR: Office
          COW: Coworking
          ENT: 'Warehouse / Logistics'
          ACT: 'Business premises'
          COM: Retail
          TER: Land
        '#default_value': BUR
      search_criteria:
        '#type': fieldset
        '#title': 'What are your search criteria?'
        budget:
          '#type': fieldset
          '#title': Budget
          '#states':
            visible:
              -
                ':input[name="transaction_type"]':
                  value: VEN
              -
                ':input[name="transaction_type"]':
                  value: EITHER
          min_budget:
            '#type': number
            '#title': 'Min price'
            '#min': 0
          max_budget:
            '#type': number
            '#title': 'Max price'
            '#min': 0
        rent:
          '#type': fieldset
          '#title': Rent
          '#states':
            visible:
              -
                ':input[name="transaction_type"]':
                  value: LOC
              -
                ':input[name="transaction_type"]':
                  value: EITHER
          min_rent:
            '#type': number
            '#title': 'Min rent (excl. tax/charges/sqm/yr)'
            '#min': 0
          max_rent:
            '#type': number
            '#title': 'Max rent (excl. tax/charges/sqm/yr)'
            '#min': 0
        surface:
          '#type': fieldset
          '#title': Surface
          '#states':
            invisible:
              -
                ':input[name="search_type"]':
                  value: COW
          min_surface:
            '#type': number
            '#title': 'Min surface'
            '#min': 20
          max_surface:
            '#type': number
            '#title': 'Max surface'
            '#min': 20
        post:
          '#type': fieldset
          '#title': Workstations
          '#states':
            visible:
              -
                ':input[name="search_type"]':
                  value: COW
          min_post:
            '#type': number
            '#title': 'Min workstations'
            '#min': 1
          max_post:
            '#type': number
            '#title': 'Max workstations'
            '#min': 1
        search_territory:
          '#type': textfield
          '#title': Location
          '#placeholder': 'City, district, postcode, building name...'
  step_contact:
    '#type': webform_wizard_page
    '#title': Details
    firstname:
      '#type': textfield
      '#title': 'First name'
      '#required': true
    lastname:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
    company_name:
      '#type': textfield
      '#title': Company
      '#required': true
    job_title:
      '#type': select
      '#title': 'Job title'
      '#empty_option': 'Select a job title'
      '#options':
        'Asset manager': 'Asset manager'
        'Avocat / Notaire': 'Lawyer / Notary'
        'CEO / Président': 'CEO / President'
        'Chef de projet immobilier': 'Real estate project manager'
        'Chef de projet logistique': 'Logistics project manager'
        'Chef de projet marketing / communication': 'Marketing / communications project manager'
        Commercial: Sales
        'Consultant immobilier': 'Real estate consultant'
        'Directeur administratif et financier': 'Chief financial and administrative officer'
        'Directeur commercial': 'Sales director'
        'Directeur comptable': 'Chief accountant'
        'Directeur des achats': 'Head of procurement'
        'Directeur des investissements et arbitrages': 'Director of investments and asset allocation'
        'Directeur des ressources humaines': 'HR director'
        'Directeur des services généraux': 'Head of general services'
        'Directeur immobilier': 'Real estate director'
        'Directeur juridique': 'Legal director'
        'Directeur logistique': 'Logistics director'
        'Directeur marketing / communication': 'Marketing / communications director'
        Etudiant: Student
        'Fund manager': 'Fund manager'
        'Gérant / Dirigeant': 'Manager / Executive'
        Gestionnaire: 'Portfolio manager'
        Journaliste: Journalist
        Juriste: 'Legal counsel'
        'Responsable commercial': 'Sales manager'
        'Responsable comptable': 'Accounting manager'
        'Responsable des achats': 'Procurement manager'
        'Responsable des services généraux': 'General services manager'
        'Responsable immobilier': 'Real estate manager'
        'Responsable juridique': 'Legal manager'
        'Responsable logistique': 'Logistics manager'
        'Responsable marketing / communication': 'Marketing / communications manager'
        Autre: Other
    prof_phone:
      '#type': tel
      '#title': 'Professional phone'
      '#required': true
    prof_email_address:
      '#type': email
      '#title': 'Professional e-mail'
      '#required': true
    optout_intro:
      '#type': webform_markup
      '#markup': '<p>I object to receiving commercial communications from BNP Paribas Real Estate Advisory France:</p>'
    optout_email_transaction:
      '#type': checkbox
      '#title': E-mail
    optout_sms_transaction:
      '#type': checkbox
      '#title': SMS
    optout_tel_transaction:
      '#type': checkbox
      '#title': Telephone
    captcha:
      '#type': captcha
      '#captcha_type': altcha/ALTCHA
    legal_notice:
      '#type': webform_markup
      '#markup': '<p class="ps-form-legal-notice__title"><strong>Personal data protection information</strong></p><p class="ps-form-legal-notice">You may object to receiving commercial prospecting by telephone by registering free of charge on the telemarketing opposition list at <a href="https://www.bloctel.gouv.fr">www.bloctel.gouv.fr</a> or by post to Société Opposetel, Service Bloctel, 6 rue Nicolas Siret, 10000 Troyes, France. This registration prohibits a professional from contacting you by telephone, except where the call relates to an ongoing contract. BNP Paribas Real Estate Transaction France, a public limited company located at 50, cours de l&rsquo;Ile Seguin, 92100 Boulogne-Billancourt, France, as data controller, processes information about you to respond to your request submitted via this form and, where applicable, for commercial prospecting purposes (if you have given your consent or applicable law allows us to do so).</p><p class="ps-form-legal-notice">For more information on how BNP Paribas Real Estate Transaction France processes your personal data in this context and on your rights (including access, rectification, objection to processing for prospecting purposes, and the right to give instructions regarding your personal data after your death, as well as, in certain circumstances, erasure, restriction of processing, data portability and objection to other forms of processing) and BNP Paribas Real Estate Transaction France''s obligations in this regard, please see our <a href="https://data-privacy.realestate.bnpparibas/">Data Protection Notice</a>.</p>'
      '#wrapper_attributes':
        class:
          - ps-contact-form__legal
  step_message:
    '#type': webform_wizard_page
    '#title': Message
    qualification_comment:
      '#type': textarea
      '#title': Message
      '#placeholder': 'Specify your project here'
      '#maxlength': 2000
css: ''
javascript: ''
settings:
  ajax: true
  ajax_scroll_top: form
  page: false
  form_submit_label: 'Send message'
  wizard_progress_bar: true
  wizard_progress_pages: true
  wizard_progress_link: false
  wizard_progress_states: false
  wizard_confirmation: false
  wizard_auto_forward: false
  wizard_page_type: container
  wizard_prev_button_label: Back
  wizard_next_button_label: Continue
  confirmation_type: inline
  confirmation_message: '<p>Thank you. Your message has been sent.</p>'
  third_party_settings:
    antibot:
      antibot: true
    honeypot:
      honeypot: true
access:
  create:
    roles:
      - anonymous
      - authenticated
    users: {  }
    permissions: {  }
handlers:
  email_notification:
    id: email
    label: 'Site notification'
    handler_id: email_notification
    status: true
    conditions: {  }
    weight: 0
    settings:
      states:
        - completed
      to_mail: _default
      from_mail: '[webform_submission:values:prof_email_address:raw]'
      from_name: '[webform_submission:values:firstname:raw] [webform_submission:values:lastname:raw]'
      subject: 'Find property request'
      body: _default
      reply_to: '[webform_submission:values:prof_email_address:raw]'
      html: true
  email_confirmation:
    id: email
    label: 'Visitor confirmation'
    handler_id: email_confirmation
    status: true
    conditions: {  }
    weight: 1
    settings:
      states:
        - completed
      to_mail: '[webform_submission:values:prof_email_address:raw]'
      from_mail: _default
      from_name: _default
      subject: 'Thank you for contacting us'
      body: '<p>Thank you for your message.</p><p>We have received your request and will get back to you shortly.</p>'
      html: true
