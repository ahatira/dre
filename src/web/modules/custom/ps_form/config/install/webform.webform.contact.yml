langcode: en
status: open
dependencies:
  module:
    - altcha
    - antibot
    - captcha
    - honeypot
id: contact
title: 'Contact us'
description: 'Site-wide contact hub for header offcanvas — routes to need-specific forms.'
category: 'Property Search'
elements: |-
  step_need:
    '#type': webform_wizard_page
    '#title': Need
    '#attributes':
      class:
        - type_need
    need_title:
      '#type': webform_markup
      '#markup': '<p class="h4">To get started, what is your need?</p>'
    target_webform:
      '#type': radios
      '#title': Need
      '#title_display': invisible
      '#required': true
      '#options': {}
css: ''
javascript: ''
settings:
  ajax: true
  ajax_scroll_top: form
  page: false
  form_submit_label: Continue
  wizard_progress_bar: true
  wizard_progress_pages: true
  wizard_progress_link: false
  wizard_progress_states: false
  wizard_confirmation: false
  wizard_auto_forward: false
  wizard_page_type: container
  wizard_prev_button_label: Back
  wizard_next_button_label: Continue
  confirmation_type: inline
  confirmation_message: ''
  third_party_settings:
    antibot:
      antibot: true
    honeypot:
      honeypot: true
access:
  create:
    roles:
      - anonymous
      - authenticated
    users: {  }
    permissions: {  }
handlers: {  }
