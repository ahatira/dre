title: 'Skontaktuj się z doradcą'
description: 'Formularz kontaktowy na stronie szczegółów oferty.'
category: 'Wyszukiwanie nieruchomości'
elements: |-
  contact:
    '#type': fieldset
    '#title': 'Jakie są Twoje dane kontaktowe?'
    first_name:
      '#type': textfield
      '#title': 'Imię'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nazwisko'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'Służbowy e-mail'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Firma
      '#placeholder': 'Wpisz nazwę firmy'
    phone:
      '#type': tel
      '#title': 'Telefon służbowy'
      '#placeholder': 'Wpisz numer telefonu służbowego'
  project:
    '#type': fieldset
    '#title': 'Chcesz dowiedzieć się więcej o swoim projekcie?'
    message:
      '#type': textarea
      '#title': Wiadomość
      '#required': true
      '#default_value': "Dzień dobry, chciałbym uzyskać więcej informacji o ofercie o numerze referencyjnym '[webform_submission:source-entity:field_reference]'. Dziękuję"
  legal:
    '#type': checkbox
    '#title': 'Przeczytałem(-am) i akceptuję warunki Polityki ochrony danych osobowych.'
    '#required': true
  marketing:
    '#type': checkbox
    '#title': 'Wyrażam zgodę na otrzymywanie komunikacji marketingowej od BNP Paribas Real Estate.'
  newsletter:
    '#type': checkbox
    '#title': 'Wyrażam zgodę na otrzymywanie newslettera.'
  similar_offers:
    '#type': checkbox
    '#title': 'Wyrażam zgodę na kontakt w sprawie podobnych nieruchomości.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France przetwarza Twoje dane, aby obsłużyć Twoją prośbę oraz, za Twoją zgodą, w celach marketingowych. Zapoznaj się z naszą <a href="/data-protection">Informacją o ochronie danych</a>, aby poznać swoje prawa.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
settings:
  form_submit_label: Wyślij
  confirmation_message: '<p>Dziękujemy. Twoja wiadomość została wysłana.</p>'
handlers:
  email_confirmation:
    settings:
      subject: 'Państwa zapytanie kontaktowe — [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dzień dobry [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dziękujemy za zainteresowanie ofertą <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Poniższe dane nieruchomości zostały zapisane w momencie złożenia zapytania:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Państwa wiadomość została przekazana naszemu doradcy, który wkrótce się z Państwem skontaktuje.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Poniżej przedstawiamy podsumowanie Państwa zapytania:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dziękujemy za zainteresowanie BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Z poważaniem,<br>Zespół Obsługi Klienta, BNP Paribas Real Estate.</p>
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Potwierdzenie dla odwiedzającego'
  email_agent:
    settings:
      subject: 'Zapytanie kontaktowe — Oferta [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Otrzymali Państwo nowe zapytanie kontaktowe. Poniżej snapshot oferty i dane odwiedzającego.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dziękujemy za zainteresowanie ofertą <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Poniższe dane nieruchomości zostały zapisane w momencie złożenia zapytania:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Państwa wiadomość została przekazana naszemu doradcy, który wkrótce się z Państwem skontaktuje.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Poniżej przedstawiamy podsumowanie Państwa zapytania:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dziękujemy za zainteresowanie BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Z poważaniem,<br>Zespół Obsługi Klienta, BNP Paribas Real Estate.</p>
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Powiadomienie doradcy'
