title: 'Contacter le consultant'
description: 'Formulaire de contact sur la fiche offre.'
category: 'Recherche immobilière'
elements: |-
  contact:
    '#type': fieldset
    '#title': 'Quelles sont vos coordonnées ?'
    first_name:
      '#type': textfield
      '#title': 'Prénom'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nom'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'E-mail professionnel'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Société
      '#placeholder': 'Saisissez votre société'
    phone:
      '#type': tel
      '#title': 'Téléphone professionnel'
      '#placeholder': 'Saisissez votre téléphone professionnel'
  project:
    '#type': fieldset
    '#title': 'Souhaitez-vous en savoir plus sur votre projet ?'
    message:
      '#type': textarea
      '#title': Message
      '#required': true
      '#default_value': "Bonjour, je souhaite obtenir plus d'informations sur l'offre référencée '[webform_submission:source-entity:field_reference]'. Merci"
  legal:
    '#type': checkbox
    '#title': "J'ai lu et j'accepte les conditions de la Politique de protection des données personnelles."
    '#required': true
  marketing:
    '#type': checkbox
    '#title': "J'accepte de recevoir des communications marketing de BNP Paribas Real Estate."
  newsletter:
    '#type': checkbox
    '#title': "J'accepte de recevoir la newsletter."
  similar_offers:
    '#type': checkbox
    '#title': "J'accepte d'être contacté au sujet de biens similaires."
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France traite vos données pour répondre à votre demande et, si vous y consentez, pour des communications commerciales. Consultez notre <a href="/data-protection">Notice de protection des données</a> pour vos droits.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
settings:
  form_submit_label: Envoyer
  confirmation_message: '<p>Merci. Votre message a été envoyé.</p>'
handlers:
  email_agent:
    label: 'Notification consultant'
    settings:
      subject: 'Demande de contact — Offre [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vous avez reçu une nouvelle demande. L'instantané de l'offre et les coordonnées du visiteur figurent ci-dessous.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Merci de l'intérêt que vous portez à l'offre <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Les caractéristiques de l'offre ci-dessous ont été enregistrées au moment de la demande :</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Votre message a été transmis à notre consultant, qui reviendra vers vous rapidement.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Pour référence, voici le récapitulatif de votre demande :</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Merci de l'intérêt que vous portez à BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Cordialement,<br>Votre équipe Service Client, BNP Paribas Real Estate.</p>
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
  email_confirmation:
    label: 'Confirmation visiteur'
    settings:
      subject: 'Votre demande de contact — [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bonjour [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Merci de l'intérêt que vous portez à l'offre <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Les caractéristiques de l'offre ci-dessous ont été enregistrées au moment de la demande :</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Votre message a été transmis à notre consultant, qui reviendra vers vous rapidement.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Pour référence, voici le récapitulatif de votre demande :</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Merci de l'intérêt que vous portez à BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Cordialement,<br>Votre équipe Service Client, BNP Paribas Real Estate.</p>
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
