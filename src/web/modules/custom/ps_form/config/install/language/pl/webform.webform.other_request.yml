    '#markup': '<p class="ps-form-legal-notice__title"><strong>Informacje o ochronie danych osobowych</strong></p><p class="ps-form-legal-notice">Może Pan/Pani sprzeciwić się otrzymywaniu telefonicznych ofert handlowych, rejestrując się bezpłatnie na liście sprzeciwu na stronie <a href="https://www.bloctel.gouv.fr">www.bloctel.gouv.fr</a> lub listownie na adres Société Opposetel, Service Bloctel, 6 rue Nicolas Siret, 10000 Troyes, Francja. Rejestracja ta zabrania profesjonalistom kontaktowania się telefonicznie, chyba że rozmowa dotyczy trwającej umowy. BNP Paribas Real Estate Advisory France, spółka z ograniczoną odpowiedzialnością uproszczona z siedzibą przy 50, cours de l&rsquo;Ile Seguin, 92100 Boulogne-Billancourt, Francja, jako administrator danych, przetwarza informacje dotyczące Pana/Pani w celu udzielenia odpowiedzi na zapytanie przesłane za pośrednictwem tego formularza oraz, w stosownych przypadkach, w celach prospectingowych (jeśli wyraził/a Pan/Pani zgodę lub pozwala na to obowiązujące prawo).</p><p class="ps-form-legal-notice">Więcej informacji o tym, w jaki sposób BNP Paribas Real Estate Advisory France przetwarza Pana/Pani dane osobowe w tym kontekście, oraz o Pana/Pani prawach (w tym prawie dostępu, sprostowania, sprzeciwu wobec przetwarzania w celach prospectingowych i prawie do wydania dyspozycji dotyczących wykorzystania danych osobowych po śmierci, a także — w określonych okolicznościach — prawie do usunięcia, ograniczenia przetwarzania, przenoszenia danych i sprzeciwu wobec innych form przetwarzania) oraz obowiązkach BNP Paribas Real Estate Advisory France w tym zakresie znajduje się w naszym <a href="https://data-privacy.realestate.bnpparibas/">Komunikat o ochronie danych</a>.</p>'
