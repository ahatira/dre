title: 'Créer une alerte de recherche'
description: "Formulaire d'inscription aux alertes de recherche immobilière."
category: 'Recherche immobilière'
elements: |-
  alert_name:
    '#type': textfield
    '#title': 'Titre de l'alerte'
    '#required': true
    '#maxlength': 255
  prof_email_address:
    '#type': email
    '#title': 'E-mail professionnel'
    '#required': true
  criteria_display:
    '#type': webform_markup
    '#markup': ''
  frequence:
    '#type': radios
    '#title': 'Fréquence d'envoi'
    '#required': true
    '#options':
      daily: Quotidienne
      weekly: Hebdomadaire
    '#default_value': weekly
  optout_group:
    '#type': fieldset
    '#title': 'Communications commerciales'
    '#title_display': invisible
    optout_intro:
      '#type': webform_markup
      '#markup': '<p class="ps-search-alert-form__optout-intro">Je m'oppose à recevoir des communications commerciales de BNP Paribas Real Estate Advisory France :</p>'
    optout_email_transaction:
      '#type': checkbox
      '#title': E-mail
    optout_sms_transaction:
      '#type': checkbox
      '#title': SMS
    optout_tel_transaction:
      '#type': checkbox
      '#title': Téléphone
  legal:
    '#type': checkbox
    '#title': 'J'ai lu et j'accepte les conditions de la Politique de protection des données personnelles.'
    '#required': true
  legal_notice:
    '#type': webform_markup
    '#markup': '<p class="ps-search-alert-form__legal-notice">BNP Paribas Real Estate traite vos données pour envoyer des alertes immobilières correspondant à vos critères. Consultez notre <a href="/data-protection">Notice de protection des données</a> pour vos droits.</p>'  criteria_json:
    '#type': hidden
    '#title': 'Critères de recherche'
  search_url:
    '#type': hidden
    '#title': 'URL de recherche'
  search_path:
    '#type': hidden
    '#title': 'Chemin de recherche'
settings:
  form_submit_label: Continuer
  confirmation_message: "<p>Votre alerte de recherche a été créée. Vous recevrez un e-mail lorsque de nouveaux biens correspondront à vos critères.</p>"
