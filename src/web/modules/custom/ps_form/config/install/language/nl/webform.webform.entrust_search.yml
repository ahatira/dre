    '#markup': '<p class="ps-form-legal-notice__title"><strong>Informatie over de bescherming van persoonsgegevens</strong></p><p class="ps-form-legal-notice">U kunt zich verzetten tegen commerciële telefonische prospectie door zich kosteloos in te schrijven op de oppositionlijst via <a href="https://www.bloctel.gouv.fr">www.bloctel.gouv.fr</a> of per post aan Société Opposetel, Service Bloctel, 6 rue Nicolas Siret, 10000 Troyes, Frankrijk. Deze inschrijving verbiedt een professional u telefonisch te benaderen, behalve wanneer het gesprek betrekking heeft op een lopend contract. BNP Paribas Real Estate Transaction France, een naamloze vennootschap gevestigd aan 50, cours de l&rsquo;Ile Seguin, 92100 Boulogne-Billancourt, Frankrijk verwerkt als verwerkingsverantwoordelijke informatie over u om te reageren op uw via dit formulier ingediende aanvraag en, indien van toepassing, voor commerciële prospectiedoeleinden (indien u toestemming heeft gegeven of de toepasselijke wetgeving dit toestaat).</p><p class="ps-form-legal-notice">Voor meer informatie over de wijze waarop BNP Paribas Real Estate Transaction France uw persoonsgegevens in deze context verwerkt en over uw rechten (met inbegrip van inzage, rectificatie, bezwaar tegen verwerking voor prospectiedoeleinden en het recht om instructies te geven over het gebruik van uw persoonsgegevens na uw overlijden, alsmede, onder bepaalde omstandigheden, wissing, beperking van de verwerking, gegevensoverdraagbaarheid en bezwaar tegen andere vormen van verwerking) en de verplichtingen van BNP Paribas Real Estate Transaction France in dit verband, raadpleeg onze <a href="https://data-privacy.realestate.bnpparibas/">Kennisgeving gegevensbescherming</a>.</p>'
