    '#markup': '<p class="ps-form-legal-notice__title"><strong>Información sobre la protección de datos personales</strong></p><p class="ps-form-legal-notice">Puede oponerse a recibir prospección comercial por teléfono inscribiéndose gratuitamente en la lista de oposición al telemarketing en <a href="https://www.bloctel.gouv.fr">www.bloctel.gouv.fr</a> o por correo postal a Société Opposetel, Service Bloctel, 6 rue Nicolas Siret, 10000 Troyes, Francia. Esta inscripción prohíbe que un profesional le contacte telefónicamente, salvo si la llamada está relacionada con un contrato en curso. BNP Paribas Real Estate Advisory France, sociedad por acciones simplificada con domicilio en 50, cours de l&rsquo;Ile Seguin, 92100 Boulogne-Billancourt, Francia, como responsable del tratamiento, trata la información que le concierne para responder a su solicitud enviada a través de este formulario y, en su caso, con fines de prospección comercial (si ha dado su consentimiento o la legislación aplicable nos lo permite).</p><p class="ps-form-legal-notice">Para más información sobre cómo BNP Paribas Real Estate Advisory France trata sus datos personales en este contexto y sobre sus derechos (incluidos los derechos de acceso, rectificación, oposición al tratamiento con fines de prospección y el derecho a dar instrucciones relativas al uso de sus datos personales después de su fallecimiento, así como, en determinadas circunstancias, supresión, limitación del tratamiento, portabilidad de los datos y oposición a otras formas de tratamiento) y las obligaciones de BNP Paribas Real Estate Advisory France al respecto, consulte nuestra <a href="https://data-privacy.realestate.bnpparibas/">Aviso de protección de datos</a>.</p>'
