title: Besichtigung vereinbaren
description: Formular zur Vereinbarung einer Besichtigung.
category: Immobiliensuche
settings:
  form_submit_label: Senden
  confirmation_message: Vielen Dank. Ihre Besichtigungsanfrage wurde gesendet.
handlers:
  email_confirmation:
    settings:
      subject: Ihre Besichtigungsanfrage — [webform_submission:values:offer_reference:raw]
      body: '<p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Guten
        Tag [webform_submission:values:firstname:raw],</p>

        [webform_submission:ps-schedule-visit-availabilities]


        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen
        Dank für Ihre Besichtigungsanfrage zum Angebot <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>

        [webform_submission:ps-offer-email-block]

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Die
        untenstehenden Objektdaten wurden zum Zeitpunkt der Anfrage erfasst:</p>

        [webform_submission:ps-offer-snapshot-recap]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Unser
        Berater wird Sie in Kürze kontaktieren, um einen Termin zu vereinbaren.</p>

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Zur
        Referenz finden Sie Ihre Anfrage im Folgenden:</p>

        [webform_submission:values]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen
        Dank für Ihr Interesse an BNP Paribas Real Estate.</p>

        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Mit freundlichen
        Grüßen,<br>Ihr Kundenservice-Team, BNP Paribas Real Estate.</p>'
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: Besucherbestätigung
  email_agent:
    settings:
      subject: Besichtigungsanfrage — Angebot [webform_submission:values:offer_reference:raw]
      body: '<p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Sie
        haben eine neue Kontaktanfrage erhalten. Objekt-Snapshot und Besucherdaten
        finden Sie unten.</p>

        [webform_submission:ps-schedule-visit-availabilities]



        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen
        Dank für Ihre Besichtigungsanfrage zum Angebot <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>

        [webform_submission:ps-offer-email-block]

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Die
        untenstehenden Objektdaten wurden zum Zeitpunkt der Anfrage erfasst:</p>

        [webform_submission:ps-offer-snapshot-recap]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Unser
        Berater wird Sie in Kürze kontaktieren, um einen Termin zu vereinbaren.</p>

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Zur
        Referenz finden Sie Ihre Anfrage im Folgenden:</p>

        [webform_submission:values]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen
        Dank für Ihr Interesse an BNP Paribas Real Estate.</p>

        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Mit freundlichen
        Grüßen,<br>Ihr Kundenservice-Team, BNP Paribas Real Estate.</p>'
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
