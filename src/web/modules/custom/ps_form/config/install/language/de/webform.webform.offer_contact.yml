title: 'Beratung kontaktieren'
description: 'Kontaktformular auf der Angebotsdetailseite.'
category: Immobiliensuche
elements: |-
  contact:
    '#type': fieldset
    '#title': 'Wie lauten Ihre Kontaktdaten?'
    first_name:
      '#type': textfield
      '#title': 'Vorname'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nachname'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'Geschäftliche E-Mail'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Unternehmen
      '#placeholder': 'Unternehmen eingeben'
    phone:
      '#type': tel
      '#title': 'Geschäftliches Telefon'
      '#placeholder': 'Geschäftliches Telefon eingeben'
  project:
    '#type': fieldset
    '#title': 'Möchten Sie mehr über Ihr Projekt erfahren?'
    message:
      '#type': textarea
      '#title': Nachricht
      '#required': true
      '#default_value': "Hallo, ich möchte weitere Informationen zum Angebot mit der Referenz '[webform_submission:source-entity:field_reference]'. Vielen Dank"
  legal:
    '#type': checkbox
    '#title': 'Ich habe die Bedingungen der Richtlinie zum Schutz personenbezogener Daten gelesen und akzeptiere sie.'
    '#required': true
  marketing:
    '#type': checkbox
    '#title': 'Ich stimme dem Erhalt von Marketingmitteilungen von BNP Paribas Real Estate zu.'
  newsletter:
    '#type': checkbox
    '#title': 'Ich stimme dem Erhalt des Newsletters zu.'
  similar_offers:
    '#type': checkbox
    '#title': 'Ich stimme zu, zu ähnlichen Immobilien kontaktiert zu werden.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France verarbeitet Ihre Daten zur Bearbeitung Ihrer Anfrage und, mit Ihrer Einwilligung, für kommerzielle Kommunikation. Weitere Informationen finden Sie in unserem <a href="/data-protection">Datenschutzhinweis</a>.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
settings:
  form_submit_label: Senden
  confirmation_message: '<p>Vielen Dank. Ihre Nachricht wurde gesendet.</p>'
handlers:
  email_confirmation:
    settings:
      subject: 'Ihre Kontaktanfrage — [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Guten Tag [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen Dank für Ihr Interesse am Angebot <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Die untenstehenden Objektdaten wurden zum Zeitpunkt der Anfrage erfasst:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Ihre Nachricht wurde an unseren Berater weitergeleitet, der sich in Kürze bei Ihnen melden wird.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Zur Referenz finden Sie Ihre Anfrage im Folgenden:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen Dank für Ihr Interesse an BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Mit freundlichen Grüßen,<br>Ihr Kundenservice-Team, BNP Paribas Real Estate.</p>
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: Besucherbestätigung
  email_agent:
    settings:
      subject: 'Kontaktanfrage — Angebot [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Sie haben eine neue Kontaktanfrage erhalten. Objekt-Snapshot und Besucherdaten finden Sie unten.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen Dank für Ihr Interesse am Angebot <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Die untenstehenden Objektdaten wurden zum Zeitpunkt der Anfrage erfasst:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Ihre Nachricht wurde an unseren Berater weitergeleitet, der sich in Kürze bei Ihnen melden wird.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Zur Referenz finden Sie Ihre Anfrage im Folgenden:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Vielen Dank für Ihr Interesse an BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Mit freundlichen Grüßen,<br>Ihr Kundenservice-Team, BNP Paribas Real Estate.</p>
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: Maklerbenachrichtigung
