title: 'Kontaktieren Sie uns'
description: "Website-weites Kontaktformular für das Header-Offcanvas."
category: Immobiliensuche
elements: |-
  contact:
    '#type': fieldset
    '#title': 'Ihre Kontaktdaten'
    first_name:
      '#type': textfield
      '#title': 'Vorname'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nachname'
      '#required': true
    email:
      '#type': email
      '#title': E-Mail
      '#required': true
    phone:
      '#type': tel
      '#title': Telefon
  message:
    '#type': textarea
    '#title': Nachricht
    '#required': true
  legal:
    '#type': checkbox
    '#title': 'Ich stimme der Datenschutzrichtlinie zu.'
    '#required': true
settings:
  form_submit_label: Senden
  confirmation_message: "<p>Vielen Dank. Ihre Nachricht wurde gesendet.</p>"
  email_notification:
    label: "Website-Benachrichtigung"
    subject: 'Kontaktformular der Website'
    body: _default
  email_confirmation:
    label: Besucherbestätigung
    subject: 'Vielen Dank für Ihre Kontaktaufnahme'
    body: "<p>Vielen Dank für Ihre Nachricht.</p><p>Wir haben Ihre Anfrage erhalten und melden uns in Kürze bei Ihnen.</p>"
