        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Hemos recibido sus criterios de búsqueda. Uno de nuestros consultores se pondrá en contacto con usted para ayudarle a encontrar el inmueble adecuado.</p>
