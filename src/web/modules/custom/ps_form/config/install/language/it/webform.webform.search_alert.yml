title: 'Crea un avviso di ricerca'
description: 'Modulo di iscrizione agli avvisi di ricerca immobiliare.'
category: 'Ricerca immobiliare'
elements: |-
  alert_name:
    '#type': textfield
    '#title': 'Titolo dell'avviso'
    '#required': true
    '#maxlength': 255
  prof_email_address:
    '#type': email
    '#title': 'E-mail professionale'
    '#required': true
  criteria_display:
    '#type': webform_markup
    '#markup': ''
  frequence:
    '#type': radios
    '#title': 'Frequenza di invio'
    '#required': true
    '#options':
      daily: Giornaliera
      weekly: Settimanale
    '#default_value': weekly
  optout_group:
    '#type': fieldset
    '#title': 'Comunicazioni commerciali'
    '#title_display': invisible
    optout_intro:
      '#type': webform_markup
      '#markup': '<p class="ps-search-alert-form__optout-intro">Mi oppongo a ricevere comunicazioni commerciali da BNP Paribas Real Estate Advisory France:</p>'
    optout_email_transaction:
      '#type': checkbox
      '#title': E-mail
    optout_sms_transaction:
      '#type': checkbox
      '#title': SMS
    optout_tel_transaction:
      '#type': checkbox
      '#title': Telefono
  legal:
    '#type': checkbox
    '#title': 'Ho letto e accetto i termini dell'Informativa sulla protezione dei dati personali.'
    '#required': true
  legal_notice:
    '#type': webform_markup
    '#markup': '<p class="ps-search-alert-form__legal-notice">BNP Paribas Real Estate tratta i tuoi dati per inviare avvisi immobiliari che corrispondono ai tuoi criteri di ricerca. Consulta la nostra <a href="/data-protection">Informativa sulla protezione dei dati</a> per i tuoi diritti.</p>'
  help_footer:
    '#type': webform_markup
    '#markup': ''
  criteria_json:
    '#type': hidden
    '#title': 'Criteri di ricerca'
  search_url:
    '#type': hidden
    '#title': 'URL di ricerca'
  search_path:
    '#type': hidden
    '#title': 'Percorso di ricerca'
settings:
  form_submit_label: Continua
  confirmation_message: "<p>Il tuo avviso di ricerca è stato creato. Riceverai un'e-mail quando nuovi immobili corrisponderanno ai tuoi criteri.</p>"
