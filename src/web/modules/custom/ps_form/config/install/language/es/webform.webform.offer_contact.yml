title: 'Contactar con la consultora'
description: 'Formulario de contacto de la ficha de oferta.'
category: 'Búsqueda inmobiliaria'
elements: |-
  contact:
    '#type': fieldset
    '#title': '¿Cuáles son sus datos de contacto?'
    first_name:
      '#type': textfield
      '#title': 'Nombre'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Apellidos'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'Correo electrónico profesional'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Empresa
      '#placeholder': 'Introduzca su empresa'
    phone:
      '#type': tel
      '#title': 'Teléfono profesional'
      '#placeholder': 'Introduzca su teléfono profesional'
  project:
    '#type': fieldset
    '#title': '¿Desea saber más sobre su proyecto?'
    message:
      '#type': textarea
      '#title': Mensaje
      '#required': true
      '#default_value': "Hola, me gustaría obtener más información sobre la oferta con referencia '[webform_submission:source-entity:field_reference]'. Gracias"
  legal:
    '#type': checkbox
    '#title': 'He leído y acepto los términos de la Política de protección de datos personales.'
    '#required': true
  marketing:
    '#type': checkbox
    '#title': 'Acepto recibir comunicaciones de marketing de BNP Paribas Real Estate.'
  newsletter:
    '#type': checkbox
    '#title': 'Acepto recibir el boletín informativo.'
  similar_offers:
    '#type': checkbox
    '#title': 'Acepto ser contactado sobre propiedades similares.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France trata sus datos para gestionar su solicitud y, con su consentimiento, para comunicaciones comerciales. Consulte nuestro <a href="/data-protection">Aviso de protección de datos</a> para conocer sus derechos.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
settings:
  form_submit_label: Enviar
  confirmation_message: '<p>Gracias. Su mensaje ha sido enviado.</p>'
handlers:
  email_confirmation:
    settings:
      subject: 'Su solicitud de contacto — [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Hola [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias por su interés en la oferta <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Los datos del inmueble que figuran a continuación se registraron en el momento de la solicitud:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Su mensaje ha sido remitido a nuestro consultor, que se pondrá en contacto con usted en breve.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">A título informativo, su solicitud es la siguiente:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias por su interés en BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Atentamente,<br>Su equipo de Atención al Cliente, BNP Paribas Real Estate.</p>
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Confirmación al visitante'
  email_agent:
    settings:
      subject: 'Solicitud de contacto — Oferta [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Ha recibido una nueva solicitud de contacto. A continuación, la instantánea del inmueble y los datos del visitante.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias por su interés en la oferta <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Los datos del inmueble que figuran a continuación se registraron en el momento de la solicitud:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Su mensaje ha sido remitido a nuestro consultor, que se pondrá en contacto con usted en breve.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">A título informativo, su solicitud es la siguiente:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias por su interés en BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Atentamente,<br>Su equipo de Atención al Cliente, BNP Paribas Real Estate.</p>
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Notificación al consultor'
