title: 'Contactar con la consultora'
description: 'Formulario de contacto de la ficha de oferta.'
category: 'Búsqueda inmobiliaria'
elements: |-
  contact:
    '#type': fieldset
    '#title': '¿Cuáles son sus datos de contacto?'
    first_name:
      '#type': textfield
      '#title': 'Nombre'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Apellidos'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'Correo electrónico profesional'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Empresa
      '#placeholder': 'Introduzca su empresa'
    phone:
      '#type': tel
      '#title': 'Teléfono profesional'
      '#placeholder': 'Introduzca su teléfono profesional'
  project:
    '#type': fieldset
    '#title': '¿Desea saber más sobre su proyecto?'
    message:
      '#type': textarea
      '#title': Mensaje
      '#required': true
      '#default_value': "Hola, me gustaría obtener más información sobre la oferta con referencia '[webform_submission:source-entity:field_reference]'. Gracias"
  legal:
    '#type': checkbox
    '#title': 'He leído y acepto los términos de la Política de protección de datos personales.'
    '#required': true
  marketing:
    '#type': checkbox
    '#title': 'Acepto recibir comunicaciones de marketing de BNP Paribas Real Estate.'
  newsletter:
    '#type': checkbox
    '#title': 'Acepto recibir el boletín informativo.'
  similar_offers:
    '#type': checkbox
    '#title': 'Acepto ser contactado sobre propiedades similares.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France trata sus datos para gestionar su solicitud y, con su consentimiento, para comunicaciones comerciales. Consulte nuestro <a href="/data-protection">Aviso de protección de datos</a> para conocer sus derechos.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
settings:
  form_submit_label: Enviar
  confirmation_message: "<p>Gracias. Su mensaje ha sido enviado.</p>"
handlers:
  email_agent:
    label: 'Notificación al consultor'
    subject: "Solicitud de contacto — Oferta [webform_submission:source-entity:field_reference]"
    body: _default
  email_confirmation:
    label: 'Confirmación al visitante'
    subject: "Su solicitud de contacto — [webform_submission:source-entity:field_reference]"
    body: "<p>Gracias por su interés en la oferta <strong>[webform_submission:source-entity:field_reference]</strong>.</p><p>Su mensaje ha sido enviado a nuestro consultor. Nos pondremos en contacto con usted en breve.</p>"
