title: 'Neem contact op met de adviseur'
description: 'Contactformulier op de detailpagina van het aanbod.'
category: 'Vastgoed zoeken'
elements: |-
  contact:
    '#type': fieldset
    '#title': 'Wat zijn uw contactgegevens?'
    first_name:
      '#type': textfield
      '#title': 'Voornaam'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Achternaam'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'Zakelijk e-mailadres'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Bedrijf
      '#placeholder': 'Voer uw bedrijf in'
    phone:
      '#type': tel
      '#title': 'Zakelijke telefoon'
      '#placeholder': 'Voer uw zakelijke telefoon in'
  project:
    '#type': fieldset
    '#title': 'Wilt u meer weten over uw project?'
    message:
      '#type': textarea
      '#title': Bericht
      '#required': true
      '#default_value': "Hallo, ik wil graag meer informatie over het aanbod met referentie '[webform_submission:source-entity:field_reference]'. Bedankt"
  legal:
    '#type': checkbox
    '#title': 'Ik heb de voorwaarden van het beleid inzake bescherming van persoonsgegevens gelezen en accepteer deze.'
    '#required': true
  marketing:
    '#type': checkbox
    '#title': 'Ik ga akkoord met het ontvangen van marketingcommunicatie van BNP Paribas Real Estate.'
  newsletter:
    '#type': checkbox
    '#title': 'Ik ga akkoord met het ontvangen van de nieuwsbrief.'
  similar_offers:
    '#type': checkbox
    '#title': 'Ik ga akkoord om gecontacteerd te worden over vergelijkbare panden.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France verwerkt uw gegevens om uw verzoek te behandelen en, met uw toestemming, voor commerciële communicatie. Bekijk onze <a href="/data-protection">Kennisgeving gegevensbescherming</a> voor uw rechten.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
settings:
  form_submit_label: Verzenden
  confirmation_message: '<p>Bedankt. Uw bericht is verzonden.</p>'
handlers:
  email_confirmation:
    settings:
      subject: 'Uw contactverzoek — [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Beste [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt voor uw interesse in het aanbod <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">De onderstaande objectgegevens zijn vastgelegd op het moment van de aanvraag:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Uw bericht is doorgestuurd naar onze adviseur, die spoedig contact met u opneemt.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Ter referentie vindt u hieronder uw aanvraag:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt voor uw interesse in BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Met vriendelijke groet,<br>Uw klantenserviceteam, BNP Paribas Real Estate.</p>
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Bevestiging bezoeker'
  email_agent:
    settings:
      subject: 'Contactverzoek — Aanbod [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">U hebt een nieuw contactverzoek ontvangen. Hieronder de snapshot van het aanbod en de gegevens van de bezoeker.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt voor uw interesse in het aanbod <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">De onderstaande objectgegevens zijn vastgelegd op het moment van de aanvraag:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Uw bericht is doorgestuurd naar onze adviseur, die spoedig contact met u opneemt.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Ter referentie vindt u hieronder uw aanvraag:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt voor uw interesse in BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Met vriendelijke groet,<br>Uw klantenserviceteam, BNP Paribas Real Estate.</p>
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Adviseur notificatie'
