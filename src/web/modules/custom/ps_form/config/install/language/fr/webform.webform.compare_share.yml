title: 'Recevoir mon comparatif'
description: "Partager le comparatif immobilier par e-mail."
category: 'Recherche immobilière'
elements: |-
  intro:
    '#type': webform_markup
    '#markup': '<p class="ps-compare-share-form__intro">Saisissez votre e-mail professionnel pour recevoir votre comparatif :</p>'
  prof_email_address:
    '#type': email
    '#title': 'E-mail professionnel'
    '#required': true
  optout_group:
    '#type': fieldset
    '#title': 'Communications commerciales'
    '#title_display': invisible
    optout_intro:
      '#type': webform_markup
      '#markup': '<p class="ps-compare-share-form__optout-intro">Je m'oppose à recevoir des communications commerciales de BNP Paribas Real Estate Transaction France :</p>'
    optout_email_transaction:
      '#type': checkbox
      '#title': E-mail
    optout_sms_transaction:
      '#type': checkbox
      '#title': SMS
    optout_tel_transaction:
      '#type': checkbox
      '#title': Téléphone
  legal:
    '#type': checkbox
    '#title': 'J'ai lu et j'accepte les conditions de la Politique de protection des données personnelles.'
    '#required': true
  legal_notice:
    '#type': webform_markup
    '#markup': '<p class="ps-compare-share-form__legal-notice">BNP Paribas Real Estate Transaction France traite vos données pour vous envoyer le comparatif demandé. Consultez notre <a href="/data-protection">Notice de protection des données</a> pour vos droits.</p>'
  help_footer:
    '#type': webform_markup
    '#markup': ''
  compare_url:
    '#type': hidden
    '#title': 'URL du comparatif'
settings:
  form_submit_label: 'Recevoir mon comparatif'
  confirmation_message: "<p>Votre comparatif a été envoyé par e-mail.</p>"
