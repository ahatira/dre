title: 'Umów wizytę'
description: 'Formularz umawiania wizyty dotyczącej oferty.'
category: 'Wyszukiwanie nieruchomości'
elements: |-
  visitor:
    '#type': fieldset
    '#title': 'Twoje dane kontaktowe'
    first_name:
      '#type': textfield
      '#title': 'Imię'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nazwisko'
      '#required': true
    email:
      '#type': email
      '#title': E-mail
      '#required': true
    phone:
      '#type': tel
      '#title': Telefon
  visit:
    '#type': fieldset
    '#title': 'Prośba o wizytę'
    preferred_date:
      '#type': date
      '#title': 'Preferowana data'
    message:
      '#type': textarea
      '#title': Wiadomość
      '#default_value': 'Chciałbym umówić wizytę dotyczącą tej oferty.'
  legal:
    '#type': checkbox
    '#title': 'Akceptuję politykę prywatności.'
    '#required': true
settings:
  form_submit_label: Wyślij
  confirmation_message: 'Dziękujemy. Twoja prośba o wizytę została wysłana.'
handlers:
  email_confirmation:
    settings:
      subject: 'Państwa prośba o wizytę — [webform_submission:source-entity:field_reference]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dzień dobry [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dziękujemy za prośbę o wizytę dotyczącą oferty <strong>[webform_submission:source-entity:field_reference]</strong>.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Nasz doradca wkrótce skontaktuje się z Państwem, aby ustalić termin wizyty.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Poniżej przedstawiamy podsumowanie Państwa zapytania:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Dziękujemy za zainteresowanie BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Z poważaniem,<br>Zespół Obsługi Klienta, BNP Paribas Real Estate.</p>
    label: 'Potwierdzenie dla odwiedzającego'
  email_agent:
    settings:
      subject: 'Prośba o wizytę — Oferta [webform_submission:source-entity:field_reference]'
      body: _default
    label: 'Powiadomienie doradcy'
