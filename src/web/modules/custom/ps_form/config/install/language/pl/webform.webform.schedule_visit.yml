title: 'Umów wizytę'
description: 'Formularz umawiania wizyty dotyczącej oferty.'
category: 'Wyszukiwanie nieruchomości'
elements: |-
  visitor:
    '#type': fieldset
    '#title': 'Twoje dane kontaktowe'
    first_name:
      '#type': textfield
      '#title': 'Imię'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nazwisko'
      '#required': true
    email:
      '#type': email
      '#title': E-mail
      '#required': true
    phone:
      '#type': tel
      '#title': Telefon
  visit:
    '#type': fieldset
    '#title': 'Prośba o wizytę'
    preferred_date:
      '#type': date
      '#title': 'Preferowana data'
    message:
      '#type': textarea
      '#title': Wiadomość
      '#default_value': 'Chciałbym umówić wizytę dotyczącą tej oferty.'
  legal:
    '#type': checkbox
    '#title': 'Akceptuję politykę prywatności.'
    '#required': true
settings:
  form_submit_label: Wyślij
  confirmation_message: 'Dziękujemy. Twoja prośba o wizytę została wysłana.'
handlers:
  email_agent:
    label: 'Powiadomienie doradcy'
    subject: "Prośba o wizytę — Oferta [webform_submission:source-entity:field_reference]"
    body: _default
  email_confirmation:
    label: 'Potwierdzenie dla odwiedzającego'
    subject: "Twoja prośba o wizytę — [webform_submission:source-entity:field_reference]"
    body: "<p>Dziękujemy za prośbę o wizytę dotyczącą oferty <strong>[webform_submission:source-entity:field_reference]</strong>.</p><p>Nasz doradca skontaktuje się z Tobą wkrótce, aby umówić termin.</p>"
