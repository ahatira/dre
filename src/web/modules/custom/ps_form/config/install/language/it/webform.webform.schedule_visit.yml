title: 'Pianifica una visita'
description: "Modulo per pianificare la visita di un'offerta."
category: 'Ricerca immobiliare'
elements: |-
  visitor:
    '#type': fieldset
    '#title': 'I tuoi dati'
    first_name:
      '#type': textfield
      '#title': 'Nome'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Cognome'
      '#required': true
    email:
      '#type': email
      '#title': E-mail
      '#required': true
    phone:
      '#type': tel
      '#title': Telefono
  visit:
    '#type': fieldset
    '#title': 'Richiesta visita'
    preferred_date:
      '#type': date
      '#title': 'Data preferita'
    message:
      '#type': textarea
      '#title': Messaggio
      '#default_value': 'Vorrei pianificare una visita per questa offerta.'
  legal:
    '#type': checkbox
    '#title': 'Accetto la politica sulla privacy.'
    '#required': true
settings:
  form_submit_label: Invia
  confirmation_message: 'Grazie. La tua richiesta di visita è stata inviata.'
handlers:
  email_confirmation:
    settings:
      subject: 'La tua richiesta visita — [webform_submission:source-entity:field_reference]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gentile [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Grazie per la sua richiesta di visita relativa all'offerta <strong>[webform_submission:source-entity:field_reference]</strong>.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Il nostro consulente la contatterà a breve per organizzare la visita.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Di seguito il riepilogo della sua richiesta:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">La ringraziamo per l'interesse verso BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Cordiali saluti,<br>Il team Servizio Clienti, BNP Paribas Real Estate.</p>
    label: 'Conferma visitatore'
  email_agent:
    settings:
      subject: 'Richiesta visita — Offerta [webform_submission:source-entity:field_reference]'
      body: _default
    label: 'Notifica consulente'
