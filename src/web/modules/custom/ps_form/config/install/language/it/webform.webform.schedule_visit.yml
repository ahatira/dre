title: Pianifica una visita
description: Modulo per pianificare la visita di un'offerta.
category: Ricerca immobiliare
settings:
  form_submit_label: Invia
  confirmation_message: Grazie. La tua richiesta di visita è stata inviata.
handlers:
  email_confirmation:
    settings:
      subject: La tua richiesta visita — [webform_submission:values:offer_reference:raw]
      body: '<p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gentile
        [webform_submission:values:firstname:raw],</p>

        [webform_submission:ps-schedule-visit-availabilities]


        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Grazie
        per la sua richiesta di visita relativa all''offerta <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>

        [webform_submission:ps-offer-email-block]

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">I
        dettagli dell''immobile riportati di seguito sono stati registrati al momento
        della richiesta:</p>

        [webform_submission:ps-offer-snapshot-recap]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Il
        nostro consulente la contatterà a breve per organizzare la visita.</p>

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Di
        seguito il riepilogo della sua richiesta:</p>

        [webform_submission:values]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">La
        ringraziamo per l''interesse verso BNP Paribas Real Estate.</p>

        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Cordiali
        saluti,<br>Il team Servizio Clienti, BNP Paribas Real Estate.</p>'
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: Conferma visitatore
  email_agent:
    settings:
      subject: Richiesta visita — Offerta [webform_submission:values:offer_reference:raw]
