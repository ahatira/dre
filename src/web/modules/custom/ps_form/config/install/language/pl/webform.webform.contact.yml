title: 'Skontaktuj się z nami'
description: 'Ogólny formularz kontaktowy dla offcanvas nagłówka.'
category: 'Wyszukiwanie nieruchomości'
elements: |-
  contact:
    '#type': fieldset
    '#title': 'Twoje dane kontaktowe'
    first_name:
      '#type': textfield
      '#title': 'Imię'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nazwisko'
      '#required': true
    email:
      '#type': email
      '#title': E-mail
      '#required': true
    phone:
      '#type': tel
      '#title': Telefon
  message:
    '#type': textarea
    '#title': Wiadomość
    '#required': true
  legal:
    '#type': checkbox
    '#title': 'Akceptuję politykę prywatności.'
    '#required': true
settings:
  form_submit_label: Wyślij
  confirmation_message: "<p>Dziękujemy. Twoja wiadomość została wysłana.</p>"
  email_notification:
    label: 'Powiadomienie witryny'
    subject: 'Formularz kontaktowy strony'
    body: _default
  email_confirmation:
    label: 'Potwierdzenie dla odwiedzającego'
    subject: 'Dziękujemy za kontakt'
    body: "<p>Dziękujemy za wiadomość.</p><p>Otrzymaliśmy Twoją prośbę i wkrótce się z Tobą skontaktujemy.</p>"
