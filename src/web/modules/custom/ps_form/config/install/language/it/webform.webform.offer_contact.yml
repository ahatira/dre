title: 'Contattare il consulente'
description: 'Modulo di contatto nella scheda offerta.'
category: 'Ricerca immobiliare'
elements: |-
  contact:
    '#type': fieldset
    '#title': 'Quali sono i tuoi dati di contatto?'
    first_name:
      '#type': textfield
      '#title': 'Nome'
      '#placeholder': Diego
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Cognome'
      '#placeholder': Plot
      '#required': true
    email:
      '#type': email
      '#title': 'E-mail professionale'
      '#placeholder': diego.plot@google.com
      '#required': true
    company:
      '#type': textfield
      '#title': Azienda
      '#placeholder': 'Inserisci la tua azienda'
    phone:
      '#type': tel
      '#title': 'Telefono professionale'
      '#placeholder': 'Inserisci il tuo telefono professionale'
  project:
    '#type': fieldset
    '#title': 'Vuoi saperne di più sul tuo progetto?'
    message:
      '#type': textarea
      '#title': Messaggio
      '#required': true
      '#default_value': "Ciao, vorrei maggiori informazioni sull'offerta con riferimento '[webform_submission:source-entity:field_reference]'. Grazie"
  legal:
    '#type': checkbox
    '#title': 'Ho letto e accetto i termini dell'Informativa sulla protezione dei dati personali.'
    '#required': true
  marketing:
    '#type': checkbox
    '#title': 'Accetto di ricevere comunicazioni marketing da BNP Paribas Real Estate.'
  newsletter:
    '#type': checkbox
    '#title': 'Accetto di ricevere la newsletter.'
  similar_offers:
    '#type': checkbox
    '#title': 'Accetto di essere contattato per immobili simili.'
  legal_notice:
    '#type': webform_markup
    '#markup': '<p>BNP Paribas Real Estate Transaction France tratta i tuoi dati per gestire la tua richiesta e, con il tuo consenso, per comunicazioni commerciali. Consulta la nostra <a href="/data-protection">Informativa sulla protezione dei dati</a> per i tuoi diritti.</p>'
    '#wrapper_attributes':
      class:
        - ps-offer-contact-modal__legal
settings:
  form_submit_label: Invia
  confirmation_message: '<p>Grazie. Il tuo messaggio è stato inviato.</p>'
handlers:
  email_confirmation:
    settings:
      subject: 'La sua richiesta di contatto — [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gentile [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">La ringraziamo per l'interesse verso l'offerta <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">I dettagli dell'immobile riportati di seguito sono stati registrati al momento della richiesta:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Il suo messaggio è stato inoltrato al nostro consulente, che la contatterà a breve.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Di seguito il riepilogo della sua richiesta:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">La ringraziamo per l'interesse verso BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Cordiali saluti,<br>Il team Servizio Clienti, BNP Paribas Real Estate.</p>
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Conferma visitatore'
  email_agent:
    settings:
      subject: 'Richiesta di contatto — Offerta [webform_submission:values:offer_reference:raw]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Ha ricevuto una nuova richiesta di contatto. Di seguito lo snapshot dell'offerta e i dati del visitatore.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">La ringraziamo per l'interesse verso l'offerta <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>
        [webform_submission:ps-offer-email-block]
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">I dettagli dell'immobile riportati di seguito sono stati registrati al momento della richiesta:</p>
        [webform_submission:ps-offer-snapshot-recap]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Il suo messaggio è stato inoltrato al nostro consulente, che la contatterà a breve.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Di seguito il riepilogo della sua richiesta:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">La ringraziamo per l'interesse verso BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Cordiali saluti,<br>Il team Servizio Clienti, BNP Paribas Real Estate.</p>
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: 'Notifica consulente'
