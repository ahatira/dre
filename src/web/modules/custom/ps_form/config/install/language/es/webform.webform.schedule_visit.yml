title: Programar una visita
description: Formulario para programar la visita de una oferta.
category: Búsqueda inmobiliaria
settings:
  form_submit_label: Enviar
  confirmation_message: Gracias. Su solicitud de visita ha sido enviada.
handlers:
  email_confirmation:
    settings:
      subject: Su solicitud de visita — [webform_submission:values:offer_reference:raw]
      body: '<p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Hola
        [webform_submission:values:firstname:raw],</p>

        [webform_submission:ps-schedule-visit-availabilities]


        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias
        por su solicitud de visita relativa a la oferta <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>

        [webform_submission:ps-offer-email-block]

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Los
        datos del inmueble que figuran a continuación se registraron en el momento
        de la solicitud:</p>

        [webform_submission:ps-offer-snapshot-recap]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Nuestro
        consultor se pondrá en contacto con usted en breve para organizar la visita.</p>

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">A
        título informativo, su solicitud es la siguiente:</p>

        [webform_submission:values]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias
        por su interés en BNP Paribas Real Estate.</p>

        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Atentamente,<br>Su
        equipo de Atención al Cliente, BNP Paribas Real Estate.</p>'
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: Confirmación al visitante
  email_agent:
    settings:
      subject: Solicitud de visita — Oferta [webform_submission:values:offer_reference:raw]
      body: '<p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Ha
        recibido una nueva solicitud de contacto. A continuación, la instantánea del
        inmueble y los datos del visitante.</p>

        [webform_submission:ps-schedule-visit-availabilities]



        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias
        por su solicitud de visita relativa a la oferta <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>

        [webform_submission:ps-offer-email-block]

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Los
        datos del inmueble que figuran a continuación se registraron en el momento
        de la solicitud:</p>

        [webform_submission:ps-offer-snapshot-recap]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Nuestro
        consultor se pondrá en contacto con usted en breve para organizar la visita.</p>

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">A
