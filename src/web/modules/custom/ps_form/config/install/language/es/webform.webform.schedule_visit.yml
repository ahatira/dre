title: 'Programar una visita'
description: 'Formulario para programar la visita de una oferta.'
category: 'Búsqueda inmobiliaria'
elements: |-
  visitor:
    '#type': fieldset
    '#title': 'Sus datos de contacto'
    first_name:
      '#type': textfield
      '#title': 'Nombre'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Apellidos'
      '#required': true
    email:
      '#type': email
      '#title': Correo electrónico
      '#required': true
    phone:
      '#type': tel
      '#title': Teléfono
  visit:
    '#type': fieldset
    '#title': 'Solicitud de visita'
    preferred_date:
      '#type': date
      '#title': 'Fecha preferida'
    message:
      '#type': textarea
      '#title': Mensaje
      '#default_value': 'Quisiera programar una visita para esta oferta.'
  legal:
    '#type': checkbox
    '#title': 'Acepto la política de privacidad.'
    '#required': true
settings:
  form_submit_label: Enviar
  confirmation_message: 'Gracias. Su solicitud de visita ha sido enviada.'
handlers:
  email_confirmation:
    settings:
      subject: 'Su solicitud de visita — [webform_submission:source-entity:field_reference]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Hola [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias por su solicitud de visita relativa a la oferta <strong>[webform_submission:source-entity:field_reference]</strong>.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Nuestro consultor se pondrá en contacto con usted en breve para organizar la visita.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">A título informativo, su solicitud es la siguiente:</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Gracias por su interés en BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Atentamente,<br>Su equipo de Atención al Cliente, BNP Paribas Real Estate.</p>
    label: 'Confirmación al visitante'
  email_agent:
    settings:
      subject: 'Solicitud de visita — Oferta [webform_submission:source-entity:field_reference]'
      body: _default
    label: 'Notificación al consultor'
