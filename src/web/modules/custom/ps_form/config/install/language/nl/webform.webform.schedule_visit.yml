title: Plan een bezoek
description: Formulier om een bezoek voor een aanbod in te plannen.
category: Vastgoed zoeken
settings:
  form_submit_label: Verzenden
  confirmation_message: Bedankt. Uw bezoekaanvraag is verzonden.
handlers:
  email_confirmation:
    settings:
      subject: Uw bezoekaanvraag — [webform_submission:values:offer_reference:raw]
      body: '<p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Beste
        [webform_submission:values:firstname:raw],</p>

        [webform_submission:ps-schedule-visit-availabilities]


        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt
        voor uw bezoekaanvraag over het aanbod <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>

        [webform_submission:ps-offer-email-block]

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">De
        onderstaande objectgegevens zijn vastgelegd op het moment van de aanvraag:</p>

        [webform_submission:ps-offer-snapshot-recap]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Onze
        adviseur neemt spoedig contact met u op om het bezoek te plannen.</p>

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Ter
        referentie vindt u hieronder uw aanvraag:</p>

        [webform_submission:values]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt
        voor uw interesse in BNP Paribas Real Estate.</p>

        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Met vriendelijke
        groet,<br>Uw klantenserviceteam, BNP Paribas Real Estate.</p>'
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
        offer_surface_suffix: offer_surface_suffix
        offer_location: offer_location
        offer_price_display: offer_price_display
        offer_price_qualifiers: offer_price_qualifiers
        offer_exclusive: offer_exclusive
        offer_url: offer_url
        offer_image_uri: offer_image_uri
        offer_image_alt: offer_image_alt
        offer_langcode: offer_langcode
        offer_agent_email: offer_agent_email
        offer_agent_id: offer_agent_id
    label: Bevestiging bezoeker
  email_agent:
    settings:
      subject: Bezoekaanvraag — Aanbod [webform_submission:values:offer_reference:raw]
      body: '<p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">U
        hebt een nieuw contactverzoek ontvangen. Hieronder de snapshot van het aanbod
        en de gegevens van de bezoeker.</p>

        [webform_submission:ps-schedule-visit-availabilities]



        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt
        voor uw bezoekaanvraag over het aanbod <strong>[webform_submission:values:offer_reference:raw]</strong>.</p>

        [webform_submission:ps-offer-email-block]

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">De
        onderstaande objectgegevens zijn vastgelegd op het moment van de aanvraag:</p>

        [webform_submission:ps-offer-snapshot-recap]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Onze
        adviseur neemt spoedig contact met u op om het bezoek te plannen.</p>

        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Ter
        referentie vindt u hieronder uw aanvraag:</p>

        [webform_submission:values]

        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bedankt
        voor uw interesse in BNP Paribas Real Estate.</p>

        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Met vriendelijke
        groet,<br>Uw klantenserviceteam, BNP Paribas Real Estate.</p>'
      to_mail: '[webform_submission:values:offer_agent_email:raw]'
      excluded_elements:
        availabilities: availabilities
        offer_reference: offer_reference
        offer_business_id: offer_business_id
        offer_operation_code: offer_operation_code
        offer_asset_code: offer_asset_code
        offer_captured_at: offer_captured_at
        offer_title: offer_title
        offer_operation_label: offer_operation_label
        offer_asset_label: offer_asset_label
        offer_surface_primary: offer_surface_primary
