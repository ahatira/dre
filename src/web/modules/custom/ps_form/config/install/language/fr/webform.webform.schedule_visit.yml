title: 'Planifier une visite'
description: "Formulaire de planification de visite d'une offre."
category: 'Recherche immobilière'
elements: |-
  visitor:
    '#type': fieldset
    '#title': Coordonnées
    first_name:
      '#type': textfield
      '#title': 'Prénom'
      '#required': true
    last_name:
      '#type': textfield
      '#title': 'Nom'
      '#required': true
    email:
      '#type': email
      '#title': E-mail
      '#required': true
    phone:
      '#type': tel
      '#title': Téléphone
  visit:
    '#type': fieldset
    '#title': 'Demande de visite'
    preferred_date:
      '#type': date
      '#title': 'Date souhaitée'
    message:
      '#type': textarea
      '#title': Message
      '#default_value': 'Je souhaite planifier une visite pour cette offre.'
  legal:
    '#type': checkbox
    '#title': "J'accepte la politique de confidentialité."
    '#required': true
settings:
  form_submit_label: Envoyer
  confirmation_message: 'Merci. Votre demande de visite a été envoyée.'
handlers:
  email_confirmation:
    settings:
      subject: 'Votre demande de visite — [webform_submission:source-entity:field_reference]'
      body: |-
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Bonjour [webform_submission:values:first_name:raw],</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Merci pour votre demande de visite concernant l'offre <strong>[webform_submission:source-entity:field_reference]</strong>.</p>
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Notre consultant vous contactera rapidement pour organiser la visite.</p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#333333;font-weight:700;">Pour référence, voici le récapitulatif de votre demande :</p>
        [webform_submission:values]
        <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#333333;">Merci de l'intérêt que vous portez à BNP Paribas Real Estate.</p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#333333;">Cordialement,<br>Votre équipe Service Client, BNP Paribas Real Estate.</p>
    label: 'Confirmation visiteur'
  email_agent:
    settings:
      subject: 'Demande de visite — Offre [webform_submission:source-entity:field_reference]'
      body: _default
    label: 'Notification consultant'
