ps_form.admin:
  path: '/admin/ps/config/forms'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormAdminOverviewController::redirectToOverview'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.admin_overview:
  path: '/admin/ps/config/forms/overview'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormAdminOverviewController::overview'
    _title: 'Forms'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.settings:
  path: '/admin/ps/config/forms/settings'
  defaults:
    _form: '\Drupal\ps_form\Form\ContactDisplaySettingsForm'
    _title: 'Display and urgency'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.hub_settings:
  path: '/admin/ps/config/forms/hub'
  defaults:
    _form: '\Drupal\ps_form\Form\ContactHubSettingsForm'
    _title: 'Contact hub'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.email:
  path: '/admin/ps/config/forms/email'
  defaults:
    _controller: '\Drupal\ps_form\Controller\ContactEmailAdminOverviewController::redirectToOverview'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.email_overview:
  path: '/admin/ps/config/forms/email/overview'
  defaults:
    _controller: '\Drupal\ps_form\Controller\ContactEmailAdminOverviewController::overview'
    _title: 'Confirmation emails'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.email_content:
  path: '/admin/ps/config/forms/email/content'
  defaults:
    _form: '\Drupal\ps_form\Form\ContactEmailContentSettingsForm'
    _title: 'Content'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.email_footer:
  path: '/admin/ps/config/forms/email/footer'
  defaults:
    _form: '\Drupal\ps_form\Form\ContactEmailFooterSettingsForm'
    _title: 'Footer and legal'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.email_heroes:
  path: '/admin/ps/config/forms/email/heroes'
  defaults:
    _form: '\Drupal\ps_form\Form\ContactEmailHeroSettingsForm'
    _title: 'Hero banners'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.email_preview_frame:
  path: '/admin/ps/config/forms/email/preview-frame/{webform}'
  defaults:
    _controller: '\Drupal\ps_form\Controller\ContactEmailPreviewFrameController::frame'
    _title: 'Email preview frame'
  requirements:
    _permission: 'manage ps_form'
    webform: '[a-z0-9_]+'
  options:
    _admin_route: TRUE

ps_form.email_preview:
  path: '/admin/ps/config/forms/email/preview'
  defaults:
    _controller: '\Drupal\ps_form\Controller\ContactEmailAdminOverviewController::redirectLegacyPreview'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.contact_settings:
  path: '/admin/ps/config/forms/contact'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormAdminOverviewController::redirectLegacyContactSettings'
  requirements:
    _permission: 'manage ps_form'
  options:
    _admin_route: TRUE

ps_form.webform_contact:
  path: '/form/contact'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    webform: contact
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'

ps_form.webform_find_property:
  path: '/form/find-property'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    webform: find_property
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'

ps_form.webform_entrust_search:
  path: '/form/entrust-search'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    webform: entrust_search
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'

ps_form.webform_get_advice:
  path: '/form/get-advice'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    webform: get_advice
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'

ps_form.webform_entrust_property:
  path: '/form/entrust-property'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    webform: entrust_property
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'

ps_form.webform_invest_sell:
  path: '/form/invest-sell'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    webform: invest_sell
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'

ps_form.webform_other_request:
  path: '/form/other-request'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    webform: other_request
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'

ps_form.webform:
  path: '/form/{webform}'
  defaults:
    _controller: '\Drupal\ps_form\Controller\FormOffcanvasController::offcanvas'
    _title_callback: '\Drupal\ps_form\Controller\FormOffcanvasController::title'
  requirements:
    _access: 'TRUE'
    webform: '[a-z0-9_]+'
