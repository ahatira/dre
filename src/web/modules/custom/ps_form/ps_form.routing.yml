ps_form.offer_contact_modal:
  path: '/offer/{node}/contact-modal'
  defaults:
    _controller: '\Drupal\ps_form\Controller\OfferContactModalController::modal'
    _title_callback: '\Drupal\ps_form\Controller\OfferContactModalController::title'
  requirements:
    _entity_access: 'node.view'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node
