services:
  ps_search_filters.more_criteria_builder:
    class: Drupal\ps_search_filters\Service\MoreCriteriaBuilder
    arguments: ['@ps_search.feature_filter_registry']
  ps_search_filters.htmx_settings:
    class: Drupal\ps_search_filters\Service\FilterBarHtmxSettings
  ps_search_filters.filter_bar_builder:
    class: Drupal\ps_search_filters\Service\FilterBarBuilder
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@language.config_factory_override'
      - '@entity_type.manager'
      - '@request_stack'
      - '@ps_search_filters.more_criteria_builder'
      - '@ps_dictionary.entry_icon_resolver'
      - '@ps_context.search_filter_visibility'
      - '@ps_context.search_budget_filter'
      - '@ps_search.search_path_resolver'
      - '@ps_search_filters.htmx_settings'
  ps_search_filters.results_header_builder:
    class: Drupal\ps_search_filters\Service\SearchResultsHeaderBuilder
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@language.config_factory_override'
      - '@entity_type.manager'
      - '@request_stack'
      - '@ps_search.location_filter'
      - '@ps_search.result_counter'
  Drupal\ps_search_filters\Hook\Theme:
    class: Drupal\ps_search_filters\Hook\Theme
  Drupal\ps_search_filters\Hook\Views:
    class: Drupal\ps_search_filters\Hook\Views
    arguments:
      - '@ps_search_filters.filter_bar_builder'
      - '@ps_search_filters.results_header_builder'
