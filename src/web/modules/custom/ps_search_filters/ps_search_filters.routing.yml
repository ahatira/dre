ps_search_filters.more_criteria_group:
  path: '/ps-search-filters/htmx/more-criteria/{group_id}'
  defaults:
    _controller: '\Drupal\ps_search_filters\Controller\MoreCriteriaGroupController::items'
    _title: 'More criteria group'
  requirements:
    _access: 'TRUE'
    group_id: '[a-zA-Z0-9_]+'
  options:
    _htmx_route: TRUE
    no_cache: TRUE

ps_search_filters.htmx_count_label:
  path: '/ps-search-filters/htmx/count-label'
  defaults:
    _controller: '\Drupal\ps_search_filters\Controller\FilterCountHtmxController::countLabel'
    _title: ''
  requirements:
    _access: 'TRUE'
  options:
    _htmx_route: TRUE

ps_search_filters.htmx_apply_type:
  path: '/ps-search-filters/htmx/apply-type'
  defaults:
    _controller: '\Drupal\ps_search_filters\Controller\FilterTypeApplyHtmxController::applyType'
    _title: 'Apply property type filter'
  requirements:
    _access: 'TRUE'
  options:
    _htmx_route: TRUE

ps_search_filters.htmx_apply_location:
  path: '/ps-search-filters/htmx/apply-location'
  defaults:
    _controller: '\Drupal\ps_search_filters\Controller\FilterLocationApplyHtmxController::applyLocation'
    _title: 'Apply location filter'
  requirements:
    _access: 'TRUE'
  options:
    _htmx_route: TRUE

ps_search_filters.htmx_apply_range:
  path: '/ps-search-filters/htmx/apply-range/{section}'
  defaults:
    _controller: '\Drupal\ps_search_filters\Controller\FilterRangeApplyHtmxController::applyRange'
    _title: 'Apply range filter'
  requirements:
    _access: 'TRUE'
    section: 'surface|capacity|budget'
  options:
    _htmx_route: TRUE

ps_search_filters.htmx_apply_mobile:
  path: '/ps-search-filters/htmx/apply-mobile'
  defaults:
    _controller: '\Drupal\ps_search_filters\Controller\FilterMobileApplyHtmxController::applyMobile'
    _title: 'Apply mobile filters'
  requirements:
    _access: 'TRUE'
  options:
    _htmx_route: TRUE

ps_search_filters.htmx_results_header:
  path: '/ps-search-filters/htmx/results-header'
  defaults:
    _controller: '\Drupal\ps_search_filters\Controller\SearchResultsHeaderHtmxController::header'
    _title: 'Search results header'
  requirements:
    _access: 'TRUE'
  options:
    _htmx_route: TRUE
