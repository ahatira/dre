services:
  ps_feature.type_manager:
    class: Drupal\ps_feature\Service\FeatureTypeManager
    arguments:
      - '@container.namespaces'
      - '@cache.default'
      - '@module_handler'
    tags:
      - { name: service }

  # Alias for compatibility with field plugins.
  plugin.manager.feature_type:
    alias: ps_feature.type_manager

  Drupal\ps_feature\Hook\OfferFeatureHooks:
    class: Drupal\ps_feature\Hook\OfferFeatureHooks
    arguments:
      - '@ps_feature.type_manager'

  ps_feature.translation_route_subscriber:
    class: Drupal\ps_feature\Routing\TranslationRouteSubscriber
    tags:
      - { name: event_subscriber, priority: -300 }

  ps_feature.state_builder:
    class: Drupal\ps_feature\Service\FeatureBuilderStateBuilder
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: service }

  ps_feature.catalogue_builder:
    class: Drupal\ps_feature\Service\FeatureCatalogueBuilder
    arguments:
      - '@entity_type.manager'
    tags:
      - { name: service }

  ps_feature.feature_group_icon_resolver:
    class: Drupal\ps_feature\Service\FeatureGroupIconResolver
    arguments:
      - '@config.factory'
      - '@entity_type.manager'

  ps_feature.feature_group_display_label:
    class: Drupal\ps_feature\Service\FeatureGroupDisplayLabelResolver
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@extension.list.module'

  ps_feature.feature_definition_icon_resolver:
    class: Drupal\ps_feature\Service\FeatureDefinitionIconResolver
    arguments:
      - '@entity_type.manager'

  ps_feature.empty_feature_field_block_subscriber:
    class: Drupal\ps_feature\EventSubscriber\EmptyFeatureFieldBlockSubscriber
    tags:
      - { name: event_subscriber }

  Drupal\ps_feature\Service\FeatureCatalogueCsvMapper:
    class: Drupal\ps_feature\Service\FeatureCatalogueCsvMapper

  Drupal\ps_feature\Service\FeatureCatalogueCsvImporter:
    class: Drupal\ps_feature\Service\FeatureCatalogueCsvImporter
    arguments:
      - '@entity_type.manager'
      - '@language_manager'
      - '@Drupal\ps_feature\Service\FeatureCatalogueCsvMapper'
      - '@ps_feature.type_manager'

  Drupal\ps_feature\Service\FeatureCatalogueCsvImporterInterface:
    alias: Drupal\ps_feature\Service\FeatureCatalogueCsvImporter
