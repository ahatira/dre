ps_feature.admin:
  path: '/admin/ps/config/features'
  defaults:
    _controller: '\Drupal\ps_feature\Controller\FeatureAdminOverviewController::redirectToOverview'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.admin_overview:
  path: '/admin/ps/config/features/overview'
  defaults:
    _controller: '\Drupal\ps_feature\Controller\FeatureAdminOverviewController::overview'
    _title: 'Features'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.feature_types:
  path: '/admin/ps/config/features/types'
  defaults:
    _controller: '\Drupal\ps_feature\Controller\FeatureTypesController::listTypes'
    _title: 'Feature types'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.config_display_settings:
  path: '/admin/ps/config/features/display'
  defaults:
    _form: '\Drupal\ps_feature\Form\FeatureSettingsForm'
    _title: 'Feature display settings'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.catalogue_governance_settings:
  path: '/admin/ps/config/features/governance'
  defaults:
    _controller: '\Drupal\ps_feature\Controller\FeatureAdminOverviewController::redirectToGovernanceSettings'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.governance_domain_settings:
  path: '/admin/ps/config/governance/features'
  defaults:
    _form: '\Drupal\ps_feature\Form\FeatureCatalogueGovernanceSettingsForm'
    _title: 'Feature catalogue governance'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.catalogue_import_form:
  path: '/admin/ps/content/features/import'
  defaults:
    _form: '\Drupal\ps_feature\Form\FeatureCatalogueImportForm'
    _title: 'Import feature catalogue'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.catalogue_import_template:
  path: '/admin/ps/content/features/import/template'
  defaults:
    _controller: '\Drupal\ps_feature\Controller\FeatureCatalogueImportTemplateController::download'
    _title: 'Download feature catalogue template'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

ps_feature.feature_group_settings:
  path: '/admin/ps/structure/features/settings'
  defaults:
    _controller: '\Drupal\ps_feature\Controller\FeatureAdminOverviewController::redirectToDisplaySettings'
  requirements:
    _permission: 'administer ps features'
  options:
    _admin_route: TRUE

entity.fb_feature_definition.collection_by_group:
  path: '/admin/ps/structure/features/{feature_group}/definitions'
  defaults:
    _controller: '\Drupal\ps_feature\Controller\FeatureDefinitionByGroupController::listByGroup'
    _title_callback: '\Drupal\ps_feature\Controller\FeatureDefinitionByGroupController::getTitle'
  requirements:
    _permission: 'administer ps features'
  options:
    parameters:
      feature_group:
        type: entity:fb_feature_group
