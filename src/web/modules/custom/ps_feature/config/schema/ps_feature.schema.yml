# Schema for the configuration files of the ps_feature module.

field.field_settings.feature:
  type: mapping
  label: 'Feature field settings'
  mapping:
    allowed_groups:
      type: sequence
      label: 'Allowed feature groups'
      sequence:
        type: string
        label: 'Group ID'
    allowed_features:
      type: sequence
      label: 'Allowed features'
      sequence:
        type: string
        label: 'Feature ID'

field.storage_settings.feature:
  type: mapping
  label: 'Feature field storage settings'
  mapping: {}

ps_feature.feature_group.*:
  type: config_entity
  label: 'Feature Group'
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
      translatable: true
    description:
      type: text
      label: 'Description'
      translatable: true
    icon:
      type: string
      label: 'UI Icon'
    asset_types:
      type: sequence
      label: 'Asset types'
      sequence:
        type: string
        label: 'Asset type code'
    weight:
      type: integer
      label: 'Weight'
    status:
      type: boolean
      label: 'Status'
    internal_lock:
      type: boolean
      label: 'Internal lock'
    source_tracking:
      type: string
      label: 'Source tracking'
    checksum:
      type: string
      label: 'Checksum'
    field_locks:
      type: mapping
      label: 'Field locks'
      mapping:
        '*':
          type: boolean
          label: 'Locked'

ps_feature.settings:
  type: config_object
  label: 'PS Feature settings'
  mapping:
    default_group_icon:
      type: string
      label: 'Default feature group icon'

ps_feature.catalogue_governance:
  type: config_object
  label: 'Feature catalogue governance settings'
  mapping:
    crm_row_strategy_override:
      type: string
      label: 'CRM row strategy override'
    allow_crm_overwrite_display:
      type: boolean
      label: 'Allow CRM to overwrite display fields'
    missing_from_xml:
      type: mapping
      label: 'Missing from XML snapshot'
      mapping:
        group_action:
          type: string
          label: 'Non-protected group action'
        definition_action:
          type: string
          label: 'Non-protected definition action'
        protected_definition_action:
          type: string
          label: 'Protected definition action'
    present_in_xml:
      type: mapping
      label: 'Present in XML snapshot'
      mapping:
        reactivate:
          type: boolean
          label: 'Reactivate inactive entries'
        sync_fields_by_entity:
          type: ps_core.import_governance.present_in_xml.sync_fields_by_entity
          label: 'Fields to synchronize by entity'
    offer_values:
      type: mapping
      label: 'Offer feature values'
      mapping:
        missing_definition:
          type: string
          label: 'Missing definition behaviour'
        sync_definition_labels:
          type: boolean
          label: 'Sync definition labels from offer import'
    bo_create:
      type: mapping
      label: 'Back-office creation defaults'
      mapping:
        default_internal_lock:
          type: boolean
          label: 'Default internal lock for new definitions'
    csv_import:
      type: mapping
      label: 'CSV import defaults'
      mapping:
        lock_on_import:
          type: boolean
          label: 'Lock definitions on CSV import'
    import_defaults:
      type: mapping
      label: 'Shared import defaults'
      mapping:
        default_group:
          type: string
          label: 'Default feature group when import has no group code'

ps_feature.feature_definition.*:
  type: config_entity
  label: 'Feature Definition'
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
      translatable: true
    description:
      type: label
      label: 'Description'
      translatable: true
    code:
      type: string
      label: 'Code'
    group:
      type: string
      label: 'Group'
    type_driver:
      type: string
      label: 'Type driver'
    required_asset_types:
      type: sequence
      label: 'Required asset types'
      sequence:
        type: string
        label: 'Asset type code'
    payload_defaults:
      type: mapping
      label: 'Payload defaults'
      mapping:
        unit:
          type: string
          label: 'Unit'
          translatable: true
        min:
          type: float
          label: 'Minimum value'
        max:
          type: float
          label: 'Maximum value'
        decimals:
          type: integer
          label: 'Decimal places'
        max_length:
          type: integer
          label: 'Maximum length'
        rows:
          type: integer
          label: 'Number of rows'
        dictionary_id:
          type: string
          label: 'Dictionary ID'
        allow_custom:
          type: boolean
          label: 'Allow custom values'
        vocabulary_id:
          type: string
          label: 'Vocabulary ID'
        multiple:
          type: boolean
          label: 'Multiple selection'
        format:
          type: string
          label: 'Date format'
        options:
          type: mapping
          label: 'List options'
          translatable: true
    weight:
      type: integer
      label: 'Weight'
    status:
      type: boolean
      label: 'Status'
    icon:
      type: string
      label: 'UI Icon'
    expose_as_filter:
      type: boolean
      label: 'Expose as search filter'
    source:
      type: string
      label: 'Catalogue source'
    type_locked:
      type: boolean
      label: 'Lock value type'
    internal_lock:
      type: boolean
      label: 'Internal lock'
    source_tracking:
      type: string
      label: 'Source tracking'
    checksum:
      type: string
      label: 'Checksum'
    field_locks:
      type: mapping
      label: 'Field locks'
      mapping:
        '*':
          type: boolean
          label: 'Locked'
