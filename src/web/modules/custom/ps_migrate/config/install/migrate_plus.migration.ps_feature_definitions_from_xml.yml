langcode: en
status: true
dependencies:
  enforced:
    module:
      - ps_migrate
  config:
    - migrate_plus.migration.ps_feature_groups_from_xml
id: ps_feature_definitions_from_xml
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - ps_crm_import
migration_group: ps_crm_import
label: 'Import Feature Definitions from CRM XML'
source:
  plugin: ps_crm_offer_xml
  mode: feature_definitions
  urls:
    - 'private://import/staging/offers.xml'
  fields:
    -
      name: definition_id
      label: 'Definition ID'
    -
      name: group_id
      label: 'Group ID'
    -
      name: group_code
      label: 'Group Code'
    -
      name: feature_code
      label: 'Feature Code'
    -
      name: label
      label: 'Label'
    -
      name: description
      label: 'Description'
    -
      name: type_driver
      label: 'Type driver'
    -
      name: weight
      label: 'Weight'
    -
      name: status
      label: 'Status'
    -
      name: payload_defaults
      label: 'Payload defaults'
    -
      name: required_asset_types
      label: 'Required asset types'
  ids:
    definition_id:
      type: string
process:
  id: definition_id
  label: label
  description: description
  code: feature_code
  group: group_id
  type_driver: type_driver
  expose_as_filter:
    plugin: default_value
    default_value: 1
  required_asset_types:
    plugin: feature_normalize_payload_defaults
    source: required_asset_types
  weight: weight
  status: status
  payload_defaults:
    plugin: feature_normalize_payload_defaults
    source: payload_defaults
  source:
    plugin: default_value
    default_value: xml
  type_locked:
    plugin: default_value
    default_value: false
destination:
  plugin: 'entity:fb_feature_definition'
migration_dependencies:
  required:
    - ps_feature_groups_from_xml
  optional: []