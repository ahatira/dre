langcode: en
paths:
  incoming: 'private://import/incoming'
  processing: 'private://import/processing'
  archive: 'private://import/archive'
  failed: 'private://import/failed'
staging_uri: 'private://import/staging/offers.xml'
mode: full
cron_enabled: false
cron_interval: 900
batch_limit: 0
max_upload_size: 52428800
queue_enabled: true
queue_process_on_cron: true
queue_items_per_cron: 1
alert_email_enabled: true
alert_email_recipients: ''
alert_email_on_warning: false
alert_skip_threshold_percent: 10
post_run_index_solr: true
post_run_search_api_index: offers
migration_order_full:
  - ps_agent_avatar_file_from_xml
  - ps_agent_from_xml
  - ps_feature_groups_from_xml
  - ps_feature_definitions_from_xml
  - ps_file_from_xml
  - ps_media_from_xml
  - ps_media_virtual_tour_from_xml
  - ps_surface_division_from_xml
  - ps_offer_from_xml
  - ps_offer_translations_from_xml
migration_order_delta:
  - ps_offer_from_xml
  - ps_offer_translations_from_xml
lock_strategy_default: log_only
lock_field_strategies: {  }
skip_unchanged_offers: false
conflict_window_seconds: 300
media_download_timeout: 30
media_download_retry_count: 2
media_download_max_failures_percent: 5
