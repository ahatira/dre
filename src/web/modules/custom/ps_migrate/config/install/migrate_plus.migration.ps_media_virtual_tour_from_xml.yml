langcode: en
status: true
dependencies:
  enforced:
    module:
      - ps_migrate
id: ps_media_virtual_tour_from_xml
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - ps_crm_import
migration_group: ps_crm_import
label: 'Import Virtual Tour Media from CRM XML (TYPE_CODE=VIS)'
source:
  plugin: ps_crm_offer_xml
  mode: media_vis
  urls:
    - 'public://crm/offers.xml'
  fields:
    -
      name: business_id_parent
      label: 'Parent Offer Business ID'
      selector: '../../BUSINESS_ID'
    -
      name: media_url
      label: 'Virtual tour URL'
      selector: URL
    -
      name: order
      label: 'Display order'
      selector: ORDER
    -
      name: alt_text_fr
      label: 'Alternative text FR'
      selector: 'ML_ALTERNATIVE/ALTERNATIVE[1]'
  ids:
    business_id_parent:
      type: string
    order:
      type: integer
process:
  bundle:
    plugin: default_value
    default_value: visite_guided

  name:
    plugin: concat
    source:
      - business_id_parent
      - order
    delimiter: '_media_'

  'field_media_link/uri': media_url
  'field_media_link/title': alt_text_fr

  status:
    plugin: default_value
    default_value: 1

  uid:
    plugin: default_value
    default_value: 1

destination:
  plugin: 'entity:media'

migration_dependencies:
  required: []
  optional: []
