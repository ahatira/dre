langcode: en
status: true
dependencies:
  enforced:
    module:
      - ps_migrate
  config:
    - migrate_plus.migration.ps_offer_from_xml
id: ps_offer_translations_from_xml_nl
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - ps_crm_import
migration_group: ps_crm_import
label: 'Import Offer Translations from CRM XML (NL)'
source:
  plugin: url
  data_fetcher_plugin: file
  data_parser_plugin: simple_xml
  urls:
    - 'public://crm/offers.xml'
  item_selector: /OFFERS_LIST/OFFER
  fields:
    -
      name: business_id
      label: 'Business ID'
      selector: BUSINESS_ID
    -
      name: offer_xml_node
      label: 'Full offer XML node'
      selector: '.'
    -
      name: availability_nl
      label: 'Availability NL'
      selector: 'ML_AVAILABILITY/AVAILABILITY[@LANGUAGE="NL"]'
    -
      name: technical_elements
      label: 'Technical elements'
      selector: TECHNICAL_ELEMENTS_LIST
    -
      name: address_country
      label: 'Country'
      selector: 'ADDRESS_LIST/ADDRESS[DISPLAY="true"]/COUNTRY_ISO'
  ids:
    business_id:
      type: string
process:
  pseudo_source_langcode:
    plugin: canonical_offer_language
    source:
      - offer_xml_node
      - address_country
    output: drupal

  _skip_same_language:
    plugin: skip_translation_if_same_language
    source: '@pseudo_source_langcode'
    target_language: nl

  # ===== LOOKUP NODE =====
  nid:
    plugin: migration_lookup
    migration: ps_offer_from_xml
    source: business_id
    no_stub: true
  
  # ===== SKIP IF NODE NOT FOUND =====
  _skip_check:
    plugin: skip_on_empty
    method: row
    source: '@nid'
  
  # ===== TITLE (NON-TRANSLATABLE BUT REQUIRED) =====
  title: business_id
  
  # ===== LANGUAGE CODE =====
  langcode:
    plugin: default_value
    default_value: nl
  
  # ===== CONTENT TRANSLATION SOURCE =====
  content_translation_source:
    plugin: get
    source: '@pseudo_source_langcode'
  
  # ===== BODY NL =====
  'body/value':
    plugin: multilingual_description
    source: offer_xml_node
    language: NL
    priority: [2, 4, 1]
  'body/format':
    plugin: default_value
    default_value: plain_text
  
  # ===== AVAILABILITY NL =====
  field_availability: availability_nl
  
  # ===== FEATURES NL =====
  field_features:
    plugin: multilingual_feature_items
    source: technical_elements
    language: NL

destination:
  plugin: 'entity:node'
  default_bundle: offer
  translations: true

migration_dependencies:
  required:
    - ps_offer_from_xml
