langcode: en
status: true
dependencies:
  enforced:
    module:
      - ps_migrate
  config:
    - migrate_plus.migration.ps_agent_from_xml
id: ps_offer_from_xml
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - ps_crm_import
migration_group: ps_crm_import
label: 'Import Offers from CRM XML (Config-First - Phase 1)'
source:
  plugin: ps_crm_offer_xml
  mode: offer
  urls:
    - 'private://import/staging/offers.xml'
  fields:
    -
      name: business_id
      label: 'Business ID'
      selector: BUSINESS_ID
    -
      name: type_code
      label: 'Type Code'
      selector: TYPE_CODE
    -
      name: operation_code
      label: 'Operation Code'
      selector: 'OPERATIONS_LIST/OPERATION_CODE[1]'
    -
      name: offer_xml_node
      label: 'Offer XML node'
      selector: .
    -
      name: is_divisible
      label: 'Is divisible'
      selector: IS_DIVISIBLE
    -
      name: publication_end_date
      label: 'Publication end date'
      selector: PUBLICATION_END_DATE
    -
      name: address_line1
      label: 'Address line 1'
      selector: 'ADDRESS_LIST/ADDRESS[DISPLAY="true"]/ADDRESS_LINE_1'
    -
      name: address_city
      label: 'City'
      selector: 'ADDRESS_LIST/ADDRESS[DISPLAY="true"]/CITY'
    -
      name: address_zip
      label: 'ZIP code'
      selector: 'ADDRESS_LIST/ADDRESS[DISPLAY="true"]/ZIP_CODE'
    -
      name: address_country
      label: 'Country'
      selector: 'ADDRESS_LIST/ADDRESS[DISPLAY="true"]/COUNTRY_ISO'
    -
      name: gps_longitude
      label: 'Longitude'
      selector: 'ADDRESS_LIST/ADDRESS[DISPLAY="true"]/GPS/LONGITUDE'
    -
      name: gps_latitude
      label: 'Latitude'
      selector: 'ADDRESS_LIST/ADDRESS[DISPLAY="true"]/GPS/LATITUDE'
    -
      name: all_surface_values
      label: 'All surface values (test multi-extraction)'
      selector: GLOBAL_SURFACES/SURFACE/VALUE
    -
      name: all_surface_quals
      label: 'All surface qualification codes (test multi-extraction)'
      selector: GLOBAL_SURFACES/SURFACE/QUALIFICATION_CODE
    -
      name: division_ids
      label: 'Division IDs list'
      selector: DIVISIONS_LIST/DIVISION/LOT
    -
      name: main_agent_uid
      label: 'Main business leader UID'
      selector: MAIN_BUSINESS_LEADER_UID
    -
      name: last_update_date
      label: 'Last update date'
      selector: LAST_UPDATE_DATE
    -
      name: timestamp
      label: 'Timestamp'
      selector: TIMESTAMP
    -
      name: media_order_list
      label: 'List of media display orders'
      selector: 'MEDIA_LIST/MEDIA/ORDER'
    -
      name: technical_elements
      label: 'Technical elements'
      selector: TECHNICAL_ELEMENTS_LIST
    -
      name: diagnostic_types
      label: 'Diagnostic types'
      selector: DIAGNOSTICS_LIST/DIAGNOSTIC/DIAGNOSTIC_TYPE
    -
      name: diagnostic_classes
      label: 'Diagnostic classes'
      selector: DIAGNOSTICS_LIST/DIAGNOSTIC/CLASS
    -
      name: diagnostic_values
      label: 'Diagnostic values'
      selector: DIAGNOSTICS_LIST/DIAGNOSTIC/VALUE
    -
      name: diagnostic_dates
      label: 'Diagnostic dates'
      selector: DIAGNOSTICS_LIST/DIAGNOSTIC/DIAGNOSTIC_DATE
    -
      name: diagnostic_validity_end_dates
      label: 'Diagnostic validity end dates'
      selector: DIAGNOSTICS_LIST/DIAGNOSTIC/VALIDITY_END_DATE
    -
      name: diagnostic_no_classification_markers
      label: 'Diagnostic no classification markers'
      selector: DIAGNOSTICS_LIST/DIAGNOSTIC/NO_CLASSIFICATION
    -
      name: diagnostic_non_applicable_markers
      label: 'Diagnostic non applicable markers'
      selector: DIAGNOSTICS_LIST/DIAGNOSTIC/NON_APPLICABLE
    -
      name: technical_id
      label: 'Technical ID'
      selector: TECHNICAL_ID
    -
      name: budget_value
      label: 'Budget value'
      selector: 'BUDGETS_LIST/BUDGET[1]/VALUE'
    -
      name: budget_period_code
      label: 'Budget period code'
      selector: 'BUDGETS_LIST/BUDGET[1]/PERIOD_CODE'
    -
      name: budget_unit_code
      label: 'Budget unit code'
      selector: 'BUDGETS_LIST/BUDGET[1]/UNIT_CODE'
    -
      name: budget_ht
      label: 'Budget HT flag'
      selector: 'BUDGETS_LIST/BUDGET[1]/HT'
    -
      name: budget_cc
      label: 'Budget CC flag'
      selector: 'BUDGETS_LIST/BUDGET[1]/CC'
    -
      name: fees
      label: 'Fees (honoraires)'
      selector: FEES
  ids:
    business_id:
      type: string
  constants:
    default_surface_zero: 0
    point_prefix: 'POINT('
    point_space: ' '
    point_suffix: ')'
process:
  # Skip manually locked offers before any other processing.
  _skip_locked:
    plugin: skip_offer_if_locked
    source: business_id

  # Skip unchanged offers when enabled (delta mode only).
  _skip_unchanged:
    plugin: skip_unchanged_offer
    source: business_id

  # ===== NODE BUNDLE =====
  type:
    plugin: default_value
    default_value: offer
  
  # ===== TITLE =====
  # Build title from operation + asset + city.
  title:
    plugin: offer_composed_title
    source:
      - operation_code
      - type_code
      - address_city
      - business_id
      - address_country
    mode: title

  # Commercial title example: "Location Bureau 960 m²".
  field_commercial_title:
    plugin: offer_composed_title
    source:
      - operation_code
      - type_code
      - all_surface_values
      - business_id
      - address_country
    mode: commercial
  
  # ===== IDENTIFICATION =====
  field_business_id: business_id
  field_reference: technical_id
  field_reference_auto:
    plugin: default_value
    default_value: 0
  
  # ===== TYPOLOGIE =====
  # TYPE_CODE: BUR, COW, LOG → field_asset_type
  # Mapping MAT-01: LOG (XML) → ENT (Drupal)
  # Lookup dictionary entity; if not found, reference stays NULL
  pseudo_asset_type_normalized:
    -
      plugin: callback
      callable: strval
      source: type_code
    -
      plugin: callback
      callable: trim
    -
      plugin: callback
      callable: strtoupper
  
  field_asset_type:
    plugin: ps_dictionary_lookup
    source: '@pseudo_asset_type_normalized'
    dictionary_type: asset_type
    map:
      LOG: ENT
  
  # Store raw code for unknown dictionaries
  field_asset_type_raw: '@pseudo_asset_type_normalized'
  
  # OPERATIONS_LIST/OPERATION_CODE: LOC, VEN → field_operation_type
  pseudo_operation_code:
    -
      plugin: callback
      callable: strval
      source: operation_code
    -
      plugin: callback
      callable: trim
    -
      plugin: callback
      callable: strtoupper

  field_operation_type:
    plugin: ps_dictionary_lookup
    source: '@pseudo_operation_code'
    dictionary_type: operation_type
  
  # Store raw code for unknown dictionaries
  field_operation_type_raw: '@pseudo_operation_code'
  
  # ===== DESCRIPTION =====
  # Resolve canonical source language from country + available XML languages.
  pseudo_source_xml_language:
    plugin: canonical_offer_language
    source:
      - offer_xml_node
      - address_country
    output: xml

  # ML_DESCRIPTION_2 (more complete) with fallback to ML_DESCRIPTION_1.
  # TODO P1: Activer format full_html ou créer format de texte riche
  # Pour l'instant: plain_text (HTML sera échappé dans l'affichage)
  'body/value':
    plugin: multilingual_description
    source:
      - offer_xml_node
      - '@pseudo_source_xml_language'
    priority: [2, 1]
  'body/format':
    plugin: default_value
    default_value: plain_text
  
  # ===== DISPONIBILITÉ =====
  field_availability:
    plugin: multilingual_availability
    source:
      - offer_xml_node
      - '@pseudo_source_xml_language'
  
  # ===== DIVISIBILITÉ =====
  # IS_DIVISIBLE: "true" ou "false" (string XML) → boolean
  field_divisible:
    plugin: static_map
    source: is_divisible
    map:
      'true': 1
      'false': 0
    default_value: 0
  
  # ===== ADRESSE & GÉOLOCALISATION =====
  field_show_address:
    plugin: offer_show_address_from_xml
    source: offer_xml_node

  field_address:
    plugin: offer_address_from_xml
    source: offer_xml_node

  field_geo:
    plugin: offer_geo_from_xml
    source: offer_xml_node
  
  # ===== SURFACES =====
  # YAML-only mapping with simple_xml parser + transpose/sub_process.
  # Pair QUALIFICATION_CODE with VALUE by index.
  pseudo_surfaces_data:
    plugin: transpose
    source:
      - all_surface_quals
      - all_surface_values

  field_surfaces:
    plugin: sub_process
    source: '@pseudo_surfaces_data'
    process:
      qualification:
        plugin: get
        source: '0'
      value:
        plugin: callback
        callable: floatval
        source: '1'
      unit_code:
        plugin: default_value
        default_value: M2

  # ===== DIAGNOSTICS (CONFIG-ONLY GENERIC) =====
  # Build rows from DIAGNOSTICS_LIST/DIAGNOSTIC without custom process plugin.
  pseudo_diagnostics_data:
    plugin: transpose
    source:
      - diagnostic_types
      - diagnostic_classes
      - diagnostic_values
      - diagnostic_dates
      - diagnostic_validity_end_dates
      - diagnostic_no_classification_markers
      - diagnostic_non_applicable_markers

  field_diagnostics:
    plugin: sub_process
    source: '@pseudo_diagnostics_data'
    process:
      diagnostic_type:
        -
          plugin: get
          source: '0'
        -
          plugin: callback
          callable: trim
        -
          plugin: callback
          callable: strtolower
      class:
        -
          plugin: get
          source: '1'
        -
          plugin: callback
          callable: trim
        -
          plugin: callback
          callable: strtoupper
      value:
        plugin: get
        source: '2'
      diagnostic_date:
        plugin: get
        source: '3'
      validity_end_date:
        plugin: get
        source: '4'
      no_classification:
        -
          plugin: get
          source: '5'
        -
          plugin: callback
          callable: trim
        -
          plugin: static_map
          map:
            '1': 1
            'true': 1
            'TRUE': 1
            'Y': 1
            'YES': 1
            'yes': 1
          default_value: 0
      non_applicable:
        -
          plugin: get
          source: '6'
        -
          plugin: callback
          callable: trim
        -
          plugin: static_map
          map:
            '1': 1
            'true': 1
            'TRUE': 1
            'Y': 1
            'YES': 1
            'yes': 1
          default_value: 0

  
  # ===== AGENTS =====
  # MAIN_BUSINESS_LEADER_UID → lookup vers ps_agent
  field_primary_agent:
    plugin: migration_lookup
    migration: ps_agent_from_xml
    source: main_agent_uid
    no_stub: true
  
  # ===== DIVISIONS / LOTS =====
  # YAML-only lookup from LOT IDs to ps_surface_division entity IDs.
  field_divisions:
    plugin: migration_lookup
    migration: ps_surface_division_from_xml
    source: division_ids
    no_stub: true
  
  # ===== DATES =====
  # LAST_UPDATE_DATE: format ISO 8601
  created:
    plugin: callback
    callable: strtotime
    source: last_update_date
  
  changed:
    plugin: callback
    callable: strtotime
    source: timestamp
  
  # ===== LANGUE =====
  # Canonical language from country, constrained by available XML languages.
  langcode:
    plugin: canonical_offer_language
    source:
      - offer_xml_node
      - address_country
    output: drupal

  # ===== CLIENT TYPE =====
  # B2B par défaut
  field_client_type:
    plugin: default_value
    default_value: B2B

  # ===== PUBLICATION =====
  # Draft par défaut, à publier manuellement
  status:
    plugin: default_value
    default_value: 1
  
  # ===== PROTECTION FIELDS =====
  # field_source_tracking: JSON avec metadata
  'field_source_tracking/value':
    plugin: default_value
    default_value: '{"source_system":"CRM_BNPPRE","import_timestamp":"@timestamp"}'
  
  # field_source_checksum: sera calculé en P1 avec process plugin custom
  # field_internal_lock: false par défaut (CRM peut écraser)
  field_internal_lock:
    plugin: default_value
    default_value: 0
  
  # ===== MEDIA GALLERY =====
  field_media_gallery:
    plugin: media_ids_by_business
    source: business_id

  # ===== BUDGET =====
  # BUDGETS_LIST/BUDGET[1]/VALUE → field_budget_value (float)
  field_budget_value:
    -
      plugin: skip_on_empty
      method: process
      source: budget_value
    -
      plugin: callback
      callable: floatval

  # PERIOD_CODE: ANN → YEAR, MEN → MONTH, UNI → ONE_SHOT
  field_budget_period:
    -
      plugin: skip_on_empty
      method: process
      source: budget_period_code
    -
      plugin: static_map
      map:
        ANN: YEAR
        MEN: MONTH
        UNI: ONE_SHOT
      bypass: true

  # UNIT_CODE: SUR → PER_M2, GBL → GLOBAL, POS → PER_POSTE
  field_budget_unit:
    -
      plugin: skip_on_empty
      method: process
      source: budget_unit_code
    -
      plugin: static_map
      map:
        SUR: PER_M2
        GBL: GLOBAL
        POS: PER_POSTE
      bypass: true

  field_budget_ht:
    -
      plugin: static_map
      source: budget_ht
      map:
        'true': 1
        'false': 0
        '1': 1
        '0': 0
      default_value: 1

  field_budget_cc:
    -
      plugin: static_map
      source: budget_cc
      map:
        'true': 1
        'false': 0
        '1': 1
        '0': 0
      default_value: 0

  field_budget_fees:
    -
      plugin: skip_on_empty
      method: process
      source: fees
    -
      plugin: callback
      callable: trim

  field_features:
    plugin: feature_items_from_technical_elements
    source: technical_elements

destination:
  plugin: 'entity:node'
  default_bundle: offer

migration_dependencies:
  required:
    - ps_feature_groups_from_xml
    - ps_feature_definitions_from_xml
    - ps_agent_from_xml
    - ps_media_from_xml
    - ps_media_virtual_tour_from_xml
    - ps_surface_division_from_xml
  optional: []
