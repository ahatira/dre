langcode: en
status: true
dependencies:
  enforced:
    module:
      - ps_migrate
  module:
    - ps_dictionary
id: ps_dictionary_operation_type_from_xml
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - ps_crm_import
migration_group: ps_crm_import
label: 'Ensure Dictionary Operation Types from CRM XML'
source:
  plugin: url
  data_fetcher_plugin: file
  data_parser_plugin: simple_xml
  urls:
    - 'public://crm/offers.xml'
  item_selector: /OFFERS_LIST/OFFER[normalize-space(OPERATIONS_LIST/OPERATION_CODE[1]) != '' and not(OPERATIONS_LIST/OPERATION_CODE[1] = preceding::OFFER/OPERATIONS_LIST/OPERATION_CODE[1])]
  fields:
    -
      name: operation_code
      label: 'Operation code from CRM'
      selector: 'OPERATIONS_LIST/OPERATION_CODE[1]'
  ids:
    operation_code:
      type: string
  constants:
    dictionary_type: operation_type
process:
  pseudo_operation_code:
    -
      plugin: callback
      callable: strval
      source: operation_code
    -
      plugin: callback
      callable: trim
    -
      plugin: callback
      callable: strtoupper

  pseudo_code:
    plugin: get
    source: '@pseudo_operation_code'
  pseudo_code_lower:
    plugin: callback
    callable: strtolower
    source: '@pseudo_code'

  id:
    plugin: concat
    source:
      - constants/dictionary_type
      - '@pseudo_code_lower'
    delimiter: .
  type: constants/dictionary_type
  code: '@pseudo_code'
  label:
    plugin: dictionary_label_or_existing
    source: '@pseudo_code'
  weight:
    plugin: default_value
    default_value: 0
destination:
  plugin: 'entity:ps_dictionary_entry'
migration_dependencies:
  required: []
  optional: []
