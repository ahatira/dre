langcode: en
status: true
dependencies:
  enforced:
    module:
      - ps_migrate
id: ps_media_from_xml
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - ps_crm_import
migration_group: ps_crm_import
label: 'Import Media from CRM XML (Step 2: Create media entities)'
source:
  plugin: ps_crm_offer_xml
  mode: media_ext
  urls:
    - 'private://import/staging/offers.xml'
  # Selector: image media only (TYPE_CODE=EXT).
  # Keep source parity with ps_file_from_xml and exclude the known broken URL.
  fields:
    -
      name: business_id_parent
      label: 'Parent Offer Business ID'
      selector: '../../BUSINESS_ID'
    -
      name: type_code
      label: 'Media Type Code'
      selector: TYPE_CODE
    -
      name: media_url
      label: 'Media URL'
      selector: URL
    -
      name: media_value
      label: 'Media filename'
      selector: VALUE
    -
      name: order
      label: 'Display order'
      selector: ORDER
    -
      name: alt_text_fr
      label: 'Alternative text FR'
      selector: 'ML_ALTERNATIVE/ALTERNATIVE[1]'
    -
      name: watermark
      label: 'Watermark flag'
      selector: WATERMARK
  # ID composite: business_id_parent + order pour unicité globale
  ids:
    business_id_parent:
      type: string
    order:
      type: integer
process:
  # ===== MEDIA BUNDLE =====
  bundle:
    plugin: default_value
    default_value: image
  
  # ===== NAME =====
  name:
    plugin: concat
    source:
      - business_id_parent
      - order
    delimiter: '_media_'
  
  # ===== IMAGE FIELD =====
  # Lookup file ID first, then skip media row if no file was imported.
  psm_file_id:
    plugin: migration_lookup
    migration: ps_file_from_xml
    source:
      - business_id_parent
      - order
    no_stub: true

  'field_media_image/target_id':
    -
      plugin: skip_on_empty
      method: row
      source: '@psm_file_id'
    -
      plugin: get
      source: '@psm_file_id'
  
  # Alternative text
  'field_media_image/alt': alt_text_fr
  
  # ===== METADATA =====
  # Champ custom pour tracking (si existe)
  # field_media_order: order
  # field_source_offer: business_id_parent
  
  # ===== STATUT =====
  status:
    plugin: default_value
    default_value: 1
  
  # ===== PROTECTION FIELDS =====
  field_internal_lock:
    plugin: default_value
    default_value: 0

  uid:
    plugin: default_value
    default_value: 1

destination:
  plugin: 'entity:media'

migration_dependencies:
  required:
    - ps_file_from_xml
  optional: []
