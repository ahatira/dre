ps_migrate.import_pipeline_settings:
  type: config_object
  label: 'CRM import pipeline settings'
  mapping:
    paths:
      type: mapping
      label: 'Pipeline folder paths'
      mapping:
        incoming:
          type: string
          label: 'Incoming folder'
        processing:
          type: string
          label: 'Processing folder'
        archive:
          type: string
          label: 'Archive folder'
        failed:
          type: string
          label: 'Failed folder'
    staging_uri:
      type: string
      label: 'Active XML staging URI for migrate'
    mode:
      type: string
      label: 'Default import mode'
    cron_enabled:
      type: boolean
      label: 'Cron polling enabled'
    cron_interval:
      type: integer
      label: 'Cron interval in seconds'
    batch_limit:
      type: integer
      label: 'Max files per run (0 = unlimited)'
    max_upload_size:
      type: integer
      label: 'Max upload size in bytes (stored; configured in MB in the UI)'
    queue_enabled:
      type: boolean
      label: 'Enqueue incoming files for async processing'
    queue_process_on_cron:
      type: boolean
      label: 'Process queue items during cron'
    queue_items_per_cron:
      type: integer
      label: 'Queue items processed per cron run'
    alert_email_enabled:
      type: boolean
      label: 'Send email alerts on import failure'
    alert_email_recipients:
      type: string
      label: 'Alert email recipients (comma-separated)'
    alert_email_on_warning:
      type: boolean
      label: 'Send email alerts on high skip rate'
    alert_skip_threshold_percent:
      type: integer
      label: 'Skip rate threshold for warning emails'
    post_run_index_solr:
      type: boolean
      label: 'Index Solr offers after successful import'
    post_run_search_api_index:
      type: string
      label: 'Search API index ID for post-run indexing'
    migration_order_full:
      type: sequence
      label: 'Full import migration order'
      sequence:
        type: string
        label: 'Migration ID'
    migration_order_delta:
      type: sequence
      label: 'Delta import migration order'
      sequence:
        type: string
        label: 'Migration ID'
    lock_strategy_default:
      type: string
      label: 'Default lock strategy for protected entities'
    lock_field_strategies:
      type: mapping
      label: 'Per-field lock strategy overrides'
      mapping:
        '*':
          type: string
          label: 'Lock strategy'
    skip_unchanged_offers:
      type: boolean
      label: 'Skip unchanged offers in delta mode'
    conflict_window_seconds:
      type: integer
      label: 'Conflict detection window in seconds'
    media_download_timeout:
      type: integer
      label: 'Media download timeout in seconds'
    media_download_retry_count:
      type: integer
      label: 'Media download retry count'
    media_download_max_failures_percent:
      type: integer
      label: 'Media download failure threshold percent for warnings'
