services:
  logger.channel.ps_migrate:
    parent: logger.channel_base
    arguments: ['ps_migrate']

  ps_migrate.canonical_country_language_resolver:
    class: Drupal\ps_migrate\Service\CanonicalCountryLanguageResolver

  ps_migrate.feature_technical_element_parser:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementParser

  ps_migrate.feature_technical_element_source_loader:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementSourceLoader
    arguments:
      - '@ps_migrate.feature_technical_element_parser'
      - '@ps_migrate.canonical_country_language_resolver'

  ps_migrate.feature_migration_key_builder:
    class: Drupal\ps_migrate\Service\FeatureMigrationKeyBuilder

  ps_migrate.feature_technical_element_validator:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementValidator

  ps_migrate.feature_payload_defaults_normalizer:
    class: Drupal\ps_migrate\Service\FeaturePayloadDefaultsNormalizer

  ps_migrate.feature_migration_post_import_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\FeatureMigrationPostImportSubscriber
    arguments:
      - '@ps_migrate.feature_technical_element_source_loader'
      - '@ps_migrate.feature_migration_key_builder'
      - '@ps_migrate.feature_technical_element_validator'
      - '@ps_migrate.feature_payload_defaults_normalizer'
      - '@entity_type.manager'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }

  ps_migrate.entity_protection_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\EntityProtectionSubscriber
    arguments:
      - '@ps_core.entity_protection_manager'
      - '@entity_type.manager'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }

  ps_migrate.offer_surface_projection_migration_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\OfferSurfaceProjectionMigrationSubscriber
    arguments:
      - '@state'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }
