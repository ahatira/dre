services:
  logger.channel.ps_migrate:
    parent: logger.channel_base
    arguments: ['ps_migrate']

  ps_migrate.canonical_country_language_resolver:
    class: Drupal\ps_migrate\Service\CanonicalCountryLanguageResolver

  ps_migrate.feature_technical_element_parser:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementParser

  ps_migrate.feature_technical_element_source_loader:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementSourceLoader
    arguments:
      - '@ps_migrate.feature_technical_element_parser'
      - '@ps_migrate.canonical_country_language_resolver'
      - '@ps_migrate.xml_parse_cache'

  ps_migrate.feature_migration_key_builder:
    class: Drupal\ps_migrate\Service\FeatureMigrationKeyBuilder

  ps_migrate.feature_import_resolver:
    class: Drupal\ps_migrate\Service\FeatureImportResolver
    arguments:
      - '@Drupal\ps_feature\Service\FeatureCanonicalGroupRegistry'
      - '@ps_migrate.feature_migration_key_builder'
      - '@entity_type.manager'
      - '@ps_core.import_governance_registry'

  ps_migrate.feature_technical_element_validator:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementValidator

  ps_migrate.feature_payload_defaults_normalizer:
    class: Drupal\ps_migrate\Service\FeaturePayloadDefaultsNormalizer

  ps_migrate.feature_offer_value_import_handler:
    class: Drupal\ps_migrate\Service\FeatureOfferValueImportHandler
    arguments:
      - '@ps_migrate.feature_import_resolver'
      - '@entity_type.manager'
      - '@ps_core.import_governance_registry'
      - '@ps_migrate.feature_payload_defaults_normalizer'
      - '@language.config_factory_override'
      - '@language_manager'
      - '@logger.channel.ps_migrate'

  ps_migrate.feature_migration_post_import_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\FeatureMigrationPostImportSubscriber
    arguments:
      - '@ps_migrate.feature_technical_element_source_loader'
      - '@ps_migrate.feature_import_resolver'
      - '@ps_migrate.feature_technical_element_validator'
      - '@ps_migrate.feature_payload_defaults_normalizer'
      - '@entity_type.manager'
      - '@ps_core.entity_protection_manager'
      - '@ps_core.import_governance_registry'
      - '@ps_core.import_governance_snapshot_synchronizer'
      - '@ps_migrate.import_run_snapshot_collector'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }

  ps_migrate.import_run_snapshot_collector:
    class: Drupal\ps_migrate\Service\ImportRunSnapshotCollector

  ps_migrate.import_run_snapshot_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\ImportRunSnapshotSubscriber
    arguments:
      - '@ps_migrate.import_run_snapshot_collector'
      - '@entity_type.manager'
    tags:
      - { name: event_subscriber }

  ps_migrate.import_pipeline_rollback:
    class: Drupal\ps_migrate\Service\ImportPipelineRollbackService
    arguments:
      - '@entity_type.manager'
      - '@ps_core.entity_protection_manager'
      - '@ps_migrate.import_pipeline_post_run_indexer'
      - '@current_user'
      - '@datetime.time'
      - '@logger.channel.ps_migrate'

  ps_migrate.entity_protection_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\EntityProtectionSubscriber
    arguments:
      - '@ps_core.entity_protection_manager'
      - '@entity_type.manager'
      - '@logger.channel.ps_migrate'
      - '@datetime.time'
      - '@ps_migrate.import_pipeline_lock_strategy'
      - '@ps_core.import_governance_registry'
    tags:
      - { name: event_subscriber }

  ps_migrate.offer_location_xml_reader:
    class: Drupal\ps_migrate\Service\OfferLocationXmlReader

  ps_migrate.offer_surface_projection_migration_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\OfferSurfaceProjectionMigrationSubscriber
    arguments:
      - '@state'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }

  ps_migrate.import_pipeline_path_resolver:
    class: Drupal\ps_migrate\Service\ImportPipelinePathResolver
    arguments:
      - '@config.factory'
      - '@file_system'
      - '@stream_wrapper_manager'

  ps_migrate.snapshot_migration_post_import_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\SnapshotMigrationPostImportSubscriber
    arguments:
      - '@ps_migrate.crm_xml_snapshot_builder'
      - '@ps_migrate.crm_xml_snapshot_migration_projector'
      - '@entity_type.manager'
      - '@ps_core.import_governance_registry'
      - '@ps_core.import_governance_snapshot_synchronizer'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }

  ps_migrate.crm_offer_xml_document_loader:
    class: Drupal\ps_migrate\Service\CrmOfferXmlDocumentLoader
    arguments:
      - '@ps_migrate.xml_parse_cache'
      - '@file_system'

  ps_migrate.crm_xml_snapshot_builder:
    class: Drupal\ps_migrate\Service\CrmXmlSnapshotBuilder
    arguments:
      - '@ps_migrate.crm_offer_xml_document_loader'

  ps_migrate.crm_xml_snapshot_destination_normalizer:
    class: Drupal\ps_migrate\Service\CrmXmlSnapshotDestinationNormalizer

  ps_migrate.crm_xml_snapshot_migration_projector:
    class: Drupal\ps_migrate\Service\CrmXmlSnapshotMigrationProjector
    arguments:
      - '@ps_migrate.crm_xml_snapshot_destination_normalizer'

  ps_migrate.crm_offer_xml_xpath_row_builder:
    class: Drupal\ps_migrate\Service\CrmOfferXmlXpathRowBuilder

  ps_migrate.feature_technical_element_row_provider:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementRowProvider
    arguments:
      - '@ps_migrate.feature_technical_element_source_loader'
      - '@ps_migrate.feature_import_resolver'
      - '@ps_migrate.feature_technical_element_validator'
      - '@entity_type.manager'

  ps_migrate.offer_translation_row_provider:
    class: Drupal\ps_migrate\Service\OfferTranslationRowProvider
    arguments:
      - '@ps_migrate.crm_offer_xml_document_loader'
      - '@ps_migrate.canonical_country_language_resolver'
      - '@language_manager'

  ps_migrate.import_pipeline_migrate_runner:
    class: Drupal\ps_migrate\Service\ImportPipelineMigrateRunner
    arguments:
      - '@plugin.manager.migration'
      - '@module_handler'
      - '@logger.channel.ps_migrate'
      - '@ps_migrate.import_pipeline_migration_source_alterer'

  ps_migrate.xml_parse_cache:
    class: Drupal\ps_migrate\Service\XmlParseCacheService
    arguments:
      - '@file_system'

  ps_migrate.import_pipeline_run_context:
    class: Drupal\ps_migrate\Service\ImportPipelineRunContext
    arguments:
      - '@config.factory'

  ps_migrate.import_pipeline_migration_source_alterer:
    class: Drupal\ps_migrate\Service\ImportPipelineMigrationSourceAlterer
    arguments:
      - '@ps_migrate.xml_parse_cache'

  ps_migrate.import_pipeline_lock:
    class: Drupal\ps_migrate\Service\ImportPipelineLock
    arguments:
      - '@state'
      - '@datetime.time'

  ps_migrate.import_pipeline_lock_strategy:
    class: Drupal\ps_migrate\Service\ImportPipelineLockStrategy
    arguments:
      - '@config.factory'

  ps_migrate.import_pipeline_post_run_indexer:
    class: Drupal\ps_migrate\Service\ImportPipelinePostRunIndexer
    arguments:
      - '@config.factory'
      - '@logger.channel.ps_migrate'

  ps_migrate.import_pipeline_alert_notifier:
    class: Drupal\ps_migrate\Service\ImportPipelineAlertNotifier
    arguments:
      - '@config.factory'
      - '@plugin.manager.mail'
      - '@language_manager'
      - '@logger.channel.ps_migrate'

  ps_migrate.import_pipeline:
    class: Drupal\ps_migrate\Service\ImportPipeline
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@file_system'
      - '@ps_migrate.import_pipeline_path_resolver'
      - '@ps_migrate.import_pipeline_migrate_runner'
      - '@current_user'
      - '@logger.channel.ps_migrate'
      - '@queue'
      - '@state'
      - '@ps_migrate.import_pipeline_lock'
      - '@ps_migrate.import_pipeline_alert_notifier'
      - '@ps_migrate.import_pipeline_post_run_indexer'
      - '@ps_migrate.xml_parse_cache'
      - '@ps_migrate.import_pipeline_run_context'
      - '@ps_migrate.import_run_snapshot_collector'
      - '@datetime.time'

  Drupal\ps_migrate\Hook\ImportPipelineCronHooks:
    class: Drupal\ps_migrate\Hook\ImportPipelineCronHooks
    arguments:
      - '@ps_migrate.import_pipeline'
      - '@config.factory'
      - '@state'

  Drupal\ps_migrate\Hook\ImportPipelineMailHooks:
    class: Drupal\ps_migrate\Hook\ImportPipelineMailHooks
