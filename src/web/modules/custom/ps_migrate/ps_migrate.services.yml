services:
  logger.channel.ps_migrate:
    parent: logger.channel_base
    arguments: ['ps_migrate']

  ps_migrate.canonical_country_language_resolver:
    class: Drupal\ps_migrate\Service\CanonicalCountryLanguageResolver

  ps_migrate.feature_technical_element_parser:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementParser

  ps_migrate.feature_technical_element_source_loader:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementSourceLoader
    arguments:
      - '@ps_migrate.feature_technical_element_parser'
      - '@ps_migrate.canonical_country_language_resolver'

  ps_migrate.feature_migration_key_builder:
    class: Drupal\ps_migrate\Service\FeatureMigrationKeyBuilder

  ps_migrate.feature_technical_element_validator:
    class: Drupal\ps_migrate\Service\FeatureTechnicalElementValidator

  ps_migrate.feature_payload_defaults_normalizer:
    class: Drupal\ps_migrate\Service\FeaturePayloadDefaultsNormalizer

  ps_migrate.feature_migration_post_import_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\FeatureMigrationPostImportSubscriber
    arguments:
      - '@ps_migrate.feature_technical_element_source_loader'
      - '@ps_migrate.feature_migration_key_builder'
      - '@ps_migrate.feature_technical_element_validator'
      - '@ps_migrate.feature_payload_defaults_normalizer'
      - '@entity_type.manager'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }

  ps_migrate.entity_protection_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\EntityProtectionSubscriber
    arguments:
      - '@ps_core.entity_protection_manager'
      - '@entity_type.manager'
      - '@logger.channel.ps_migrate'
      - '@datetime.time'
      - '@ps_migrate.import_pipeline_lock_strategy'
    tags:
      - { name: event_subscriber }

  ps_migrate.offer_location_xml_reader:
    class: Drupal\ps_migrate\Service\OfferLocationXmlReader

  ps_migrate.offer_surface_projection_migration_subscriber:
    class: Drupal\ps_migrate\EventSubscriber\OfferSurfaceProjectionMigrationSubscriber
    arguments:
      - '@state'
      - '@logger.channel.ps_migrate'
    tags:
      - { name: event_subscriber }

  ps_migrate.import_pipeline_path_resolver:
    class: Drupal\ps_migrate\Service\ImportPipelinePathResolver
    arguments:
      - '@config.factory'
      - '@file_system'
      - '@stream_wrapper_manager'

  ps_migrate.import_pipeline_migrate_runner:
    class: Drupal\ps_migrate\Service\ImportPipelineMigrateRunner
    arguments:
      - '@plugin.manager.migration'
      - '@module_handler'
      - '@logger.channel.ps_migrate'

  ps_migrate.import_pipeline_lock:
    class: Drupal\ps_migrate\Service\ImportPipelineLock
    arguments:
      - '@state'
      - '@datetime.time'

  ps_migrate.import_pipeline_lock_strategy:
    class: Drupal\ps_migrate\Service\ImportPipelineLockStrategy
    arguments:
      - '@config.factory'

  ps_migrate.import_pipeline_post_run_indexer:
    class: Drupal\ps_migrate\Service\ImportPipelinePostRunIndexer
    arguments:
      - '@config.factory'
      - '@logger.channel.ps_migrate'

  ps_migrate.import_pipeline_alert_notifier:
    class: Drupal\ps_migrate\Service\ImportPipelineAlertNotifier
    arguments:
      - '@config.factory'
      - '@plugin.manager.mail'
      - '@language_manager'
      - '@logger.channel.ps_migrate'

  ps_migrate.import_pipeline:
    class: Drupal\ps_migrate\Service\ImportPipeline
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@file_system'
      - '@ps_migrate.import_pipeline_path_resolver'
      - '@ps_migrate.import_pipeline_migrate_runner'
      - '@current_user'
      - '@logger.channel.ps_migrate'
      - '@queue'
      - '@state'
      - '@ps_migrate.import_pipeline_lock'
      - '@ps_migrate.import_pipeline_alert_notifier'
      - '@ps_migrate.import_pipeline_post_run_indexer'
      - '@datetime.time'

  Drupal\ps_migrate\Hook\ImportPipelineCronHooks:
    class: Drupal\ps_migrate\Hook\ImportPipelineCronHooks
    arguments:
      - '@ps_migrate.import_pipeline'
      - '@config.factory'
      - '@state'

  Drupal\ps_migrate\Hook\ImportPipelineMailHooks:
    class: Drupal\ps_migrate\Hook\ImportPipelineMailHooks
