handlers:
  email_confirmation:
    id: email
    handler_id: email_confirmation
    label: 'Email confirmation'
    notes: ''
    status: true
    conditions: {  }
    weight: 1
    settings:
      states:
        - completed
      to_mail: '[webform_submission:values:professional_email]'
      to_options: {  }
      bcc_mail: ''
      bcc_options: {  }
      cc_mail: ''
      cc_options: {  }
      from_mail: no-reply@your-site.com
      from_options: {  }
      from_name: 'BNP Paribas Real Estate'
      reply_to: '[webform_submission:values:professional_email]'
      return_path: no-reply@your-site.com
      sender_mail: ''
      sender_name: ''
      subject: 'Your request has been sent'
      body: |
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <style>
            body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
            .container { max-width: 600px; margin: 0 auto; padding: 20px; }
            .header { background: #004a8f; color: white; padding: 20px; text-align: center; }
            .content { padding: 20px; background: #f9f9f9; }
            .field { margin-bottom: 10px; }
            .field-label { font-weight: bold; display: inline-block; width: 220px; }
            .field-value { display: inline-block; }
            .footer { text-align: center; padding: 20px; font-size: 12px; color: #666; border-top: 1px solid #ddd; margin-top: 20px; }
          </style>
        </head>
        <body>
          <div class="container">
            <div class="header">
              <h1>Your request has been sent</h1>
            </div>
            <div class="content">
              <p>Hello,</p>
              <p>Your request has been successfully transmitted. We will contact you very shortly.</p>

              <h3>For your reference, your request is as follows:</h3>

              <div class="field">
                <span class="field-label">Your request:</span>
                <span class="field-value">I would like to delegate my search</span>
              </div>

              <div class="field">
                <span class="field-label">Search type:</span>
                <span class="field-value">[webform_submission:values:transaction_type] - [webform_submission:values:property_type]</span>
              </div>

              {# Display criteria based on property type #}
              {% if data.property_type == 'Coworking' %}
                <div class="field">
                  <span class="field-label">Min Price:</span>
                  <span class="field-value">[webform_submission:values:price_min] €</span>
                </div>
                <div class="field">
                  <span class="field-label">Max Price:</span>
                  <span class="field-value">[webform_submission:values:price_max] €</span>
                </div>
                <div class="field">
                  <span class="field-label">Min Seats:</span>
                  <span class="field-value">[webform_submission:values:seat_min]</span>
                </div>
                <div class="field">
                  <span class="field-label">Max Seats:</span>
                  <span class="field-value">[webform_submission:values:seat_max]</span>
                </div>
              {% else %}
                <div class="field">
                  <span class="field-label">Min Rent:</span>
                  <span class="field-value">[webform_submission:values:rent_min] €</span>
                </div>
                <div class="field">
                  <span class="field-label">Max Rent:</span>
                  <span class="field-value">[webform_submission:values:rent_max] €</span>
                </div>
                <div class="field">
                  <span class="field-label">Min Surface:</span>
                  <span class="field-value">[webform_submission:values:surface_min] m²</span>
                </div>
                <div class="field">
                  <span class="field-label">Max Surface:</span>
                  <span class="field-value">[webform_submission:values:surface_max] m²</span>
                </div>
              {% endif %}

              <div class="field">
                <span class="field-label">Location:</span>
                <span class="field-value">[webform_submission:values:location]</span>
              </div>

              <hr>

              <div class="field">
                <span class="field-label">First name:</span>
                <span class="field-value">[webform_submission:values:first_name]</span>
              </div>
              <div class="field">
                <span class="field-label">Last name:</span>
                <span class="field-value">[webform_submission:values:last_name]</span>
              </div>
              <div class="field">
                <span class="field-label">Company:</span>
                <span class="field-value">[webform_submission:values:company]</span>
              </div>
              <div class="field">
                <span class="field-label">Function:</span>
                <span class="field-value">[webform_submission:values:function]</span>
              </div>
              <div class="field">
                <span class="field-label">Professional email:</span>
                <span class="field-value">[webform_submission:values:professional_email]</span>
              </div>
              <div class="field">
                <span class="field-label">Professional phone:</span>
                <span class="field-value">[webform_submission:values:professional_phone]</span>
              </div>

              {% if data.message %}
                <div class="field">
                  <span class="field-label">Message:</span>
                  <span class="field-value">[webform_submission:values:message]</span>
                </div>
              {% endif %}

              <hr>

              <div class="field">
                <span class="field-label">Opt-out Email:</span>
                <span class="field-value">[webform_submission:values:opt_out_email]</span>
              </div>
              {% if data.opt_out_email == '1' %}
                <div class="field">
                  <span class="field-label">Email opt-out text:</span>
                  <span class="field-value">I object to receiving commercial communications from BNP Paribas Real Estate Advisory France</span>
                </div>
              {% endif %}

              <div class="field">
                <span class="field-label">Opt-out SMS/MMS:</span>
                <span class="field-value">[webform_submission:values:opt_out_sms]</span>
              </div>
              {% if data.opt_out_sms == '1' %}
                <div class="field">
                  <span class="field-label">SMS/MMS opt-out text:</span>
                  <span class="field-value">I object to receiving commercial communications from BNP Paribas Real Estate Advisory France</span>
                </div>
              {% endif %}

              <div class="field">
                <span class="field-label">Opt-out Phone:</span>
                <span class="field-value">[webform_submission:values:opt_out_phone]</span>
              </div>
              {% if data.opt_out_phone == '1' %}
                <div class="field">
                  <span class="field-label">Phone opt-out text:</span>
                  <span class="field-value">I object to receiving commercial communications from BNP Paribas Real Estate Advisory France</span>
                </div>
              {% endif %}

              <p>Thank you for your interest in BNP Paribas Real Estate.</p>
              <p>Best regards,</p>
              <p><strong>Your Customer Service Team</strong><br>BNP Paribas Real Estate</p>
            </div>
            <div class="footer">
              © BNP Paribas Real Estate
            </div>
          </div>
        </body>
        </html>
      excluded_elements: {  }
      ignore_access: false
      exclude_empty: false
      exclude_empty_checkbox: false
      exclude_attachments: false
