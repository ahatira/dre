id: delegate_search
title: 'Delegate my search'
description: '<p>Real estate search delegation form in 3 steps</p>'
categories: {  }
elements: |-
  project:
    '#type': webform_wizard_page
    '#title': Project
    '#open': true
    '#next_button_label': Continue
    transaction_type:
      '#type': radios
      '#title': 'What type of transaction?'
      '#options':
        Rent: Rent
        Buy: Buy
        Indifferent: Indifferent
      '#default_value': Indifferent
      '#required': true
      '#attributes':
        class:
          - btn-group
          - btn-group-toggle
      '#wrapper_attributes':
        class:
          - btn-group-container
      '#options_attributes':
        Rent:
          class:
            - btn
            - btn-outline-primary
        Buy:
          class:
            - btn
            - btn-outline-primary
        Indifferent:
          class:
            - btn
            - btn-outline-primary
    property_type:
      '#type': radios
      '#title': 'What type of property are you looking for?'
      '#options':
        Office: Office
        Coworking: Coworking
        'Warehouse / Logistics': 'Warehouse / Logistics'
        'Commercial premises': 'Commercial premises'
        Retail: Retail
        Land: Land
        Mixed: Mixed
        Residential: Residential
        Hospitality: Hospitality
      '#default_value': Office
      '#required': true
      '#attributes':
        class:
          - btn-group
          - btn-group-toggle
      '#wrapper_attributes':
        class:
          - btn-group-container
      '#options_attributes':
        Office:
          class:
            - btn
            - btn-outline-primary
        Coworking:
          class:
            - btn
            - btn-outline-primary
        'Warehouse / Logistics':
          class:
            - btn
            - btn-outline-primary
        'Commercial premises':
          class:
            - btn
            - btn-outline-primary
        Retail:
          class:
            - btn
            - btn-outline-primary
        Land:
          class:
            - btn
            - btn-outline-primary
        Mixed:
          class:
            - btn
            - btn-outline-primary
        Residential:
          class:
            - btn
            - btn-outline-primary
        Hospitality:
          class:
            - btn
            - btn-outline-primary
    rent_min:
      '#type': number
      '#title': 'Min rent (HT/HC/m²/year)'
      '#suffix': ' €'
      '#step': any
      '#min': 0
      '#states':
        visible:
          - ':input[name="property_type"]':
              - '!value': Coworking
    rent_max:
      '#type': number
      '#title': 'Max rent (HT/HC/m²/year)'
      '#suffix': ' €'
      '#step': any
      '#min': 0
      '#states':
        visible:
          - ':input[name="property_type"]':
              - '!value': Coworking
    surface_min:
      '#type': number
      '#title': 'Min surface'
      '#suffix': ' m²'
      '#min': 0
      '#step': any
      '#states':
        visible:
          - ':input[name="property_type"]':
              - '!value': Coworking
    surface_max:
      '#type': number
      '#title': 'Max surface'
      '#suffix': ' m²'
      '#min': 0
      '#step': any
      '#states':
        visible:
          - ':input[name="property_type"]':
              - '!value': Coworking
    price_min:
      '#type': number
      '#title': 'Min price (HT/HH/HD)'
      '#suffix': ' €'
      '#step': any
      '#min': 0
      '#states':
        visible:
          - ':input[name="property_type"]':
              - value: Coworking
    price_max:
      '#type': number
      '#title': 'Max price (HT/HH/HD)'
      '#suffix': ' €'
      '#step': any
      '#min': 0
      '#states':
        visible:
          - ':input[name="property_type"]':
              - value: Coworking
    seat_min:
      '#type': number
      '#title': 'Min number of seats'
      '#min': 0
      '#states':
        visible:
          - ':input[name="property_type"]':
              - value: Coworking
    seat_max:
      '#type': number
      '#title': 'Max number of seats'
      '#min': 0
      '#states':
        visible:
          - ':input[name="property_type"]':
              - value: Coworking
    location:
      '#type': textfield
      '#title': Location
      '#description': 'City, district, postal code or building name'
      '#required': true
      '#placeholder': 'Enter a location'
  contact_details:
    '#type': webform_wizard_page
    '#title': 'Contact details'
    '#prev_button_label': Back
    '#next_button_label': Continue
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#required': true
      '#maxlength': 50
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#required': true
      '#maxlength': 50
    company:
      '#type': textfield
      '#title': Company
      '#maxlength': 100
    function:
      '#type': select
      '#title': Function
      '#options':
        asset_manager: 'Asset manager'
        consultant: Consultant
        investor: Investor
        other: Other
      '#empty_option': '-- Select --'
    professional_phone:
      '#type': tel
      '#title': 'Professional phone'
      '#required': true
      '#placeholder': '06 XX XX XX XX'
      '#pattern': '^[0-9\s\+\-\(\)]{10,}$'
    professional_email:
      '#type': email
      '#title': 'Professional email'
      '#required': true
      '#placeholder': name@domain.com
    opt_out_group:
      '#type': fieldset
      '#title': 'I object to receiving commercial communications'
      '#states':
        visible: {  }
      opt_out_email:
        '#type': checkbox
        '#title': Email
        '#description': 'I object to receiving commercial communications by email'
        '#return_value': 1
        '#default_value': 0
      opt_out_sms:
        '#type': checkbox
        '#title': 'SMS / MMS'
        '#description': 'I object to receiving commercial communications by SMS / MMS'
        '#return_value': 1
        '#default_value': 0
      opt_out_phone:
        '#type': checkbox
        '#title': Phone
        '#description': 'I object to receiving commercial communications by phone'
        '#return_value': 1
        '#default_value': 0
  page_message:
    '#type': webform_wizard_page
    '#title': Message
    '#prev_button_label': Back
    '#next_button_label': Continue
    message:
      '#type': textarea
      '#title': 'Would you like to specify your project?'
      '#description': 'Specify your project here'
      '#rows': 5
      '#placeholder': 'Describe your project in a few words...'
