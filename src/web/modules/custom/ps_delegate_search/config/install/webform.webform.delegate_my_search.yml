id: delegate_my_search
title: 'Delegate my search'
description: '<p>Real estate search delegation form in 3 steps</p>'
categories: {  }
elements: |-
  page_project:
    '#type': webform_wizard_page
    '#title': Project
    '#open': true
    '#next_button_label': Continue
    what_type_of_transaction:
      '#type': radios
      '#title': 'What type of transaction?'
      '#options':
        Rent: Rent
        Buy: Buy
        Indifferent: Indifferent
    what_type_of_property_are_you_looking_for:
      '#type': radios
      '#title': 'What type of property are you looking for?'
      '#options':
        Office: Office
        Coworking: Coworking
        'Warehouse / Logistics': 'Warehouse / Logistics'
        'Commercial premises': 'Commercial premises'
        Retail: Retail
        Land: Land
        Mixed: Mixed
        Residential: Residential
        Hospitality: Hospitality
    label_search_criteria:
      '#type': webform_markup
      '#markup': '<p><label data-drupal-selector="edit-search-criteria" for="edit-search-criteria"><strong>What are your search criteria?</strong></label></p>'
    min_rent_ht_hc_m2_year:
      '#type': number
      '#title': 'Min rent (HT/HC/m²/year)'
      '#title_display': none
      '#field_suffix': €
      '#placeholder': 'Min rent (HT/HC/m²/year)'
      '#autocomplete': ''
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            '!value': Coworking
      '#min': 0
    max_rent_ht_hc_m2_year:
      '#type': number
      '#title': 'Max rent (HT/HC/m²/year)'
      '#title_display': none
      '#field_suffix': €
      '#placeholder': 'Max rent (HT/HC/m²/year)'
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            '!value': Coworking
      '#min': 0
    min_surface:
      '#type': number
      '#title': 'Min surface'
      '#title_display': none
      '#field_suffix': m²
      '#placeholder': 'Min surface'
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            '!value': Coworking
    max_surface:
      '#type': number
      '#title': 'Max surface'
      '#title_display': none
      '#field_suffix': m²
      '#placeholder': 'Max surface'
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            '!value': Coworking
      '#min': 0
    min_price_ht_hh_hd:
      '#type': number
      '#title': 'Min price (HT/HH/HD)'
      '#title_display': none
      '#field_suffix': €
      '#placeholder': 'Min price (HT/HH/HD)'
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            value: Coworking
      '#min': 0
    max_price_ht_hh_hd:
      '#type': number
      '#title': 'Max price (HT/HH/HD)'
      '#title_display': none
      '#field_suffix': €
      '#placeholder': 'Max price (HT/HH/HD)'
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            '!value': Coworking
      '#min': 0
    min_number_of_seats:
      '#type': number
      '#title': 'Min number of seats'
      '#title_display': none
      '#placeholder': 'Min number of seats'
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            value: Coworking
    max_number_of_seats:
      '#type': number
      '#title': 'Max number of seats'
      '#title_display': none
      '#placeholder': 'Max number of seats'
      '#states':
        visible:
          ':input[name="what_type_of_property_are_you_looking_for"]':
            value: Coworking
    location:
      '#type': textfield
      '#title': Location
      '#title_display': none
      '#placeholder': 'City, district, postal code or building name'
      '#required': true
  page_contact_details:
    '#type': webform_wizard_page
    '#title': 'Contact details'
    '#open': true
    '#prev_button_label': Back
    '#next_button_label': Continue
    markup_contact_details:
      '#type': webform_markup
      '#markup': '<p><strong>What are your contact details?</strong></p>'
    last_name:
      '#type': textfield
      '#title': 'Last name'
      '#title_display': none
      '#placeholder': 'Last name'
    first_name:
      '#type': textfield
      '#title': 'First name'
      '#title_display': none
      '#placeholder': 'First name'
      '#required': true
    company:
      '#type': textfield
      '#title': Company
      '#title_display': none
      '#placeholder': Company
    function:
      '#type': select
      '#title': Function
      '#title_display': none
      '#options':
        asset_manager: 'Asset manager'
        consultant: Consultant
        investor: Investor
        other: Other
      '#empty_option': 'Select a function'
      '#select2': true
      '#required': true
    professional_phone:
      '#type': tel
      '#title': 'Professional phone'
      '#title_display': none
      '#placeholder': 'Professional phone*'
      '#required': true
      '#pattern': '^[0-9\s\+\-\(\)]{10,}$'
    professional_email:
      '#type': email
      '#title': 'Professional email'
      '#title_display': none
      '#placeholder': 'Professional email*'
      '#required': true
    rgpd:
      '#type': fieldset
      '#title': rgpd
      '#title_display': invisible
      markup_rgpd:
        '#type': webform_markup
        '#markup': '<p>I object to receiving commercial communications from BNP Paribas Real Estate Advisory France:</p>'
      opt_sms:
        '#type': checkbox
        '#title': SMS
      opt_phone:
        '#type': checkbox
        '#title': Phone
      opt_email:
        '#type': checkbox
        '#title': Email
  page_message:
    '#type': webform_wizard_page
    '#title': Message
    '#open': true
    '#prev_button_label': Back
    '#next_button_label': Continue
    would_you_like_to_specify_your_project:
      '#type': textarea
      '#title': 'Would you like to specify your project?'
  info:
    '#type': webform_markup
    '#markup': '<p><strong>Pressé ? Appelez-nous au</strong> <a href="tel:+33187586052">01 87 58 60 52</a></p><p>Du lundi au vendredi de 9h00 à 19h00.</p>'
