handlers:
  email:
    id: email
    handler_id: email
    label: 'Email confirmation'
    notes: ''
    status: true
    conditions: {  }
    weight: 0
    settings:
      states:
        - completed
      to_mail: '[webform_submission:values:professional_email]'
      to_options: {  }
      bcc_mail: ''
      bcc_options: {  }
      cc_mail: ''
      cc_options: {  }
      from_mail: _default
      from_options: {  }
      from_name: _default
      reply_to: ''
      return_path: ''
      sender_mail: ''
      sender_name: ''
      subject: 'Your request has been sent'
      body: '<div class="container"><div class="header"><h1>Your request has been sent</h1></div><div class="content"><p>Hello,</p><p>Your request has been successfully transmitted. We will contact you very shortly.</p><h3>For your reference, your request is as follows:</h3><div class="field"><span class="field-label">Your request:</span> <span class="field-value">I would like to delegate my search</span></div><div class="field"><span class="field-label">Search type:</span> <span class="field-value">[webform_submission:values:transaction_type] - [webform_submission:values:property_type]</span></div><p>{# Display criteria based on property type #} {% if data.property_type == ''Coworking'' %}</p><div class="field"><span class="field-label">Min Price:</span> <span class="field-value">[webform_submission:values:price_min] €</span></div><div class="field"><span class="field-label">Max Price:</span> <span class="field-value">[webform_submission:values:price_max] €</span></div><div class="field"><span class="field-label">Min Seats:</span> <span class="field-value">[webform_submission:values:seat_min]</span></div><div class="field"><span class="field-label">Max Seats:</span> <span class="field-value">[webform_submission:values:seat_max]</span></div><p>{% else %}</p><div class="field"><span class="field-label">Min Rent:</span> <span class="field-value">[webform_submission:values:rent_min] €</span></div><div class="field"><span class="field-label">Max Rent:</span> <span class="field-value">[webform_submission:values:rent_max] €</span></div><div class="field"><span class="field-label">Min Surface:</span> <span class="field-value">[webform_submission:values:surface_min] m²</span></div><div class="field"><span class="field-label">Max Surface:</span> <span class="field-value">[webform_submission:values:surface_max] m²</span></div><p>{% endif %}</p><div class="field"><span class="field-label">Location:</span> <span class="field-value">[webform_submission:values:location]</span></div><hr><div class="field"><span class="field-label">First name:</span> <span class="field-value">[webform_submission:values:first_name]</span></div><div class="field"><span class="field-label">Last name:</span> <span class="field-value">[webform_submission:values:last_name]</span></div><div class="field"><span class="field-label">Company:</span> <span class="field-value">[webform_submission:values:company]</span></div><div class="field"><span class="field-label">Function:</span> <span class="field-value">[webform_submission:values:function]</span></div><div class="field"><span class="field-label">Professional email:</span> <span class="field-value">[webform_submission:values:professional_email]</span></div><div class="field"><span class="field-label">Professional phone:</span> <span class="field-value">[webform_submission:values:professional_phone]</span></div><p>{% if data.message %}</p><div class="field"><span class="field-label">Message:</span> <span class="field-value">[webform_submission:values:message]</span></div><p>{% endif %}&nbsp;</p><hr><div class="field"><span class="field-label">Opt-out Email:</span> <span class="field-value">[webform_submission:values:opt_out_email]</span></div><p>{% if data.opt_out_email == ''1'' %}</p><div class="field"><span class="field-label">Email opt-out text:</span> <span class="field-value">I object to receiving commercial communications from BNP Paribas Real Estate Advisory France</span></div><p>{% endif %}</p><div class="field"><span class="field-label">Opt-out SMS/MMS:</span> <span class="field-value">[webform_submission:values:opt_out_sms]</span></div><p>{% if data.opt_out_sms == ''1'' %}</p><div class="field"><span class="field-label">SMS/MMS opt-out text:</span> <span class="field-value">I object to receiving commercial communications from BNP Paribas Real Estate Advisory France</span></div><p>{% endif %}</p><div class="field"><span class="field-label">Opt-out Phone:</span> <span class="field-value">[webform_submission:values:opt_out_phone]</span></div><p>{% if data.opt_out_phone == ''1'' %}</p><div class="field"><span class="field-label">Phone opt-out text:</span> <span class="field-value">I object to receiving commercial communications from BNP Paribas Real Estate Advisory France</span></div><p>{% endif %}</p><p>Thank you for your interest in BNP Paribas Real Estate.</p><p>Best regards,</p><p><strong>Your Customer Service Team</strong><br>BNP Paribas Real Estate</p></div><div class="footer">© BNP Paribas Real Estate</div></div>'
