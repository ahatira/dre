ps_demo.settings:
  type: config_object
  label: 'PS Demo settings'
  mapping:
    front_page:
      type: string
      label: 'Front page internal path'
    homepage_uuid:
      type: uuid
      label: 'Homepage node UUID (export reference)'

ps_demo.homepage:
  type: config_object
  label: 'PS Demo homepage metadata'
  mapping:
    node:
      type: mapping
      label: 'Homepage node metadata'
      mapping:
        titles:
          type: ignore
          label: 'Titles per langcode'
        path:
          type: ignore
          label: 'URL aliases per langcode (without leading slash)'
