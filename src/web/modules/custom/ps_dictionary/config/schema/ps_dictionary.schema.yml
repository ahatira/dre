field.storage_settings.ps_dictionary:
  type: mapping
  label: 'ps_dictionary field storage settings'
  mapping: {}

field.field_settings.ps_dictionary:
  type: mapping
  label: 'ps_dictionary field settings'
  mapping:
    dictionary_type:
      type: string
      label: 'Dictionary type'

ps_dictionary.type.*:
  type: config_entity
  label: 'Dictionary type'
  mapping:
    id:
      type: string
      label: 'ID'
    label:
      type: label
      label: 'Label'
      translatable: true
    description:
      type: label
      label: 'Description'
      translatable: true

ps_dictionary.entry.*:
  type: config_entity
  label: 'Dictionary entry'
  mapping:
    id:
      type: string
      label: 'ID'
    type:
      type: string
      label: 'Dictionary type'
    code:
      type: string
      label: 'Code'
    label:
      type: label
      label: 'Label'
      translatable: true
    description:
      type: label
      label: 'Description'
      translatable: true
    icon:
      type: string
      label: 'UI Icon'
      nullable: true
    weight:
      type: integer
      label: 'Weight'

ps_dictionary.import_governance:
  type: config_object
  label: 'Dictionary import governance settings'
  mapping:
    csv_import:
      type: mapping
      label: 'CSV import defaults'
      mapping:
        preserve_existing_labels:
          type: boolean
          label: 'Preserve existing labels on CSV update'
        lock_on_import:
          type: boolean
          label: 'Lock entries on CSV import'
    bo_create:
      type: mapping
      label: 'Back-office creation defaults'
      mapping:
        default_internal_lock:
          type: boolean
          label: 'Default internal lock for new entries'
    crm_lookup:
      type: mapping
      label: 'CRM lookup defaults'
      mapping:
        preserve_existing_labels:
          type: boolean
          label: 'Preserve existing labels from CRM lookup'
