block.settings.ps_homepage_search_hero_block:
  type: mapping
  label: 'Search hero (homepage) block'
  mapping:
    background_image:
      type: integer
      label: 'Hero background file ID'
      nullable: true
    promo_background_image:
      type: integer
      label: 'Promo background file ID'
      nullable: true
    background_alt:
      type: string
      label: 'Hero background alt'
    promo_background_alt:
      type: string
      label: 'Promo background alt'
    promo_offers_use_dynamic:
      type: boolean
      label: 'Use dynamic Solr offer count'
    title:
      type: string
      label: 'Title'
    promo_offers_template:
      type: string
      label: 'Offers line template'

block.settings.ps_homepage_section_header_block:
  type: mapping
  label: 'Homepage section header block'
  mapping:
    title:
      type: string
      label: 'Title'
    subtitle:
      type: string
      label: 'Subtitle'
    align:
      type: string
      label: 'Alignment'
    accent:
      type: string
      label: 'Accent'

block.settings.ps_homepage_section_footer_block:
  type: mapping
  label: 'Homepage section footer block'
  mapping:
    cta_label:
      type: string
      label: 'CTA label'
    cta_url:
      type: string
      label: 'CTA URL'
    cta_style:
      type: string
      label: 'CTA style'

ps_homepage.settings:
  type: config_object
  label: 'PS Homepage settings'
  mapping:
    homepage_uuid:
      type: string
      label: 'Homepage node UUID'
    front_page:
      type: string
      label: 'Front page path'

ps_homepage.homepage:
  type: config_object
  label: 'PS Homepage node metadata'
  mapping:
    node:
      type: mapping
      mapping:
        titles:
          type: mapping
          label: 'Node titles per language'
        path:
          type: mapping
          label: 'Path aliases per language'
