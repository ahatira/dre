ps_content_outils_accordion_block:
  es:
    title: 'Abordar mejor su proyecto inmobiliario'
    subtitle: 'Todas las herramientas de ayuda a la decisión desarrolladas por BNP Paribas Real Estate tienen un objetivo común: permitirle afinar sus criterios y optimizar sus búsquedas.'
    items:
      - weight: 0
        illustration: null
        question: '¿Oficinas clásicas o coworking? ¡Haga la prueba!'
        answer: '<p>Responda a las 10 preguntas del simulador para obtener un diagnóstico personalizado.</p><p>Esta herramienta analiza sus modos de trabajo, sus necesidades y su perfil para orientarle hacia la solución más adecuada.</p>'
        link_label: 'Abrir el simulador'
        link_url: /outils/simulateur-location-bureaux-coworking
        button_style: outline
        opened_by_default: true
      - weight: 1
        illustration: null
        question: 'Calculadora de superficie de oficinas'
        answer: '<p>Simple y rápida de usar, la calculadora de superficie le permite definir en unos clics los m² que se ajustan a sus necesidades según su plantilla, espacios comunes y organización del trabajo.</p>'
        link_label: 'Iniciar la calculadora'
        link_url: /outils/calculateur-de-surface-bureaux
        button_style: outline
        opened_by_default: false
      - weight: 2
        illustration: null
        question: 'Guías y consejos'
        answer: '<p>¡Descubra todas nuestras guías prácticas para optimizar su búsqueda inmobiliaria!</p><p>Desde la comprensión de los contratos de arrendamiento comercial hasta las tendencias del mercado, nuestros recursos le dan las claves para el éxito de su proyecto.</p>'
        link_label: 'Descubrir la colección'
        link_url: /guides/guides-conseils
        button_style: outline

