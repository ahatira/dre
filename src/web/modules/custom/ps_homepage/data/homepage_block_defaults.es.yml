ps_content_experts_accompagnement_block:
  es:
    title: 'Nuestros expertos le acompañan'
    subtitle: 'Sea cual sea su proyecto inmobiliario de empresa, un experto dedicado de BNP Paribas Real Estate le acompaña en cada paso.'
    steps:
      - weight: 0
        image: null
        image_alt: 'Proyecto inmobiliario BNPPRE'
        image_credit: 'nenetus - Adobe Stock'
        step_label: 'Definición de necesidades'
        step_title: 'Cuéntenos su proyecto'
        step_body: 'Formalizamos juntos un pliego de condiciones claro y preciso. Revisamos todas las variables para clarificar sus necesidades y priorizar sus requisitos: superficie, ubicación, accesibilidad, presupuesto, plazos, restricciones técnicas y evoluciones futuras. Le enviamos después los anuncios adaptados a este pliego.'
      - weight: 1
        image: null
        image_alt: 'Visita del inmueble BNP Paribas Real Estate'
        image_credit: 'tsyhun - Shutterstock'
        step_label: 'Visita del inmueble'
        step_title: '¡Programemos una visita!'
        step_body: 'Dos tipos de visita: en el lugar con un consultor que responde a todas sus preguntas, o visita inmersiva para algunos anuncios, que le permite explorar los espacios a distancia y preseleccionar sus favoritos antes de desplazarse.'
      - weight: 2
        image: null
        image_alt: 'Contractualización BNP Paribas Real Estate'
        image_credit: 'Andrey_Popov - Shutterstock'
        step_label: Contractualización
        step_title: 'Velamos por preservar sus intereses'
        step_body: 'Negociación del contrato de arrendamiento, precio de venta, contractualización… En cada etapa le acompañamos para tomar decisiones informadas. Nuestros equipos analizan las cláusulas, identifican puntos de vigilancia y negocian las mejores condiciones.'
      - weight: 3
        image: null
        image_alt: 'Acondicionamiento de locales profesionales'
        image_credit: 'Who is Danny - Adobe Stock'
        step_label: 'Acondicionamiento de locales'
        step_title: 'Le aconsejamos en el acondicionamiento de sus locales'
        step_body: 'Implemente nuevos modos de trabajo y espacios dedicados al bienestar de sus empleados para ganar competitividad y atraer el mejor talento. Del flex office a los espacios de colaboración, le ayudamos a diseñar un entorno que impulse su rendimiento.'
      - weight: 4
        image: null
        image_alt: 'Acompañamiento continuo BNP Paribas Real Estate'
        image_credit: 'marvent - Shutterstock'
        step_label: Instalación
        step_title: 'El acompañamiento continúa…'
        step_body: 'Ya tiene bases sólidas para construir el futuro de su empresa. El acompañamiento de BNP Paribas Real Estate no termina ahí: presentes en todos los negocios inmobiliarios, siempre tendremos una solución para sus proyectos futuros.'

