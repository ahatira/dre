ps_content_experts_accompagnement_block:
  it:
    title: 'I nostri esperti la accompagnano'
    subtitle: 'Qualunque sia il suo progetto immobiliare d''impresa, un esperto dedicato di BNP Paribas Real Estate la accompagna in ogni fase.'
    steps:
      - weight: 0
        image: null
        image_alt: 'Progetto immobiliare BNPPRE'
        image_credit: 'nenetus - Adobe Stock'
        step_label: 'Definizione delle esigenze'
        step_title: 'Ci parli del suo progetto'
        step_body: 'Formalizziamo insieme un capitolato chiaro e preciso. Esaminiamo tutte le variabili per chiarire le sue esigenze e prioritizzare i suoi requisiti: superficie, ubicazione, accessibilità, budget, tempistiche, vincoli tecnici ed evoluzioni future. Le inviamo poi gli annunci adatti a questo capitolato.'
      - weight: 1
        image: null
        image_alt: 'Visita dell''immobile BNP Paribas Real Estate'
        image_credit: 'tsyhun - Shutterstock'
        step_label: 'Visita dell''immobile'
        step_title: 'Programmiamo una visita!'
        step_body: 'Due tipi di visita: sul posto con un consulente che risponde a tutte le sue domande, oppure visita immersiva per alcuni annunci, che le permette di esplorare gli spazi a distanza e preselezionare i suoi preferiti prima di spostarsi.'
      - weight: 2
        image: null
        image_alt: 'Contrattualizzazione BNP Paribas Real Estate'
        image_credit: 'Andrey_Popov - Shutterstock'
        step_label: Contrattualizzazione
        step_title: 'Vigiliamo per tutelare i suoi interessi'
        step_body: 'Negoziazione del contratto di locazione, prezzo di vendita, contrattualizzazione… In ogni fase la accompagniamo per prendere decisioni informate. I nostri team analizzano le clausole, identificano i punti di attenzione e negoziano le migliori condizioni.'
      - weight: 3
        image: null
        image_alt: 'Adeguamento dei locali professionali'
        image_credit: 'Who is Danny - Adobe Stock'
        step_label: 'Adeguamento dei locali'
        step_title: 'La consigliamo sull''adeguamento dei suoi locali'
        step_body: 'Implementi nuove modalità di lavoro e spazi dedicati al benessere dei suoi dipendenti per guadagnare competitività e attrarre i migliori talenti. Dal flex office agli spazi di collaborazione, la aiutiamo a progettare un ambiente che stimoli le sue performance.'
      - weight: 4
        image: null
        image_alt: 'Accompagnamento continuo BNP Paribas Real Estate'
        image_credit: 'marvent - Shutterstock'
        step_label: Installazione
        step_title: 'L''accompagnamento continua…'
        step_body: 'Ha già solide basi per costruire il futuro della sua azienda. L''accompagnamento di BNP Paribas Real Estate non finisce qui: presenti in tutte le linee di business immobiliare, avremo sempre una soluzione per i suoi progetti futuri.'

