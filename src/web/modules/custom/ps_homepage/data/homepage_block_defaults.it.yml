ps_content_outils_accordion_block:
  it:
    title: 'Affrontare al meglio il suo progetto immobiliare'
    subtitle: 'Tutti gli strumenti di supporto decisionale sviluppati da BNP Paribas Real Estate hanno un obiettivo comune: permetterle di affinare i suoi criteri e ottimizzare le sue ricerche.'
    items:
      - weight: 0
        illustration: null
        question: 'Uffici classici o coworking? Faccia il test!'
        answer: '<p>Risponda alle 10 domande del simulatore per ottenere una diagnosi personalizzata.</p><p>Questo strumento analizza le sue modalità di lavoro, le sue esigenze e il suo profilo per orientarla verso la soluzione più adatta.</p>'
        link_label: 'Aprire il simulatore'
        link_url: /outils/simulateur-location-bureaux-coworking
        button_style: outline
        opened_by_default: true
      - weight: 1
        illustration: null
        question: 'Calcolatore di superficie uffici'
        answer: '<p>Facile e rapido da usare, il calcolatore di superficie le permette di definire in pochi clic i m² adatti alle sue esigenze in base al personale, agli spazi comuni e all''organizzazione del lavoro.</p>'
        link_label: 'Avviare il calcolatore'
        link_url: /outils/calculateur-de-surface-bureaux
        button_style: outline
        opened_by_default: false
      - weight: 2
        illustration: null
        question: 'Guide e consigli'
        answer: '<p>Scopra tutte le nostre guide pratiche per ottimizzare la sua ricerca immobiliare!</p><p>Dalla comprensione dei contratti di locazione commerciale alle tendenze di mercato, le nostre risorse le forniscono le chiavi per il successo del suo progetto.</p>'
        link_label: 'Scoprire la raccolta'
        link_url: /guides/guides-conseils
        button_style: outline

