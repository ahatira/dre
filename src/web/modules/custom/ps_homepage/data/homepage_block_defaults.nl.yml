ps_content_outils_accordion_block:
  nl:
    title: 'Uw vastgoedproject optimaal benaderen'
    subtitle: 'Alle beslissingshulpmiddelen ontwikkeld door BNP Paribas Real Estate hebben een gemeenschappelijk doel: u helpen uw criteria te verfijnen en uw zoekopdrachten te optimaliseren.'
    items:
      - weight: 0
        illustration: null
        question: 'Klassieke kantoren of coworking? Doe de test!'
        answer: '<p>Beantwoord de 10 vragen van de simulator voor een gepersonaliseerde diagnose.</p><p>Dit hulpmiddel analyseert uw werkwijzen, behoeften en profiel om u naar de meest geschikte oplossing te leiden.</p>'
        link_label: 'Simulator openen'
        link_url: /outils/simulateur-location-bureaux-coworking
        button_style: outline
        opened_by_default: true
      - weight: 1
        illustration: null
        question: 'Kantooroppervlaktecalculator'
        answer: '<p>Eenvoudig en snel te gebruiken: met de oppervlaktecalculator bepaalt u in enkele klikken de m² die aansluiten bij uw behoeften op basis van personeelsbezetting, gemeenschappelijke ruimtes en werkwijze.</p>'
        link_label: 'Calculator starten'
        link_url: /outils/calculateur-de-surface-bureaux
        button_style: outline
        opened_by_default: false
      - weight: 2
        illustration: null
        question: 'Gidsen en tips'
        answer: '<p>Ontdek al onze praktische gidsen om uw vastgoedzoektocht te optimaliseren!</p><p>Van het begrijpen van commerciële huurovereenkomsten tot markttrends: onze bronnen geven u de sleutels voor het succes van uw project.</p>'
        link_label: 'Collectie ontdekken'
        link_url: /guides/guides-conseils
        button_style: outline

