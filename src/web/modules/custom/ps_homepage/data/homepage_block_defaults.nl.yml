ps_content_experts_accompagnement_block:
  nl:
    title: 'Onze experts begeleiden u'
    subtitle: 'Welk bedrijfsvastgoedproject u ook heeft, een toegewijde BNP Paribas Real Estate-expert begeleidt u bij elke stap.'
    steps:
      - weight: 0
        image: null
        image_alt: 'Vastgoedproject BNPPRE'
        image_credit: 'nenetus - Adobe Stock'
        step_label: 'Behoeftebepaling'
        step_title: 'Vertel ons over uw project'
        step_body: 'We stellen samen een duidelijk en precies lastenboek op. We bekijken alle variabelen om uw behoeften te verduidelijken en uw vereisten te prioriteren: oppervlakte, locatie, bereikbaarheid, budget, timing, technische beperkingen en toekomstige ontwikkelingen. Daarna sturen we u de advertenties die passen bij dit lastenboek.'
      - weight: 1
        image: null
        image_alt: 'Bezichtiging van het pand BNP Paribas Real Estate'
        image_credit: 'tsyhun - Shutterstock'
        step_label: 'Bezichtiging van het pand'
        step_title: 'Laten we een bezichtiging plannen!'
        step_body: 'Twee soorten bezichtigingen: ter plaatse met een consultant die al uw vragen beantwoordt, of een immersieve bezichtiging voor sommige advertenties, waarmee u de ruimtes op afstand kunt verkennen en uw favorieten kunt preselecteren voordat u zich verplaatst.'
      - weight: 2
        image: null
        image_alt: 'Contractualisering BNP Paribas Real Estate'
        image_credit: 'Andrey_Popov - Shutterstock'
        step_label: Contractualisering
        step_title: 'Wij waken over uw belangen'
        step_body: 'Onderhandeling over de huurovereenkomst, verkoopprijs, contractualisering… Bij elke stap begeleiden we u om weloverwogen beslissingen te nemen. Onze teams analyseren de clausules, identificeren aandachtspunten en onderhandelen de beste voorwaarden.'
      - weight: 3
        image: null
        image_alt: 'Inrichting van bedrijfsruimtes'
        image_credit: 'Who is Danny - Adobe Stock'
        step_label: 'Inrichting van ruimtes'
        step_title: 'Wij adviseren u over de inrichting van uw ruimtes'
        step_body: 'Implementeer nieuwe werkwijzen en ruimtes voor het welzijn van uw medewerkers om competitiever te worden en het beste talent aan te trekken. Van flex office tot samenwerkingsruimtes: wij helpen u een omgeving te ontwerpen die uw prestaties stimuleert.'
      - weight: 4
        image: null
        image_alt: 'Doorlopende begeleiding BNP Paribas Real Estate'
        image_credit: 'marvent - Shutterstock'
        step_label: Installatie
        step_title: 'De begeleiding gaat door…'
        step_body: 'U heeft al een solide basis om de toekomst van uw bedrijf op te bouwen. De begeleiding van BNP Paribas Real Estate stopt daar niet: aanwezig in alle vastgoedlijnen hebben we altijd een oplossing voor uw toekomstige projecten.'

