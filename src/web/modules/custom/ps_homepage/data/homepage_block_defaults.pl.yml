ps_content_experts_accompagnement_block:
  pl:
    title: 'Nasi eksperci towarzyszą Panu/Pani'
    subtitle: 'Niezależnie od projektu nieruchomości komercyjnej, dedykowany ekspert BNP Paribas Real Estate towarzyszy na każdym etapie.'
    steps:
      - weight: 0
        image: null
        image_alt: 'Projekt nieruchomościowy BNPPRE'
        image_credit: 'nenetus - Adobe Stock'
        step_label: 'Określenie potrzeb'
        step_title: 'Opowiedz nam o swoim projekcie'
        step_body: 'Wspólnie formalizujemy jasny i precyzyjny program wymagań. Analizujemy wszystkie zmienne, aby wyjaśnić potrzeby i ustalić priorytety: powierzchnia, lokalizacja, dostępność, budżet, terminy, ograniczenia techniczne i przyszłe zmiany. Następnie przesyłamy ogłoszenia dopasowane do tego programu.'
      - weight: 1
        image: null
        image_alt: 'Wizyta na nieruchomości BNP Paribas Real Estate'
        image_credit: 'tsyhun - Shutterstock'
        step_label: 'Wizyta na nieruchomości'
        step_title: 'Umówmy wizytę!'
        step_body: 'Dwa rodzaje wizyt: na miejscu z konsultantem, który odpowie na wszystkie pytania, lub wizyta immersyjna dla niektórych ogłoszeń, umożliwiająca zdalne poznanie przestrzeni i wstępną selekcję ulubionych przed dojazdem.'
      - weight: 2
        image: null
        image_alt: 'Kontraktualizacja BNP Paribas Real Estate'
        image_credit: 'Andrey_Popov - Shutterstock'
        step_label: Kontraktualizacja
        step_title: 'Dbamy o ochronę Pana/Pani interesów'
        step_body: 'Negocjacje umowy najmu, ceny sprzedaży, kontraktualizacja… Na każdym etapie towarzyszymy, aby podejmować świadome decyzje. Nasze zespoły analizują klauzule, identyfikują punkty wymagające uwagi i negocjują najlepsze warunki.'
      - weight: 3
        image: null
        image_alt: 'Dostosowanie lokali profesjonalnych'
        image_credit: 'Who is Danny - Adobe Stock'
        step_label: 'Dostosowanie lokali'
        step_title: 'Doradzamy w dostosowaniu lokali'
        step_body: 'Wprowadź nowe modele pracy i przestrzenie dedykowane dobrostanowi pracowników, aby zyskać przewagę konkurencyjną i przyciągnąć najlepsze talenty. Od flex office po przestrzenie współpracy — pomagamy zaprojektować środowisko wspierające wydajność.'
      - weight: 4
        image: null
        image_alt: 'Ciągłe wsparcie BNP Paribas Real Estate'
        image_credit: 'marvent - Shutterstock'
        step_label: Instalacja
        step_title: 'Wsparcie trwa dalej…'
        step_body: 'Ma Pan/Pani już solidne podstawy do budowy przyszłości firmy. Wsparcie BNP Paribas Real Estate na tym się nie kończy: obecni we wszystkich liniach biznesu nieruchomościowego, zawsze mamy rozwiązanie dla przyszłych projektów.'

