ps_content_outils_accordion_block:
  pl:
    title: 'Jak najlepiej podejść do projektu nieruchomościowego'
    subtitle: 'Wszystkie narzędzia wspierające decyzje opracowane przez BNP Paribas Real Estate mają wspólny cel: umożliwić doprecyzowanie kryteriów i optymalizację poszukiwań.'
    items:
      - weight: 0
        illustration: null
        question: 'Biura klasyczne czy coworking? Sprawdź!'
        answer: '<p>Odpowiedz na 10 pytań symulatora, aby uzyskać spersonalizowaną diagnozę.</p><p>To narzędzie analizuje sposoby pracy, potrzeby i profil, aby skierować Cię ku najbardziej odpowiedniemu rozwiązaniu.</p>'
        link_label: 'Otwórz symulator'
        link_url: /outils/simulateur-location-bureaux-coworking
        button_style: outline
        opened_by_default: true
      - weight: 1
        illustration: null
        question: 'Kalkulator powierzchni biurowej'
        answer: '<p>Prosty i szybki w użyciu kalkulator powierzchni pozwala w kilka kliknięć określić m² dopasowane do potrzeb w oparciu o liczebność zespołu, przestrzenie wspólne i organizację pracy.</p>'
        link_label: 'Uruchom kalkulator'
        link_url: /outils/calculateur-de-surface-bureaux
        button_style: outline
        opened_by_default: false
      - weight: 2
        illustration: null
        question: 'Poradniki i wskazówki'
        answer: '<p>Odkryj wszystkie nasze praktyczne poradniki, aby zoptymalizować poszukiwania nieruchomości!</p><p>Od zrozumienia umów najmu komercyjnego po trendy rynkowe — nasze materiały dają klucze do sukcesu projektu.</p>'
        link_label: 'Przeglądaj kolekcję'
        link_url: /guides/guides-conseils
        button_style: outline

