ps_content_experts_accompagnement_block:
  en:
    title: 'Our experts support you'
    subtitle: 'Whatever your corporate real estate project, a dedicated BNP Paribas Real Estate expert will accompany you every step of the way. This proven methodology ensures that every dimension of your project is taken into account, from defining your requirements through to your move-in and beyond.'
    steps:
      - weight: 0
        image: null
        image_alt: 'BNP PRE real estate project'
        image_credit: 'nenetus - Adobe Stock'
        step_label: 'Need definition'
        step_title: 'Tell us about your project'
        step_body: 'Together we draw up a clear and precise specification. Every variable is reviewed to clarify your needs and prioritise your requirements: floor area, location, accessibility, budget, timelines, technical constraints and future developments. We then send you listings matched to this specification.'
      - weight: 1
        image: null
        image_alt: 'Property visit BNP Paribas Real Estate'
        image_credit: 'tsyhun - Shutterstock'
        step_label: 'Property visit'
        step_title: "Let's schedule a visit!"
        step_body: 'Two types of visit are available: an on-site property visit with a consultant who answers all your questions, or an immersive visit for some of our listings, allowing you to explore remotely and shortlist your favourite properties before travelling.'
      - weight: 2
        image: null
        image_alt: 'Contracting BNP Paribas Real Estate'
        image_credit: 'Andrey_Popov - Shutterstock'
        step_label: Contracting
        step_title: 'We safeguard your interests'
        step_body: 'Lease negotiation, sale price, contracting… At every stage, we support you so you can make informed decisions. Our teams analyse clauses, identify points of attention and negotiate the best terms to secure your commitment.'
      - weight: 3
        image: null
        image_alt: 'Fitting out business premises'
        image_credit: 'Who is Danny - Adobe Stock'
        step_label: 'Premises fitting out'
        step_title: 'We advise you on fitting out your premises'
        step_body: 'Implement new ways of working and spaces dedicated to employee wellbeing and gain competitiveness while attracting the best talent. From flex office to collaboration spaces, we help you design an environment that supports your performance.'
      - weight: 4
        image: null
        image_alt: 'Ongoing support BNP Paribas Real Estate'
        image_credit: 'marvent - Shutterstock'
        step_label: Move-in
        step_title: 'Support continues…'
        step_body: "You now have solid foundations to build your company's future. BNP Paribas Real Estate support does not stop there. Present across all real estate businesses, we will always have a solution for your future projects, whether rethinking your workspaces or optimising your property portfolio."
  fr:
    title: 'Nos experts vous accompagnent'
    subtitle: "Quel que soit votre projet immobilier d'entreprise, un expert BNP Paribas Real Estate dédié vous accompagne étape par étape. Cette méthodologie éprouvée garantit que chaque dimension de votre projet est prise en compte, de la définition de vos besoins jusqu'à votre installation et au-delà."
    steps:
      - weight: 0
        image: null
        image_alt: 'Projet Immobilier BNPPRE'
        image_credit: 'nenetus - Adobe Stock'
        step_label: 'Définition du besoin'
        step_title: 'Parlez-nous de votre projet'
        step_body: 'Nous formalisons ensemble un cahier des charges clair et précis. Toutes les variables sont passées en revue pour clarifier vos besoins et prioriser vos impératifs : surface, localisation, accessibilité, budget, délais, contraintes techniques et évolutions futures. Nous vous envoyons ensuite les annonces adaptées à ce cahier des charges.'
      - weight: 1
        image: null
        image_alt: 'Visite du bien BNP Paribas Real Estate'
        image_credit: 'tsyhun - Shutterstock'
        step_label: 'Visite du bien'
        step_title: 'Programmons une visite !'
        step_body: "Deux types de visite s'offrent à vous : la visite du bien sur place, avec un consultant qui répond à toutes vos questions, ou bien la visite immersive pour certaines de nos annonces, qui vous permet d'explorer les lieux à distance et de présélectionner vos biens favoris avant de vous déplacer."
      - weight: 2
        image: null
        image_alt: 'Contractualisation BNP Paribas Real Estate'
        image_credit: 'Andrey_Popov - Shutterstock'
        step_label: Contractualisation
        step_title: 'Nous veillons à préserver vos intérêts'
        step_body: 'Négociation du bail, du prix de vente, contractualisation… À chaque étape, nous vous accompagnons pour vous permettre de prendre des décisions éclairées. Nos équipes analysent les clauses, identifient les points de vigilance et négocient les meilleures conditions pour sécuriser votre engagement.'
      - weight: 3
        image: null
        image_alt: 'Aménagement des locaux professionnels'
        image_credit: 'Who is Danny - Adobe Stock'
        step_label: 'Aménagement des locaux'
        step_title: "Nous vous conseillons dans l'aménagement de vos locaux."
        step_body: 'Mettez en place de nouveaux modes de travail et des espaces dédiés au bien-être de vos collaborateurs et gagnez ainsi en compétitivité tout en attirant les meilleurs talents. Du flex office aux espaces de collaboration, nous vous aidons à concevoir un environnement qui soutient votre performance.'
      - weight: 4
        image: null
        image_alt: 'Accompagnement continu BNP Paribas Real Estate'
        image_credit: 'marvent - Shutterstock'
        step_label: "L'installation"
        step_title: "L'accompagnement continue…"
        step_body: "Vous voilà avec des fondations solides pour construire le futur de votre entreprise. L'accompagnement BNP Paribas Real Estate ne s'arrête pas là pour autant. Présents sur l'ensemble des métiers de l'immobilier, nous aurons toujours une solution à vos projets futurs, qu'il s'agisse de repenser vos espaces de travail ou d'optimiser votre parc immobilier."

