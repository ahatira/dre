services:
  logger.channel.ps_homepage:
    parent: logger.channel_base
    arguments: ['ps_homepage']

  _defaults:
    autowire: true
    autoconfigure: true

  Drupal\ps_homepage\Hook\HomepageLayoutEntityHooks:
    arguments:
      - '@ps_homepage.layout_structure_synchronizer'

  Drupal\ps_homepage\Hook\HomepageLayoutBuilderFormHooks: ~

  ps_homepage.offer_count_provider:
    class: Drupal\ps_homepage\Service\HomepageOfferCountProvider
    arguments:
      - '@ps_search.content_language_resolver'
      - '@language_manager'
      - '@request_stack'
      - '@?ps_search.solr_circuit_breaker'

  ps_homepage.cta_link_builder:
    alias: ps_content.content_cta_link_builder

  ps_homepage.media_resolver:
    alias: ps_content.content_media_resolver

  ps_homepage.media_library_form_element_builder:
    class: Drupal\ps_homepage\Form\HomepageMediaLibraryFormElementBuilder
    arguments:
      - '@entity_type.manager'
      - '@ps_content.content_media_resolver'
      - '@media_library.ui_builder'

  ps_homepage.media_library_opener.homepage_block:
    class: Drupal\ps_homepage\Form\HomepageBlockMediaLibraryOpener
    tags:
      - { name: media_library.opener }

  ps_homepage.media_migrator:
    class: Drupal\ps_homepage\Service\HomepageMediaMigrator
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.layout_persister'

  ps_homepage.expert_journey_default_assets:
    alias: ps_content.expert_journey_default_assets

  ps_homepage.faq_config_refresher:
    class: Drupal\ps_homepage\Service\HomepageFaqConfigRefresher
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.block_defaults_loader'
      - '@config.factory'
      - '@?ps_faq.faq_default_items'
      - '@ps_homepage.layout_persister'

  ps_homepage.market_study_config_refresher:
    class: Drupal\ps_homepage\Service\HomepageMarketStudyConfigRefresher
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.block_defaults_loader'
      - '@config.factory'
      - '@?ps_market_study.market_study_default_items'
      - '@?ps_market_study.market_study_list_path_resolver'
      - '@ps_homepage.layout_persister'

  ps_homepage.services_config_refresher:
    class: Drupal\ps_homepage\Service\HomepageServicesConfigRefresher
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.block_defaults_loader'
      - '@config.factory'
      - '@ps_homepage.layout_persister'

  ps_homepage.tools_config_refresher:
    class: Drupal\ps_homepage\Service\HomepageToolsConfigRefresher
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.block_defaults_loader'
      - '@config.factory'
      - '@ps_homepage.layout_persister'

  ps_homepage.expert_journey_config_refresher:
    class: Drupal\ps_homepage\Service\HomepageExpertJourneyConfigRefresher
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.default_layout_builder'
      - '@ps_homepage.block_defaults_loader'
      - '@ps_homepage.layout_persister'
      - '@config.factory'

  ps_homepage.block_defaults_loader:
    class: Drupal\ps_homepage\Service\HomepageBlockDefaultsLoader
    arguments:
      - '@extension.path.resolver'
      - '@entity.repository'
      - '@ps_search.search_path_resolver'

  ps_homepage.default_layout_builder:
    class: Drupal\ps_homepage\Service\HomepageDefaultLayoutBuilder
    arguments:
      - '@ps_homepage.section_library_template_builder'

  ps_homepage.sd_layout_migrator:
    class: Drupal\ps_homepage\Service\HomepageSdLayoutMigrator
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.layout_persister'
      - '@ps_homepage.section_library_template_builder'
      - '@config.factory'

  ps_homepage.layout_config_migrator:
    class: Drupal\ps_homepage\Service\HomepageLayoutConfigMigrator
    arguments:
      - '@entity_type.manager'
      - '@ps_homepage.layout_persister'

  ps_homepage.layout_persister:
    class: Drupal\ps_homepage\Service\HomepageLayoutPersister
    arguments:
      - '@entity_type.manager'

  ps_homepage.layout_field_ensurer:
    class: Drupal\ps_homepage\Service\HomepageLayoutFieldEnsurer

  ps_homepage.layout_structure_synchronizer:
    class: Drupal\ps_homepage\Service\HomepageLayoutStructureSynchronizer
    arguments:
      - '@entity_type.manager'

  ps_homepage.section_library_installer:
    class: Drupal\ps_homepage\Service\HomepageSectionLibraryInstaller
    arguments:
      - '@ps_homepage.section_library_template_builder'
      - '@entity_type.manager'
      - '@config.factory'
      - '@entity.repository'

  ps_homepage.layout_tempstore_cleaner:
    class: Drupal\ps_homepage\Service\HomepageLayoutTempstoreCleaner
    arguments:
      - '@tempstore.shared'
      - '@entity_type.manager'
      - '@config.factory'

  ps_homepage.section_library_template_builder:
    class: Drupal\ps_homepage\Service\HomepageSectionLibraryTemplateBuilder
    arguments:
      - '@plugin.manager.block'
      - '@uuid'
      - '@ps_homepage.block_defaults_loader'
      - '@?ps_news.news_list_path_resolver'
      - '@?ps_market_study.market_study_list_path_resolver'
      - '@ps_search.search_path_resolver'

  ps_homepage.shell_installer:
    class: Drupal\ps_homepage\Service\HomepageShellInstaller
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@language_manager'
      - '@entity_field.manager'
      - '@ps_homepage.layout_field_ensurer'
      - '@ps_homepage.default_layout_builder'
      - '@ps_homepage.layout_persister'
      - '@ps_homepage.section_library_installer'
      - '@ps_homepage.faq_config_refresher'
      - '@ps_homepage.market_study_config_refresher'
      - '@logger.channel.ps_homepage'
