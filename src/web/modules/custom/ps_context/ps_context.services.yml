services:
  ps_context.offer_matrix_rules:
    class: Drupal\ps_context\Service\OfferMatrixRules
    arguments:
      - '@entity_type.manager'

  ps_context.search_filter_visibility:
    class: Drupal\ps_context\Service\SearchFilterVisibilityResolver
    arguments:
      - '@entity_type.manager'

  ps_context.search_budget_filter:
    class: Drupal\ps_context\Service\SearchBudgetFilterResolver

  # Registered with FQCN so Drupal's HookCollectorPass can inject dependencies.
  Drupal\ps_context\Hook\OfferFormHooks:
    class: Drupal\ps_context\Hook\OfferFormHooks
    arguments:
      - '@ps_context.offer_matrix_rules'
