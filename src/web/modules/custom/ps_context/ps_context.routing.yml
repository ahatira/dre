ps_context.context:
  path: '/admin/ps/config/context'
  defaults:
    _controller: '\Drupal\ps_context\Controller\MatrixAdminOverviewController::redirectToOverview'
  requirements:
    _permission: 'administer ps_context matrix'
  options:
    _admin_route: TRUE

ps_context.context_overview:
  path: '/admin/ps/config/context/overview'
  defaults:
    _controller: '\Drupal\ps_context\Controller\MatrixAdminOverviewController::overview'
    _title: 'Context'
  requirements:
    _permission: 'administer ps_context matrix'
  options:
    _admin_route: TRUE

ps_context.context_translate:
  path: '/admin/ps/config/context/translate'
  defaults:
    _controller: '\Drupal\ps_context\Controller\MatrixTranslationOverviewController::overview'
    _title: 'Translate'
  requirements:
    _permission: 'administer ps_context matrix'
  options:
    _admin_route: TRUE

ps_context.matrix_legacy:
  path: '/admin/ps/config/matrix'
  defaults:
    _controller: '\Drupal\ps_context\Controller\MatrixAdminOverviewController::redirectLegacyMatrix'
  requirements:
    _permission: 'administer ps_context matrix'
  options:
    _admin_route: TRUE

ps_context.matrix_legacy_overview:
  path: '/admin/ps/config/matrix/overview'
  defaults:
    _controller: '\Drupal\ps_context\Controller\MatrixAdminOverviewController::redirectLegacyMatrix'
  requirements:
    _permission: 'administer ps_context matrix'
  options:
    _admin_route: TRUE

ps_context.matrix_legacy_translate:
  path: '/admin/ps/config/matrix/translate'
  defaults:
    _controller: '\Drupal\ps_context\Controller\MatrixAdminOverviewController::redirectLegacyMatrixTranslate'
  requirements:
    _permission: 'administer ps_context matrix'
  options:
    _admin_route: TRUE
