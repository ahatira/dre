ps_email.admin:
  path: '/admin/ps/config/email'
  defaults:
    _controller: '\Drupal\ps_email\Controller\EmailAdminOverviewController::overview'
    _title: 'Transactional emails'
  requirements:
    _permission: 'access ps_email hub'
  options:
    _admin_route: TRUE

ps_email.shell_footer:
  path: '/admin/ps/config/email/shell/footer'
  defaults:
    _form: '\Drupal\ps_email\Form\ShellFooterSettingsForm'
    _title: 'Email footer and legal'
  requirements:
    _permission: 'manage ps_email content'
  options:
    _admin_route: TRUE

ps_email.contact:
  path: '/admin/ps/config/email/contact'
  defaults:
    _controller: '\Drupal\ps_email\Controller\ContactEmailOverviewController::overview'
    _title: 'Contact confirmation copy'
  requirements:
    _permission: 'manage ps_email content'
  options:
    _admin_route: TRUE

ps_email.contact_webform:
  path: '/admin/ps/config/email/contact/{webform_id}'
  defaults:
    _form: '\Drupal\ps_email\Form\ContactWebformEmailSettingsForm'
    _title_callback: '\Drupal\ps_email\Form\ContactWebformEmailSettingsForm::title'
  requirements:
    _permission: 'manage ps_email content'
    webform_id: 'find_property|entrust_search|get_advice|entrust_property|invest_sell|other_request'
  options:
    _admin_route: TRUE

ps_email.user_account:
  path: '/admin/ps/config/email/user'
  defaults:
    _form: '\Drupal\ps_email\Form\UserAccountEmailSettingsForm'
    _title: 'User account emails'
  requirements:
    _permission: 'manage ps_email content'
  options:
    _admin_route: TRUE
