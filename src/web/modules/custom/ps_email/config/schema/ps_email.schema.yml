ps_email.footer:
  type: config_object
  label: 'PS email footer (WYSIWYG zones)'
  mapping:
    footer_left:
      type: mapping
      label: 'Footer left column'
      translatable: true
      mapping:
        value:
          type: text
        format:
          type: string
    footer_right:
      type: mapping
      label: 'Footer right column'
      translatable: true
      mapping:
        value:
          type: text
        format:
          type: string
    legal:
      type: mapping
      label: 'Legal notice'
      translatable: true
      mapping:
        value:
          type: text
        format:
          type: string

ps_email.email_tokens:
  type: config_object
  label: 'PS email design tokens'
  mapping:
    primary_color:
      type: string
      label: 'Primary color'
    text_color:
      type: string
      label: 'Text color'
    muted_color:
      type: string
      label: 'Muted color'
    background_color:
      type: string
      label: 'Background color'
    surface_color:
      type: string
      label: 'Surface color'
    footer_dark_color:
      type: string
      label: 'Footer dark color'
    font_family:
      type: string
      label: 'Font family'
    font_size_base:
      type: string
      label: 'Base font size'
    line_height_base:
      type: string
      label: 'Base line height'
    spacing_unit:
      type: integer
      label: 'Spacing unit (px)'
    max_width:
      type: integer
      label: 'Max width (px)'
    logo_width:
      type: integer
      label: 'Logo width (px)'
    logo_height:
      type: integer
      label: 'Logo height (px)'
    primary_hover_color:
      type: string
      label: 'Primary hover color'
    primary_strong_color:
      type: string
      label: 'Primary strong color'
    secondary_color:
      type: string
      label: 'Secondary color'
    heading_font_family:
      type: string
      label: 'Heading font family'
    border_color:
      type: string
      label: 'Border color'
    exclusive_badge_color:
      type: string
      label: 'Exclusive badge color'
    header_divider_color:
      type: string
      label: 'Header divider color'
    button_radius:
      type: string
      label: 'Button border radius'
