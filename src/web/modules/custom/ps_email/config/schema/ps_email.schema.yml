ps_email.shell:
  type: config_object
  label: 'PS email shell (footer and legal)'
  mapping:
    reuse_site_footer:
      type: boolean
      label: 'Reuse site footer blocks'
    footer_address:
      type: text
      label: 'Footer address'
      translatable: true
    footer_phone:
      type: string
      label: 'Footer phone display'
    footer_phone_link:
      type: string
      label: 'Footer phone tel link'
    footer_offers_url:
      type: string
      label: 'Footer offers URL'
    footer_offers_label:
      type: label
      label: 'Footer offers label'
      translatable: true
    footer_services:
      type: label
      label: 'Footer services line'
      translatable: true
    legal_markup:
      type: text
      label: 'Legal footer markup'
      translatable: true

ps_email.footer_layout:
  type: config_object
  label: 'PS email footer layout'
  mapping:
    reuse_site_footer:
      type: boolean
      label: 'Reuse site footer blocks'
    footer_components:
      type: sequence
      label: 'Footer zone components'
      sequence:
        type: mapping
        mapping:
          uuid:
            type: string
          plugin:
            type: string
          weight:
            type: integer
          region:
            type: string
            label: 'Footer column region'
          settings:
            type: mapping
            mapping:
              markup:
                type: text
              markup_key:
                type: string
    legal_components:
      type: sequence
      label: 'Legal zone components'
      sequence:
        type: mapping
        mapping:
          uuid:
            type: string
          plugin:
            type: string
          weight:
            type: integer
          region:
            type: string
            label: 'Footer column region'
          settings:
            type: mapping
            mapping:
              markup:
                type: text
              markup_key:
                type: string

ps_email.email_tokens:
  type: config_object
  label: 'PS email design tokens'
  mapping:
    primary_color:
      type: string
      label: 'Primary color'
    text_color:
      type: string
      label: 'Text color'
    muted_color:
      type: string
      label: 'Muted color'
    background_color:
      type: string
      label: 'Background color'
    surface_color:
      type: string
      label: 'Surface color'
    footer_dark_color:
      type: string
      label: 'Footer dark color'
    font_family:
      type: string
      label: 'Font family'
    font_size_base:
      type: string
      label: 'Base font size'
    line_height_base:
      type: string
      label: 'Base line height'
    spacing_unit:
      type: integer
      label: 'Spacing unit (px)'
    max_width:
      type: integer
      label: 'Max width (px)'
    logo_width:
      type: integer
      label: 'Logo width (px)'
    logo_height:
      type: integer
      label: 'Logo height (px)'
    primary_hover_color:
      type: string
      label: 'Primary hover color'
    primary_strong_color:
      type: string
      label: 'Primary strong color'
    heading_font_family:
      type: string
      label: 'Heading font family'
    border_color:
      type: string
      label: 'Border color'
    exclusive_badge_color:
      type: string
      label: 'Exclusive badge color'
    header_divider_color:
      type: string
      label: 'Header divider color'
    button_radius:
      type: string
      label: 'Button border radius'
