services:
  ps_email.email_transaction_registry:
    class: Drupal\ps_email\Service\EmailTransactionRegistry
    arguments:
      - '@module_handler'

  ps_email.email_admin_overview_builder:
    class: Drupal\ps_email\Service\EmailAdminOverviewBuilder
    arguments:
      - '@ps_email.email_transaction_registry'
      - '@config.factory'
      - '@module_handler'
      - '@current_user'
      - '@ps_email.mjml_preview_link_builder'

  ps_email.email_shell_settings:
    class: Drupal\ps_email\Service\EmailShellSettings
    arguments:
      - '@config.factory'
      - '@language_manager'

  ps_email.contact_webform_email_settings:
    class: Drupal\ps_email\Service\ContactWebformEmailSettings

  ps_email.mjml_preview_link_builder:
    class: Drupal\ps_email\Service\MjmlPreviewLinkBuilder
    arguments:
      - '@module_handler'

  ps_email.email_branding_builder:
    class: Drupal\ps_email\Service\EmailBrandingBuilder
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@extension.list.theme'
      - '@file_url_generator'

  ps_email.email_design_token_sync:
    class: Drupal\ps_email\Service\EmailDesignTokenSync
    arguments:
      - '@config.factory'
      - '@extension.list.theme'

  ps_email.email_design_tokens:
    class: Drupal\ps_email\Service\EmailDesignTokens
    arguments:
      - '@config.factory'
      - '@ps_email.email_design_token_sync'

  ps_email.email_logo_attachment_processor:
    class: Drupal\ps_email\Processor\EmailLogoAttachmentProcessor
    arguments:
      - '@ps_email.email_branding_builder'

  ps_email.email_plain_text_from_html_processor:
    class: Drupal\ps_email\Processor\EmailPlainTextFromHtmlProcessor

  ps_email.email_footer_block.address:
    class: Drupal\ps_email\Plugin\EmailFooterBlock\AddressFooterBlock
    arguments:
      - '@ps_email.email_shell_settings'
      - '@config.factory'
      - '@entity_type.manager'

  ps_email.email_footer_block.phone:
    class: Drupal\ps_email\Plugin\EmailFooterBlock\PhoneFooterBlock
    arguments:
      - '@ps_email.email_shell_settings'
      - '@config.factory'
      - '@entity_type.manager'

  ps_email.email_footer_block.social_links:
    class: Drupal\ps_email\Plugin\EmailFooterBlock\SocialLinksFooterBlock
    arguments:
      - '@ps_email.email_shell_settings'
      - '@config.factory'
      - '@entity_type.manager'

  ps_email.email_footer_block.offers_link:
    class: Drupal\ps_email\Plugin\EmailFooterBlock\OffersLinkFooterBlock
    arguments:
      - '@ps_email.email_shell_settings'
      - '@config.factory'
      - '@entity_type.manager'

  ps_email.email_footer_block.services_line:
    class: Drupal\ps_email\Plugin\EmailFooterBlock\ServicesLineFooterBlock
    arguments:
      - '@ps_email.email_shell_settings'
      - '@config.factory'
      - '@entity_type.manager'

  ps_email.email_footer_block.rich_text:
    class: Drupal\ps_email\Plugin\EmailFooterBlock\RichTextFooterBlock
    arguments:
      - '@ps_email.email_shell_settings'
      - '@config.factory'
      - '@entity_type.manager'

  ps_email.email_footer_block_registry:
    class: Drupal\ps_email\Service\EmailFooterBlockRegistry
    arguments:
      -
        address: '@ps_email.email_footer_block.address'
        phone: '@ps_email.email_footer_block.phone'
        social_links: '@ps_email.email_footer_block.social_links'
        offers_link: '@ps_email.email_footer_block.offers_link'
        services_line: '@ps_email.email_footer_block.services_line'
        rich_text: '@ps_email.email_footer_block.rich_text'

  ps_email.email_footer_layout_renderer:
    class: Drupal\ps_email\Service\EmailFooterLayoutRenderer
    arguments:
      - '@config.factory'
      - '@ps_email.email_footer_block_registry'

  ps_email.email_rich_footer_builder:
    class: Drupal\ps_email\Service\EmailRichFooterBuilder
    arguments:
      - '@ps_email.email_shell_settings'
      - '@config.factory'
      - '@entity_type.manager'
      - '@ps_email.email_footer_layout_renderer'

  ps_email.offer_email_card_html_renderer:
    class: Drupal\ps_email\Service\OfferEmailCardHtmlRenderer
    arguments:
      - '@renderer'
      - '@ps_email.email_design_tokens'

  ps_email.email_mjml_preview_variables_builder:
    class: Drupal\ps_email\Service\EmailMjmlPreviewVariablesBuilder
    arguments:
      - '@config.factory'
      - '@module_handler'
      - '@language_manager'
      - '@ps_email.email_branding_builder'
      - '@ps_email.email_design_tokens'
      - '@ps_email.email_rich_footer_builder'
      - '@ps_email.offer_email_card_html_renderer'

  ps_email.mjml_preview_variables_subscriber:
    class: Drupal\ps_email\EventSubscriber\MjmlPreviewVariablesSubscriber
    arguments:
      - '@module_handler'
      - '@language_manager'
      - '@ps_email.email_mjml_preview_variables_builder'
    tags:
      - { name: event_subscriber }

  Drupal\ps_email\Hook\MailHooks:
    class: Drupal\ps_email\Hook\MailHooks
    arguments:
      - '@ps_email.email_logo_attachment_processor'
      - '@ps_email.email_plain_text_from_html_processor'
      - '@ps_email.email_mjml_preview_variables_builder'

  Drupal\ps_email\Hook\EmailAdminHooks: {}

  Drupal\ps_email\Hook\EmailThemeHooks: {}
