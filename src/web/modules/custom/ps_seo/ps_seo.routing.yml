ps_seo.admin:
  path: '/admin/ps/config/seo'
  defaults:
    _controller: '\Drupal\ps_seo\Controller\SeoAdminOverviewController::redirectToOverview'
  requirements:
    _permission: 'access ps_seo admin+access ps_core config section'
  options:
    _admin_route: TRUE

ps_seo.admin_overview:
  path: '/admin/ps/config/seo/overview'
  defaults:
    _controller: '\Drupal\ps_seo\Controller\SeoAdminOverviewController::overview'
    _title: 'SEO'
  requirements:
    _permission: 'access ps_seo admin+access ps_core config section'
  options:
    _admin_route: TRUE
