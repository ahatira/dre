services:
  ps_seo.search_head_builder:
    class: Drupal\ps_seo\Search\SearchSeoHeadBuilder
    arguments:
      - '@ps_search.filter_results_header_builder'
      - '@ps_search.seo_canonical_url_builder'
      - '@config.factory'

  Drupal\ps_seo\Search\SearchSeoHeadBuilder: '@ps_seo.search_head_builder'

  ps_seo.offer_head_builder:
    class: Drupal\ps_seo\Offer\OfferSeoHeadBuilder
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@language_manager'
      - '@ps_offer.surface_kpi_builder'
      - '@file_url_generator'

  Drupal\ps_seo\Offer\OfferSeoHeadBuilder: '@ps_seo.offer_head_builder'

  Drupal\ps_seo\Hook\SearchMetatagHooks:
    class: Drupal\ps_seo\Hook\SearchMetatagHooks
    arguments:
      - '@current_route_match'
      - '@ps_seo.search_head_builder'
      - '@ps_search.seo_canonical_url_builder'
      - '@ps_search.seo_indexability_checker'

  Drupal\ps_seo\Hook\OfferMetatagHooks:
    class: Drupal\ps_seo\Hook\OfferMetatagHooks
    arguments:
      - '@current_route_match'
      - '@ps_seo.offer_head_builder'
