ps_offer.settings:
  type: config_object
  label: 'Offer display settings'
  mapping:
    tooltip_title:
      type: label
      label: 'Popover title'
      translatable: true
    label_ht:
      type: label
      label: 'HT definition'
      translatable: true
    label_hc:
      type: label
      label: 'HC definition'
      translatable: true
    label_cc:
      type: label
      label: 'CC definition'
      translatable: true
    label_hd:
      type: label
      label: 'HD definition'
      translatable: true
    fees_prefix:
      type: label
      label: 'Fees line prefix'
      translatable: true
    default_fees_rental:
      type: label
      label: 'Default rental fees text'
      translatable: true
    default_fees_sale:
      type: label
      label: 'Default sale fees text'
      translatable: true
    on_request:
      type: label
      label: 'On request label'
      translatable: true
    budget_from_prefix:
      type: label
      label: 'Budget from prefix'
      translatable: true
    label_ttc:
      type: label
      label: 'TTC label'
      translatable: true
    price_information:
      type: label
      label: 'Info icon aria-label'
      translatable: true
    surface_divisible_template:
      type: label
      label: 'Divisible surface template'
      translatable: true
    surface_capacity_unit:
      type: label
      label: 'Capacity unit label'
      translatable: true
    surface_kpi_separator:
      type: label
      label: 'Surface KPI separator'
      translatable: true
    default_image_fid:
      type: integer
      label: 'Default offer image file ID'
    default_image_alt:
      type: label
      label: 'Default offer image alt text'
      translatable: true
    default_contact_agent:
      type: integer
      label: 'Default contact agent entity ID'

ps_offer.import_governance:
  type: config_object
  label: 'Offer import governance settings'
  mapping:
    crm_row_strategy_override:
      type: string
      label: 'CRM row strategy override'
    allow_crm_overwrite_reference:
      type: boolean
      label: 'Allow CRM to overwrite reference fields'
    missing_from_xml:
      type: mapping
      label: 'Missing from XML snapshot'
      mapping:
        offer_action:
          type: string
          label: 'Non-protected offer action'
        protected_offer_action:
          type: string
          label: 'Protected offer action'
    present_in_xml:
      type: mapping
      label: 'Present in XML snapshot'
      mapping:
        reactivate:
          type: boolean
          label: 'Republish inactive offers'
        sync_fields_by_entity:
          type: ps_core.import_governance.present_in_xml.sync_fields_by_entity
          label: 'Fields to synchronize by entity'
    bo_create:
      type: mapping
      label: 'Back-office creation defaults'
      mapping:
        default_internal_lock:
          type: boolean
          label: 'Default internal lock for new offers'

ps_offer.map_settings:
  type: config_object
  label: 'Offer map settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enable offer detail map'
    poi_enabled:
      type: boolean
      label: 'Enable POI filters'
    travel_enabled:
      type: boolean
      label: 'Enable travel time tools'
    circle_radius_m:
      type: integer
      label: 'Approximate circle radius'
    circle_radius_large_cities_m:
      type: integer
      label: 'Approximate circle radius in large cities'
    poi_search_radius_m:
      type: integer
      label: 'POI search radius'
    default_zoom_exact:
      type: integer
      label: 'Default zoom for exact address'
    default_zoom_approx:
      type: integer
      label: 'Default zoom for approximate location'
    default_zoom_approx_large_city:
      type: integer
      label: 'Default zoom for approximate large city location'
    large_city_localities:
      type: text
      label: 'Large city localities'
    circle_color:
      type: string
      label: 'Approximate circle color'
    travel_mode_icon_driving:
      type: string
      label: 'Travel mode icon (car)'
    travel_mode_icon_transit:
      type: string
      label: 'Travel mode icon (public transport)'
    travel_mode_icon_walking:
      type: string
      label: 'Travel mode icon (walking)'
    travel_mode_icon_bicycling:
      type: string
      label: 'Travel mode icon (cycling)'
    poi_icon_transport:
      type: string
      label: 'POI filter icon (transports)'
    poi_icon_parkings:
      type: string
      label: 'POI filter icon (parkings)'
    poi_icon_restaurants:
      type: string
      label: 'POI filter icon (restaurants)'
    poi_icon_hotels:
      type: string
      label: 'POI filter icon (hotels)'
    poi_marker_icon_transport:
      type: string
      label: 'POI map marker icon (transports)'
    poi_marker_icon_parkings:
      type: string
      label: 'POI map marker icon (parkings)'
    poi_marker_icon_restaurants:
      type: string
      label: 'POI map marker icon (restaurants)'
    poi_marker_icon_hotels:
      type: string
      label: 'POI map marker icon (hotels)'
    poi_marker_color_transport:
      type: string
      label: 'POI map marker color (transports)'
    poi_marker_color_parkings:
      type: string
      label: 'POI map marker color (parkings)'
    poi_marker_color_restaurants:
      type: string
      label: 'POI map marker color (restaurants)'
    poi_marker_color_hotels:
      type: string
      label: 'POI map marker color (hotels)'
