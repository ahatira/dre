langcode: en
status: true
dependencies:
  module:
    - password_policy_blacklist
    - password_policy_character_types
    - password_policy_history
    - password_policy_length
id: bnp_corporate
label: 'BNP corporate password policy'
password_reset: 90
send_reset_email: true
send_pending_email:
  - 14
  - 7
  - 1
policy_constraints:
  -
    id: password_length
    character_length: 12
    character_operation: minimum
  -
    id: character_types
    character_types: 4
  -
    id: password_policy_history_constraint
    history_repeats: 5
  -
    id: password_blacklist
    blacklist:
      - password
      - admin
      - welcome
      - bnp
      - '123456'
      - '12345678'
      - qwerty
    match_substrings: true
roles:
  administrator: administrator
  content_admin: content_admin
  seo_admin: seo_admin
  site_admin: site_admin
  translate_admin: translate_admin
show_policy_table: true
