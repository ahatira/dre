services:
  bnp_editor.manager:
    class: Drupal\bnp_editor\Service\EditorManager
    arguments:
      - '@entity_type.manager'
      - '@logger.channel.bnp_editor'

  bnp_editor.role_installer:
    class: Drupal\bnp_editor\Service\BnpEditorRoleInstaller
    public: true
    arguments:
      - '@entity_type.manager'
      - '@module_handler'

  logger.channel.bnp_editor:
    parent: logger.channel_base
    arguments:
      - 'bnp_editor'
