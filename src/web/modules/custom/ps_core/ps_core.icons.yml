ps_core:
  label: "Property Search admin"
  description: "Navigation toolbar icons for Property Search admin menu links."
  version: 1.0.0
  license:
    name: GPL-2.0-or-later
    gpl-compatible: true
  extractor: svg
  config:
    sources:
      - assets/icons/navigation/*.svg
  settings:
    size:
      title: "Size"
      description: "Icon size in pixels (Navigation toolbar default: 20)."
      type: "integer"
      default: 20
    class:
      title: "Class"
      description: "CSS class applied to the SVG root element."
      type: "string"
      default: ""
  template: >
    <svg
      {{ attributes
          .setAttribute('viewBox', attributes.viewBox|default('0 0 24 24'))
          .setAttribute('class', class)
          .setAttribute('width', size|default('20'))
          .setAttribute('height', size|default('20'))
          .setAttribute('aria-hidden', 'true')
      }}
    >
      {{ content }}
    </svg>
