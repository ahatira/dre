ps_core.import_governance.present_in_xml.sync_fields_by_entity:
  type: mapping
  label: 'Snapshot field sync by entity'
  mapping:
    '*':
      type: sequence
      label: 'Fields to synchronize'
      sequence:
        type: string
        label: 'Field name'

ps_core.settings:
  type: config_object
  label: 'Property Search Core settings'
  mapping:
    cache_default_ttl:
      type: integer
      label: 'Default cache TTL (seconds)'
    enable_audit_logging:
      type: boolean
      label: 'Enable audit logging'
    audit_retention_days:
      type: integer
      label: 'Audit retention (days)'
    conflict_window_seconds:
      type: integer
      label: 'Conflict detection window (seconds)'
    urgency_help_enabled:
      type: boolean
      label: 'Enable site-wide urgency help block'
    urgency_help_lead:
      type: label
      label: 'Urgency help lead text'
      translatable: true
    urgency_help_phone:
      type: string
      label: 'Urgency help phone (display)'
    urgency_help_phone_link:
      type: string
      label: 'Urgency help phone link (tel: URI, optional)'
    urgency_help_hours:
      type: label
      label: 'Urgency help opening hours'
      translatable: true

ps_core.offer_section_settings:
  type: config_object
  label: 'Offer section settings'
  mapping:
    sections:
      type: mapping
      label: 'Offer detail sections'
      mapping:
        '*':
          type: mapping
          label: 'Section'
          mapping:
            label:
              type: label
              label: 'Section title'
              translatable: true
            icon:
              type: string
              label: 'Section icon'
            transport_group:
              type: string
              label: 'Transport feature group'

ps_core.governance:
  type: config_object
  label: 'Import governance global settings'
  mapping:
    import:
      type: mapping
      label: 'Import governance'
      mapping:
        global_lock_strategy:
          type: mapping
          label: 'Global lock strategy source'
          mapping:
            source_config:
              type: string
              label: 'Source config name'
            source_key:
              type: string
              label: 'Source config key'
        show_domain_inheritance_hints:
          type: boolean
          label: 'Show inheritance hints on domain forms'
