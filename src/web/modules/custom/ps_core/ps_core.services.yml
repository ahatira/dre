services:
  logger.channel.ps_core:
    parent: logger.channel_base
    arguments: ['ps_core']

  ps_core.conflict_window_provider:
    class: Drupal\ps_core\Service\NullConflictWindowProvider

  Drupal\ps_core\Service\ConflictWindowProviderInterface: '@ps_core.conflict_window_provider'

  ps_core.field_mapper:
    class: Drupal\ps_core\Service\FieldMapper

  ps_core.config_resolver:
    class: Drupal\ps_core\Service\ConfigResolver
    arguments: ['@config.factory']

  ps_core.config_entity_protection_registry:
    class: Drupal\ps_core\ConfigEntityProtection\ConfigEntityProtectionRegistry
    arguments: [!tagged_iterator ps_core.config_entity_protection.definition]

  ps_core.entity_protection_manager:
    class: Drupal\ps_core\Service\EntityProtectionManager
    arguments:
      - '@logger.channel.ps_core'
      - '@ps_core.config_entity_protection_registry'
      - '@datetime.time'
      - '@ps_core.conflict_window_provider'

  Drupal\ps_core\Service\EntityProtectionManagerInterface: '@ps_core.entity_protection_manager'

  ps_core.permission_manager:
    class: Drupal\ps_core\Service\PermissionManager
    arguments: ['@current_user', '@router.route_provider']

  ps_core.section_manager:
    class: Drupal\ps_core\Service\OfferSectionManager
    arguments:
      - '@container.namespaces'
      - '@cache.discovery'
      - '@module_handler'

  ps_core.import_governance_policy_manager:
    class: Drupal\ps_core\Service\ImportGovernancePolicyManager
    arguments:
      - '@container.namespaces'
      - '@cache.discovery'
      - '@module_handler'

  ps_core.import_governance_registry:
    class: Drupal\ps_core\Service\ImportGovernanceRegistry
    arguments:
      - '@ps_core.import_governance_policy_manager'

  ps_core.import_governance_global_resolver:
    class: Drupal\ps_core\Service\ImportGovernanceGlobalResolver
    arguments:
      - '@config.factory'
      - '@module_handler'

  ps_core.admin_flowchart_builder:
    class: Drupal\ps_core\Service\AdminFlowchartBuilder

  ps_core.governance_admin_flow_builder:
    class: Drupal\ps_core\Service\GovernanceAdminFlowBuilder
    arguments:
      - '@ps_core.admin_flowchart_builder'
      - '@ps_core.import_governance_registry'
      - '@ps_core.import_governance_global_resolver'
      - '@module_handler'

  ps_core.import_governance_snapshot_field_resolver:
    class: Drupal\ps_core\Service\ImportGovernanceSnapshotFieldResolver
    arguments:
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@ps_core.config_entity_protection_registry'

  ps_core.import_governance_snapshot_field_settings:
    class: Drupal\ps_core\Service\ImportGovernanceSnapshotFieldSettings
    arguments:
      - '@ps_core.import_governance_snapshot_field_resolver'

  ps_core.import_governance_snapshot_synchronizer:
    class: Drupal\ps_core\Service\ImportGovernanceSnapshotSynchronizer
    arguments:
      - '@ps_core.entity_protection_manager'

  ps_core.section_registry:
    class: Drupal\ps_core\Service\OfferSectionRegistry
    arguments:
      - '@ps_core.section_manager'
      - '@config.factory'

  ps_core.section_heading_builder:
    class: Drupal\ps_core\Service\OfferSectionHeadingBuilder
    arguments:
      - '@ps_core.section_registry'

  ps_core.email_branding_builder:
    class: Drupal\ps_core\Service\EmailBrandingBuilder
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@extension.list.theme'
      - '@file_url_generator'

  ps_core.email_logo_attachment_processor:
    class: Drupal\ps_core\Processor\EmailLogoAttachmentProcessor
    arguments:
      - '@ps_core.email_branding_builder'

  ps_core.site_urgency_contact:
    class: Drupal\ps_core\Service\SiteUrgencyContactBuilder
    arguments:
      - '@config.factory'
      - '@renderer'

  ps_core.site_config_split_installer:
    class: Drupal\ps_core\Service\SiteConfigSplitInstaller
    arguments:
      - '@config.factory'
      - '@config.storage'
      - '@logger.channel.ps_core'

  ps_core.site_language_negotiation_installer:
    alias: ps_core.site_config_split_installer

  ps_core.ps_theme_shell_installer:
    class: Drupal\ps_theme\Service\ThemeShellInstaller
    arguments:
      - '@config.factory'
      - '@extension.path.resolver'
      - '@logger.channel.ps_core'

  Drupal\ps_core\Hook\MailHooks:
    class: Drupal\ps_core\Hook\MailHooks
    arguments:
      - '@config.factory'
      - '@ps_core.email_branding_builder'
      - '@ps_core.email_logo_attachment_processor'

  Drupal\ps_core\Hook\ThemeHooks:
    class: Drupal\ps_core\Hook\ThemeHooks

  Drupal\ps_core\Hook\PsCoreAdminHooks: {}

  ps_core.anonymous_csrf_session_subscriber:
    class: Drupal\ps_core\EventSubscriber\AnonymousCsrfSessionSubscriber
    arguments:
      - '@current_user'
      - '@session_manager.metadata_bag'
    tags:
      - { name: event_subscriber }

