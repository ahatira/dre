ps_search.seo_url_mappings:
  type: config_object
  label: 'PS Search SEO URL mappings'
  mapping:
    search_path:
      type: label
      label: 'Search page URL slug (base config = internal Views route; translations = public slug per language)'
    operation_types:
      type: mapping
      label: 'Operation type slugs'
      mapping:
        LOC:
          type: label
          label: 'Slug for LOC (rental)'
        VEN:
          type: label
          label: 'Slug for VEN (sale)'
    asset_types:
      type: mapping
      label: 'Asset type slugs'
      mapping:
        BUR:
          type: label
          label: 'Slug for BUR (office)'
        ENT:
          type: label
          label: 'Slug for ENT (warehouse)'
        ACT:
          type: label
          label: 'Slug for ACT (activity)'
        COM:
          type: label
          label: 'Slug for COM (retail)'
        TER:
          type: label
          label: 'Slug for TER (land)'
        LOG:
          type: label
          label: 'Slug for LOG (logistics)'
        COW:
          type: label
          label: 'Slug for COW (coworking)'
    asset_slug_aliases:
      type: mapping
      label: 'Legacy asset slug aliases'
      mapping:
        '*':
          type: label
          label: 'Canonical asset slug'

ps_search.seo_redirects:
  type: config_object
  label: 'PS Search SEO migration redirects'
  mapping:
    enabled:
      type: boolean
      label: 'Enable configured 301 redirects'
    redirects:
      type: mapping
      label: 'Source path to target path map'
      mapping:
        '*':
          type: string
          label: 'Target path'

ps_search.map_zone_settings:
  type: config_object
  label: 'PS Search map zone settings'
  mapping:
    default_center_lat:
      type: float
      label: 'Default map center latitude'
    default_center_lng:
      type: float
      label: 'Default map center longitude'
    default_radius_km:
      type: float
      label: 'Default search zone radius (km)'
    list_pager_threshold:
      type: integer
      label: 'Max zone results before infinite scroll'
    markers_max:
      type: integer
      label: 'Maximum markers returned per zone'
    markers_cluster_enabled:
      type: boolean
      label: 'Enable server-side grid clusters when zone exceeds markers_max'
    markers_cluster_cells:
      type: integer
      label: 'Target grid cells for server-side marker clusters'
    isochrone_provider:
      type: string
      label: 'Isochrone provider (approximation, ors, google)'
    isochrone_fallback:
      type: boolean
      label: 'Fallback to approximation when external provider fails'
    ors_enabled:
      type: boolean
      label: 'Enable OpenRouteService isochrone provider'
    ors_api_key:
      type: string
      label: 'OpenRouteService API key'
    google_routes_api_key:
      type: string
      label: 'Google Routes API key override (optional)'
    default_zoom:
      type: integer
      label: 'Default map zoom level'
    zoom_min:
      type: integer
      label: 'Minimum map zoom level'
    zoom_max:
      type: integer
      label: 'Maximum map zoom level'
    gesture_handling:
      type: string
      label: 'Map gesture handling mode'
    marker_cluster_max_zoom:
      type: integer
      label: 'Client-side marker cluster max zoom'
    marker_cluster_skip_below:
      type: integer
      label: 'Skip client-side clustering up to this marker count'
    cluster_options:
      type: string
      label: 'Client-side MarkerClusterer options (JSON)'
    google_map_id:
      type: string
      label: 'Google Cloud Map ID (Advanced Markers, optional)'
    lazy_load:
      type: boolean
      label: 'Lazy-load the map shell (future use)'

ps_search.feature_filter_sync:
  type: config_object
  label: 'PS Search feature filter sync settings'
  mapping:
    cron_run_immediate_index:
      type: boolean
      label: 'Run immediate indexing during cron'
    cron_index_only_on_change:
      type: boolean
      label: 'Index only when sync changed configuration'
    sync_view_filters:
      type: boolean
      label: 'Sync individual feature filters into the search view'
    feature_filters_combine:
      type: string
      label: 'Combine mode for active feature filters'

ps_search.api_rate_limit_settings:
  type: config_object
  label: 'PS Search API rate limit settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enable API rate limiting'
    window_seconds:
      type: integer
      label: 'Rate limit window in seconds'
    default_max_requests:
      type: integer
      label: 'Default max requests per window'
    routes:
      type: mapping
      label: 'Per-route limits'
      mapping:
        markers:
          type: integer
          label: 'Markers endpoint'
        isochrone:
          type: integer
          label: 'Isochrone endpoint'
        location_suggest:
          type: integer
          label: 'Location suggest endpoint'
        location_data:
          type: integer
          label: 'Location data endpoint'
        count:
          type: integer
          label: 'Count endpoint'
        htmx:
          type: integer
          label: 'HTMX fragments'

ps_search.api_cache_settings:
  type: config_object
  label: 'PS Search API cache settings'
  mapping:
    markers_ttl:
      type: integer
      label: 'Markers JSON cache TTL (seconds)'
    isochrone_ttl:
      type: integer
      label: 'Isochrone server cache TTL (seconds)'
    isochrone_coordinate_precision:
      type: integer
      label: 'Decimal places for isochrone cache key coordinates'

ps_search.alert_settings:
  type: config_object
  label: 'PS Search alert settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enable search alert cron notifications'
    default_frequence:
      type: string
      label: 'Default frequency for new alerts'
    from_mail:
      type: email
      label: 'From email'
    from_name:
      type: string
      label: 'From name'
    bcc_mail:
      type: email
      label: 'BCC email'
    retention_days:
      type: integer
      label: 'Retention for anonymous alerts (days)'
    batch_size:
      type: integer
      label: 'Alerts processed per cron run'

views.filter.ps_search_location_tokens:
  type: views.filter.search_api_string
  label: 'PS Search location tokens filter'

views.filter_value.ps_search_location_tokens:
  type: views.filter_value.search_api_string
  label: 'PS Search location tokens filter value'

ps_search.geo_zones.*:
  type: config_object
  label: 'PS Search geo zones per country'
  mapping:
    country:
      type: string
      label: 'Country code'
    default_zone:
      type: string
      label: 'Default geo zone id for this country'
    zones:
      type: mapping
      label: 'Geo zones keyed by stable id'
      mapping:
        '*':
          type: mapping
          mapping:
            id:
              type: string
              label: 'Canonical zone id (dots allowed in value)'
            type:
              type: string
              label: 'Zone type'
            code:
              type: string
              label: 'Administrative or semantic code'
            label:
              type: string
              label: 'Human label'
            slug:
              type: string
              label: 'URL slug'
            lat:
              type: float
              label: 'Centroid latitude'
            lng:
              type: float
              label: 'Centroid longitude'
            bbox:
              type: mapping
              label: 'Bounding box'
              mapping:
                sw_lat:
                  type: float
                sw_lng:
                  type: float
                ne_lat:
                  type: float
                ne_lng:
                  type: float
            postal_prefixes:
              type: sequence
              label: 'Postal code prefixes'
              sequence:
                type: string
            parent:
              type: string
              label: 'Parent zone id'
            weight:
              type: integer
              label: 'Sort weight'

ps_search.engine_settings:
  type: config_object
  label: 'PS Search engine v2 settings'
  mapping:
    location_required:
      type: boolean
      label: 'Require a geo context for search'
    default_geo_zone_by_country:
      type: mapping
      label: 'Default geo zone id per country'
      mapping:
        '*':
          type: string
          label: 'Geo zone id'
    geocoding_providers:
      type: sequence
      label: 'Geocoding provider stack'
      sequence:
        type: mapping
        mapping:
          id:
            type: string
            label: 'Provider id'
          enabled:
            type: boolean
            label: 'Enabled'
          weight:
            type: integer
            label: 'Weight'
          api_key:
            type: string
            label: 'Optional API key'
    default_radius_by_geo_type:
      type: mapping
      label: 'Default search radius by geo type (metres)'
      mapping:
        address:
          type: integer
          label: 'Address radius'
        city:
          type: integer
          label: 'City radius'
        postal:
          type: integer
          label: 'Postal radius'
        coordinates:
          type: integer
          label: 'Coordinates radius'
    expand_search_factor:
      type: float
      label: 'BBox expansion factor for widen search CTA'
    feature_filters_combine:
      type: string
      label: 'More filters combine mode (and|or)'
    features:
      type: mapping
      label: 'Feature flags'
      mapping:
        use_search_context:
          type: boolean
          label: 'Attach SearchContext to search requests'
        legacy_location_filter:
          type: boolean
          label: 'Keep legacy LocationSearchFilter path'
