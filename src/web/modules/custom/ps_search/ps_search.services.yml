services:
  logger.channel.ps_search:
    parent: logger.channel_base
    arguments: ['ps_search']

  ps_search.location_filter:
    class: Drupal\ps_search\Service\LocationSearchFilter
    arguments:
      - '@database'
      - '@ps_dictionary.resolver'

  ps_search.location_suggest_builder:
    class: Drupal\ps_search\Service\LocationSuggestBuilder
    arguments:
      - '@database'
      - '@ps_search.location_filter'
      - '@ps_dictionary.resolver'

  ps_search.isochrone.approximation:
    class: Drupal\ps_search\Service\Isochrone\IsochroneApproximationProvider

  ps_search.isochrone.ors:
    class: Drupal\ps_search\Service\Isochrone\OpenRouteServiceIsochroneProvider
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@logger.channel.ps_search'

  ps_search.isochrone.google:
    class: Drupal\ps_search\Service\Isochrone\GoogleRoutesIsochroneProvider
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@logger.channel.ps_search'
      - '@ps_search.isochrone.approximation'

  ps_search.isochrone:
    class: Drupal\ps_search\Service\IsochroneService
    arguments:
      - '@config.factory'
      - '@ps_search.isochrone.approximation'
      - '@ps_search.isochrone.ors'
      - '@ps_search.isochrone.google'
      - '@logger.channel.ps_search'

  ps_search.map_bounds_resolver:
    class: Drupal\ps_search\Service\MapBoundsResolver
    arguments:
      - '@ps_search.location_centroid'
      - '@ps_search.location_filter'
      - '@config.factory'
      - '@ps_search.result_geo_bounds_resolver'

  ps_search.result_geo_bounds_resolver:
    class: Drupal\ps_search\Service\SearchResultGeoBoundsResolver
    arguments:
      - '@ps_search.filter_query_builder'

  ps_search.filter_query_builder:
    class: Drupal\ps_search\Service\SearchFilterQueryBuilder
    arguments:
      - '@ps_search.location_filter'
      - '@ps_search.more_criteria_applier'

  ps_search.result_counter:
    class: Drupal\ps_search\Service\SearchResultCounter
    arguments:
      - '@ps_search.filter_query_builder'
      - '@ps_search.map_bounds_resolver'

  ps_search.markers_grid_cluster_builder:
    class: Drupal\ps_search\Service\SearchMarkersGridClusterBuilder

  ps_search.markers_builder:
    class: Drupal\ps_search\Service\SearchMarkersBuilder
    arguments:
      - '@ps_search.filter_query_builder'
      - '@ps_search.map_bounds_resolver'
      - '@Drupal\ps_search\Service\SearchMapMarkerBuilder'
      - '@ps_search.result_counter'
      - '@ps_search.markers_grid_cluster_builder'
      - '@config.factory'
      - '@cache.default'

  Drupal\ps_search\Hook\MapBoundsQueryHooks:
    class: Drupal\ps_search\Hook\MapBoundsQueryHooks
    arguments:
      - '@ps_search.map_bounds_resolver'
      - '@ps_search.filter_query_builder'
      - '@request_stack'

  Drupal\ps_search\Hook\SearchListPagerHooks:
    class: Drupal\ps_search\Hook\SearchListPagerHooks
    arguments:
      - '@ps_search.result_counter'
      - '@config.factory'
      - '@request_stack'

  ps_search.location_centroid:
    class: Drupal\ps_search\Service\LocationCentroidResolver
    arguments:
      - '@ps_search.location_filter'
      - '@config.factory'

  Drupal\ps_search\Hook\SearchLocationHooks:
    class: Drupal\ps_search\Hook\SearchLocationHooks
    arguments:
      - '@ps_search.location_centroid'
      - '@ps_search.map_bounds_resolver'
      - '@ps_search.result_counter'
      - '@ps_offer.map_settings'
      - '@config.factory'
      - '@request_stack'

  ps_search.more_criteria_applier:
    class: Drupal\ps_search\Service\MoreCriteriaConditionApplier
    arguments:
      - '@ps_search.feature_filter_registry'
      - '@config.factory'

  Drupal\ps_search\Hook\FeatureFilterQueryHooks:
    class: Drupal\ps_search\Hook\FeatureFilterQueryHooks
    arguments:
      - '@ps_search.more_criteria_applier'
      - '@ps_search.feature_filter_registry'
      - '@request_stack'

  ps_search.feature_filter_registry:
    class: Drupal\ps_search\Service\FeatureSearchFilterRegistry
    arguments:
      - '@entity_type.manager'
      - '@ps_feature.feature_group_display_label'

  Drupal\ps_search\Service\FeatureFilterSyncManager:
    class: Drupal\ps_search\Service\FeatureFilterSyncManager
    arguments:
      - '@config.factory'
      - '@ps_search.feature_filter_registry'

  Drupal\ps_search\Service\SearchMapMarkerBuilder:
    class: Drupal\ps_search\Service\SearchMapMarkerBuilder

  Drupal\ps_search\Hook\GeofieldMapHooks:
    class: Drupal\ps_search\Hook\GeofieldMapHooks

  Drupal\ps_search\Hook\FeatureFilterCronHooks:
    class: Drupal\ps_search\Hook\FeatureFilterCronHooks
    arguments:
      - '@Drupal\ps_search\Service\FeatureFilterSyncManager'
      - '@config.factory'
      - '@logger.factory'

  ps_search.seo_path_processor:
    class: Drupal\ps_search\PathProcessor\SearchSeoPathProcessor
    arguments:
      - '@config.factory'
      - '@language_manager'
      - '@language.config_factory_override'
      - '@ps_search.search_path_resolver'
    tags:
      - { name: path_processor_inbound, priority: 290 }
      - { name: path_processor_outbound, priority: 110 }

  ps_search.search_path_resolver:
    class: Drupal\ps_search\Service\SearchPathResolver
    arguments:
      - '@language_manager'
      - '@language.config_factory_override'
      - '@config.storage'

  ps_search.base_path_processor:
    class: Drupal\ps_search\PathProcessor\SearchBasePathProcessor
    arguments:
      - '@ps_search.search_path_resolver'
      - '@language_manager'
    tags:
      - { name: path_processor_inbound, priority: 285 }
      - { name: path_processor_outbound, priority: 105 }

  ps_search.canonical_redirect_subscriber:
    class: Drupal\ps_search\EventSubscriber\SearchCanonicalRedirectSubscriber
    arguments:
      - '@config.factory'
      - '@language.config_factory_override'
      - '@database'
      - '@ps_search.search_path_resolver'
      - '@ps_dictionary.resolver'
    tags:
      - { name: event_subscriber }
