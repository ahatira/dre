services:
  Drupal\ps_search\Commands\SearchFeatureSyncCommands:
    class: Drupal\ps_search\Commands\SearchFeatureSyncCommands
    arguments:
      - '@ps_search.feature_filter_sync_manager'
    tags:
      - { name: drush.command }

  Drupal\ps_search\Commands\SearchAlertCommands:
    class: Drupal\ps_search\Commands\SearchAlertCommands
    arguments:
      - '@Drupal\ps_search\Hook\SearchAlertCronHooks'
      - '@ps_search.alert_matcher'
    tags:
      - { name: drush.command }

  Drupal\ps_search\Commands\SearchGeoZoneCommands:
    class: Drupal\ps_search\Commands\SearchGeoZoneCommands
    arguments:
      - '@ps_search.geo_zone.importer'
      - '@ps_search.geo_zone.builder'
      - '@ps_search.geo_zone.validator'
    tags:
      - { name: drush.command }
