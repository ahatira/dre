ps_search.seo_url_mappings_form:
  path: '/admin/ps/config/search/seo-urls'
  defaults:
    _form: '\Drupal\ps_search\Form\SeoUrlMappingsForm'
    _title: 'SEO URL Mappings'
  requirements:
    _permission: 'administer site configuration'

ps_search.feature_filter_sync_settings:
  path: '/admin/ps/config/search/feature-filters'
  defaults:
    _form: '\Drupal\ps_search\Form\FeatureFilterSyncSettingsForm'
    _title: 'Feature search filters'
  requirements:
    _permission: 'administer site configuration'

ps_search.map_zone_settings_form:
  path: '/admin/ps/config/search/map-zone'
  defaults:
    _form: '\Drupal\ps_search\Form\MapZoneSettingsForm'
    _title: 'Map zone settings'
  requirements:
    _permission: 'administer site configuration'

# Legacy routes - Deprecated in 2.0.0, use ps_search_filters and ps_location_autocomplete instead

ps_search.markers:
  path: '/ps-search/markers'
  defaults:
    _controller: '\Drupal\ps_search\Controller\SearchMarkersController::markers'
    _title: 'Search map markers'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

ps_search.count:
  path: '/ps-search/count'
  defaults:
    _controller: '\Drupal\ps_search\Controller\SearchCountController::count'
    _title: 'Search result count'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

ps_search.location_suggest:
  path: '/ps-search/location-suggest'
  defaults:
    _controller: '\Drupal\ps_search\Controller\SearchCountController::suggest'
    _title: 'Location suggestions'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

ps_search.location_data:
  path: '/ps-search/location-data'
  defaults:
    _controller: '\Drupal\ps_search\Controller\SearchCountController::locationData'
    _title: 'Location structured data'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE
