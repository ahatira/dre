ps_media.gallery_settings:
  type: config_object
  label: 'PS Media gallery settings'
  mapping:
    badge_icon_photos:
      type: string
      label: 'Photos badge icon'
    badge_icon_videos:
      type: string
      label: 'Videos badge icon'
    badge_icon_visit_3d:
      type: string
      label: '3D visit badge icon'
    badge_icon_plan:
      type: string
      label: 'Plan badge icon'

ps_media.import_governance:
  type: config_object
  label: 'Media import governance settings'
  mapping:
    crm_row_strategy_override:
      type: string
      label: 'CRM row strategy override'
    allow_crm_overwrite_alt:
      type: boolean
      label: 'Allow CRM to overwrite alt text and link titles'
    missing_from_xml:
      type: mapping
      label: 'Missing from XML snapshot'
      mapping:
        media_action:
          type: string
          label: 'Non-protected media action'
        protected_media_action:
          type: string
          label: 'Protected media action'
    present_in_xml:
      type: mapping
      label: 'Present in XML snapshot'
      mapping:
        reactivate:
          type: boolean
          label: 'Republish inactive media'
        sync_fields_by_entity:
          type: ps_core.import_governance.present_in_xml.sync_fields_by_entity
          label: 'Fields to synchronize by entity'
    bo_create:
      type: mapping
      label: 'Back-office creation defaults'
      mapping:
        default_internal_lock:
          type: boolean
          label: 'Default internal lock for new media'
