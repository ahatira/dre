services:
  Drupal\ps_media\Hook\PsMediaHooks:
    class: Drupal\ps_media\Hook\PsMediaHooks

  Drupal\ps_media\Hook\MediaEntityHooks:
    class: Drupal\ps_media\Hook\MediaEntityHooks
    arguments:
      - '@ps_media.import_governance'

  ps_media.import_governance:
    class: Drupal\ps_media\Service\MediaImportGovernance
    arguments:
      - '@config.factory'
      - '@ps_core.import_governance_global_resolver'

  ps_media.gallery_badge_icon_resolver:
    class: Drupal\ps_media\Service\GalleryBadgeIconResolver
    arguments: ['@config.factory']

  ps_media.offer_gallery_field_block_subscriber:
    class: Drupal\ps_media\EventSubscriber\OfferGalleryFieldBlockSubscriber
    tags:
      - { name: event_subscriber }
